  .nav-drop-item:hover .nav-drop-icon{transform:scale(1.15);}
  .nav-drop-item.active .nav-drop-icon{transform:scale(1.15);}

  /* ══════════════════════════════════════════════════════════════
     PROJECT TAB STRIP — premium tabs
  ══════════════════════════════════════════════════════════════ */
  .proj-tabs{
    display:flex;align-items:stretch;gap:0;
    overflow-x:auto;scrollbar-width:none;
    border-bottom:1px solid var(--border);
    background:var(--bg);
    height:38px;padding:0 12px;flex-shrink:0;
  }
  .proj-tab{
    display:flex;align-items:center;gap:8px;
    padding:0 14px 0 16px;
    border-bottom:2px solid transparent;
    cursor:pointer;background:none;
    white-space:nowrap;
    font-family:'DM Sans',sans-serif;
    font-size:12px;font-weight:600;
    color:var(--text3);
    letter-spacing:0.01em;
    transition:all 0.15s ease;
    position:relative;height:100%;flex-shrink:0;
    border-right:1px solid var(--border);
  }
  .proj-tab:hover{color:var(--text);background:var(--surface);}
  .proj-tab.active{
    color:var(--text);font-weight:700;
    border-bottom-color:var(--accent);
    background:var(--modal-bg);
  }
  .proj-tab-name{max-width:130px;overflow:hidden;text-overflow:ellipsis;}
  .proj-tab-close{
    display:flex;align-items:center;justify-content:center;
    width:18px;height:18px;border-radius:6px;
    font-size:11px;color:var(--text4);
    transition:all 0.12s;flex-shrink:0;margin-left:4px;
  }
  .proj-tab-close:hover{
    background:color-mix(in srgb,var(--red) 15%,transparent);
    color:var(--red);
  }
  .proj-tab-add{
    display:flex;align-items:center;justify-content:center;
    padding:0 12px;font-size:18px;color:var(--text4);
    cursor:pointer;background:none;border:none;
    height:100%;transition:all 0.15s;flex-shrink:0;
  }
  .proj-tab-add:hover{color:var(--accent);transform:rotate(90deg) scale(1.1);}

  /* ══════════════════════════════════════════════════════════════
     SYNC BADGE — refined
  ══════════════════════════════════════════════════════════════ */
  .sync-badge{
    display:flex;align-items:center;gap:6px;
    padding:5px 10px;
    border-radius:100px;
    border:1px solid var(--border);
    background:var(--surface);
    cursor:pointer;
    font-family:'DM Sans',sans-serif;
    font-size:11px;font-weight:600;
    color:var(--text3);
    transition:all 0.15s;
    white-space:nowrap;overflow:hidden;
    max-width:160px;text-overflow:ellipsis;
  }
  .sync-badge:hover{border-color:var(--accent);color:var(--text);}

  /* ══════════════════════════════════════════════════════════════
     ROOM PILL — refined
  ══════════════════════════════════════════════════════════════ */
  .room-pill{
    display:flex;align-items:center;gap:6px;
    padding:5px 12px;
    background:color-mix(in srgb,var(--green) 10%,transparent);
    border:1px solid color-mix(in srgb,var(--green) 35%,transparent);
    border-radius:100px;cursor:pointer;
    font-family:'DM Sans',sans-serif;
    font-size:11px;font-weight:700;
    color:var(--green);transition:all 0.15s;
    flex-shrink:0;white-space:nowrap;
  }
  .room-pill:hover{
    background:color-mix(in srgb,var(--green) 18%,transparent);
    transform:translateY(-1px);
  }

  /* ══════════════════════════════════════════════════════════════
     MOBILE NAV — more refined
  ══════════════════════════════════════════════════════════════ */
  .mob-nav-label{
    font-family:'DM Sans',sans-serif;
    font-size:9px;font-weight:600;
    letter-spacing:0;line-height:1;
  }

  /* ══════════════════════════════════════════════════════════════
     SAVE BAR — elevated sticky footer
  ══════════════════════════════════════════════════════════════ */
  .save-bar{
    position:sticky;bottom:0;
    background:color-mix(in srgb,var(--modal-bg) 92%,transparent);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding:14px 20px;
    display:flex;gap:10px;align-items:center;
    flex-wrap:wrap;
    box-shadow:0 -4px 20px color-mix(in srgb,var(--text) 6%,transparent);
  }

  /* ══════════════════════════════════════════════════════════════
     EDIT PANEL — premium slide-in
  ══════════════════════════════════════════════════════════════ */
  .edit-panel{
    box-shadow:-16px 0 48px rgba(0,0,0,0.2),
               -1px 0 0 color-mix(in srgb,var(--border) 80%,transparent) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     WIZARD STEPS
  ══════════════════════════════════════════════════════════════ */
  .wizard-step{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px;margin-bottom:16px;
    transition:border-color 0.2s,box-shadow 0.2s;
  }
  .wizard-step:hover{
    border-color:color-mix(in srgb,var(--accent) 30%,var(--border));
  }
  .step-num{
    width:26px;height:26px;border-radius:50%;
    background:var(--accent);color:#fff;
    font-family:'DM Sans',sans-serif;
    font-size:12px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    box-shadow:0 2px 8px color-mix(in srgb,var(--accent) 40%,transparent);
  }

  /* ══════════════════════════════════════════════════════════════
     NAV TRIGGER — upgraded pill
  ══════════════════════════════════════════════════════════════ */
  .nav-trigger{
    border-radius:10px !important;
    padding:8px 14px !important;
  }
  .nav-trigger:hover{
    box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 20%,transparent) !important;
    transform:translateY(-1px);
  }

  /* ══════════════════════════════════════════════════════════════
     INTEGRATION TABS
  ══════════════════════════════════════════════════════════════ */
  .int-tab{
    font-family:'DM Sans',sans-serif;
    font-size:12px;font-weight:600;
    letter-spacing:0.01em;
    padding:11px 16px;
  }

  /* ══════════════════════════════════════════════════════════════
     SHARE CHANNEL BUTTONS
  ══════════════════════════════════════════════════════════════ */
  .share-channel-btn{
    font-family:'DM Sans',sans-serif;
    font-size:12px;font-weight:600;
    letter-spacing:0.01em;
    border-radius:8px;
    padding:11px 16px;
    transition:all 0.15s;
  }
  .share-channel-btn:hover{transform:translateY(-1px);}

  /* ══════════════════════════════════════════════════════════════
     ROLE BADGES
  ══════════════════════════════════════════════════════════════ */
  .role-badge{
    border-radius:100px;
    font-family:'DM Sans',sans-serif;
    font-size:10px;font-weight:700;
    letter-spacing:0.01em;
    padding:4px 10px;
  }

  /* ══════════════════════════════════════════════════════════════
     PROV CARDS — mobile provision cards
  ══════════════════════════════════════════════════════════════ */
  .prov-card{
    border-radius:16px;
    transition:box-shadow 0.2s,transform 0.2s;
  }
  .prov-card:active{transform:scale(0.99);}

  /* ══════════════════════════════════════════════════════════════
     CHAT — team room
  ══════════════════════════════════════════════════════════════ */
  .chat-bubble{
    border-radius:14px;
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    line-height:1.5;
  }
  .chat-msg.mine .chat-bubble{
    border-radius:14px 14px 4px 14px;
  }
  .chat-msg:not(.mine) .chat-bubble{
    border-radius:14px 14px 14px 4px;
  }
  .chat-input-field{
    font-family:'DM Sans',sans-serif !important;
    font-size:13px !important;
    border-radius:22px !important;
  }
  .chat-input-field:focus{
    border-color:var(--accent) !important;
    box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent) !important;
  }
  .chat-send-btn{
    border-radius:50% !important;
    transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1) !important;
  }
  .chat-send-btn:hover{
    transform:scale(1.1) !important;
    box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 35%,transparent) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     LANDING PAGE UPGRADES
  ══════════════════════════════════════════════════════════════ */

  .lp-btn-primary{
    border-radius:9px !important;
    font-family:'DM Sans',sans-serif !important;
    font-weight:700 !important;
    letter-spacing:0.02em !important;
    transition:all 0.2s cubic-bezier(0.34,1.4,0.64,1) !important;
  }
  .lp-btn-primary:hover{transform:translateY(-2px) !important;box-shadow:0 0 44px color-mix(in srgb,var(--accent) 50%,transparent) !important;}
  .lp-btn-primary:active{transform:scale(0.97) !important;}
  .lp-btn-ghost{border-radius:9px !important;font-family:'DM Sans',sans-serif !important;font-weight:600 !important;transition:all 0.15s ease !important;}
  .lp-btn-ghost:hover{border-color:var(--text3) !important;}
  .lp-feat-card{border-radius:13px !important;transition:all 0.22s cubic-bezier(0.34,1.2,0.64,1) !important;}
  .lp-feat-card:hover{transform:translateY(-4px) !important;box-shadow:0 14px 42px color-mix(in srgb,var(--bg) 20%,black) !important;}
  .lp-feat-title{font-family:'Sora',sans-serif !important;font-weight:800 !important;}

  /* ══════════════════════════════════════════════════════════════
     ORG BOX  /* ══════════════════════════════════════════════════════════════
     ORG BOX — reg box premium look
  ══════════════════════════════════════════════════════════════ */
  .org-box,.reg-box,.lock-box{
    border-radius:20px !important;
    box-shadow:0 24px 80px rgba(0,0,0,0.2),0 4px 16px rgba(0,0,0,0.1) !important;
  }
  .org-mode-btn{
    transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1) !important;
    border-radius:16px !important;
  }
  .org-mode-btn:hover{
    transform:translateY(-2px) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     DARK THEME NOISE PATTERN on main bg
  ══════════════════════════════════════════════════════════════ */
  [data-theme="dark"] #root::before,
  [data-theme="slate"] #root::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    opacity:0.018;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:256px 256px;
  }

  /* ══════════════════════════════════════════════════════════════
     MODAL BACKDROPS — richer blur
  ══════════════════════════════════════════════════════════════ */
  .edit-overlay,.share-modal-overlay,.int-overlay,
  .org-panel-overlay,.mob-drawer-overlay{
    backdrop-filter:blur(8px) saturate(150%) !important;
    -webkit-backdrop-filter:blur(8px) saturate(150%) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     PIN / LOCK SCREEN BUTTONS
  ══════════════════════════════════════════════════════════════ */
  .pin-btn{
    border-radius:12px !important;
    font-family:'DM Sans',sans-serif !important;
    font-size:18px !important;font-weight:600 !important;
    transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1) !important;
  }
  .pin-btn:active{
    transform:scale(0.9) !important;
    transition-duration:0.08s !important;
  }

  /* ══════════════════════════════════════════════════════════════
     MOBILE DRAWER IMPROVEMENTS
  ══════════════════════════════════════════════════════════════ */
  .mob-drawer{border-radius:24px 24px 0 0 !important;}
  .mob-drawer-btn{
    border-radius:12px !important;
    font-weight:600 !important;
    transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1) !important;
  }
  .mob-drawer-btn:hover{
    transform:translateX(3px) !important;
    border-color:var(--accent) !important;
    color:var(--accent) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     MOBILE TAB BAR
  ══════════════════════════════════════════════════════════════ */
  .mob-tab-btn{
    font-family:'DM Sans',sans-serif !important;
    font-weight:600 !important;
    font-size:12px !important;
    letter-spacing:0 !important;
    text-transform:none !important;
  }

  /* ══════════════════════════════════════════════════════════════
     EDIT ROW — panel rows
  ══════════════════════════════════════════════════════════════ */
  .edit-row{
    border-radius:10px !important;
    transition:border-color 0.15s,box-shadow 0.15s !important;
  }
  .edit-row:hover{
    border-color:var(--border2) !important;
    box-shadow:0 2px 8px color-mix(in srgb,var(--text) 5%,transparent) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     INVITE CODE BOX
  ══════════════════════════════════════════════════════════════ */
  .invite-code-val{
    background:linear-gradient(135deg, var(--accent), color-mix(in srgb,var(--accent) 70%, var(--purple)));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }

  /* ══════════════════════════════════════════════════════════════
     OVERFLOW MENU BUTTON (⋯)
  ══════════════════════════════════════════════════════════════ */
  .ov-btn{
    transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1) !important;
  }
  .ov-btn:hover{transform:scale(1.05) !important;}

  /* ══════════════════════════════════════════════════════════════
     APP HOME BUTTON
  ══════════════════════════════════════════════════════════════ */
  .app-home-btn{
    border-radius:8px !important;
    font-family:'DM Sans',sans-serif !important;
    font-weight:700 !important;
    font-size:12px !important;
    letter-spacing:0.01em !important;
    transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1) !important;
  }
  .app-home-btn:hover{
    transform:translateY(-1px) !important;
    box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 25%,transparent) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     MOBILE SAFE AREA — ensure toast clears nav pill
  ══════════════════════════════════════════════════════════════ */
  @media(max-width:768px){
    .toast{
      bottom:calc(98px + env(safe-area-inset-bottom,0px)) !important;
      font-size:12px !important;
    }
    /* btn adjustments for iOS touch targets */
    .btn-primary{padding:14px 22px !important;border-radius:14px !important;font-size:15px !important;min-height:48px;font-weight:800 !important;letter-spacing:0.02em !important;box-shadow:0 4px 16px var(--accent)44 !important;}
    .btn-ghost{padding:12px 18px !important;border-radius:12px !important;font-size:14px !important;min-height:48px;}
    .btn-add{padding:14px 20px !important;border-radius:14px !important;font-size:14px !important;min-height:48px;}
    .field-input,.field-select{border-radius:12px !important;font-size:15px !important;padding:12px 14px !important;}
  }

  /* ══════════════════════════════════════════════════════════════
     LARGE TEXT MODE COMPAT
  ══════════════════════════════════════════════════════════════ */
  [data-large="1"] .btn-primary{font-size:16px !important;padding:15px 26px !important;min-height:54px !important;}
  [data-large="1"] .btn-ghost{font-size:16px !important;min-height:50px !important;}
  [data-large="1"] .field-input,[data-large="1"] .field-select{font-size:17px !important;}
  [data-large="1"] .edit-tab{font-size:14px !important;}
  [data-large="1"] .nav-drop-item{font-size:15px !important;}
  [data-large="1"] .chip{font-size:13px !important;}
  [data-large="1"] .toast{font-size:16px !important;}
  [data-large="1"] td{font-size:15px !important;}
  [data-large="1"] th{font-size:13px !important;}

  /* ══════════════════════════════════════════════════════════════
     MRADI ADMIN PANEL — founder-grade control room
  ══════════════════════════════════════════════════════════════ */
  .adm-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.88);
    z-index:2000;display:flex;flex-direction:column;
    animation:fadeIn 0.2s ease;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .adm-shell{
    display:flex;flex-direction:column;height:100vh;max-height:100vh;
    background:#07070D;color:#E8E8F4;
    font-family:'DM Sans',sans-serif;overflow:hidden;position:relative;
  }
  .adm-shell::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 60% 40% at 70% 0%,rgba(255,92,0,0.07) 0%,transparent 70%),
               radial-gradient(ellipse 40% 30% at 10% 100%,rgba(0,212,170,0.05) 0%,transparent 70%);
  }
  .adm-topbar{
    display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;
    background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07);
    flex-shrink:0;position:relative;z-index:1;
  }
  .adm-logo{
    display:flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;
    color:#FF5C00;letter-spacing:0.12em;text-transform:uppercase;flex-shrink:0;
  }
  .adm-logo-badge{
    background:#FF5C00;color:#07070D;font-family:'JetBrains Mono',monospace;
    font-size:8px;font-weight:900;padding:2px 6px;border-radius:3px;
    letter-spacing:0.12em;text-transform:uppercase;
  }
  .adm-tabs{
    display:flex;gap:0;height:100%;margin-left:16px;
  }
  .adm-tab{
    display:flex;align-items:center;gap:6px;padding:0 16px;
    background:none;border:none;border-bottom:2px solid transparent;
    font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.35);
    cursor:pointer;transition:all 0.15s;white-space:nowrap;height:100%;
  }
  .adm-tab:hover{color:rgba(255,255,255,0.7);}
  .adm-tab.active{color:#FF5C00;border-bottom-color:#FF5C00;}
  .adm-close{
    margin-left:auto;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.5);padding:5px 12px;border-radius:5px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.08em;transition:all 0.15s;flex-shrink:0;
  }
  .adm-close:hover{background:rgba(255,59,59,0.15);border-color:rgba(255,59,59,0.4);color:#FF3B3B;}
  .adm-body{
    flex:1;overflow-y:auto;padding:20px;position:relative;z-index:1;
  }
  .adm-body::-webkit-scrollbar{width:4px;}
  .adm-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
  /* Stat cards */
  .adm-stat-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;
    margin-bottom:24px;
  }
  .adm-stat{
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;padding:18px 16px;position:relative;overflow:hidden;
    transition:border-color 0.2s;
  }
  .adm-stat:hover{border-color:rgba(255,255,255,0.16);}
  .adm-stat::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
  }
  .adm-stat.green::before{background:linear-gradient(90deg,#00D4AA,transparent);}
  .adm-stat.amber::before{background:linear-gradient(90deg,#FFB300,transparent);}
  .adm-stat.accent::before{background:linear-gradient(90deg,#FF5C00,transparent);}
  .adm-stat.blue::before{background:linear-gradient(90deg,#4A9EFF,transparent);}
  .adm-stat-label{
    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.35);
    margin-bottom:10px;
  }
  .adm-stat-val{
    font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:900;
    line-height:1;letter-spacing:-0.02em;
  }
  .adm-stat-sub{
    font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,0.3);
    margin-top:4px;
  }
  /* Section headers */
  .adm-section-hdr{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:12px;
  }
  .adm-section-title{
    font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.5);
    display:flex;align-items:center;gap:8px;
  }
  /* Payments table */
  .adm-tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid rgba(255,255,255,0.08);}
  .adm-tbl{width:100%;border-collapse:collapse;}
  .adm-tbl th{
    background:rgba(255,255,255,0.04);
    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.3);
    padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.08);
    text-align:left;white-space:nowrap;position:sticky;top:0;z-index:1;
  }
  .adm-tbl td{

  }
  .adm-tbl tr:last-child td{border-bottom:none;}

  .adm-tbl tr.pending-row td{background:rgba(255,179,0,0.04);}
  .adm-tbl tr.pending-row:hover td{background:rgba(255,179,0,0.08);}
  /* Status badges */
  .adm-badge{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 8px;border-radius:20px;
    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;
  }
  .adm-badge.pending{background:rgba(255,179,0,0.15);color:#FFB300;border:1px solid rgba(255,179,0,0.3);}
  .adm-badge.confirmed{background:rgba(0,212,170,0.12);color:#00D4AA;border:1px solid rgba(0,212,170,0.25);}
  .adm-badge.failed{background:rgba(255,59,59,0.12);color:#FF3B3B;border:1px solid rgba(255,59,59,0.25);}
  .adm-badge.active{background:rgba(0,212,170,0.12);color:#00D4AA;border:1px solid rgba(0,212,170,0.25);}
  .adm-badge.inactive{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.1);}
  /* Action buttons */
  .adm-btn-approve{
    background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);
    color:#00D4AA;padding:5px 10px;border-radius:5px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.06em;transition:all 0.15s;
    white-space:nowrap;
  }
  .adm-btn-approve:hover{background:rgba(0,212,170,0.22);transform:translateY(-1px);}
  .adm-btn-approve:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
  .adm-btn-reject{
    background:rgba(255,59,59,0.1);border:1px solid rgba(255,59,59,0.25);
    color:#FF3B3B;padding:5px 10px;border-radius:5px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.06em;transition:all 0.15s;
    white-space:nowrap;
  }
  .adm-btn-reject:hover{background:rgba(255,59,59,0.2);transform:translateY(-1px);}
  .adm-btn-reject:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
  .adm-btn-toggle-on{
    background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);
    color:#00D4AA;padding:5px 12px;border-radius:5px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.06em;transition:all 0.15s;
  }
  .adm-btn-toggle-off{
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);

    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:800;
    text-transform:uppercase;letter-spacing:0.06em;transition:all 0.15s;
  }

    transform:translateY(-1px);

  .adm-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}

    color:rgba(255,255,255,0.45);padding:5px 12px;border-radius:20px;cursor:pointer;

  ══════════════════════════════════════════════════════════════ */
  .app-body{display:flex;min-height:calc(100vh - 58px);}
  .side-nav{

    background:var(--header-bg);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;

    z-index:50;scrollbar-width:none;

  .side-nav::-webkit-scrollbar{display:none;}
  .side-nav.collapsed{width:52px;min-width:52px;}
  .side-nav-inner{display:flex;flex-direction:column;height:100%;padding:8px 0 12px;}
  .snav-section-label{
    font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.1em;color:var(--text4);
    padding:12px 14px 5px;white-space:nowrap;overflow:hidden;
    transition:opacity 0.15s;
  }
  .side-nav.collapsed .snav-section-label{opacity:0;height:0;padding:0;}
  .snav-item{
    display:flex;align-items:center;gap:10px;
    padding:8px 12px;margin:1px 6px;
    border-radius:8px;border:none;background:none;
    cursor:pointer;text-align:left;width:calc(100% - 12px);
    color:var(--text3);font-family:'DM Sans',sans-serif;
    font-size:12px;font-weight:600;letter-spacing:0.01em;
    transition:background 0.12s,color 0.12s;
    white-space:nowrap;overflow:hidden;position:relative;
  }
  .snav-item:hover{background:var(--nav-active-bg);color:var(--text);}
  .snav-item.active{
    background:var(--nav-active-bg);color:var(--accent);font-weight:700;
  }
  .snav-item.active::before{
    content:'';position:absolute;left:0;top:20%;bottom:20%;
    width:3px;border-radius:0 3px 3px 0;background:var(--accent);
  }
  .snav-icon{font-size:16px;line-height:1;flex-shrink:0;}
  .snav-label{flex:1;overflow:hidden;text-overflow:ellipsis;transition:opacity 0.15s,max-width 0.22s;}
  .side-nav.collapsed .snav-label{opacity:0;max-width:0;pointer-events:none;}
  .snav-collapse-btn{
    display:flex;align-items:center;justify-content:center;
    margin:4px 6px 0;padding:7px;border-radius:8px;
    background:none;border:1px solid var(--border);
    color:var(--text4);cursor:pointer;
    font-size:11px;transition:all 0.15s;
    width:calc(100% - 12px);gap:6px;
    font-family:'JetBrains Mono',monospace;font-weight:700;
    white-space:nowrap;overflow:hidden;
  }
  .snav-collapse-btn:hover{background:var(--nav-active-bg);color:var(--text);border-color:var(--border2);}
  .side-nav.collapsed .snav-collapse-btn span.snav-collapse-label{display:none;}
  .app-main-area{flex:1;min-width:0;}
  @media(max-width:768px){
    .side-nav{display:none !important;}
    .app-body{display:block;}
  }
  @media(min-width:769px) and (max-width:1100px){

    .side-nav .snav-label{opacity:0;max-width:0;pointer-events:none;}
    .side-nav .snav-section-label{opacity:0;height:0;padding:0;}
    .side-nav .snav-collapse-btn span.snav-collapse-label{display:none;}

  .workspace-ctx-bar{display:flex;}

  @media(min-width:769px){.hide-desktop{display:none!important;}}
