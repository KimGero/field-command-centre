<div id="root" style="position:relative;z-index:1;"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;


// ══════════════════════════════════════════════════════════════════
// FIELD COMMAND CENTER — LANDING PAGE COMPONENT
// Shares theme system with the app via CSS variables
// ══════════════════════════════════════════════════════════════════
function LandingPage({theme, setTheme, largeText, setLargeText, onEnter}){
  const [chosenPlan, setChosenPlan] = React.useState(null);
  const {useEffect} = React;

  // Scroll-reveal
  useEffect(()=>{
    const els = document.querySelectorAll(".lp-reveal");
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add("lp-vis"); });
    },{threshold:0.1});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);

  // Individual feat-card reveals
  useEffect(()=>{
    const cards = document.querySelectorAll(".lp-feat-card");
    cards.forEach((c,i)=>{
      c.style.opacity="0";
      c.style.transform="translateY(18px)";
      c.style.transition=`opacity 0.55s ease ${i*0.05}s, transform 0.55s ease ${i*0.05}s, border-color 0.3s, box-shadow 0.3s, transform 0.3s`;
    });
    const obs2 = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.style.opacity="1"; e.target.style.transform="translateY(0)"; } });
    },{threshold:0.08});
    cards.forEach(c=>obs2.observe(c));
    return()=>obs2.disconnect();
  },[]);

  const scrollTo = id => {
    const el = document.getElementById(id);
    if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
  };

  const phases = [
    {label:"PH1 Design & Approvals", pct:100, col:"var(--green)"},
    {label:"PH2 Foundation",          pct:100, col:"var(--green)"},
    {label:"PH3 Superstructure",      pct:72,  col:"var(--amber)"},
    {label:"PH4 Roof Structure",      pct:45,  col:"var(--accent)"},
    {label:"PH5 MEP Services",        pct:30,  col:"var(--accent)"},
    {label:"PH6 Int. Finishes",       pct:15,  col:"var(--red)"},
  ];

  const features = [
    {num:"01",icon:"📝",bg:"rgba(255,92,0,0.12)",title:"Daily Site Diary → Auto Report",desc:"Log progress, materials, photos, and issues once. Mradi HQ auto-generates your Daily Progress Report, Client Update, and Consultant Report — PDF and WhatsApp link included.",hook:"1 button → professional report",hookClr:"var(--accent)"},
    {num:"02",icon:"💰",bg:"rgba(0,212,170,0.12)",title:'"Where Is My Money?" Dashboard',desc:"Contract value, certified payments, pending invoices, paid amounts, outstanding balance — your construction bank account, always visible. If you check this daily, you win.",hook:"Real-time payment position",hookClr:"var(--green)"},

  return <span style={{background:`${c}18`,color:c,border:`1px solid ${c}35`,borderRadius:"3px",fontSize:"9px",fontWeight:"700",padding:"2px 6px",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}}>{label}</span>;
}
function Bar({value,color,h=4}){
  const c=color||"var(--accent)";
  return(
    <div style={{background:"var(--bg)",borderRadius:"3px",height:h,overflow:"hidden",width:"100%"}}>
      <div style={{width:`${Math.min(100,Math.max(0,value))}%`,height:"100%",background:c,borderRadius:"3px",transition:"width 0.8s ease"}}/>
    </div>
  );
}
function Arc({value,size=60,color}){
  const c=color||(value>=80?"var(--green)":value>=50?"var(--amber)":"var(--red)");
  const r=(size-8)/2,circ=2*Math.PI*r,offset=circ-(value/100)*circ;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth="5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth="5"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 1s ease"}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
        fill={c} fontSize="11" fontWeight="800" fontFamily="'JetBrains Mono',monospace"
        style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`}}>{value}%</text>
    </svg>
  );
}
function Field({label,value,onChange,type="text",opts,half,textarea,placeholder=""}){
  return(
    <div className="field-group" style={{gridColumn:half?"span 1":"span 2"}}>
      <label className="field-label">{label}</label>
      {opts?(
        <select className="field-select" value={value} onChange={e=>onChange(e.target.value)}>
          {opts.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      ):textarea?(
        <textarea className="field-input" value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)}/>
      ):(
        <input className="field-input" type={type} value={value} placeholder={placeholder}
          onChange={e=>onChange(type==="number"?Number(e.target.value):e.target.value)}/>
      )}
    </div>
  );
}
function RangeField({label,value,onChange,max=100}){
  return(
    <div className="field-group">
      <label className="field-label">{label}</label>
      <div className="range-wrap">
        <input type="range" min="0" max={max} value={value} onChange={e=>onChange(Number(e.target.value))}/>
        <span className="range-val">{value}{max===100?"%":""}</span>
      </div>
    </div>
  );
}
function SectionTitle({children}){
  return <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"10px"}}>{children}</div>;
}
function StatCard({label,value,color,sub,bar}){
  return(
    <div className="card" style={{padding:"14px"}}>
      <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"6px"}}>{label}</div>
      <div style={{fontSize:"24px",fontWeight:"900",color:color||"var(--accent)",lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:"9px",color:"var(--text4)",marginTop:"4px",fontFamily:"'JetBrains Mono',monospace"}}>{sub}</div>}
      {bar!==undefined&&<Bar value={bar} color={color} h={2}/>}
    </div>
  );
}

// ── GANTT ─────────────────────────────────────────────────────────────────────
function Gantt({phases}){
  const S=new Date("2024-01-01"),E=new Date("2027-01-01"),T=(E-S)/864e5;
  const tp=d=>Math.max(0,Math.min(100,((new Date(d)-S)/864e5/T)*100));
  const todayPct=tp(new Date().toISOString().slice(0,10));
  const quarters=[];
  for(let y=2024;y<=2026;y++) for(let q=0;q<4;q++){
    const d=new Date(y,q*3,1);
    quarters.push({label:`Q${q+1}'${String(y).slice(2)}`,left:tp(d.toISOString().slice(0,10))});
  }
  return(
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",overflowX:"auto"}}>
      <div style={{minWidth:"500px"}}>
        <div style={{display:"flex",marginBottom:"6px",marginLeft:"160px",position:"relative",height:"18px"}}>
          {quarters.map(q=><div key={q.label} style={{position:"absolute",left:`${q.left}%`,color:"var(--text4)",borderLeft:"1px solid var(--border)",paddingLeft:"3px",fontSize:"8px"}} className="hide-mobile">{q.label}</div>)}
          <div style={{position:"absolute",left:`${todayPct}%`,top:"-2px",bottom:"-200px",borderLeft:"2px dashed var(--red)55",zIndex:2}}>
            <div style={{background:"var(--red)",color:"#fff",fontSize:"8px",padding:"1px 4px",borderRadius:"2px",whiteSpace:"nowrap",transform:"translateX(-50%)",fontWeight:"800"}}>TODAY</div>
          </div>
        </div>
        {phases.map(ph=>{
          const left=tp(ph.startDate),width=Math.max(1,tp(ph.endDate)-left),col=SCC[ph.status]||"#A0AEC0";
          return(
            <div key={ph.id} style={{display:"flex",alignItems:"center",marginBottom:"7px",gap:"8px"}}>
              <div className="gantt-label" style={{width:"155px",flexShrink:0,textAlign:"right",paddingRight:"8px"}}>
                <div style={{color:"var(--text2)",fontSize:"9px",lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ph.name}</div>
                <div style={{color:"var(--text4)",fontSize:"8px"}}>{ph.id}</div>
              </div>
              <div style={{flex:1,position:"relative",height:"22px",background:"var(--bg)",borderRadius:"3px",minWidth:"200px"}}>
                <div style={{position:"absolute",left:`${left}%`,width:`${width}%`,height:"100%",background:`${col}25`,border:`1px solid ${col}55`,borderRadius:"2px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${ph.progress}%`,background:`${col}70`}}/>
                </div>
                <div style={{position:"absolute",left:`${left+width/2}%`,top:"50%",transform:"translate(-50%,-50%)",color:col,fontSize:"9px",fontWeight:"bold",pointerEvents:"none",whiteSpace:"nowrap"}}>{ph.progress}%</div>
              </div>
              <div style={{width:"20px",flexShrink:0}}><div style={{width:"8px",height:"8px",borderRadius:"50%",background:col,margin:"0 auto"}}/></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── PIN LOCK ──────────────────────────────────────────────────────────────────
function PinLock({onUnlock}){
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  const press=n=>{
    if(pin.length>=4) return;
    const next=pin+n;
    setPin(next);
    if(next.length===4){
      if(next===ADMIN_PIN){onUnlock();}
      else{setErr(true);setTimeout(()=>{setPin("");setErr(false);},600);}
    }
  };
  return(
    <div className="lock-screen">
      <div className="lock-box">
        <div style={{fontSize:"11px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:"0.14em",marginBottom:"8px"}}>AHP Command Centre</div>
        <div style={{fontSize:"18px",fontWeight:"800",color:"var(--text)",marginBottom:"4px"}}>Team Access</div>
        <div className="pin-dots">{[0,1,2,3].map(i=><div key={i} className={`pin-dot ${i<pin.length?(err?"error":"filled"):""}`}/>)}</div>
        <div className="pin-grid">
          {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n,i)=>(
            <button key={i} className="pin-btn" style={{visibility:n===""?"hidden":"visible"}}
              onClick={()=>{if(n==="⌫"){setPin(p=>p.slice(0,-1));}else{press(String(n));}}}>
              {n}
            </button>
          ))}
        </div>
        <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginTop:"16px"}}>Contact your project administrator for access.</div>
      </div>
    </div>
  );
}

// ── NEW PROJECT WIZARD ────────────────────────────────────────────────────────
const TRADES = ["Foreman","Mason","Carpenter","Steel Fixer","Electrician","Plumber","Labourer","Painter","Tiler","Welder","Plant Operator","Driver","Site Clerk","Safety Officer","Watchman","Other"];
const WORKER_STATUS = ["active","inactive","suspended"];

function NewProjectWizard({onCreate,onCancel}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:"",location:"",client:"",contractor:"",contractValue:"",startDate:today(),targetCompletion:""});
  const [workers,setWorkers]=useState([{name:"",trade:"Foreman",phone:""},{name:"",trade:"Mason",phone:""}]);
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));
  const upW=(i,k,v)=>setWorkers(ws=>{const n=[...ws];n[i]={...n[i],[k]:v};return n;});
  const canStep0=form.name.trim()&&form.location.trim();

  const create=()=>{
    const p=blankProject(form.name.trim(),form.location.trim());
    p.site.client=form.client;
    p.site.contractor=form.contractor;
    p.site.contractValue=Number(form.contractValue)||0;
    if(form.startDate) p.site.startDate=form.startDate;
    if(form.targetCompletion) p.site.targetCompletion=form.targetCompletion;
    const seeded=workers.filter(w=>w.name.trim()).map((w,i)=>({
      id:"W"+String(i+1).padStart(3,"0"),
      name:w.name.trim(), trade:w.trade, role:w.trade,
      org:form.contractor||"", phone:w.phone,
      status:"active", joinDate:today(),
      inductionDate:"", idNumber:"", emergencyContact:"", emergencyPhone:"", dailyRate:"", load:0,
    }));
    if(seeded.length){
      p.workers = seeded; // on-site workforce — separate from professional team
    }
    onCreate(p);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"var(--overlay)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",animation:"fadeIn 0.2s"}}>
      <div style={{background:"var(--modal-bg)",border:"1px solid var(--border)",borderRadius:"14px",width:"min(540px,100%)",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.25)"}}>
        <div style={{padding:"20px 24px 16px",borderBottom:"1px solid var(--border)",position:"relative"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:"var(--gradient)",borderRadius:"14px 14px 0 0"}}/>
          <div style={{fontSize:"18px",fontWeight:"900",color:"var(--text)"}}>New Project</div>
          <div style={{display:"flex",gap:"8px",marginTop:"12px"}}>
            {["Project details","First workers"].map((l,i)=>(
              <div key={i} style={{flex:1}}>
                <div style={{height:"3px",borderRadius:"2px",background:i<=step?"var(--accent)":"var(--border)",marginBottom:"5px",transition:"background 0.3s"}}/>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:i===step?"var(--accent)":"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        {step===0&&(
          <div style={{padding:"22px 24px"}}>
            <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)",marginBottom:"14px"}}>What's this project called and where is it?</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
              <Field label="Project name *" value={form.name} onChange={v=>up("name",v)} placeholder="e.g. Kilimani Phase 2"/>
              <Field label="Location *" value={form.location} onChange={v=>up("location",v)} placeholder="e.g. Kilimani, Nairobi"/>
            </div>
            <div style={{height:"1px",background:"var(--border)",margin:"16px 0 14px"}}/>
            <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginBottom:"14px",textTransform:"uppercase",letterSpacing:"0.08em"}}>Optional — fill in now or update later</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
              <Field label="Client / Owner" value={form.client} onChange={v=>up("client",v)} placeholder="e.g. Kilimani Developers Ltd" half/>
              <Field label="Main Contractor" value={form.contractor} onChange={v=>up("contractor",v)} placeholder="e.g. Jamhuri Construction" half/>
              <Field label="Contract Value (KES)" value={form.contractValue} onChange={v=>up("contractValue",v)} type="number" half/>
              <div/>
              <Field label="Start Date" value={form.startDate} onChange={v=>up("startDate",v)} type="date" half/>
              <Field label="Target Completion" value={form.targetCompletion} onChange={v=>up("targetCompletion",v)} type="date" half/>
            </div>
          </div>
        )}

        {step===1&&(
          <div style={{padding:"22px 24px"}}>
            <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)",marginBottom:"4px"}}>Add your first workers</div>
            <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"16px",lineHeight:1.5}}>Start with a few — add everyone else in the Workers tab after. Skip this step to start empty.</div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {workers.map((w,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto 1fr auto",gap:"8px",alignItems:"end"}}>
                  <div className="field-group" style={{margin:0}}>
                    {i===0&&<label className="field-label">Name</label>}
                    <input className="field-input" value={w.name} onChange={e=>upW(i,"name",e.target.value)} placeholder={"e.g. "+(i===0?"James Mwangi":"Aisha Kamau")}/>
                  </div>
                  <div className="field-group" style={{margin:0}}>
                    {i===0&&<label className="field-label">Trade</label>}
                    <select className="field-select" value={w.trade} onChange={e=>upW(i,"trade",e.target.value)}>
                      {TRADES.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="field-group" style={{margin:0}}>
                    {i===0&&<label className="field-label">Phone</label>}
                    <input className="field-input" value={w.phone} onChange={e=>upW(i,"phone",e.target.value)} placeholder="+254 7XX XXX XXX"/>
                  </div>
                  <button onClick={()=>setWorkers(ws=>ws.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"16px",padding:"6px 2px",marginTop:i===0?"20px":"0"}}>✕</button>
                </div>
              ))}
            </div>
            <button className="btn-ghost" style={{marginTop:"12px",fontSize:"11px",padding:"6px 14px"}} onClick={()=>setWorkers(ws=>[...ws,{name:"",trade:"Labourer",phone:""}])}>+ Add another</button>
          </div>
        )}

        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",gap:"10px",justifyContent:"space-between"}}>
          <button className="btn-ghost" onClick={step===0?onCancel:()=>setStep(0)}>{step===0?"Cancel":"← Back"}</button>
          <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
            {step===0&&<button className="btn-primary" disabled={!canStep0} style={{opacity:canStep0?1:0.4}} onClick={()=>{if(!canStep0)return;setStep(1);}}>Continue →</button>}
            {step===1&&<button className="btn-ghost" style={{fontSize:"11px"}} onClick={create}>Skip — start empty</button>}
            {step===1&&<button className="btn-primary" onClick={create}>Create project ✓</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN EDIT PANEL ──────────────────────────────────────────────────────────

  const [snags,setSnags]=useState(data.snags.map(s=>({...s})));
  const [team,setTeam]=useState(data.team.map(m=>({...m})));

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div className="field-group"><label className="field-label">Status</label><select className="field-select" value={w.status} onChange={e=>upWP(i,"status",e.target.value)}>{STATUS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                    <div className="field-group"><label className="field-label">Priority</label><select className="field-select" value={w.priority} onChange={e=>upWP(i,"priority",e.target.value)}>{PRIORITY_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                    <div className="field-group"><label className="field-label">Phase</label><input className="field-input" value={w.phase} onChange={e=>upWP(i,"phase",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Trade</label><input className="field-input" value={w.trade} onChange={e=>upWP(i,"trade",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Assignee (Team ID)</label><input className="field-input" value={w.assignee} onChange={e=>upWP(i,"assignee",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Value</label><input className="field-input" value={w.unit} onChange={e=>upWP(i,"unit",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Quantity/Scope</label><input className="field-input" value={w.qty} onChange={e=>upWP(i,"qty",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Dependencies</label><input className="field-input" value={w.deps} onChange={e=>upWP(i,"deps",e.target.value)}/></div>
                  </div>
                </div>
              ))}
              <button className="btn-add" onClick={()=>setWps(ws=>[...ws,{id:`WP${String(ws.length+1).padStart(3,"0")}`,phase:"PH1",trade:"Structural",name:"New Work Package",status:"not-started",priority:"medium",assignee:"PM",progress:0,qty:"",unit:"KES 0",deps:""}])}>+ Add Work Package</button>
            </div>
          )}
          {tab==="risks"&&(
            <div className="edit-section">
              <div className="edit-section-title">⚠ Risk Register</div>
              {risks.map((r,i)=>(
                <div key={r.id} className="edit-row">
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                    <div style={{display:"flex",gap:"6px"}}><Badge label={r.id} color={SCC[r.severity]||"#A0AEC0"}/><Badge label={r.severity} color={SCC[r.severity]||"#A0AEC0"}/></div>
                    <button className="btn-danger" onClick={()=>setRisks(rs=>rs.filter((_,j)=>j!==i))}>Remove</button>
                  </div>
                  <div className="field-group"><label className="field-label">Risk Title</label><input className="field-input" value={r.title} onChange={e=>upRisk(i,"title",e.target.value)}/></div>
                  <RangeField label={`Probability: ${r.probability}%`} value={r.probability} onChange={v=>upRisk(i,"probability",v)}/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div className="field-group"><label className="field-label">Severity</label><select className="field-select" value={r.severity} onChange={e=>upRisk(i,"severity",e.target.value)}>{SEVERITY_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                    <div className="field-group"><label className="field-label">Status</label><select className="field-select" value={r.status} onChange={e=>upRisk(i,"status",e.target.value)}>{RISK_STATUS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                    <div className="field-group"><label className="field-label">Phase</label><input className="field-input" value={r.phase} onChange={e=>upRisk(i,"phase",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Owner (Team ID)</label><input className="field-input" value={r.owner} onChange={e=>upRisk(i,"owner",e.target.value)}/></div>
                  </div>
                  <div className="field-group"><label className="field-label">Impact</label><input className="field-input" value={r.impact} onChange={e=>upRisk(i,"impact",e.target.value)}/></div>
                  <div className="field-group"><label className="field-label">Mitigation Action</label><input className="field-input" value={r.mitigation} onChange={e=>upRisk(i,"mitigation",e.target.value)}/></div>
                </div>
              ))}
              <button className="btn-add" onClick={()=>setRisks(rs=>[...rs,{id:`R${String(rs.length+1).padStart(3,"0")}`,phase:"PH1",title:"New Risk",severity:"medium",probability:50,impact:"",mitigation:"",owner:"PM",status:"open"}])}>+ Add Risk</button>
            </div>
          )}
          {tab==="snags"&&(
            <div className="edit-section">
              <div className="edit-section-title">🔍 QA/QC Snagging</div>
              {snags.map((s,i)=>(
                <div key={s.id} className="edit-row">
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                    <div style={{display:"flex",gap:"6px"}}><Badge label={s.id} color={SCC[s.severity]||"#A0AEC0"}/><Badge label={s.severity} color={SCC[s.severity]||"#A0AEC0"}/></div>
                    <button className="btn-danger" onClick={()=>setSnags(ss=>ss.filter((_,j)=>j!==i))}>Remove</button>
                  </div>
                  <div className="field-group"><label className="field-label">Defect Description</label><input className="field-input" value={s.item} onChange={e=>upSnag(i,"item",e.target.value)}/></div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div className="field-group"><label className="field-label">Block / Location</label><input className="field-input" value={s.block} onChange={e=>upSnag(i,"block",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Date Raised</label><input className="field-input" type="date" value={s.raised} onChange={e=>upSnag(i,"raised",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Severity</label><select className="field-select" value={s.severity} onChange={e=>upSnag(i,"severity",e.target.value)}>{SEVERITY_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                    <div className="field-group"><label className="field-label">Status</label><select className="field-select" value={s.status} onChange={e=>upSnag(i,"status",e.target.value)}>{SNAG_STATUS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                  </div>
                </div>
              ))}
              <button className="btn-add" onClick={()=>setSnags(ss=>[...ss,{id:`SN${String(ss.length+1).padStart(3,"0")}`,block:"Block A",item:"New snag item",severity:"minor",status:"open",raised:today()}])}>+ Add Snag Item</button>
            </div>
          )}
          {tab==="team"&&(
            <div className="edit-section">
              <div className="edit-section-title">👷 Site Team</div>
              <div style={{fontSize:"10px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",marginBottom:"12px",padding:"8px 10px",background:"var(--accent-bg)",borderRadius:"5px",lineHeight:1.5}}>
                💡 This is the <strong>professional team</strong> — PM, SE, AR, QS etc. For on-site workers (masons, labourers, steel fixers), use <strong>Workers → Registry tab</strong> which has induction tracking, ID numbers, daily rates, and emergency contacts.
              </div>
              {team.map((m,i)=>(
                <div key={m.id} className="edit-row">
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                    <span style={{fontSize:"13px",fontWeight:"700",color:"var(--text)"}}>{m.name} <span style={{color:"var(--text4)",fontSize:"10px"}}>({m.id})</span></span>
                    <button className="btn-danger" onClick={()=>setTeam(ts=>ts.filter((_,j)=>j!==i))}>Remove</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div className="field-group"><label className="field-label">Team ID</label><input className="field-input" value={m.id} onChange={e=>upTeam(i,"id",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Full Name</label><input className="field-input" value={m.name} onChange={e=>upTeam(i,"name",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Role / Title</label><input className="field-input" value={m.role} onChange={e=>upTeam(i,"role",e.target.value)}/></div>
                    <div className="field-group"><label className="field-label">Organisation</label><input className="field-input" value={m.org} onChange={e=>upTeam(i,"org",e.target.value)}/></div>
                  </div>
                  <RangeField label={`Workload: ${m.load||0}%`} value={m.load||0} onChange={v=>upTeam(i,"load",v)}/>
                </div>
              ))}
              <button className="btn-add" onClick={()=>setTeam(ts=>[...ts,{id:"XX",name:"New Team Member",role:"",org:"",load:0}])}>+ Add Team Member</button>
            </div>
          )}
        </div>
        <div className="save-bar">
          <button className="btn-primary" onClick={()=>onSave({site,phases,wps,risks,snags,team})}>💾 Save Changes</button>
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </>
  );
}

// ── PROVISIONS VIEW ───────────────────────────────────────────────────────────
function ProvisionsView({provisions,setProvisions,site,phases}){
  const {useState:uS,useRef:uR,useEffect:uE}=React;
  const [tab,setTab]=uS("summary");
  const [editItem,setEditItem]=uS(null);  // {section,idx} | null
  const [editForm,setEditForm]=uS(null);
  const [showContForm,setShowContForm]=uS(false);
  const [contForm,setContForm]=uS({...provisions.contingency});
  const inputRef=uR(null);

  uE(()=>{if(editItem&&inputRef.current)inputRef.current.focus();},[editItem]);

  const {contingency,provisionalSums=[],primeCost=[],variations=[],dayworks=[]}=provisions;

  // ── computed totals ──────────────────────────────────────────────────────────
  const psScheduled = provisionalSums.reduce((s,p)=>s+p.scheduled,0);
  const psInstructed = provisionalSums.reduce((s,p)=>s+p.instructed,0);
  const psSpent = provisionalSums.reduce((s,p)=>s+p.spent,0);
  const psSaved = psScheduled - psInstructed; // omitted/savings

  const pcScheduled = primeCost.reduce((s,p)=>s+p.scheduled,0);
  const pcExpended  = primeCost.reduce((s,p)=>s+(p.actual||0),0);
  const pcAdjusted  = primeCost.reduce((s,p)=>s+p.adjusted,0);

  const voApproved = variations.filter(v=>v.status==="approved").reduce((s,v)=>s+v.amount,0);
  const voPending  = variations.filter(v=>v.status==="pending"||v.status==="submitted").reduce((s,v)=>s+v.amount,0);
  const voTotal    = variations.reduce((s,v)=>s+v.amount,0);

  const dwApproved = dayworks.filter(d=>d.status==="approved").reduce((s,d)=>s+d.labour+d.plant+d.materials,0);
  const dwTotal    = dayworks.reduce((s,d)=>s+d.labour+d.plant+d.materials,0);

  const originalContract = site.contractValue||0;
  const revisedContract  = originalContract + voApproved;
  const provisionBudget  = psScheduled + pcScheduled + (contingency.allocated||0);
  const provisionExpended= psSpent + pcExpended + (contingency.expended||0) + dwApproved;

  // ── CRUD helpers ──────────────────────────────────────────────────────────────
  const startEdit=(section,idx)=>{
    const item=provisions[section][idx];
    setEditItem({section,idx});
    setEditForm({...item});
  };
  const saveEdit=()=>{
    if(!editItem) return;
    const {section,idx}=editItem;
    const arr=[...provisions[section]];
    arr[idx]={...arr[idx],...editForm};
    setProvisions({...provisions,[section]:arr});
    setEditItem(null);setEditForm(null);
  };
  const cancelEdit=()=>{setEditItem(null);setEditForm(null);};
  const addItem=(section,template)=>setProvisions({...provisions,[section]:[...provisions[section],template]});
  const removeItem=(section,idx)=>{
    const arr=[...provisions[section]];arr.splice(idx,1);
    setProvisions({...provisions,[section]:arr});
  };
  const upField=(k,v)=>setEditForm(f=>({...f,[k]:v}));

  const TABS=[
    {id:"summary",label:"Summary",icon:"📊"},
    {id:"ps",     label:"Prov. Sums",icon:"📋"},
    {id:"pc",     label:"Prime Cost",icon:"🏷"},
    {id:"vo",     label:"Variations",icon:"📝"},
    {id:"dw",     label:"Dayworks",  icon:"⏱"},
  ];

  // ── Waterfall bar component ───────────────────────────────────────────────────
  const WaterfallRow=({label,amount,sub,color,indent=false,bold=false,divider=false})=>(
    <div style={{display:"flex",alignItems:"center",gap:"8px",padding:`${divider?"10px":"5px"} 0`,borderTop:divider?"2px solid var(--border)":"none",marginTop:divider?"4px":"0"}}>
      <div className="waterfall-label" style={{flex:"0 0 200px",fontSize:bold?"12px":"11px",fontWeight:bold?800:500,color:bold?"var(--text)":"var(--text2)",fontFamily:"'JetBrains Mono',monospace",paddingLeft:indent?"14px":"0",borderLeft:indent?`3px solid ${color||"var(--border)"}40`:"none"}}>
        {label}
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:"6px",minWidth:0}}>
        {amount!==0&&<div style={{width:`${Math.min(100,Math.abs(amount)/Math.max(originalContract,1)*100*8)}%`,minWidth:"4px",maxWidth:"50%",height:bold?"12px":"8px",background:color||"var(--accent)",borderRadius:"2px",opacity:amount<0?0.5:0.85,border:amount<0?`1px dashed ${color}`:"none",flexShrink:0}}/>}
        <div className="waterfall-amount" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:bold?"13px":"11px",fontWeight:bold?800:600,color:color||"var(--text)",whiteSpace:"nowrap"}}>{amount>=0?"":"-"}{fmtKES(Math.abs(amount))}</div>
      </div>
      {sub&&<div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap",flexShrink:0}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      {/* ── TAB BAR ── */}
      <div style={{display:"flex",gap:"2px",marginBottom:"16px",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} className={`edit-tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)} style={{padding:"8px 14px",fontSize:"10px",whiteSpace:"nowrap"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* ── SUMMARY TAB ── */}
      {tab==="summary"&&(
        <div>
          {/* KPI row */}
          <div className="page-grid-4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"16px"}}>
            <div className="card" style={{padding:"14px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>Original Contract</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:"var(--accent)",lineHeight:1}}>{fmtKES(originalContract)}</div>
            </div>
            <div className="card" style={{padding:"14px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>Approved VOs</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:voApproved>0?"var(--amber)":"var(--green)",lineHeight:1}}>{voApproved>=0?"+":""}{fmtKES(voApproved)}</div>
              {voPending>0&&<div style={{fontSize:"9px",color:"var(--amber)",marginTop:"4px",fontFamily:"'JetBrains Mono',monospace"}}>{fmtKES(voPending)} pending</div>}
            </div>
            <div className="card" style={{padding:"14px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>Revised Contract</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:"var(--text)",lineHeight:1}}>{fmtKES(revisedContract)}</div>
            </div>
            <div className="card" style={{padding:"14px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>Contingency Remaining</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:(contingency.allocated-contingency.expended)<0?"var(--red)":"var(--green)",lineHeight:1}}>{fmtKES(contingency.allocated-contingency.expended)}</div>
              <div style={{marginTop:"6px"}}><Bar value={pct(contingency.expended,contingency.allocated||1)} color={(contingency.expended/contingency.allocated)>0.8?"var(--red)":"var(--amber)"} h={4}/></div>
            </div>
          </div>

          {/* Waterfall */}
          <div className="card" style={{padding:"20px",marginBottom:"14px"}}>
            <div style={{fontSize:"11px",fontWeight:"800",color:"var(--text)",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>Contract Value Waterfall — {site.name}</span>
              <Badge label={`Revised: ${fmtKES(revisedContract)}`} color="var(--accent)"/>
            </div>
            <WaterfallRow label="Original Contract Sum" amount={originalContract} color="var(--accent)" bold/>
            <WaterfallRow label="Provisional Sums (scheduled)" amount={psScheduled} sub={`${provisionalSums.length} items`} color="var(--text3)" indent/>
            <WaterfallRow label="Prime Cost Items (scheduled)" amount={pcScheduled} sub={`${primeCost.length} items`} color="var(--text3)" indent/>
            <WaterfallRow label="Contingency Allowance" amount={contingency.allocated} color="var(--text3)" indent/>
            <WaterfallRow label="PS Savings (not instructed)" amount={-(psSaved)} sub="released back" color="var(--green)" indent/>
            <WaterfallRow label="Approved Variation Orders" amount={voApproved} sub={`${variations.filter(v=>v.status==="approved").length} approved`} color="var(--amber)" bold divider/>
            <WaterfallRow label="Pending / Submitted VOs" amount={voPending} sub="under review" color="var(--text4)" indent/>
            <WaterfallRow label="Dayworks (approved)" amount={dwApproved} color="var(--purple)" indent/>
            <WaterfallRow label="Revised Contract Total" amount={revisedContract} color="var(--green)" bold divider/>
          </div>

          {/* Provisions Budget vs Spent */}
          <div className="page-grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
            <div className="card" style={{padding:"16px"}}>
              <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"12px"}}>Provisions Budget Utilisation</div>
              {[
                ["Provisional Sums",psSpent,psScheduled,"var(--accent)"],
                ["Prime Cost Items",pcExpended,pcScheduled,"var(--purple)"],
                ["Contingency",contingency.expended,contingency.allocated,"var(--amber)"],
                ["Dayworks",dwApproved,dwTotal,"var(--red)"],
              ].map(([l,s,t,c])=>(
                <div key={l} style={{marginBottom:"10px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"var(--text2)",marginBottom:"4px"}}>
                    <span>{l}</span>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:"700",color:c}}>{fmtKES(s)} <span style={{color:"var(--text4)",fontWeight:400}}>/ {fmtKES(t)}</span></span>
                  </div>
                  <Bar value={pct(s,t||1)} color={c} h={6}/>
                </div>
              ))}
            </div>
            <div className="card" style={{padding:"16px"}}>
              <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"12px"}}>Status Register Counts</div>
              {[
                {label:"Provisional Sums",items:provisionalSums,statuses:PROV_STATUS_OPTS.slice(0,4)},
                {label:"Variation Orders",items:variations,statuses:VO_STATUS_OPTS.slice(0,4)},
              ].map(({label,items,statuses})=>(
                <div key={label} style={{marginBottom:"14px"}}>
                  <div style={{fontSize:"10px",fontWeight:"700",color:"var(--text)",marginBottom:"7px"}}>{label}</div>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {statuses.map(s=>{const cnt=items.filter(i=>i.status===s).length;return cnt>0?(
                      <span key={s} style={{background:`${PROV_SCC[s]||"#A0AEC0"}18`,color:PROV_SCC[s]||"#A0AEC0",border:`1px solid ${PROV_SCC[s]||"#A0AEC0"}35`,borderRadius:"3px",fontSize:"9px",fontWeight:"700",padding:"3px 8px",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>{cnt} {s}</span>
                    ):null;})}
                  </div>
                </div>
              ))}
              <div style={{borderTop:"1px solid var(--border)",paddingTop:"12px"}}>
                <div style={{fontSize:"10px",fontWeight:"700",color:"var(--text)",marginBottom:"7px"}}>Contingency</div>
                <div style={{display:"flex",gap:"8px",fontSize:"10px",fontFamily:"'JetBrains Mono',monospace"}}>
                  <span style={{color:"var(--green)"}}>Allocated: {fmtKES(contingency.allocated)}</span>
                  <span style={{color:"var(--amber)"}}>Committed: {fmtKES(contingency.committed)}</span>
                  <span style={{color:"var(--red)"}}>Spent: {fmtKES(contingency.expended)}</span>
                </div>
                {contingency.description&&<div style={{fontSize:"10px",color:"var(--text3)",marginTop:"6px",padding:"6px 8px",background:"var(--bg)",borderRadius:"4px"}}>{contingency.description}</div>}
                <button className="btn-ghost" style={{marginTop:"8px",padding:"4px 10px",fontSize:"9px"}} onClick={()=>{setContForm({...contingency});setShowContForm(true);}}>✏ Edit Contingency</button>
              </div>

// ── MATERIALS VIEW ────────────────────────────────────────────────────────────
function MaterialsView({materials,setMaterials}){
  const [cat,setCat]=useState("All");
  const [editIdx,setEditIdx]=useState(null);
  const [form,setForm]=useState(null);
  const filtered=cat==="All"?materials:materials.filter(m=>m.category===cat);
  const weeksLeft=m=>(!m.weeklyBurn||m.weeklyBurn===0)?"∞":Math.floor(m.onSite/m.weeklyBurn);
  const ss=m=>{const w=weeksLeft(m);return w==="∞"?"ok":w<=1?"critical":w<=3?"warn":"ok";};
  const sc=s=>s==="critical"?"var(--red)":s==="warn"?"var(--amber)":"var(--green)";
  const openEdit=(m,i)=>{setForm({...m});setEditIdx(i);};
  const saveEdit=()=>{const n=[...materials];n[editIdx]={...form};setMaterials(n);setEditIdx(null);setForm(null);};
  const alertCount=materials.filter(m=>ss(m)!=="ok").length;
  return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      <div className="page-grid-4" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"10px",marginBottom:"16px"}}>
        <StatCard label="Materials Tracked" value={materials.length} color="var(--accent)" sub="items on register"/>
        <StatCard label="Delivery Rate" value={`${pct(materials.reduce((s,m)=>s+m.delivered,0),materials.reduce((s,m)=>s+m.totalOrdered,0))}%`} color="var(--green)" sub="delivered vs ordered"/>
        <StatCard label="Burn Rate" value={`${pct(materials.reduce((s,m)=>s+m.consumed,0),materials.reduce((s,m)=>s+m.delivered,0))}%`} color="var(--amber)" sub="consumed vs delivered"/>
        <StatCard label="Stock Alerts" value={alertCount} color={alertCount>0?"var(--red)":"var(--green)"} sub="low-stock items"/>
      </div>
      <div style={{display:"flex",gap:"6px",marginBottom:"14px",alignItems:"center",flexWrap:"wrap"}}>
        {MAT_CATS.map(c=>(
          <button key={c} className="chip" onClick={()=>setCat(c)} style={{borderColor:cat===c?"var(--accent)":"var(--border)",color:cat===c?"var(--accent)":"var(--text3)",background:cat===c?"var(--accent-bg)":"var(--surface)"}}>
            {c}
          </button>
        ))}
        <button className="btn-add" style={{width:"auto",marginTop:0,marginLeft:"auto"}} onClick={()=>{const nm={id:`MT${String(materials.length+1).padStart(3,"0")}`,name:"New Material",unit:"",category:"Concrete",totalOrdered:0,delivered:0,onSite:0,consumed:0,plannedConsumption:0,weeklyBurn:0,supplier:"",lastDelivery:today(),nextDelivery:"",notes:""};setMaterials([...materials,nm]);openEdit(nm,materials.length);}}>+ Add Material</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:"12px"}}>
        {filtered.map((m,i)=>{
          const realIdx=materials.findIndex(mm=>mm.id===m.id);
          const s=ss(m);const scolor=sc(s);
          const delivPct=pct(m.delivered,m.totalOrdered);
          const burnPct=pct(m.consumed,m.delivered);
          return(
            <div key={m.id} className="card" style={{padding:"16px",border:`1px solid ${s!=="ok"?scolor+"44":"var(--border)"}`,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:scolor}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                <div style={{flex:1,minWidth:0,marginRight:"8px"}}>
                  <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</div>
                  <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginTop:"2px"}}>{m.id} · {m.unit} · {m.category}</div>
                </div>
                <div style={{display:"flex",gap:"6px",flexShrink:0}}>
                  <Badge label={s==="critical"?"CRITICAL":s==="warn"?"LOW":"OK"} color={scolor}/>
                  <button className="btn-ghost" style={{padding:"3px 8px",fontSize:"9px"}} onClick={()=>openEdit(m,realIdx)}>Edit</button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"5px",marginBottom:"12px"}}>
                {[["Ordered",m.totalOrdered,"var(--text4)"],["Delivered",m.delivered,"var(--accent)"],["On Site",m.onSite,"var(--amber)"],["Consumed",m.consumed,"var(--red)"],["Remaining",m.delivered-m.consumed,"var(--green)"],["Planned",m.plannedConsumption,"var(--text3)"]].map(([l,v,c])=>(
                  <div key={l} style={{textAlign:"center",background:"var(--bg)",borderRadius:"4px",padding:"6px 3px"}}>
                    <div style={{fontSize:"14px",fontWeight:"800",color:c,lineHeight:1,fontFamily:"'JetBrains Mono',monospace"}}>{Number(v).toLocaleString()}</div>
                    <div style={{fontSize:"8px",color:"var(--text4)",marginTop:"2px",textTransform:"uppercase"}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"10px"}}>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginBottom:"3px"}}><span>DELIVERY</span><span style={{color:"var(--accent)",fontWeight:"700"}}>{delivPct}%</span></div>
                  <Bar value={delivPct} color="var(--accent)" h={6}/>
                </div>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginBottom:"3px"}}><span>BURN RATE (of delivered)</span><span style={{color:burnPct>85?scolor:"var(--amber)",fontWeight:"700"}}>{burnPct}%</span></div>
                  <div className="burn-bar-track"><div className="burn-bar-fill" style={{width:`${burnPct}%`,background:burnPct>85?scolor:"var(--amber)"}}/></div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:"8px",borderTop:"1px solid var(--border)",fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace"}}>
                <span>Burn: <strong style={{color:"var(--amber)"}}>{m.weeklyBurn} {m.unit}/wk</strong> · Weeks left: <strong style={{color:scolor}}>{weeksLeft(m)}</strong></span>
                <span>{m.nextDelivery?"Next: "+m.nextDelivery:m.supplier}</span>
              </div>
              {m.notes&&<div style={{marginTop:"7px",padding:"6px 8px",background:"var(--amber)11",borderRadius:"4px",border:"1px solid var(--amber)33",fontSize:"10px",color:"var(--amber)"}}>{m.notes}</div>}
            </div>
          );
        })}
      </div>
      {editIdx!==null&&form&&(
        <>
          <div className="edit-overlay" onClick={()=>{setEditIdx(null);setForm(null);}}/>
          <div className="edit-panel">
            <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",flexShrink:0}}>
              <div><div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)"}}>Edit — {form.name}</div></div>
              <button className="btn-ghost" onClick={()=>{setEditIdx(null);setForm(null);}}>✕</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"4px 0"}}>
              <div className="edit-section">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
                  <Field label="Material Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))}/>
                  <Field label="Category" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} opts={["Concrete","Steel","Aggregate","Formwork","Other"]} half/>
                  <Field label="Unit" value={form.unit} onChange={v=>setForm(f=>({...f,unit:v}))} half/>
                  <Field label="Supplier" value={form.supplier} onChange={v=>setForm(f=>({...f,supplier:v}))}/>
                  <Field label="Total Ordered" value={form.totalOrdered} onChange={v=>setForm(f=>({...f,totalOrdered:v}))} type="number" half/>
                  <Field label="Delivered" value={form.delivered} onChange={v=>setForm(f=>({...f,delivered:v}))} type="number" half/>
                  <Field label="On Site (stock)" value={form.onSite} onChange={v=>setForm(f=>({...f,onSite:v}))} type="number" half/>
                  <Field label="Consumed" value={form.consumed} onChange={v=>setForm(f=>({...f,consumed:v}))} type="number" half/>
                  <Field label="Planned Total" value={form.plannedConsumption} onChange={v=>setForm(f=>({...f,plannedConsumption:v}))} type="number" half/>
                  <Field label="Weekly Burn Rate" value={form.weeklyBurn} onChange={v=>setForm(f=>({...f,weeklyBurn:v}))} type="number" half/>
                  <Field label="Last Delivery" value={form.lastDelivery} onChange={v=>setForm(f=>({...f,lastDelivery:v}))} type="date" half/>
                  <Field label="Next Delivery" value={form.nextDelivery} onChange={v=>setForm(f=>({...f,nextDelivery:v}))} half/>
                  <Field label="Notes" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} textarea/>
                </div>
              </div>
            </div>
            <div className="save-bar">
              <button className="btn-primary" onClick={saveEdit}>💾 Save</button>
              <button className="btn-ghost" onClick={()=>{setEditIdx(null);setForm(null);}}>Cancel</button>
              <button className="btn-danger" style={{marginLeft:"auto"}} onClick={()=>{setMaterials(ms=>ms.filter((_,j)=>j!==editIdx));setEditIdx(null);setForm(null);}}>🗑 Delete</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── DIARY VIEW ────────────────────────────────────────────────────────────────
function DiaryView({diaries,setDiaries,team,workers,currentUserId,site}){
  const [showAdd,setShowAdd]=useState(false);
  const [filterMonth,setFilterMonth]=useState("all");
  const [form,setForm]=useState(null);
  const months=[...new Set(diaries.map(d=>d.date.slice(0,7)))].sort().reverse();
  const filtered=filterMonth==="all"?[...diaries].sort((a,b)=>b.date.localeCompare(a.date)):[...diaries].filter(d=>d.date.startsWith(filterMonth)).sort((a,b)=>b.date.localeCompare(a.date));
  const [lightbox, setLightbox] = useState(null); // {photos, index} | null
  const [uploading, setUploading] = useState(false);
  const [reportEntry, setReportEntry] = useState(null); // auto-report modal

  // Upload file(s) — tries Supabase Storage first; falls back to base64
  const addPhotos = async (files, userId) => {
    setUploading(true);
    const results = await Promise.all(Array.from(files).map(async file => {
      const cloudUrl = await sbUploadPhoto(file, userId);
      if(cloudUrl) {
        return { url: cloudUrl, src: cloudUrl, caption: "", ts: new Date().toISOString(), _cloud: true };
      }
      // Fallback: read as base64 (works offline)
      return new Promise(res => {
        const reader = new FileReader();
        reader.onload = ev => res({ src: ev.target.result, caption: "", ts: new Date().toISOString() });
        reader.readAsDataURL(file);
      });
    }));
    setForm(f => ({ ...f, photos: [...(f.photos||[]), ...results] }));
    setUploading(false);
  };

  const allPeople = [...team, ...(workers||[])];
  const newEntry=()=>{setForm({id:`D${String(diaries.length+1).padStart(3,"0")}`,date:today(),weather:"sunny",gangsPresent:0,temperature:"",works:[{area:"",description:"",manHours:0,materials:""}],workforce:[],photos:[],issues:"",visitors:"",author:team[0]?.id||"PM"});setShowAdd(true);};
  const upWork=(i,k,v)=>setForm(f=>{const w=[...f.works];w[i]={...w[i],[k]:v};return {...f,works:w};});
  const totalHours=diaries.reduce((s,d)=>s+(d.works||[]).reduce((ss,w)=>ss+(w.manHours||0),0),0);
  return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      <div className="page-grid-4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"16px"}}>
        <StatCard label="Diary Entries" value={diaries.length} color="var(--accent)" sub="total logged days"/>
        <StatCard label="Man-Hours Logged" value={totalHours.toLocaleString()} color="var(--green)" sub="cumulative on site"/>
        <StatCard label="Avg Gang Size" value={diaries.length?Math.round(diaries.reduce((s,d)=>s+(d.gangsPresent||0),0)/diaries.length):0} color="var(--amber)" sub="workers per day"/>
        <StatCard label="Issues Flagged" value={diaries.filter(d=>d.issues&&d.issues.trim()).length} color="var(--red)" sub="days with observations"/>
        <StatCard label="Site Photos" value={diaries.reduce((s,d)=>s+(d.photos||[]).length,0)} color="var(--purple)" sub="photos attached"/>
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"14px",alignItems:"center",flexWrap:"wrap"}}>
        {["all",...months].map(m=>(
          <button key={m} className="chip" onClick={()=>setFilterMonth(m)} style={{borderColor:filterMonth===m?"var(--accent)":"var(--border)",color:filterMonth===m?"var(--accent)":"var(--text3)",background:filterMonth===m?"var(--accent-bg)":"var(--surface)"}}>
            {m==="all"?"All Entries":new Date(m+"-01").toLocaleDateString("en-KE",{month:"short",year:"numeric"})}
          </button>
        ))}
        <button className="btn-primary" style={{marginLeft:"auto",padding:"6px 14px",fontSize:"10px"}} onClick={newEntry}>+ New Entry</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
        {filtered.length===0&&<div className="card" style={{padding:"32px",textAlign:"center",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px"}}>No diary entries yet. Tap "+ New Entry" to log today's activities.</div>}
        {filtered.map(d=>{
          const totalH=(d.works||[]).reduce((s,w)=>s+(w.manHours||0),0);
          return(
            <div key={d.id} className="card" style={{overflow:"hidden"}}>
              <div style={{padding:"12px 16px",background:"var(--bg)",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
                <div>
                  <div style={{fontSize:"15px",fontWeight:"800",color:"var(--text)",fontFamily:"'JetBrains Mono',monospace"}}>{fmtDate(d.date)}</div>
                  <div style={{fontSize:"9px",color:"var(--text4)",marginTop:"1px",fontFamily:"'JetBrains Mono',monospace"}}>Entry {d.id} · {d.author}</div>
                </div>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:"14px"}}>{WEATHER_ICONS[d.weather]||"🌤️"}</span>
                  <Badge label={d.weather.replace("-"," ")} color={SCC["in-progress"]}/>
                  {d.temperature&&<Badge label={d.temperature} color={SCC["at-risk"]}/>}
                  <Badge label={`${d.gangsPresent} workers`} color={SCC["completed"]}/>
                  <Badge label={`${totalH}h`} color={SCC["low"]}/>
                  {d.issues&&d.issues.trim()&&<Badge label="Issues" color={SCC["critical"]}/>}
                  <button className="btn-primary" style={{padding:"3px 10px",fontSize:"9px",marginLeft:"4px"}} onClick={()=>setReportEntry(d)}>📤 Report</button>
                </div>
              </div>
              <div style={{padding:"14px 16px"}}>
                {(d.works||[]).map((w,i)=>(
                  <div key={i} style={{marginBottom:i<(d.works.length-1)?"12px":0,paddingBottom:i<(d.works.length-1)?"12px":0,borderBottom:i<(d.works.length-1)?"1px dashed var(--border)":"none"}}>
                    <div style={{display:"flex",gap:"6px",marginBottom:"4px",flexWrap:"wrap"}}>
                      {w.area&&<span style={{background:"var(--accent-bg)",border:"1px solid var(--accent)33",borderRadius:"4px",padding:"2px 7px",fontSize:"9px",fontWeight:"700",color:"var(--accent)",fontFamily:"'JetBrains Mono',monospace"}}>{w.area}</span>}
                      {w.manHours>0&&<Badge label={`${w.manHours}h`} color={SCC["low"]}/>}
                    </div>
                    <div style={{fontSize:"12px",color:"var(--text)",lineHeight:1.6,marginBottom:"3px"}}>{w.description}</div>
                    {w.materials&&<div style={{fontSize:"10px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>Materials: {w.materials}</div>}
                  </div>
                ))}
                {d.issues&&d.issues.trim()&&(
                  <div style={{marginTop:"10px",padding:"10px 12px",background:"var(--red)0D",border:"1px solid var(--red)33",borderRadius:"6px",display:"flex",gap:"8px"}}>
                    <span>⚠️</span>
                    <div>
                      <div style={{fontSize:"9px",fontWeight:"700",color:"var(--red)",fontFamily:"'JetBrains Mono',monospace",marginBottom:"2px"}}>ISSUES / OBSERVATIONS</div>
                      <div style={{fontSize:"12px",color:"var(--text)"}}>{d.issues}</div>
                    </div>
                  </div>
                )}
                {d.visitors&&d.visitors.trim()&&<div style={{marginTop:"7px",padding:"7px 10px",background:"var(--green)0D",border:"1px solid var(--green)33",borderRadius:"5px",fontSize:"10px",color:"var(--green)",fontFamily:"'JetBrains Mono',monospace"}}>👤 Visitors: {d.visitors}</div>}
                {(d.workforce||[]).length>0&&(
                  <div style={{marginTop:"10px",padding:"10px 12px",background:"var(--purple)0D",border:"1px solid var(--purple)33",borderRadius:"6px"}}>
                    <div style={{fontSize:"9px",fontWeight:"700",color:"var(--purple)",fontFamily:"'JetBrains Mono',monospace",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.1em"}}>👷 Workforce — {(d.workforce||[]).reduce((s,w)=>s+(Number(w.count)||0),0)} workers total</div>
                    <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                      {(d.workforce||[]).map((w,i)=>(
                        <div key={i} style={{background:"var(--surface)",border:"1px solid var(--purple)33",borderRadius:"4px",padding:"4px 8px",fontSize:"9px",fontFamily:"'JetBrains Mono',monospace",color:"var(--text2)"}}>
                          <span style={{color:"var(--purple)",fontWeight:"700"}}>{w.count}×</span> {w.trade}{w.company?` · ${w.company}`:""}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {(d.photos||[]).length>0&&(
                  <div style={{marginTop:"10px"}}>
                    <div style={{fontSize:"9px",fontWeight:"700",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.1em"}}>📸 Site Photos ({(d.photos||[]).length})</div>
                    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                      {(d.photos||[]).map((p,i)=>(
                        <div key={i} style={{position:"relative",width:"80px",height:"80px",borderRadius:"6px",overflow:"hidden",border:"1px solid var(--border2)",cursor:"pointer",flexShrink:0}}
                          onClick={()=>setLightbox({photos:d.photos,index:i})}>
                          <img src={p.url||p.src} alt={p.caption||"Site photo"} style={{width:"100%",height:"100%",objectFit:"cover"}}
                            onError={e=>{e.target.style.display="none";e.target.nextSibling&&(e.target.nextSibling.style.display="flex");}}/>
                          <div style={{display:"none",width:"100%",height:"100%",alignItems:"center",justifyContent:"center",background:"var(--bg)",fontSize:"20px"}}>🖼</div>
                          {p.caption&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.6)",fontSize:"7px",color:"#fff",padding:"2px 4px",fontFamily:"'JetBrains Mono',monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.caption}</div>}
                          {p.url&&<div style={{position:"absolute",top:"3px",right:"3px",background:"rgba(0,0,0,0.55)",borderRadius:"3px",padding:"1px 4px",fontSize:"7px",color:"#fff",fontFamily:"'JetBrains Mono',monospace"}}>☁</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
      {lightbox&&<PhotoLightbox photos={lightbox.photos} startIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}

      {/* ── AUTO REPORT MODAL ── */}
      {reportEntry&&(
        <AutoReportModal entry={reportEntry} site={site||{}} team={team} workers={workers||[]} onClose={()=>setReportEntry(null)}/>
      )}

      {showAdd&&form&&(
        <>
          <div className="edit-overlay" onClick={()=>{setShowAdd(false);setForm(null);}}/>
          <div className="edit-panel">
            <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",flexShrink:0}}>
              <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)"}}>New Site Diary Entry</div>
              <button className="btn-ghost" onClick={()=>{setShowAdd(false);setForm(null);}}>✕</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"4px 0"}}>
              <div className="edit-section">
                <div className="edit-section-title">📅 General</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
                  <Field label="Date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} type="date" half/>
                  <Field label="Weather" value={form.weather} onChange={v=>setForm(f=>({...f,weather:v}))} opts={WEATHER_OPTS} half/>
                  <Field label="Workers on Site" value={form.gangsPresent} onChange={v=>setForm(f=>({...f,gangsPresent:Number(v)}))} type="number" half/>
                  <Field label="Temperature" value={form.temperature} onChange={v=>setForm(f=>({...f,temperature:v}))} half placeholder="e.g. 28°C"/>
                  <div className="field-group" style={{gridColumn:"span 1"}}>
                    <label className="field-label">Author</label>
                    <select className="field-select" value={form.author} onChange={e=>setForm(f=>({...f,author:e.target.value}))}>
                      {allPeople.map(m=><option key={m.id} value={m.id}>{m.name} ({m.id})</option>)}
                      <option value="PM">PM</option>
                    </select>
                  </div>
                  <Field label="Visitors / Inspectors" value={form.visitors} onChange={v=>setForm(f=>({...f,visitors:v}))} half/>
                </div>
              </div>
              <div className="edit-section">
                <div className="edit-section-title">🔨 Works Carried Out</div>
                {form.works.map((w,i)=>(
                  <div key={i} className="edit-row" style={{marginBottom:"10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                      <span style={{fontSize:"10px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>Work Item #{i+1}</span>
                      {form.works.length>1&&<button className="btn-danger" onClick={()=>setForm(f=>({...f,works:f.works.filter((_,j)=>j!==i)}))}>Remove</button>}
                    </div>
                    <div className="field-group"><label className="field-label">Area / Location</label><input className="field-input" value={w.area} onChange={e=>upWork(i,"area",e.target.value)} placeholder="e.g. Block 2 — Lvl 3"/></div>
                    <div className="field-group"><label className="field-label">Description of Works</label><textarea className="field-input" value={w.description} onChange={e=>upWork(i,"description",e.target.value)} placeholder="Describe activities..."/></div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                      <div className="field-group"><label className="field-label">Man-Hours</label><input className="field-input" type="number" value={w.manHours} onChange={e=>upWork(i,"manHours",Number(e.target.value))}/></div>
                      <div className="field-group"><label className="field-label">Materials Used</label><input className="field-input" value={w.materials} onChange={e=>upWork(i,"materials",e.target.value)} placeholder="e.g. 2.4t Y16"/></div>
                    </div>
                  </div>
                ))}
                <button className="btn-add" onClick={()=>setForm(f=>({...f,works:[...f.works,{area:"",description:"",manHours:0,materials:""}]}))}>+ Add Work Item</button>
              </div>
              <div className="edit-section">
