        const { data } = await sb.from("mradi_payments")
          .select("*").eq("user_id",session.user.id)
          .order("created_at",{ascending:false}).limit(100);
        if(!data||!data.length) return;
        const norm = data.map(r=>({
          id:r.id, client:r.client_name, amount:r.amount,
          method:r.method, status:r.status, receipt:r.receipt_code,
          description:r.description, date:r.created_at
        }));
        setHistory(norm);
        try { localStorage.setItem("mradi_payments",JSON.stringify(norm)); }catch{}
      } catch{}
    })();
  }, []);
  const [processing, setProcessing] = React.useState(false);
  const [mpesaStatus, setMpesaStatus] = React.useState(null); // null | "pending" | "sent" | "error"

  const saveToHistory = (entry) => {
    const updated = [entry, ...history].slice(0, 100);
    setHistory(updated);
    try { localStorage.setItem("mradi_payments", JSON.stringify(updated)); } catch {}
    // Write to Supabase (source of truth)
    (async () => {
      try {
        const sb = getSupabaseClient();
        if(!sb) return;
        const { data:{session} } = await sb.auth.getSession();
        await sb.from("mradi_payments").upsert({
          id: entry.id,
          user_id: session?.user?.id||null,
          client_name: entry.client,
          amount: entry.amount,
          currency: "KES",
          method: entry.method,
          status: entry.status,
          receipt_code: entry.receipt||null,
          description: entry.description||null,
          created_at: entry.date,
        },{onConflict:"id"});
      } catch(e){ console.warn("[Mradi] Payment sync failed:",e.message); }
    })();
  };

  const totalCollected = history.filter(h => h.status === "success").reduce((s, h) => s + h.amount, 0);
  const pendingCount = history.filter(h => h.status === "pending").length;

  const fmtK = n => "KES " + Number(n).toLocaleString("en-KE");

  // ── Safely ensure Paystack script is loaded, then run callback ──
  const loadPaystack = (cb) => {
    if (window.PaystackPop) { cb(); return; }
    const existing = document.querySelector('script[src*="paystack"]');
    if (existing) {
      // Script tag exists but hasn't finished — wait for it
      existing.addEventListener("load", cb);
      existing.addEventListener("error", () => { setProcessing(false); alert("Could not load Paystack. Check your internet connection."); });
      return;
    }
    const s = document.createElement("script");
    s.src = "https://js.paystack.co/v1/inline.js";
    s.onload = cb;
    s.onerror = () => { setProcessing(false); alert("Could not load Paystack. Check your internet connection."); };
    document.head.appendChild(s);
  };

  // ── Paystack card / M-Pesa via Paystack ──
  const handlePaystack = () => {
    const amt = parseFloat(form.amount);
    if (!form.email || !amt || amt < 1) {
      alert("Please enter a valid email and amount."); return;
    }
    setProcessing(true);
    loadPaystack(() => {
      try {
        const ref = "OJL-" + Date.now();
        const handler = window.PaystackPop.setup({
          key: PAYSTACK_KEY,
          email: form.email,
          amount: Math.round(amt * 100),
          currency: "KES",
          ref,
          channels: ["card", "mobile_money", "bank_transfer"],
          metadata: {
            custom_fields: [
              { display_name: "Client Name", variable_name: "client_name", value: form.name },
              { display_name: "Project",     variable_name: "project",     value: site?.name || "Mradi HQ" },
              { display_name: "Description", variable_name: "description", value: form.description },
            ]
          },
          callback: (response) => {
            setProcessing(false);
            saveToHistory({
              id: response.reference,
              date: new Date().toISOString(),
              client: form.name || form.email,
              email: form.email,
              description: form.description || "Payment",
              amount: amt,
              method: "Card / Paystack",
              status: "success",
            });
            setForm({ email: "", amount: "", name: "", description: "", phone: "" });
            alert("✅ Payment successful! Ref: " + response.reference);
          },
          onClose: () => { setProcessing(false); },
        });
        handler.openIframe();
      } catch(e) {
        setProcessing(false);
        alert("Paystack error: " + e.message);
      }
    });
  };

  // ── M-Pesa STK Push via Supabase Edge Function relay ──────────────────────
  const handleMpesa = async () => {
    const amt = parseFloat(form.amount);
    if (!form.phone || !amt || amt < 1) {
      alert("Please enter a valid Safaricom phone number and amount."); return;
    }
    if (!FCC_CONFIG.mpesaRelayUrl) {
      alert("M-Pesa not configured.\n\nSet FCC_CONFIG.mpesaRelayUrl to your Supabase Edge Function URL.\nSee the setup guide in the Payments tab."); return;
    }
    const phone = form.phone.replace(/\D/g, "").replace(/^0/, "254").replace(/^(\+?254)/, "254");
    const timestamp = new Date().toISOString().replace(/[-T:.Z]/g,"").slice(0,14);
    const passkey = FCC_CONFIG.mpesaPasskey || "bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919";
    const password = btoa((FCC_CONFIG.mpesaShortcode || "174379") + passkey + timestamp);
    setProcessing(true);
    setMpesaStatus("pending");
    try {
      const res = await fetch(FCC_CONFIG.mpesaRelayUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          env:              FCC_CONFIG.mpesaEnv || "sandbox",
          shortcode:        FCC_CONFIG.mpesaShortcode || "174379",
          password,
          timestamp,
          amount:           Math.round(amt),
          phone,
          accountReference: "MRADI-" + Date.now().toString(36).toUpperCase(),
          transactionDesc:  form.description || `Payment to ${site?.name || "Mradi HQ"}`,
          callbackUrl:      FCC_CONFIG.mpesaRelayUrl + "/callback",
        }),
      });
      const data = await res.json();
      if (res.ok && data.ResponseCode === "0") {
        const checkoutId = data.CheckoutRequestID || ("MPE-" + Date.now());
        setMpesaStatus("sent");
        saveToHistory({
          id:          checkoutId,
          date:        new Date().toISOString(),
          client:      form.name || phone,
          email:       form.email || "—",
          description: form.description || "M-Pesa STK Push",
          amount:      amt,
          method:      "M-Pesa STK",
          status:      "pending",
        });
        setForm({ email: "", amount: "", name: "", description: "", phone: "" });
        // ── Poll Supabase for callback result (or resolve sandbox instantly) ──
        const startedAt = Date.now();
        const poll = setInterval(async () => {
          if (FCC_CONFIG.mpesaEnv === "sandbox" && Date.now() - startedAt > 8000) {
            clearInterval(poll);
            setMpesaStatus(null);
            setHistory(prev => prev.map(h => h.id === checkoutId ? {...h, status:"success"} : h));
            try { localStorage.setItem("mradi_payments", JSON.stringify(
              JSON.parse(localStorage.getItem("mradi_payments")||"[]").map(h => h.id===checkoutId ? {...h,status:"success"} : h)
            )); } catch {}
            return;
          }
          if (Date.now() - startedAt > 90000) { clearInterval(poll); setMpesaStatus(null); return; }
          try {
            const r = await fetch(
              `${FCC_CONFIG.supabaseUrl}/rest/v1/mpesa_payments?id=eq.${encodeURIComponent(checkoutId)}&select=status,mpesa_receipt`,
              { headers: { apikey: FCC_CONFIG.supabaseKey, Authorization: `Bearer ${FCC_CONFIG.supabaseKey}` } }
            );
            const rows = await r.json();
            const row = Array.isArray(rows) && rows[0];
            if (row && row.status && row.status !== "pending") {
              clearInterval(poll);
              setMpesaStatus(null);
              const finalStatus = row.status === "success" ? "success" : "failed";
              setHistory(prev => prev.map(h => h.id === checkoutId ? {...h, status: finalStatus, receipt: row.mpesa_receipt} : h));
              try { localStorage.setItem("mradi_payments", JSON.stringify(
                JSON.parse(localStorage.getItem("mradi_payments")||"[]").map(h => h.id===checkoutId ? {...h,status:finalStatus} : h)
              )); } catch {}
            }
          } catch {} // network hiccup — keep polling
        }, 3000);
      } else {
        setMpesaStatus("error");
        const msg = data.ResponseDescription || data.errorMessage || res.statusText;
        alert("M-Pesa STK Push failed: " + msg);
        setTimeout(() => setMpesaStatus(null), 5000);
      }
    } catch (e) {
      setMpesaStatus("error");
      alert("Could not reach the M-Pesa relay.\n\nVerify FCC_CONFIG.mpesaRelayUrl and that the Supabase Edge Function is deployed.\n\n" + e.message);
      setTimeout(() => setMpesaStatus(null), 5000);
    }
    setProcessing(false);
  };

  const statusColor = { success: "var(--green)", pending: "var(--amber)", failed: "var(--red)" };

  return (
    <div style={{ animation: "fadeUp 0.2s ease" }}>

      {/* ── Summary strip ── */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "10px", marginBottom: "14px" }}>
        {[
          { label: "Total Collected", value: fmtK(totalCollected), color: "var(--green)" },
          { label: "Transactions", value: history.filter(h => h.status === "success").length, color: "var(--accent)" },
          { label: "Awaiting Confirmation", value: pendingCount, color: pendingCount > 0 ? "var(--amber)" : "var(--text4)" },
        ].map(({ label, value, color }) => (
          <div key={label} className="card" style={{ padding: "14px 16px" }}>
            <div style={{ fontSize: "20px", fontWeight: "900", color, lineHeight: 1 }}>{value}</div>
            <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", marginTop: "4px" }}>{label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "14px" }}>

        {/* ── Payment request form ── */}
        <div className="card" style={{ padding: "18px" }}>
          <div style={{ fontSize: "11px", fontWeight: "800", color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "14px", display: "flex", alignItems: "center", gap: "6px" }}>
            💳 Request Payment
          </div>

          {/* Method toggle */}
          <div style={{ display: "flex", gap: "6px", marginBottom: "14px" }}>
            {[
              { id: "card", label: "💳 Card / Paystack" },
              { id: "mpesa", label: "📱 M-Pesa STK" },
            ].map(m => (
              <button key={m.id} onClick={() => setMethod(m.id)}
                style={{ flex: 1, padding: "8px", border: `2px solid ${method === m.id ? "var(--accent)" : "var(--border)"}`, borderRadius: "5px", background: method === m.id ? "var(--accent-bg)" : "var(--bg)", color: method === m.id ? "var(--accent)" : "var(--text3)", fontFamily: "'JetBrains Mono',monospace", fontSize: "9px", fontWeight: "700", cursor: "pointer", textTransform: "uppercase", letterSpacing: "0.05em", transition: "all 0.15s" }}>
                {m.label}
              </button>
            ))}
          </div>

          {/* Form fields */}
          {[
            { key: "name", label: "Client Name", placeholder: "e.g. Acme Ltd", type: "text" },
            { key: "email", label: method === "card" ? "Email (required)" : "Email (optional)", placeholder: "client@example.com", type: "email" },
            { key: "amount", label: "Amount (KES)", placeholder: "e.g. 150000", type: "number" },
            { key: "description", label: "Description", placeholder: "e.g. Phase 2 deposit", type: "text" },
            ...(method === "mpesa" ? [{ key: "phone", label: "Safaricom Number", placeholder: "07XX XXX XXX", type: "tel" }] : []),
          ].map(({ key, label, placeholder, type }) => (
            <div key={key} style={{ marginBottom: "10px" }}>
              <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase", marginBottom: "4px" }}>{label}</div>
              <input
                type={type}
                value={form[key]}
                placeholder={placeholder}
                onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                style={{ width: "100%", padding: "8px 10px", background: "var(--input-bg)", border: "1px solid var(--border)", borderRadius: "4px", color: "var(--text)", fontFamily: "'DM Sans',sans-serif", fontSize: "12px", outline: "none" }}
              />
            </div>
          ))}

          {/* M-Pesa status message */}
          {mpesaStatus === "sent" && (
            <div style={{ background: "var(--green)15", border: "1px solid var(--green)44", borderRadius: "5px", padding: "10px 12px", marginBottom: "10px", fontSize: "11px", color: "var(--green)", fontWeight: "700" }}>
              ✅ STK Push sent! Ask the client to check their phone and enter their M-Pesa PIN.
            </div>
          )}
          {mpesaStatus === "error" && (
            <div style={{ background: "var(--red)15", border: "1px solid var(--red)44", borderRadius: "5px", padding: "10px 12px", marginBottom: "10px", fontSize: "11px", color: "var(--red)", fontWeight: "700" }}>
              ❌ STK Push failed. Check your Daraja credentials in FCC_CONFIG and verify the Supabase Edge Function is deployed.
            </div>
          )}

          <button
            onClick={method === "card" ? handlePaystack : handleMpesa}
            disabled={processing}
            style={{ width: "100%", padding: "11px", background: processing ? "var(--border)" : method === "card" ? "var(--accent)" : "var(--green)", color: "#fff", border: "none", borderRadius: "5px", fontFamily: "'JetBrains Mono',monospace", fontSize: "11px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.08em", cursor: processing ? "not-allowed" : "pointer", transition: "all 0.15s" }}>
            {processing ? "Processing…" : method === "card" ? "▶ Open Paystack Checkout" : "📱 Send M-Pesa STK Push"}
          </button>

          {method === "mpesa" && (
            <div style={{ marginTop: "10px", padding: "10px", background: "var(--amber)10", border: "1px solid var(--amber)33", borderRadius: "4px", fontSize: "9px", color: "var(--text3)", fontFamily: "'JetBrains Mono',monospace", lineHeight: 1.6 }}>
              ⚠ M-Pesa STK requires the Supabase Edge Function (mpesa-relay) to be deployed. Set FCC_CONFIG.mpesaRelayUrl to activate. See setup guide below.
            </div>
          )}
        </div>

        {/* ── Payment history ── */}
        <div className="card" style={{ padding: "18px" }}>
          <div style={{ fontSize: "11px", fontWeight: "800", color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>📜 Payment History</span>
            {history.length > 0 && (
              <button onClick={() => { if (confirm("Clear all payment history?")) { setHistory([]); localStorage.removeItem("mradi_payments"); } }}
                style={{ background: "var(--red)15", border: "1px solid var(--red)44", color: "var(--red)", padding: "3px 8px", borderRadius: "3px", fontFamily: "'JetBrains Mono',monospace", fontSize: "8px", fontWeight: "700", cursor: "pointer", textTransform: "uppercase" }}>
                Clear
              </button>
            )}
          </div>
          {history.length === 0 ? (
            <div style={{ textAlign: "center", padding: "32px 16px", color: "var(--text4)", fontFamily: "'JetBrains Mono',monospace", fontSize: "10px" }}>
              No payments yet.<br />Requests you initiate will appear here.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "8px", maxHeight: "420px", overflowY: "auto" }}>
              {history.map((h, i) => (
                <div key={i} style={{ padding: "10px 12px", background: "var(--bg)", borderRadius: "5px", borderLeft: `3px solid ${statusColor[h.status] || "var(--border)"}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontSize: "12px", fontWeight: "800", color: "var(--text)" }}>{h.client}</div>
                      <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'JetBrains Mono',monospace", marginTop: "2px" }}>{h.description}</div>
                      <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'JetBrains Mono',monospace" }}>{h.method} · {new Date(h.date).toLocaleDateString("en-KE")}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: "14px", fontWeight: "900", color: statusColor[h.status] || "var(--text)" }}>{fmtK(h.amount)}</div>
                      <div style={{ fontSize: "8px", fontWeight: "700", color: statusColor[h.status] || "var(--text4)", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>{h.status}</div>
                    </div>
                  </div>
                  {h.receipt && <div style={{ fontSize: "8px", color: "var(--green)", fontFamily: "'JetBrains Mono',monospace", marginTop: "3px", fontWeight: "700" }}>✓ Receipt: {h.receipt}</div>}
                  <div style={{ fontSize: "8px", color: "var(--text4)", fontFamily: "'JetBrains Mono',monospace", marginTop: "2px", wordBreak: "break-all" }}>{h.id}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* ── Daraja / Supabase setup guide ── */}
      <div className="card" style={{ padding: "18px", marginTop: "14px" }}>
        <div style={{ fontSize: "11px", fontWeight: "800", color: "var(--amber)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "12px" }}>
          📋 M-Pesa Setup Checklist (Supabase Edge Function)
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: "10px" }}>
          {[
            { step: "1", title: "Register on Daraja", desc: "developer.safaricom.co.ke → Create App → enable M-Pesa Express. Copy Consumer Key and Consumer Secret." },
            { step: "2", title: "Deploy Edge Function", desc: "Create supabase/functions/mpesa-relay/index.ts then run: supabase functions deploy mpesa-relay --no-verify-jwt" },
            { step: "3", title: "Set Supabase Secrets", desc: "supabase secrets set MPESA_CONSUMER_KEY=xxx and MPESA_CONSUMER_SECRET=xxx — secrets never touch the browser." },
            { step: "4", title: "Create payments table", desc: "Run the SQL from the edge function file header in Supabase SQL Editor to enable callback storage and Realtime." },
            { step: "5", title: "Update FCC_CONFIG", desc: "Set mpesaRelayUrl to your function URL, mpesaShortcode, mpesaPasskey, and mpesaEnv to 'sandbox' for testing." },
            { step: "6", title: "Go Live on Daraja", desc: "Apply for production shortcode via Safaricom Business portal. Update secrets with live keys and set mpesaEnv: 'live'." },
          ].map(({ step, title, desc }) => (
            <div key={step} style={{ display: "flex", gap: "10px", padding: "10px", background: "var(--bg)", borderRadius: "5px" }}>
              <div style={{ width: "24px", height: "24px", borderRadius: "50%", background: "var(--amber)20", border: "1px solid var(--amber)44", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono',monospace", fontSize: "10px", fontWeight: "800", color: "var(--amber)", flexShrink: 0 }}>{step}</div>
              <div>
                <div style={{ fontSize: "11px", fontWeight: "700", color: "var(--text)" }}>{title}</div>
                <div style={{ fontSize: "10px", color: "var(--text3)", marginTop: "2px", lineHeight: 1.4 }}>{desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
