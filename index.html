  <!-- Inline Service Worker for offline caching -->
  <script>
  (function(){
    if(!('serviceWorker' in navigator)) return;
    // Build an inline SW that caches this page + CDN assets
    const SW_SRC = `
const CACHE_NAME = 'mradi-hq-v2';
const SELF_URL = self.location.href.split('?')[0];

// On install: cache the app shell
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE_NAME).then(cache => {
      return cache.addAll([SELF_URL]).catch(()=>{});
    })
  );
  self.skipWaiting();
});

// On activate: clean old caches
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k=>k!==CACHE_NAME).map(k=>caches.delete(k)))
    )
  );
  self.clients.claim();
});

// On fetch: network-first with offline fallback
self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request)
      .then(res => {
        if(res.ok && (e.request.url.startsWith(self.location.origin) || e.request.url.includes('cdnjs.cloudflare.com'))) {
          const clone = res.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return res;
      })
      .catch(() => caches.match(e.request))
  );
});

// Push notifications — receive server push or local postMessage trigger
self.addEventListener('push', e => {
  let data = { title: 'Mradi HQ', body: 'You have a new alert.', tag: 'mradi-alert', icon: '/icon-192.png' };
  try { data = { ...data, ...e.data.json() }; } catch(_) {}
  e.waitUntil(
    self.registration.showNotification(data.title, {
      body: data.body,
      tag: data.tag,
      icon: data.icon || '/icon-192.png',
      badge: '/icon-192.png',
      vibrate: [200, 100, 200],
      requireInteraction: data.requireInteraction || false,
      data: { url: data.url || '/' }
    })
  );
});

// Local notification trigger (postMessage from app)
self.addEventListener('message', e => {
  if(e.data?.type === 'SHOW_NOTIFICATION') {
    const d = e.data;
    self.registration.showNotification(d.title || 'Mradi HQ', {
      body: d.body || '',
      tag: d.tag || 'mradi-local',
      icon: '/icon-192.png',
      badge: '/icon-192.png',
      vibrate: [150, 75, 150],
      requireInteraction: !!d.requireInteraction,
      data: { url: d.url || '/' }
    });
  }
});

self.addEventListener('notificationclick', e => {
  e.notification.close();
  const url = e.notification.data?.url || '/';
  e.waitUntil(
    clients.matchAll({ type: 'window', includeUncontrolled: true }).then(list => {
      const existing = list.find(c => c.url && c.focus);
      if(existing) return existing.focus();
      return clients.openWindow(url);
    })
  );
});
    `;
    if(!['https:','http:'].includes(location.protocol)){
      console.info('[Mradi SW] Skipped — open from Vercel/Netlify for offline support');
    } else
    try {
      const blob = new Blob([SW_SRC], {type:'text/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl, {scope:'./'})
        .then(reg => {
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw && nw.addEventListener('statechange', () => {
              if(nw.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[Mradi SW] Update available — reload to apply');
              }
            });
          });
          // Expose sync trigger
          window.__mradiSWRegistration = reg;
        })
        .catch(e => console.warn('[Mradi SW] Registration skipped:', e.message));
    } catch(e) { /* blob URL SW not supported in this context */ }

    // ── Capture beforeinstallprompt for custom install button ──
    window.__pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window.__pwaInstallPrompt = e;
      // Notify React app if already mounted
      window.dispatchEvent(new CustomEvent('mradi-install-ready'));
    });
    window.addEventListener('appinstalled', () => {
      window.__pwaInstallPrompt = null;
      window.dispatchEvent(new CustomEvent('mradi-installed'));
    });
  })();
  </script>
  <script>
    (function(){
      try{
        const params=new URLSearchParams(window.location.search);
        // Legacy ?snap= (full base64 payload — still supported)
        const snap=params.get('snap');
        if(snap){
          try{
            const decoded=JSON.parse(atob(decodeURIComponent(snap)));
            window.__FCC_SNAPSHOT__=decoded;
          }catch(e){ /* bad legacy snap — ignore */ }
        }
        // New ?share=<id> — fetch from Supabase before React boots
        const shareId=params.get('share');
        if(shareId && !snap){
          window.__FCC_SHARE_ID__ = shareId;
          // Show a loading overlay until the async fetch resolves
          const overlay=document.createElement('div');
          overlay.id='fcc-share-loader';
          overlay.style.cssText='position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:monospace;color:#94a3b8;gap:16px;';
          overlay.innerHTML='<div style="animation:spin 1s linear infinite;display:inline-block"><svg viewBox="0 0 48 56" width="40" height="47" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="48" height="38" rx="7" fill="#FF5C00"/><text x="24" y="31" font-size="28" font-weight="900" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" fill="#07070D">M</text><text x="24" y="52" font-size="10" font-weight="700" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" fill="#FF5C00" letter-spacing="2">mradi</text></svg></div><div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase">Loading shared project…</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
          document.body.appendChild(overlay);
        }
        // ?room=<projectId> — join a live team room
        const roomId=params.get('room');
        if(roomId && !snap && !shareId){
          window.__FCC_ROOM_ID__ = roomId;
          const overlay=document.createElement('div');
          overlay.id='fcc-room-loader';
          overlay.style.cssText='position:fixed;inset:0;background:#080812;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:monospace;color:#4A9EFF;gap:16px;';
          overlay.innerHTML='<div style="font-size:36px;animation:spin 1s linear infinite">👥</div><div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#4A9EFF">Joining Team Room…</div><div style="font-size:9px;color:#666688;letter-spacing:0.1em">Connecting to live session</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
          document.body.appendChild(overlay);
        }
        // ?join=<inviteCode> — join an organisation
        const joinCode=params.get('join');
        if(joinCode){
          window.__FCC_JOIN_CODE__ = joinCode.toUpperCase();
          const overlay=document.createElement('div');
          overlay.id='fcc-join-loader';
          overlay.style.cssText='position:fixed;inset:0;background:#080812;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:monospace;color:#00D4AA;gap:16px;';
          overlay.innerHTML='<div style="font-size:36px;animation:spin 1s linear infinite">👥</div><div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#00D4AA">Joining Organisation…</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
          document.body.appendChild(overlay);
        }
      }catch(e){ /* param init error — ignore */ }
    })();
  </script>

    [data-theme="slate"] .card:hover{
      border-color:rgba(255,255,255,0.08);
      background:rgba(24,24,38,0.8);
    }
    /* scrollbar — see elite layer */

    /* RESPONSIVE NAV */
    .nav-btn{background:none;border:none;cursor:pointer;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.01em;border-radius:8px;transition:all 0.15s;color:var(--text3);white-space:nowrap;}
    .nav-btn:hover{color:var(--text);background:var(--nav-active-bg);}
    .nav-btn.active{color:var(--accent);background:var(--nav-active-bg);border-bottom:2px solid var(--accent);font-weight:700;}

    /* ── DESKTOP NAV DROPDOWN ── */
    .desktop-nav{flex:1 1 0;min-width:0;display:flex;align-items:center;position:relative;z-index:200;}
    .nav-trigger{
      display:flex;align-items:center;gap:8px;
      background:var(--nav-active-bg);border:1px solid var(--border);
      border-radius:8px;padding:7px 12px;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:0.01em;color:var(--accent);
      transition:all 0.15s;white-space:nowrap;max-width:240px;
      user-select:none;
    }
    .nav-trigger:hover{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 18%,transparent);}
    .nav-trigger-icon{font-size:14px;line-height:1;}
    .nav-trigger-label{flex:1;overflow:hidden;text-overflow:ellipsis;}
    .nav-trigger-chevron{
      font-size:9px;color:var(--text4);margin-left:2px;
      transition:transform 0.18s ease;flex-shrink:0;
    }
    .nav-trigger.open .nav-trigger-chevron{transform:rotate(180deg);}
    /* Dropdown panel */
    .nav-dropdown{
      width:min(340px,90vw);
      background:var(--modal-bg);
      border:1px solid var(--border);border-radius:14px;
      box-shadow:0 16px 48px rgba(0,0,0,0.22),0 2px 8px rgba(0,0,0,0.08);
      overflow:hidden;
      animation:navDropIn 0.18s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes navDropIn{
      from{opacity:0;transform:translateY(-6px) scale(0.97);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }
    .nav-dropdown-grid{
      display:grid;grid-template-columns:1fr 1fr;
      padding:8px;gap:3px;
    }
    .nav-drop-item{
      display:flex;align-items:center;gap:9px;
      padding:11px 13px;border-radius:10px;border:none;background:none;
      cursor:pointer;text-align:left;width:100%;
      transition:background 0.12s,color 0.12s;
      font-family:'JetBrains Mono',monospace;font-size:9.5px;
      text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);
    }
    .nav-drop-item:hover{background:var(--nav-active-bg);color:var(--text);}
    .nav-drop-item.active{
      background:var(--accent)18;color:var(--accent);font-weight:700;
    }
    .nav-drop-item.active .nav-drop-icon{transform:scale(1.15);}
    .nav-drop-icon{font-size:17px;line-height:1;flex-shrink:0;transition:transform 0.15s;}

    /* Desktop header right cluster: never shrinks */
    .hdr-right{flex:0 0 auto;display:flex;align-items:center;gap:6px;}

    /* ── PROJECT TAB STRIP ────────────────────────────────── */
    .proj-tabs{display:flex;align-items:stretch;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg);height:34px;padding:0 8px;flex-shrink:0;}
    .proj-tabs::-webkit-scrollbar{display:none;}
    .proj-tab{display:flex;align-items:center;gap:7px;padding:0 12px 0 14px;border-right:1px solid var(--border);border-bottom:2px solid transparent;cursor:pointer;background:none;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.04em;transition:all 0.14s;position:relative;height:100%;flex-shrink:0;min-width:0;}
    .proj-tab:hover{background:var(--surface);color:var(--text);}
    .proj-tab.active{background:var(--modal-bg);color:var(--text);border-bottom-color:var(--accent);font-weight:800;}
    .proj-tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .proj-tab-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;}
    .proj-tab-close{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;font-size:10px;color:var(--text4);transition:all 0.12s;flex-shrink:0;margin-left:2px;}
    .proj-tab-close:hover{background:var(--red)20;color:var(--red);}
    .proj-tab-add{display:flex;align-items:center;justify-content:center;padding:0 10px;font-size:16px;color:var(--text4);cursor:pointer;background:none;border:none;height:100%;transition:color 0.14s;flex-shrink:0;}
    .proj-tab-add:hover{color:var(--accent);}
    @media(max-width:640px){.proj-tabs{display:none;}}


    .chip{background:var(--surface);border:1px solid var(--border);color:var(--text3);cursor:pointer;padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.05em;border-radius:100px;transition:all 0.15s;}
    .chip:hover{background:var(--nav-active-bg);border-color:var(--accent);color:var(--accent);}

    table{width:100%;border-collapse:collapse;}
    th{color:var(--text4);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;background:var(--bg);}
    td{padding:9px 10px;font-size:10px;border-bottom:1px solid var(--border);color:var(--text2);font-family:'JetBrains Mono',monospace;vertical-align:middle;word-break:break-word;max-width:200px;}
    tr:hover td{background:var(--row-hover);}

    /* PANELS */
    .edit-overlay{position:fixed;inset:0;background:var(--overlay);z-index:500;animation:fadeIn 0.2s ease;backdrop-filter:blur(3px);}
    .edit-panel{position:fixed;top:0;right:0;bottom:0;width:min(580px,100vw);background:var(--modal-bg);border-left:1px solid var(--border);z-index:501;overflow-y:auto;animation:slideIn 0.25s ease;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,0.15);}
    .edit-panel::-webkit-scrollbar{width:4px;}
    .edit-panel::-webkit-scrollbar-thumb{background:var(--border);}

    /* MOBILE BOTTOM SHEET */
    @media(max-width:640px){
      .edit-panel{top:auto;right:0;left:0;bottom:0;width:100%;border-left:none;border-top:1px solid var(--border);border-radius:16px 16px 0 0;max-height:92vh;animation:slideUp 0.25s ease;}
    }

    .field-group{margin-bottom:14px;}
    .field-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;display:block;}
    .field-input{width:100%;background:var(--input-bg);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;border-radius:8px;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
    .field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent);}
    .field-select{width:100%;background:var(--input-bg);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;border-radius:8px;outline:none;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
    .field-select option{background:var(--modal-bg);}
    .edit-section{padding:16px 20px;border-bottom:1px solid var(--border);}
    .edit-section-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .edit-row{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:12px;margin-bottom:8px;position:relative;}
    .edit-row:hover{border-color:var(--border2);}

    .btn-primary{background:var(--accent);border:none;color:#fff;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.01em;border-radius:8px;cursor:pointer;transition:all 0.15s;}
    .btn-danger{background:transparent;border:1px solid color-mix(in srgb,var(--red) 35%,transparent);color:var(--red);padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;transition:all 0.15s;}
    .btn-add{background:color-mix(in srgb,var(--green) 8%,transparent);border:1.5px dashed color-mix(in srgb,var(--green) 45%,transparent);color:var(--green);padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.01em;border-radius:8px;cursor:pointer;transition:all 0.15s;width:100%;margin-top:4px;}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--text3);padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.01em;border-radius:8px;cursor:pointer;transition:all 0.15s;}
    .save-bar{position:sticky;bottom:0;background:var(--modal-bg);border-top:1px solid var(--border);padding:14px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);padding:12px 20px 12px 16px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;z-index:1000;animation:fadeUp 0.2s ease;box-shadow:0 8px 32px rgba(0,0,0,0.18);white-space:nowrap;border:1px solid var(--border);border-left:3px solid var(--green);}
    .edit-tab{background:none;border:none;cursor:pointer;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.01em;color:var(--text3);transition:all 0.15s;border-bottom:2px solid transparent;white-space:nowrap;}
    .edit-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .range-wrap{display:flex;align-items:center;gap:10px;}
    input[type=range]{flex:1;accent-color:var(--accent);height:4px;}
    .range-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);width:36px;text-align:right;}

    /* ── REGISTRATION SCREEN ── */
    .reg-screen{position:fixed;inset:0;background:var(--bg);z-index:950;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s;padding:20px;}
    .reg-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;width:min(420px,100%);position:relative;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.15);}
    .reg-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient);}
    .reg-logo{font-family:'Sora',sans-serif;font-size:28px;letter-spacing:0.08em;color:var(--accent);margin-bottom:6px;}
    .reg-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:20px;}
    .reg-tagline{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5;border-left:2px solid var(--accent);padding-left:10px;}
    .reg-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text4);margin-top:14px;text-align:center;line-height:1.6;}
    .reg-skip{background:none;border:none;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text4);cursor:pointer;text-decoration:underline;margin-top:8px;display:block;width:100%;text-align:center;padding:8px;}
    .reg-skip:hover{color:var(--text3);}
    .reg-status{font-family:'JetBrains Mono',monospace;font-size:9px;text-align:center;margin-top:10px;min-height:16px;}
    /* ── SHARE SNAPSHOT MODAL ── */
    .share-modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:600;animation:fadeIn 0.2s;backdrop-filter:blur(3px);}
    .share-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(540px,96vw);background:var(--modal-bg);border:1px solid var(--border);border-radius:var(--radius-lg);z-index:601;padding:24px;box-shadow:var(--shadow-modal);animation:fadeUp 0.2s ease;}
    .share-url-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);word-break:break-all;margin:12px 0;max-height:80px;overflow-y:auto;line-height:1.5;}
    .share-channels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
    .share-channel-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.01em;border-radius:8px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
    .share-channel-btn:hover{border-color:var(--accent);color:var(--accent);}
    .lock-screen{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s;}
    .lock-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:min(360px,92vw);text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
    .pin-dots{display:flex;justify-content:center;gap:12px;margin:20px 0;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all 0.15s;}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent);}
    .pin-dot.error{background:var(--red);border-color:var(--red);}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto;}
    .pin-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:14px;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;border-radius:5px;cursor:pointer;transition:all 0.15s;}
    .pin-btn:hover{background:var(--nav-active-bg);border-color:var(--accent)44;}
    .pin-btn:active{transform:scale(0.95);}
    .burn-bar-track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative;}
    .burn-bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease;}

    /* FLOATING GLASS PILL BOTTOM NAV */
    .mobile-nav{
      display:none;position:fixed;bottom:0;left:0;right:0;
      padding-bottom:calc(env(safe-area-inset-bottom,12px) + 6px);
      padding-left:env(safe-area-inset-left,0px);
      padding-right:env(safe-area-inset-right,0px);
      z-index:200;pointer-events:none;
    }
    .mobile-nav-inner{
      pointer-events:all;
      display:flex;align-items:center;justify-content:space-around;
      margin:0 14px;padding:5px 6px;
      border-radius:26px;
      background:rgba(255,255,255,0.78);
      -webkit-backdrop-filter:blur(30px) saturate(200%);
      backdrop-filter:blur(30px) saturate(200%);
      border:1px solid rgba(0,0,0,0.09);
      box-shadow:0 6px 24px rgba(0,0,0,0.12),0 1px 0 rgba(255,255,255,0.6) inset;
      gap:2px;overflow:visible;
    }
    [data-theme="dark"] .mobile-nav-inner,
    [data-theme="slate"] .mobile-nav-inner,
    [data-theme="amber"] .mobile-nav-inner,
    [data-theme="highvis"] .mobile-nav-inner{
      background:rgba(12,12,22,0.86);
      border-color:rgba(255,255,255,0.09);
      box-shadow:0 6px 28px rgba(0,0,0,0.55),0 1px 0 rgba(255,255,255,0.05) inset;
    }
    .mob-nav-btn{
      flex:1;background:none;border:none;cursor:pointer;
      padding:11px 2px 10px;
      min-height:48px;
      font-family:'JetBrains Mono',monospace;font-size:7.5px;
      letter-spacing:0.01em;color:var(--text4);
      display:flex;flex-direction:column;align-items:center;gap:4px;
      border-radius:20px;min-width:0;
      transition:color 0.2s ease;
      -webkit-tap-highlight-color:transparent;
      position:relative;
    }
    .mob-nav-btn:active{animation:navTap 0.14s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes navTap{0%,100%{transform:scale(1)}50%{transform:scale(0.88)}}
    .mob-nav-btn.active{color:var(--accent);}
    .mob-nav-btn.active::before{
      content:'';position:absolute;inset:0;border-radius:20px;
      background:var(--accent)15;
      animation:navPillIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes navPillIn{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
    .mob-nav-icon{
      font-size:21px;line-height:1;
      transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .mob-nav-btn.active .mob-nav-icon{transform:scale(1.2) translateY(-1px);}
    .mob-nav-label{font-size:7.5px;letter-spacing:0.03em;line-height:1;}
    .mob-nav-btn:not(.active) .mob-nav-label{opacity:0.5;}

    /* ── MOBILE DRAWER MENU ── */
    .mob-drawer-overlay{position:fixed;inset:0;background:var(--overlay);z-index:350;animation:fadeIn 0.18s ease;}
    .mob-drawer{position:fixed;top:0;right:0;bottom:0;width:min(320px,88vw);background:var(--modal-bg);border-left:1px solid var(--border);z-index:351;animation:slideIn 0.22s cubic-bezier(0.32,0.72,0,1);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.2);}
    @media(max-width:480px){
      .mob-drawer{top:auto;left:0;right:0;bottom:0;width:100%;max-height:90vh;border-left:none;border-top:1px solid var(--border);border-radius:24px 24px 0 0;animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1);}
      .mob-drawer::before{content:'';display:block;width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 4px;flex-shrink:0;}
    }
    .mob-drawer-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--modal-bg);z-index:1;}
    .mob-drawer-title{font-family:'DM Sans',sans-serif;font-weight:700;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;}
    .mob-drawer-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px;line-height:1;}
    .mob-drawer-body{padding:14px 18px;flex:1;}
    .mob-drawer-section{margin-bottom:18px;}
    .mob-drawer-section-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text4);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:8px;}
    .mob-drawer-btn{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:0;border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all 0.15s;text-align:left;}
    .mob-drawer-btn:hover{border-color:var(--accent);color:var(--accent);}
    .mob-drawer-btn.admin{border-color:var(--amber)44;background:var(--amber)08;color:var(--amber);}
    .mob-drawer-btn.sync-online{border-color:var(--green)44;background:var(--green)08;color:var(--green);}
    .mob-drawer-btn.sync-offline{border-color:var(--red)44;background:var(--red)08;color:var(--red);}
    .sync-badge{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);transition:all 0.15s;white-space:nowrap;overflow:hidden;max-width:140px;text-overflow:ellipsis;}
    .sync-badge:hover{border-color:var(--accent);color:var(--text);}
    .theme-row{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;}
    .mob-menu-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;transition:all 0.15s;}
    .mob-menu-btn:hover{border-color:var(--accent);color:var(--accent);}
    @media(max-width:768px){.mob-menu-btn{display:flex;align-items:center;justify-content:center;}}
    .mob-sync-pill{display:none;align-items:center;gap:5px;padding:4px 8px;border-radius:12px;border:1px solid var(--border);background:var(--bg);font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);flex-shrink:0;}
    @media(max-width:768px){.mob-sync-pill{display:flex;}}

    /* ── TABLET (769–1100px) ── */
    @media(min-width:769px) and (max-width:1100px){
      .nav-btn{font-size:8.5px;padding:7px 7px;letter-spacing:0.03em;}
      .hide-tablet{display:none !important;}
      .desktop-nav{flex:1 1 0;min-width:0;}
      header{gap:5px !important;padding:0 8px !important;}
    }

    /* ══ GLOBAL MOBILE GUARDS ══ */
    *{-webkit-tap-highlight-color:transparent;}
    html{overflow-x:hidden;max-width:100vw;}
    body{overflow-x:hidden;-webkit-overflow-scrolling:touch;max-width:100vw;}
    #root{overflow-x:hidden;max-width:100vw;}

    /* ══ iPHONE 17 RESPONSIVE LAYOUT ══ */
    @media(max-width:768px){
      .mobile-nav{display:block;}
      .desktop-nav{display:none !important;}
      /* Frosted glass header */
      header{
        height:52px !important;padding:0 12px !important;overflow:visible !important;
        background:rgba(255,255,255,0.82) !important;
        -webkit-backdrop-filter:blur(24px) saturate(180%) !important;
        backdrop-filter:blur(24px) saturate(180%) !important;
        border-bottom:1px solid rgba(0,0,0,0.07) !important;
        box-shadow:none !important;
      }
      [data-theme="dark"] header,[data-theme="slate"] header,
      [data-theme="amber"] header,[data-theme="highvis"] header{
        background:rgba(8,8,18,0.90) !important;
        border-bottom-color:rgba(255,255,255,0.07) !important;
      }
      header>*{flex-shrink:1;min-width:0;}
      /* Space for floating pill + safe area */
      main{padding:12px 14px calc(94px + env(safe-area-inset-bottom,0px)) 14px !important;}
      /* iPhone-radius cards */
      .card{border-radius:18px !important;}
      .edit-row{border-radius:12px !important;}
      /* Bottom sheet with pull handle */
      .edit-panel{
        top:auto !important;right:0 !important;left:0 !important;bottom:0 !important;
        width:100% !important;border-left:none !important;
        border-top:none !important;border-radius:26px 26px 0 0 !important;
        max-height:92vh !important;
        animation:slideUp 0.32s cubic-bezier(0.32,0.72,0,1) !important;
      }
      .edit-panel::before{
        content:'';display:block;width:36px;height:4px;
        background:var(--border2);border-radius:2px;margin:10px auto 0;
      }
      /* Grids */
      .page-grid-2{grid-template-columns:1fr !important;}
      .page-grid-3{grid-template-columns:1fr 1fr !important;}
      .page-grid-5{grid-template-columns:1fr 1fr !important;}
      .page-grid-4{grid-template-columns:1fr 1fr !important;}
      .gantt-label{width:80px !important;font-size:8px !important;}
      .hide-mobile{display:none !important;}
      .share-channels{grid-template-columns:1fr !important;}
      .share-modal{padding:16px !important;width:94vw !important;}
      .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;}
      .tbl-wrap table{min-width:480px;}
      .card,.edit-row{max-width:100%;overflow:hidden;word-break:break-word;}
      /* Toast floats above pill */
      .toast{
        max-width:88vw;white-space:normal;text-align:center;
        font-size:11px;padding:12px 18px;border-radius:20px !important;
        bottom:calc(96px + env(safe-area-inset-bottom,0px)) !important;
        box-shadow:0 8px 32px rgba(0,0,0,0.2) !important;
      }
      .auth-split-right{display:none !important;}
      .auth-form-panel{width:100% !important;max-width:100% !important;}
      /* iOS sizing */
      button,select,input{min-height:44px;}
      .btn-primary{border-radius:14px !important;}
      .btn-ghost{border-radius:12px !important;}
      .field-input,.field-select{border-radius:14px !important;font-size:14px !important;padding:12px 16px !important;}
      .chip{border-radius:12px;}
      th{font-size:8px;padding:8px 10px;}
      td{font-size:10px;padding:9px 10px;}
      .nav-btn{letter-spacing:0.03em;}
      .edit-section-title{letter-spacing:0.08em;}
      .field-label{letter-spacing:0.07em;}
      .btn-primary,.btn-ghost,.btn-add{letter-spacing:0.06em;}
      .edit-tab{letter-spacing:0.06em;}
      .share-channel-btn{letter-spacing:0.06em;}
      .mob-drawer-btn{letter-spacing:0.05em;}
    }
    @media(max-width:480px){
      .page-grid-2{grid-template-columns:1fr !important;}
      .page-grid-3{grid-template-columns:1fr !important;}
      .page-grid-4{grid-template-columns:1fr 1fr !important;}
      .page-grid-5{grid-template-columns:1fr 1fr !important;}
      .mob-nav-icon{font-size:19px;}
      th{font-size:8px;padding:6px 8px;}
      td{font-size:9px;padding:7px 8px;}
      .chip{font-size:8px;padding:5px 8px;}
      .field-label{font-size:8px;}
      .edit-section-title{font-size:9px;}
      .edit-tab{font-size:8px;padding:8px 8px;}
    }
    @media(max-width:360px){
      .mob-nav-icon{font-size:17px;}
      .mob-nav-label{display:none;}
      td{font-size:8.5px;padding:6px 6px;}
      th{font-size:7.5px;padding:5px 6px;}
    }
    textarea.field-input{resize:vertical;min-height:72px;line-height:1.5;}

    /* ── INLINE CELL EDITING ── */
    .cell-edit{cursor:pointer;border-radius:3px;padding:2px 5px;margin:-2px -5px;display:inline-block;transition:background 0.12s,outline 0.12s;outline:1.5px solid transparent;}
    .cell-edit:hover{background:var(--accent-bg);outline-color:var(--accent)44;}
    .inline-input{background:var(--input-bg);border:1.5px solid var(--accent);color:var(--text);padding:3px 7px;font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:3px;outline:none;min-width:70px;width:100%;box-shadow:0 0 0 3px var(--accent-bg);}
    .inline-select{background:var(--input-bg);border:1.5px solid var(--accent);color:var(--text);padding:3px 5px;font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:3px;outline:none;cursor:pointer;box-shadow:0 0 0 3px var(--accent-bg);}
    .inline-number{width:54px;}
    .wbs-kbd-hint{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text4);padding:4px 12px 6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);}
    .kbd{background:var(--bg);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;font-size:8px;color:var(--text3);}
    tr.inline-active td{background:var(--accent-bg) !important;}

    /* WIZARD */
    .wizard-step{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:16px;}
    .wizard-step-title{font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    /* THEME PICKER */
    .theme-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border:3px solid transparent;}
    .theme-swatch:hover{transform:scale(1.15);}
    .theme-swatch.active{border-color:var(--text);box-shadow:0 0 0 2px var(--bg);}

    /* ── INTEGRATION HUB ── */
    .int-overlay{position:fixed;inset:0;background:var(--overlay);z-index:600;animation:fadeIn 0.2s ease;backdrop-filter:blur(4px);}
    .int-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(840px,96vw);max-height:88vh;background:var(--modal-bg);border:1px solid var(--border);border-radius:var(--radius-lg);z-index:601;display:flex;flex-direction:column;box-shadow:var(--shadow-modal);animation:fadeUp 0.25s ease;overflow:hidden;}
    @media(max-width:640px){.int-modal{top:auto;bottom:0;left:0;right:0;transform:none;width:100%;border-radius:16px 16px 0 0;max-height:94vh;}}
    .int-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg);flex-shrink:0;}
    .int-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text4);cursor:pointer;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
    .int-tab:hover{color:var(--text);background:var(--nav-active-bg);}
    .int-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--nav-active-bg);}
    .int-body{flex:1;overflow-y:auto;padding:20px;}
    .int-section{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;}
    .int-section-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .int-action-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
    .btn-export{background:var(--accent)15;border:1px solid var(--accent)44;color:var(--accent);padding:9px 16px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border-radius:5px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
    .btn-export:hover{background:var(--accent)25;}
    .btn-import{background:var(--green)12;border:1px solid var(--green)44;color:var(--green);padding:9px 16px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border-radius:5px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
    .btn-import:hover{background:var(--green)22;}
    /* Sync pulse */
    @keyframes syncSpin{to{transform:rotate(360deg)}}
    .sync-spin{animation:syncSpin 1s linear infinite;display:inline-block;}
    .sync-dot{width:7px;height:7px;border-radius:50%;}
    .sync-dot.online{background:var(--green);}
    .sync-dot.offline{background:var(--red);animation:pulse2 1.5s infinite;}
    .sync-dot.syncing{background:var(--amber);animation:pulse2 0.7s infinite;}
    .sync-badge{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);transition:all 0.15s;white-space:nowrap;overflow:hidden;max-width:140px;text-overflow:ellipsis;}
    .sync-badge:hover{border-color:var(--accent);color:var(--text);}
    /* Import drop zone */
    .drop-zone{border:2px dashed var(--border2);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg);}
    .drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--accent-bg);}
    .format-pill{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin:3px;}
    /* Conflict banner */
    .conflict-bar{background:var(--amber)18;border:1px solid var(--amber)44;border-radius:6px;padding:10px 14px;display:flex;gap:10px;align-items:center;margin-bottom:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);}
    /* RE REPORT */
    .re-report-print{background:var(--card);}
    @media print{
      .no-print{display:none !important;}
      body{background:#fff !important;}
      .re-report-print{box-shadow:none !important;border:none !important;}
    }

    /* Horizontal swipe tray — stat cards, phase chips */
    .mob-scroll-x{
      display:flex;gap:10px;overflow-x:auto;
      scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;padding-bottom:2px;
      margin:0 -14px;padding-left:14px;padding-right:14px;
    }
    .mob-scroll-x::-webkit-scrollbar{display:none;}
    .mob-scroll-x > *{scroll-snap-align:start;flex-shrink:0;}

    /* Mobile stat card in a swipe row */
    .mob-stat-card{
      min-width:140px;flex:0 0 140px;
      background:var(--card);border:1px solid var(--border);
      border-radius:18px;padding:16px 14px;
      display:flex;flex-direction:column;gap:4px;
    }

    /* Mobile hero card — project overview */
    .mob-hero{
      background:var(--card);border:1px solid var(--border);
      border-radius:22px;padding:20px 18px;
      margin-bottom:14px;position:relative;overflow:hidden;
    }
    .mob-hero::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--green),var(--amber));
    }

    /* Mobile section header — label + count + action */
    .mob-section-hdr{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 0 10px;margin-bottom:2px;
    }
    .mob-section-label{
      font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
      color:var(--text4);text-transform:uppercase;letter-spacing:0.1em;
    }
    .mob-section-action{
      font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);
      background:none;border:none;cursor:pointer;padding:4px 0;
      display:flex;align-items:center;gap:3px;
    }

    /* Mobile list row — tappable item in a list */
    .mob-list-row{
      display:flex;align-items:center;gap:12px;
      padding:14px 16px;
      background:var(--card);border-bottom:1px solid var(--border);
      cursor:pointer;transition:background 0.1s;
      -webkit-tap-highlight-color:transparent;
      position:relative;
    }
    .mob-list-row:first-child{border-radius:18px 18px 0 0;}
    .mob-list-row:last-child{border-bottom:none;border-radius:0 0 18px 18px;}
    .mob-list-row:only-child{border-radius:18px;}
    .mob-list-row:active{background:var(--nav-active-bg);}
    .mob-list-row::after{
      content:'›';position:absolute;right:16px;top:50%;transform:translateY(-50%);
      font-size:18px;color:var(--text4);opacity:0.5;
    }

    /* Mobile phase card in swipe tray */
    .mob-phase-card{
      min-width:180px;flex:0 0 180px;
      background:var(--card);border:1px solid var(--border);border-radius:18px;
      padding:16px;position:relative;overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }
    .mob-phase-card:active{opacity:0.85;}

    /* ─────────────────────────────────────────────────────────────
       MULTI-TENANT ORG SYSTEM
       ───────────────────────────────────────────────────────────── */
    .org-setup-screen{position:fixed;inset:0;background:var(--bg);z-index:960;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s;padding:20px;overflow-y:auto;}
    .org-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:min(480px,100%);position:relative;overflow:hidden;box-shadow:0 20px 64px rgba(0,0,0,0.18);margin:auto;}
    .org-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient);}
    .org-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
    .org-mode-btn{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:20px 16px;cursor:pointer;text-align:center;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .org-mode-btn:hover,.org-mode-btn.selected{border-color:var(--accent);background:var(--accent-bg);}
    .org-mode-btn.selected{box-shadow:0 0 0 3px var(--accent)22;}
    .org-mode-icon{font-size:32px;line-height:1;}
    .org-mode-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--text);}
    .org-mode-sub{font-size:10px;color:var(--text4);line-height:1.4;}
    .invite-code-box{background:var(--accent)10;border:2px dashed var(--accent)44;border-radius:12px;padding:16px 20px;text-align:center;margin:12px 0;}
    .invite-code-val{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:800;letter-spacing:0.22em;color:var(--accent);line-height:1;}
    .invite-code-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text4);text-transform:uppercase;letter-spacing:0.12em;margin-top:4px;}
    .role-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;white-space:nowrap;}
    .role-badge.admin{background:var(--amber)18;color:var(--amber);border:1px solid var(--amber)33;}
    .role-badge.member{background:var(--green)12;color:var(--green);border:1px solid var(--green)30;}
    .org-member-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border-radius:12px;margin-bottom:8px;}
    .org-member-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
    .org-member-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.2;}
    .org-member-meta{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--text4);margin-top:2px;}
    .org-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all 0.15s;flex-shrink:0;max-width:160px;overflow:hidden;}
    .org-pill:hover{border-color:var(--accent);}
    .org-pill-name{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    @media(max-width:900px){.org-pill-name{display:none;}}
    .org-panel-overlay{position:fixed;inset:0;background:var(--overlay);z-index:600;animation:fadeIn 0.2s;backdrop-filter:blur(3px);}
    .org-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(540px,96vw);max-height:88vh;background:var(--modal-bg);border:1px solid var(--border);border-radius:var(--radius-lg);z-index:601;overflow-y:auto;box-shadow:var(--shadow-modal);animation:fadeUp 0.2s ease;}

    /* Mobile provisions chips */
    .mob-provision-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
    }
    .mob-provision-chip{
      background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:12px 14px;
    }

    /* ── MOBILE PROVISIONS CARDS (PS / PC / DW) ── */
    .prov-card{
      background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;
    }
    .prov-card-accent{position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:16px 0 0 16px;}
    .prov-card-id{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;letter-spacing:0.06em;}
    .prov-card-desc{font-size:13px;font-weight:700;color:var(--text);margin:4px 0 8px;line-height:1.35;}
    .prov-card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .prov-card-label{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--text4);text-transform:uppercase;letter-spacing:0.07em;}
    .prov-card-value{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;}
    .prov-card-amounts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
    .prov-card-amount-cell{text-align:center;}
    .prov-card-amount-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;line-height:1;}
    .prov-card-amount-lbl{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--text4);text-transform:uppercase;margin-top:2px;letter-spacing:0.05em;}
    .prov-card-actions{display:flex;gap:6px;margin-top:10px;}
    /* hide table on mobile, show cards */
    @media(max-width:768px){
      .prov-desktop-table{display:none !important;}
      .prov-mobile-cards{display:block !important;}
      /* fix waterfall row label width on mobile */
      .waterfall-label{flex:0 0 auto !important;width:auto !important;max-width:55% !important;font-size:10px !important;}
      .waterfall-amount{font-size:11px !important;}
      /* summary stats wrap nicely */
      .prov-stat-bar{flex-wrap:wrap;gap:6px;}
      .prov-stat-bar strong{font-size:11px;}
    }
    @media(min-width:769px){
      .prov-mobile-cards{display:none !important;}
    }

    /* Section divider */
    .mob-divider{
      height:1px;background:var(--border);margin:4px 0 16px;opacity:0.5;
    }

    /* Swipe indicator for horizontal scrollers */
    .mob-swipe-hint{
      display:flex;align-items:center;gap:4px;
      font-family:'JetBrains Mono',monospace;font-size:8px;
      color:var(--text4);padding:6px 0 2px;
    }

    /* Mobile risk row */
    .mob-risk-row{
      display:flex;align-items:flex-start;gap:12px;
      padding:13px 16px;background:var(--card);
      border-bottom:1px solid var(--border);
    }
    .mob-risk-row:first-child{border-radius:18px 18px 0 0;}
    .mob-risk-row:last-child{border-bottom:none;border-radius:0 0 18px 18px;}

    /* Mobile team member card */
    .mob-member-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:18px;padding:16px;margin-bottom:10px;
    }

    /* Tab-style section switcher */
    .mob-tab-bar{
      display:flex;gap:6px;overflow-x:auto;
      scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;padding-bottom:2px;
      margin:0 -14px;padding-left:14px;padding-right:14px;
      margin-bottom:14px;
    }
    .mob-tab-bar::-webkit-scrollbar{display:none;}
    .mob-tab-btn{
      scroll-snap-align:start;flex-shrink:0;
      padding:8px 16px;border-radius:20px;
      font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
      text-transform:uppercase;letter-spacing:0.06em;
      background:var(--card);border:1px solid var(--border);color:var(--text3);
      cursor:pointer;transition:all 0.15s;white-space:nowrap;
    }
    .mob-tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

    /* Pill badge — larger, more readable on mobile */
    .mob-badge{
      display:inline-flex;align-items:center;gap:4px;
      padding:4px 10px;border-radius:20px;
      font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
    }

    /* Big number display */
    .mob-big-num{
      font-size:36px;font-weight:900;line-height:1;letter-spacing:-0.02em;
    }
    .mob-mid-num{
      font-size:22px;font-weight:900;line-height:1;
    }

    /* Mobile-only show/hide */
    .mob-only{display:none;}
    .desk-only{display:block;}

    @media(max-width:768px){
      .mob-only{display:block;}
      .desk-only{display:none;}
      .mob-only-flex{display:flex !important;}
      .mob-only-grid{display:grid !important;}

      /* Make ALL section titles bigger on mobile */
      .card [style*="font-size:\"10px\""],
      .card [style*="font-size:10px"]{font-size:11px !important;}

      /* Card touch feedback */
      .card{-webkit-tap-highlight-color:transparent;}

      /* Tables: sticky first column */
      .tbl-wrap th:first-child,
      .tbl-wrap td:first-child{
        position:sticky;left:0;
        background:var(--card);z-index:1;
        box-shadow:2px 0 4px rgba(0,0,0,0.06);
      }

      /* Smooth bounce scroll */
      main{scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}

      /* Section spacing */
      main > div > div{margin-bottom:10px;}
    }

    /* ══════════════════════════════════════════════════════════
       TEAM ROOM — Live collaboration panel
    ══════════════════════════════════════════════════════════ */
    .team-room-overlay{position:fixed;inset:0;z-index:400;pointer-events:none;}
    .team-room-panel{
      position:fixed;top:0;right:0;bottom:0;width:min(340px,100vw);
      background:var(--modal-bg);border-left:1px solid var(--border);
      z-index:401;display:flex;flex-direction:column;
      box-shadow:-8px 0 40px rgba(0,0,0,0.22);
      animation:slideIn 0.25s ease;
      pointer-events:all;
    }
    @media(max-width:640px){
      .team-room-panel{top:auto;right:0;left:0;bottom:0;width:100%;border-left:none;
        border-top:1px solid var(--border);border-radius:18px 18px 0 0;max-height:88vh;
        animation:slideUp 0.25s ease;}
    }
    .team-room-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px 12px;border-bottom:1px solid var(--border);
      background:var(--modal-bg);position:sticky;top:0;z-index:1;flex-shrink:0;
    }
    .room-live-dot{
      width:8px;height:8px;border-radius:50%;background:var(--green);
      box-shadow:0 0 0 3px var(--green)30;animation:pulse2 2s infinite;
      flex-shrink:0;
    }
    .member-row{
      display:flex;align-items:center;gap:10px;padding:9px 16px;
      border-radius:0;transition:background 0.12s;
    }
    .member-row:hover{background:var(--bg);}
    .member-avatar{
      width:32px;height:32px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;
      color:#fff;flex-shrink:0;position:relative;
    }
    .member-avatar-dot{
      position:absolute;bottom:-2px;right:-2px;
      width:9px;height:9px;border-radius:50%;
      border:2px solid var(--modal-bg);
    }
    .chat-area{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;min-height:0;}
    .chat-area::-webkit-scrollbar{width:3px;}
    .chat-area::-webkit-scrollbar-thumb{background:var(--border);}
    .chat-msg{
      display:flex;flex-direction:column;gap:2px;
      animation:fadeUp 0.15s ease;
    }
    .chat-msg.mine{align-items:flex-end;}
    .chat-bubble{
      max-width:82%;padding:8px 11px;border-radius:10px;
      font-size:12px;color:var(--text);line-height:1.4;
      background:var(--bg);border:1px solid var(--border);
      word-break:break-word;
    }
    .chat-msg.mine .chat-bubble{
      background:var(--accent)20;border-color:var(--accent)44;color:var(--text);
    }
    .chat-meta{
      font-family:'JetBrains Mono',monospace;font-size:8px;
      color:var(--text4);padding:0 2px;
    }
    .chat-input-row{
      display:flex;gap:8px;padding:10px 14px;
      border-top:1px solid var(--border);flex-shrink:0;background:var(--modal-bg);
    }
    .chat-input-field{
      flex:1;background:var(--input-bg);border:1px solid var(--border);
      color:var(--text);padding:9px 12px;font-family:'DM Sans',sans-serif;
      font-size:12px;border-radius:20px;outline:none;transition:border-color 0.15s;
      min-height:38px;resize:none;overflow:hidden;line-height:1.4;
    }
    .chat-input-field:focus{border-color:var(--accent);}
    .chat-send-btn{
      width:38px;height:38px;border-radius:50%;background:var(--accent);
      border:none;color:#fff;cursor:pointer;display:flex;align-items:center;
      justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.15s;
    }
    .chat-send-btn:hover{opacity:0.85;transform:scale(1.05);}
    .chat-send-btn:disabled{background:var(--border);cursor:not-allowed;transform:none;}
    .sync-mode-bar{
      display:flex;gap:6px;padding:10px 14px;
      border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);
    }
    .sync-mode-btn{
      flex:1;padding:7px 6px;border-radius:6px;border:1px solid var(--border);
      background:var(--modal-bg);color:var(--text3);cursor:pointer;
      font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
      text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s;
      display:flex;flex-direction:column;align-items:center;gap:2px;
    }
    .sync-mode-btn:hover{border-color:var(--accent);color:var(--text);}
    .sync-mode-btn.active{background:var(--accent)18;border-color:var(--accent);color:var(--accent);}
    .room-invite-box{
      margin:10px 14px;padding:10px 12px;background:var(--bg);
      border:1px solid var(--border);border-radius:8px;
    }
    .room-btn{
      display:flex;align-items:center;gap:5px;padding:6px 12px;
      background:var(--accent)18;border:1px solid var(--accent)44;color:var(--accent);
      border-radius:5px;cursor:pointer;font-family:'JetBrains Mono',monospace;
      font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;
      transition:all 0.15s;white-space:nowrap;flex-shrink:0;
    }
    .room-btn:hover{background:var(--accent)30;}
    .room-btn.green{background:var(--green)18;border-color:var(--green)44;color:var(--green);}
    .room-btn.red{background:var(--red)18;border-color:var(--red)44;color:var(--red);}
    /* Room indicator pill in header */
    .room-pill{
      display:flex;align-items:center;gap:5px;padding:4px 10px;
      background:var(--green)15;border:1px solid var(--green)44;
      border-radius:20px;cursor:pointer;font-family:'JetBrains Mono',monospace;
      font-size:8px;font-weight:700;color:var(--green);transition:all 0.15s;
      flex-shrink:0;white-space:nowrap;
    }
    .room-pill:hover{background:var(--green)25;}
    .room-pill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse2 2s infinite;}
    .typing-indicator{
      font-family:'JetBrains Mono',monospace;font-size:9px;
      color:var(--text4);padding:4px 14px;height:22px;flex-shrink:0;
    }
    .chat-system-msg{
      text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;
      color:var(--text4);padding:6px 14px;background:var(--bg);
      border-radius:20px;align-self:center;margin:2px 0;
    }
    @media(max-width:768px){
      .room-pill span.room-pill-label{display:none;}
    }

    /* ── OUTDOOR / SUN-SAFE THEMES ── */
    [data-theme="solar"]{
      --bg:#FFFDE7; --surface:#FFFFFF; --card:#FFFFFF;
      --border:#F9A825; --border2:#F57F17;
      --text:#1A1A00; --text2:#33330A; --text3:#5D4E00; --text4:#8D6E00;
      --accent:#E65100; --accent-bg:#FFF3E0;
      --green:#2E7D32; --amber:#E65100; --red:#B71C1C; --purple:#4A148C;
      --row-hover:#FFFDE7; --input-bg:#FFFFF0;
      --header-bg:#FFF8E1; --nav-active-bg:#FFF3E0;
      --modal-bg:#FFFFFF; --overlay:#00000088;
      --gradient:linear-gradient(90deg,#B71C1C,#E65100,#2E7D32,#1565C0,#4A148C);
      --shadow-card:0 1px 4px rgba(26,32,0,0.07),0 4px 16px rgba(26,32,0,0.04);
      --shadow-modal:0 20px 60px rgba(26,32,0,0.18),0 4px 16px rgba(26,32,0,0.08);
      --radius-card:12px; --radius-lg:16px; --radius-pill:100px;
    }
    [data-theme="highvis"]{
      --bg:#000000; --surface:#111111; --card:#111111;
      --border:#333300; --border2:#555500;
      --text:#FFFF00; --text2:#FFE600; --text3:#CCBB00; --text4:#887700;
      --accent:#00FF88; --accent-bg:#00FF8814;
      --green:#00FF88; --amber:#FFAA00; --red:#FF3333; --purple:#BB88FF;
      --row-hover:#111100; --input-bg:#080800;
      --header-bg:#0A0A00; --nav-active-bg:#00FF8810;
      --modal-bg:#111111; --overlay:#000000DD;
      --gradient:linear-gradient(90deg,#FF3333,#FFAA00,#00FF88,#00AAFF,#BB88FF);
      --shadow-card:0 1px 0 rgba(255,255,0,0.04) inset,0 4px 24px rgba(0,0,0,0.5);
      --shadow-modal:0 24px 80px rgba(0,0,0,0.8),0 2px 0 rgba(255,255,0,0.05) inset;
      --radius-card:12px; --radius-lg:16px; --radius-pill:100px;
    }
    [data-theme="amber"]{
      --bg:#1C1200; --surface:#241800; --card:#2A1E00;
      --border:#4A3200; --border2:#664500;
      --text:#FFD080; --text2:#FFB840; --text3:#CC8800; --text4:#775500;
      --accent:#FFB840; --accent-bg:#FFB84018;
      --green:#80CC40; --amber:#FFB840; --red:#FF5540; --purple:#BB88FF;
      --row-hover:#2A1E00; --input-bg:#181000;
      --header-bg:#181000; --nav-active-bg:#FFB84012;
      --modal-bg:#241800; --overlay:#000000CC;
      --gradient:linear-gradient(90deg,#FF5540,#FFB840,#80CC40,#40AAFF,#BB88FF);
      --shadow-card:0 1px 0 rgba(255,184,64,0.05) inset,0 4px 24px rgba(0,0,0,0.45);
      --shadow-modal:0 24px 80px rgba(0,0,0,0.75),0 2px 0 rgba(255,184,64,0.04) inset;
      --radius-card:12px; --radius-lg:16px; --radius-pill:100px;
    }
    /* Large text mode */
    [data-large="1"] body{ font-size:17px; }
    [data-large="1"] .nav-btn{ font-size:13px; padding:10px 16px; }
    [data-large="1"] .mob-nav-btn{ padding:14px 18px; }
    [data-large="1"] .mob-nav-icon{ font-size:22px; }
    [data-large="1"] td{ font-size:13px; padding:12px 14px; }
    [data-large="1"] th{ font-size:11px; padding:10px 14px; }
    [data-large="1"] .field-input,.field-select{ font-size:15px; padding:11px 13px; }
    [data-large="1"] .field-label{ font-size:12px; margin-bottom:7px; }
    [data-large="1"] .btn-primary{ font-size:13px; padding:13px 22px; }
    [data-large="1"] .btn-ghost{ font-size:13px; padding:11px 18px; }
    [data-large="1"] .chip{ font-size:12px; padding:8px 14px; }
    [data-large="1"] .edit-section-title{ font-size:13px; }
    [data-large="1"] .int-tab{ font-size:12px; padding:12px 18px; }
    [data-large="1"] .btn-add{ font-size:12px; padding:11px 16px; }

    /* ══════════════════════════════════════════════════════
       FIELD COMMAND CENTER — LANDING PAGE STYLES
       New marketing landing page — all themes supported
    ══════════════════════════════════════════════════════ */
    .lp-wrap{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;position:relative;}
    .lp-grid-bg{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 80% 55% at 50% 0%,black 20%,transparent 100%);pointer-events:none;z-index:0;}
    .lp-above{position:relative;z-index:2;}
    /* NAV */
    .lp-nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;background:color-mix(in srgb,var(--bg) 75%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .lp-logo{display:flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;font-weight:800;font-size:16px;letter-spacing:0.05em;color:var(--text);}
    .lp-logo-mark{width:32px;height:38px;background:transparent;border-radius:0;display:flex;align-items:center;justify-content:center;overflow:visible;}
    .lp-nav-links{display:flex;gap:26px;align-items:center;}
    .lp-nav-links a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;cursor:pointer;}
    .lp-nav-links a:hover{color:var(--text);}
    .lp-theme-strip{display:flex;gap:5px;align-items:center;}
    .lp-swatch{border-radius:50%;cursor:pointer;transition:all 0.15s;}
    .lp-swatch.active{border-color:var(--text) !important;}
    .lp-swatch.outdoor{outline:2px solid var(--amber);outline-offset:1px;}
    .lp-sep{width:1px;height:14px;background:var(--border);margin:0 3px;}
    .lp-aplus{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:5px;padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;cursor:pointer;transition:all 0.15s;line-height:1;}
    .lp-aplus.on{background:var(--accent);border-color:var(--accent);color:#fff;}
    /* HERO */
    .lp-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;position:relative;overflow:hidden;}
    .lp-hero-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(ellipse,color-mix(in srgb,var(--accent) 15%,transparent) 0%,transparent 70%);pointer-events:none;z-index:0;}
    .lp-eyebrow{display:inline-flex;align-items:center;gap:8px;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);color:var(--accent);padding:6px 14px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px;}
    .lp-pulse{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:lpPulse 2s ease infinite;flex-shrink:0;}
    .lp-h1{font-family:'Sora',sans-serif;font-weight:900;font-size:clamp(44px,7vw,84px);line-height:1.0;letter-spacing:-0.03em;margin-bottom:24px;}
    .lp-h1 .lp-accent{color:var(--accent);}
    .lp-sub{font-size:clamp(15px,2vw,19px);color:var(--text2);max-width:580px;line-height:1.7;margin-bottom:40px;}
    .lp-actions{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:0;}
    .lp-btn-primary{background:var(--accent);color:#fff;border:none;padding:14px 32px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 0 28px color-mix(in srgb,var(--accent) 35%,transparent);}
    .lp-btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 44px color-mix(in srgb,var(--accent) 50%,transparent);}
    .lp-btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border2);padding:13px 24px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .lp-btn-ghost:hover{border-color:var(--text3);}
    /* DASHBOARD MOCKUP */
    .lp-mockup-wrap{margin-top:56px;width:100%;max-width:880px;position:relative;z-index:2;}
    .lp-mockup{background:var(--card,var(--surface));border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 28px 72px color-mix(in srgb,var(--bg) 30%,black),0 0 0 1px color-mix(in srgb,var(--accent) 8%,transparent);}
    .lp-mockup-topbar{display:flex;align-items:center;gap:7px;padding:11px 14px;background:color-mix(in srgb,var(--text) 2%,transparent);border-bottom:1px solid var(--border);}
    .lp-mockup-dot{width:9px;height:9px;border-radius:50%;}
    .lp-mockup-title{margin-left:6px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}
    .lp-mstat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 10px;}
    .lp-mstat-l{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;}
    .lp-mstat-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;margin-top:2px;}
    .lp-phase-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
    .lp-phase-name{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--text3);width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lp-phase-pct{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;width:26px;text-align:right;}
    .lp-bar-track{height:4px;background:var(--border);position:relative;overflow:hidden;flex:1;}
    .lp-bar-fill{position:absolute;left:0;top:0;height:100%;}
    /* TICKER */
    .lp-ticker{border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--accent) 3%,transparent);padding:10px 0;overflow:hidden;white-space:nowrap;}
    .lp-ticker-inner{display:inline-block;animation:lpTicker 28s linear infinite;}
    .lp-ticker-item{display:inline-block;padding:0 36px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}
    .lp-ticker-item span{color:var(--accent);font-weight:700;}
    /* SECTIONS */
    .lp-section{padding:96px 24px;max-width:1120px;margin:0 auto;}
    .lp-section-full{padding:96px 24px;background:color-mix(in srgb,var(--accent) 3%,transparent);}
    .lp-sec-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:14px;}
    .lp-h2{font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(30px,4vw,50px);line-height:1.1;letter-spacing:-0.025em;margin-bottom:14px;}
    .lp-body{font-size:16px;color:var(--text2);line-height:1.7;max-width:540px;}
    /* FEATURE CARDS */
    .lp-feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:52px;}
    .lp-feat-card{background:var(--card,var(--surface));border:1px solid var(--border);border-radius:13px;padding:26px;position:relative;overflow:hidden;transition:all 0.3s;cursor:default;}
    .lp-feat-card:hover{border-color:color-mix(in srgb,var(--accent) 35%,transparent);transform:translateY(-3px);box-shadow:0 14px 42px color-mix(in srgb,var(--bg) 20%,black);}
    .lp-feat-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:800;color:var(--text4);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;}
    .lp-feat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px;}
    .lp-feat-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;margin-bottom:7px;letter-spacing:-0.01em;}
    .lp-feat-body{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px;}
    .lp-feat-hook{display:inline-flex;align-items:center;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);padding:3px 9px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;}
    /* PAIN / QUOTE */
    .lp-pain-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center;margin-top:52px;}
    .lp-pain-list{display:flex;flex-direction:column;gap:16px;}
    .lp-pain-item{display:flex;gap:14px;align-items:flex-start;padding:18px;background:var(--card,var(--surface));border:1px solid var(--border);border-radius:11px;transition:border-color 0.2s;}
    .lp-pain-item:hover{border-color:var(--border2);}
    .lp-pain-icon{font-size:22px;flex-shrink:0;}
    .lp-pain-strong{display:block;font-size:14px;font-weight:700;margin-bottom:3px;}
    .lp-pain-span{font-size:13px;color:var(--text2);}
    .lp-quote{background:var(--card,var(--surface));border:1px solid var(--border);border-radius:14px;padding:32px;position:relative;}
    .lp-quote-mark{position:absolute;top:-18px;left:26px;font-family:'Sora',sans-serif;font-size:90px;font-weight:900;color:var(--accent);line-height:1;opacity:0.25;}
    .lp-quote-text{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;line-height:1.55;color:var(--text);margin-bottom:18px;}
    .lp-quote-author{display:flex;align-items:center;gap:10px;}
    .lp-quote-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--amber));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;}
    .lp-quote-name{display:block;font-size:13px;font-weight:700;}
    .lp-quote-role{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
    /* MONEY DASH */
    .lp-money-dash{background:var(--card,var(--surface));border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:44px;box-shadow:0 20px 52px color-mix(in srgb,var(--bg) 20%,black);}
    .lp-money-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}

    .lp-money-grid{display:grid;grid-template-columns:repeat(4,1fr);}
    .lp-money-cell{padding:22px 18px;border-right:1px solid var(--border);}
    .lp-money-cell:last-child{border-right:none;}
    .lp-money-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px;}
    .lp-money-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;line-height:1;}
    .lp-money-sub{font-size:10px;color:var(--text3);margin-top:3px;}
    .lp-money-bar{padding:18px 22px;border-top:1px solid var(--border);}
    .lp-money-bar-track{height:9px;background:var(--border);border-radius:5px;overflow:hidden;position:relative;}
    .lp-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
    .lp-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
    .lp-legend-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
    /* WHATSAPP */
    .lp-wa-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;max-width:1120px;margin:0 auto;}
    .lp-wa-mock{background:var(--card,var(--surface));border:1px solid var(--border);border-radius:20px;padding:18px;max-width:320px;margin:0 auto;box-shadow:0 20px 52px color-mix(in srgb,var(--bg) 20%,black);}

    .lp-wa-msg-header{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:800;color:var(--green);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.06em;}
    .lp-wa-link{display:block;margin-top:7px;padding:7px 9px;background:color-mix(in srgb,var(--green) 15%,transparent);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--green);}
    .lp-wa-time{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:3px;text-align:right;}
    .lp-wa-reply{background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);border-radius:11px 11px 3px 11px;padding:9px 13px;max-width:80%;font-size:12px;color:var(--text2);}
    /* STATS BAND */
    .lp-stats-band{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:52px 24px;}
    .lp-stats-grid{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:28px;}
    .lp-stat-item{text-align:center;}
    .lp-stat-val{font-family:'Sora',sans-serif;font-size:clamp(34px,5vw,52px);font-weight:900;line-height:1;margin-bottom:5px;}
    .lp-stat-lbl{font-size:13px;color:var(--text2);font-weight:500;}
    /* PRICING */
    .lp-price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:52px;}

    .lp-price-badge{position:absolute;top:0;right:0;background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:800;padding:5px 11px;letter-spacing:0.1em;border-radius:0 14px 0 8px;}
    .lp-price-plan{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;}
    .lp-price-val{font-family:'Sora',sans-serif;font-size:42px;font-weight:900;line-height:1;margin-bottom:3px;}
    .lp-price-period{font-size:11px;color:var(--text3);margin-bottom:22px;font-family:'JetBrains Mono',monospace;}
    .lp-price-features{list-style:none;margin-bottom:26px;}
    .lp-price-features li{display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border);}
    .lp-price-features li:last-child{border-bottom:none;}
    .lp-price-features li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;}
    .lp-price-btn{width:100%;padding:12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;border:none;}

    .lp-price-btn-accent{background:var(--accent);color:#fff;box-shadow:0 0 18px color-mix(in srgb,var(--accent) 35%,transparent);}
    .lp-price-btn-accent:hover{box-shadow:0 0 28px color-mix(in srgb,var(--accent) 50%,transparent);}
    /* CTA */
    .lp-cta{padding:96px 24px;text-align:center;position:relative;overflow:hidden;}
    .lp-cta-glow{position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);width:600px;height:350px;background:radial-gradient(ellipse,color-mix(in srgb,var(--accent) 12%,transparent) 0%,transparent 70%);pointer-events:none;}

    .lp-cta-sub{font-size:16px;color:var(--text2);margin-bottom:36px;}
    .lp-trust{display:flex;gap:20px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:36px;}
    .lp-trust-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;}

    .lp-footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;max-width:1200px;margin:0 auto;}
    .lp-footer-links{display:flex;gap:20px;}
    .lp-footer-links button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);transition:color 0.2s;font-family:'DM Sans',sans-serif;}
    .lp-footer-links button:hover{color:var(--text2);}
    .lp-footer-sig{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text4);}
    /* REVEAL */
    .lp-reveal{opacity:0;transform:translateY(22px);transition:opacity 0.65s ease,transform 0.65s ease;}
    .lp-reveal.lp-vis{opacity:1;transform:translateY(0);}
    .lp-d1{transition-delay:0.08s;}.lp-d2{transition-delay:0.16s;}.lp-d3{transition-delay:0.24s;}
    /* WA checks section */
    .lp-wa-checklist{display:flex;flex-direction:column;gap:10px;margin-top:28px;}
    .lp-wa-check{display:flex;gap:10px;align-items:center;}
    .lp-wa-check-icon{width:34px;height:34px;border-radius:8px;background:color-mix(in srgb,var(--green) 12%,transparent);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    /* ANIMATIONS */
    @keyframes lpPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
    @keyframes lpTicker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
    /* RESPONSIVE */
    @media(max-width:900px){
      .lp-nav{padding:12px 18px;}
      .lp-nav-links{display:none;}
      .lp-pain-grid{grid-template-columns:1fr;}
      .lp-wa-grid{grid-template-columns:1fr;}
      .lp-money-grid{grid-template-columns:1fr 1fr;}
      .lp-price-grid{grid-template-columns:1fr;}
      .lp-stats-grid{grid-template-columns:1fr 1fr;}
      .lp-footer{flex-direction:column;align-items:flex-start;}
    }
    @media(max-width:640px){
      .lp-h1{font-size:40px;}
      .lp-mockup-wrap{display:none;}
      .lp-money-grid{grid-template-columns:1fr 1fr;}
      .lp-stats-grid{grid-template-columns:1fr 1fr;}
    }
    @media(max-width:380px){
      .lp-h1{font-size:34px;}
      .lp-h2{font-size:28px;}
