function TutorialSystem({ currentView, isFirstVisit, onDismiss }) {
  const [open, setOpen] = useState(false);
  const [activeTutorial, setActiveTutorial] = useState(null);
  const [step, setStep] = useState(0);
  const [seen, setSeen] = useState(() => {
    try { return JSON.parse(localStorage.getItem("fcc_tutorials_seen")) || {}; } catch { return {}; }
  });

  const markSeen = (id) => {
    const next = { ...seen, [id]: true };
    setSeen(next);
    try { localStorage.setItem("fcc_tutorials_seen", JSON.stringify(next)); } catch {}
  };

  // Auto-open welcome on very first visit
  useEffect(() => {
    if (isFirstVisit && !seen["welcome"]) {
      setTimeout(() => {
        setActiveTutorial(TUTORIALS[0]);
        setStep(0);
        setOpen(true);
      }, 800);
    }
  }, [isFirstVisit]);

  // Auto-suggest tutorial when entering a view for first time
  useEffect(() => {
    const viewTut = TUTORIALS.find(t => t.id === currentView);
    if (viewTut && !seen[currentView] && !open) {
      // Don't auto-open, just show a gentle prompt via a timeout
    }
  }, [currentView]);

  const openTutorial = (tut) => {
    setActiveTutorial(tut);
    setStep(0);
    setOpen(true);
  };

  const close = () => {
    if (activeTutorial) markSeen(activeTutorial.id);
    setOpen(false);
    setActiveTutorial(null);
    setStep(0);
  };

  const next = () => {
    if (step < activeTutorial.steps.length - 1) {
      setStep(s => s + 1);
    } else {
      close();
    }
  };

  const prev = () => { if (step > 0) setStep(s => s - 1); };

  const currentStep = activeTutorial ? activeTutorial.steps[step] : null;

  return (
    <>
      {/* Tutorial launcher button — bottom right */}
      <button
        onClick={() => setOpen(o => !o)}
        title="Tutorials & Help"
        style={{
          position: "fixed", bottom: "88px", right: "16px", zIndex: 400,
          width: "44px", height: "44px", borderRadius: "50%",
          background: "var(--accent)", border: "none", color: "#fff",
          fontSize: "18px", cursor: "pointer", boxShadow: "0 4px 16px rgba(0,0,0,0.25)",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "all 0.2s"
        }}
        onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"}
        onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
      >
        ?
      </button>

      {/* Tutorial picker drawer */}
      {open && !activeTutorial && (
        <>
          <div onClick={() => setOpen(false)} style={{position:"fixed",inset:0,zIndex:401}}/>
          <div style={{
            position: "fixed", bottom: "144px", right: "16px", zIndex: 402,
            background: "var(--modal-bg)", border: "1px solid var(--border)",
            borderRadius: "10px", padding: "14px", width: "260px",
            boxShadow: "0 8px 32px rgba(0,0,0,0.2)", animation: "fadeUp 0.15s ease"
          }}>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"9px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.14em",marginBottom:"10px"}}>
              Tutorials & Help
            </div>
            {TUTORIALS.map(tut => (
              <button key={tut.id} onClick={() => openTutorial(tut)} style={{
                width:"100%",background:seen[tut.id]?"var(--bg)":"var(--accent)10",
                border:"1px solid " + (seen[tut.id]?"var(--border)":"var(--accent)44"),
                borderRadius:"5px",padding:"9px 12px",marginBottom:"6px",
                cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",
                transition:"all 0.15s"
              }}>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:"11px",fontWeight:"700",color:"var(--text)"}}>{tut.title}</div>
                  <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",color:"var(--text4)",marginTop:"2px"}}>{tut.steps.length} steps</div>
                </div>
                {seen[tut.id] && <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",color:"var(--green)"}}>✓ done</span>}
              </button>
            ))}
            <div style={{marginTop:"8px",borderTop:"1px solid var(--border)",paddingTop:"8px",fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",color:"var(--text4)",lineHeight:1.5}}>
              Press ? anytime to reopen this menu
            </div>
          </div>
        </>
      )}

      {/* Active tutorial modal */}
      {open && activeTutorial && currentStep && (
        <>
          <div onClick={close} style={{position:"fixed",inset:0,background:"var(--overlay)",zIndex:450,animation:"fadeIn 0.2s"}}/>
          <div style={{
            position:"fixed",bottom:"100px",right:"16px",
            width:"min(340px,calc(100vw - 32px))",
            background:"var(--modal-bg)",border:"1px solid var(--border)",
            borderRadius:"12px",zIndex:451,
            boxShadow:"0 16px 48px rgba(0,0,0,0.3)",animation:"fadeUp 0.2s ease",
            overflow:"hidden"
          }}>
            {/* Progress bar */}
            <div style={{height:"3px",background:"var(--border)"}}>
              <div style={{height:"100%",width:`${((step+1)/activeTutorial.steps.length)*100}%`,background:"var(--accent)",transition:"width 0.3s ease"}}/>
            </div>

            <div style={{padding:"16px 18px"}}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"9px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.12em"}}>
                  {activeTutorial.title}
                </div>
                <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                  <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>
                    {step+1}/{activeTutorial.steps.length}
                  </span>
                  <button onClick={close} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:"14px",padding:"0",lineHeight:1}}>✕</button>
                </div>
              </div>

              {/* Step content */}
              <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)",marginBottom:"8px",lineHeight:1.3}}>
                {currentStep.title}
              </div>
              <div style={{fontSize:"11px",color:"var(--text2)",lineHeight:1.6,marginBottom:currentStep.tip?"10px":"0"}}>
                {currentStep.body}
              </div>

              {/* Tip callout */}
              {currentStep.tip && (
                <div style={{
                  background:"var(--amber)10",border:"1px solid var(--amber)33",
                  borderRadius:"5px",padding:"8px 10px",
                  display:"flex",gap:"6px",alignItems:"flex-start"
                }}>
                  <span style={{fontSize:"12px",flexShrink:0}}>💡</span>
                  <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"8.5px",color:"var(--amber)",lineHeight:1.5}}>
                    {currentStep.tip}
                  </div>
                </div>
              )}

              {/* Navigation */}
              <div style={{display:"flex",gap:"8px",marginTop:"14px",alignItems:"center"}}>
                {step > 0 ? (
                  <button onClick={prev} className="btn-ghost" style={{fontSize:"9px",padding:"7px 12px"}}>← Back</button>
                ) : (
                  <button onClick={close} className="btn-ghost" style={{fontSize:"9px",padding:"7px 12px"}}>Skip</button>
                )}
                <button onClick={next} className="btn-primary" style={{flex:1,fontSize:"9px",padding:"8px"}}>
                  {step < activeTutorial.steps.length - 1 ? "Next →" : "Got it ✓"}
                </button>
              </div>

              {/* Dots */}
              <div style={{display:"flex",gap:"5px",justifyContent:"center",marginTop:"10px"}}>
                {activeTutorial.steps.map((_,i) => (
                  <div key={i} onClick={() => setStep(i)} style={{
                    width:"6px",height:"6px",borderRadius:"50%",cursor:"pointer",
                    background:i===step?"var(--accent)":"var(--border)",
                    transition:"background 0.2s"
                  }}/>
                ))}
              </div>
            </div>
          </div>
        </>
      )}
    </>
  );
}

function App(){
  const load=key=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch{return null;}};
  const persist=(key,val)=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}};

  // ── OJOLA SEED GUARD — clears any stale Rongo/other cached data and forces
  //    fresh Ojola project on first load of this file. Change SEED_VER to re-seed.
  //    SKIP if a ?snap= link is being loaded — recipient's storage must not be wiped.
  const SEED_VER="ojola-v1";
  const _isSnapLoad=!!window.__FCC_SNAPSHOT__;
  if(!_isSnapLoad && load("ahp_seed")!==SEED_VER){
    ["ahp_projects","ahp_activeProject","ahp_seenApp","ahp_theme","ahp_large"].forEach(k=>{
      try{localStorage.removeItem(k);}catch{}
    });
    persist("ahp_seed",SEED_VER);
    persist("ahp_projects",[RONGO_DATA]);
    persist("ahp_activeProject",0);
  }

  // ── Registration state ─────────────────────────────────────────────────────
  // ── Auth state ─────────────────────────────────────────────────────────────
  // NOTE: If a snapshot is incoming (?snap=), we bypass auth + landing synchronously
  //       so the recipient lands directly on the shared project — no blank screen.
  const [showAuth,setShowAuth]=useState(()=>{
    if(window.__FCC_SNAPSHOT__) return false; // snap links skip auth gate
    try{return !JSON.parse(localStorage.getItem("fcc_user"));}catch{return true;}
  });
  const [currentUser,setCurrentUser]=useState(()=>{ try{return JSON.parse(localStorage.getItem("fcc_user"))||null;}catch{return null;} });
  const [showOrgPanel,setShowOrgPanel]=useState(false);
  const [upgradedBanner,setUpgradedBanner]=useState(()=>new URLSearchParams(window.location.search).get("upgraded")||null);
  const [isFirstVisit]=useState(()=>{ try{return !localStorage.getItem("fcc_tutorials_seen");}catch{return true;} });
  const [showShare,setShowShare]=useState(false);

  // (snapshot toast fires after toast state is declared below)

  const [theme,setTheme]     = useState(()=>load("ahp_theme")||"light");
  const [largeText,setLargeText] = useState(()=>load("ahp_large")||false);
  const [showLanding,setShowLanding] = useState(()=>{
    if(window.__FCC_SNAPSHOT__) return false; // snap links skip landing page
    return load("ahp_seenApp")!==true;
  });
  const [projects,setProjects] = useState(()=>{
    if(window.__FCC_SNAPSHOT__){
      try{
        const snap=window.__FCC_SNAPSHOT__;
        const snapProject={...snap, site:{...snap.site, name:`[Shared] ${snap.site?.name||"Project"}`}, _isSnapshot:true};
        const existing=load("ahp_projects")||[RONGO_DATA];
        // Avoid duplicating if already saved (e.g. hot reload)
        const alreadyIn=existing.some(p=>p._isSnapshot && p.site?.name===snapProject.site?.name);
        const merged=alreadyIn?existing:[...existing,snapProject];
        persist("ahp_projects",merged);
        persist("ahp_activeProject",merged.length-1);
        persist("ahp_seenApp",true);
        window.history.replaceState({},"",window.location.pathname);
        // stash name for toast — fired after render
        window.__FCC_SNAP_NAME__=snap.site?.name||"Project";
        window.__FCC_SNAPSHOT__=null;
        return merged;
      }catch(e){ console.warn("FCC: snapshot parse failed",e); }
    }
    return load("ahp_projects")||[RONGO_DATA];
  });
  const [activeProject,setActiveProject] = useState(()=>{
    // If we just loaded a snapshot, point to the last project (the snap)
    if(window.__FCC_SNAP_NAME__ !== undefined){
      const all=load("ahp_projects")||[RONGO_DATA];
      return all.length-1;
    }
    return load("ahp_activeProject")||0;
  });
  const [showNewProject,setShowNewProject] = useState(false);
  const [showProjectPicker,setShowProjectPicker] = useState(false);

  const proj = projects[activeProject]||projects[0];
  const {site,phases=[],wps=[],risks=[],snags=[],team=[]} = proj;
  const [diaries,setDiaries]   = useState(()=>proj.diaries||[]);
  const [materials,setMaterials] = useState(()=>proj.materials||[]);
  const [provisions,setProvisions] = useState(()=>proj.provisions||RONGO_PROVISIONS);

  // sync diaries/materials when switching project
  useEffect(()=>{
    const p=projects[activeProject]||projects[0];
    setDiaries(p.diaries||[]);
    setMaterials(p.materials||[]);
    setProvisions(p.provisions||RONGO_PROVISIONS);
  },[activeProject]);

  // save diaries/materials/provisions back to project
  useEffect(()=>{
    const p=[...projects];
    p[activeProject]={...p[activeProject],diaries,materials,provisions};
    setProjects(p);
    persist("ahp_projects",p);
    sbSaveProject(currentUser?.id, p[activeProject]);
  },[diaries,materials,provisions]);

  const saveProj=(d)=>{
    const p=[...projects];
    p[activeProject]={...p[activeProject],...d};
    setProjects(p);persist("ahp_projects",p);
    sbSaveProject(currentUser?.id, p[activeProject]);
  };

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);persist("ahp_theme",theme);},[theme]);
  useEffect(()=>{document.documentElement.setAttribute("data-large",largeText?"1":"0");persist("ahp_large",largeText);},[largeText]);
  const enterApp=()=>{
    persist("ahp_seenApp",true);setShowLanding(false);
    if(window.fccTrack) window.fccTrack("app_entered",{project:proj?.site?.name||""});
  };
  const goHome=()=>{setShowLanding(true);window.scrollTo({top:0,behavior:"smooth"});};
  useEffect(()=>{persist("ahp_activeProject",activeProject);},[activeProject]);

  const [view,setView]         = useState("overview");
  const [activePhase,setActivePhase] = useState("PH3");
  const [time,setTime]         = useState(new Date());
  const [notif,setNotif]       = useState(false);
  const [showEdit,setShowEdit] = useState(false);
  const [showPin,setShowPin]   = useState(false);
  const [toast,setToast]       = useState("");
  const [showIntegration,setShowIntegration] = useState(false);
  const [online,setOnline]     = useState(()=>navigator.onLine);
  const [syncing,setSyncing]   = useState(false);
  const [lastSync,setLastSync] = useState(()=>load("ahp_lastSync")||null);
  // ── Inline cell editing ──────────────────────────────────────────────────────
  const [inlineEdit,setInlineEdit] = useState(null); // {wpId,col,val} | null
  const inlineRef = useRef(null);

  // Online/offline detection
  useEffect(()=>{
    const goOnline=()=>{
      setOnline(true);
      setSyncing(true);
      const ts=new Date().toISOString();
      setTimeout(()=>{setLastSync(ts);persist("ahp_lastSync",ts);setSyncing(false);showToast("☁ Back online — data synced");},1400);
    };
    const goOffline=()=>{setOnline(false);showToast("📴 Offline — changes saved locally");};
    window.addEventListener("online",goOnline);
    window.addEventListener("offline",goOffline);
    return()=>{window.removeEventListener("online",goOnline);window.removeEventListener("offline",goOffline);};
  },[]);

  const manualSync=()=>{
    if(!online){showToast("📴 Cannot sync — no connection");return;}
    setSyncing(true);
    const ts=new Date().toISOString();
    setTimeout(()=>{setLastSync(ts);persist("ahp_lastSync",ts);setSyncing(false);showToast("☁ Synced successfully");},1200);
  };

  const handleImport=(imported)=>{
    const p=[...projects];
    p[activeProject]={...p[activeProject],...imported};
    setProjects(p);persist("ahp_projects",p);
    if(imported.diaries)setDiaries(imported.diaries);
    if(imported.materials)setMaterials(imported.materials);
    if(imported.provisions)setProvisions(imported.provisions);
  };

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  // ── Snapshot toast — notify recipient that shared project loaded ────────────
  useEffect(()=>{
    if(window.__FCC_SNAP_NAME__!==undefined){
      const name=window.__FCC_SNAP_NAME__;
      window.__FCC_SNAP_NAME__=undefined;
      setTimeout(()=>showToast(`✓ Shared snapshot loaded — ${name}`),400);
      if(window.fccTrack) window.fccTrack("snapshot_received",{project:name});
    }
  },[]);

  const handleSave=d=>{saveProj(d);setShowEdit(false);showToast("✓ Dashboard updated");};

  // ── Inline edit helpers ──────────────────────────────────────────────────────
  // Auto-focus & select the input whenever a cell enters edit mode
  useEffect(()=>{
    if(inlineEdit&&inlineRef.current){
      inlineRef.current.focus();
      if(typeof inlineRef.current.select==="function") inlineRef.current.select();
    }
  },[inlineEdit]);

  // Commit the current edit back into wps state
  const commitInline=(overrideVal)=>{
    if(!inlineEdit) return;
    const {wpId,col}=inlineEdit;
    const val=overrideVal!==undefined?overrideVal:inlineEdit.val;
    const coerced=col==="progress"?Math.max(0,Math.min(100,Number(val))):val;
    const newWPs=wps.map(w=>w.id===wpId?{...w,[col]:coerced}:w);
    saveProj({wps:newWPs});
    setInlineEdit(null);
    showToast("✓ Saved");
  };

  const cancelInline=()=>setInlineEdit(null);

  // Save current cell and move up/down in same column (dir: +1 down, -1 up)
  const navigateInline=(dir)=>{
    if(!inlineEdit) return;
    const {wpId,col,val}=inlineEdit;
    // commit current value first
    const coerced=col==="progress"?Math.max(0,Math.min(100,Number(val))):val;
    const updatedWPs=wps.map(w=>w.id===wpId?{...w,[col]:coerced}:w);
    saveProj({wps:updatedWPs});
    const rows=updatedWPs.filter(w=>w.phase===activePhase);
    const idx=rows.findIndex(w=>w.id===wpId);
    const nextIdx=idx+dir;
    if(nextIdx>=0&&nextIdx<rows.length){
      const next=rows[nextIdx];
      setInlineEdit({wpId:next.id,col,val:String(next[col]??'')});
    } else {
      setInlineEdit(null);
    }
  };

  // Shared keyboard handler for all inline inputs
  const inlineKeyDown=(e)=>{
    if(e.key==="Enter"||e.key==="ArrowDown"){e.preventDefault();navigateInline(1);}
    else if(e.key==="ArrowUp"){e.preventDefault();navigateInline(-1);}
    else if(e.key==="Escape"){e.preventDefault();cancelInline();}

//  PAYMENTS VIEW  — Paystack (Card / M-Pesa) + M-Pesa Daraja
// ══════════════════════════════════════════════════════════
const PAYSTACK_KEY = "pk_test_63e1fcfd734d117a23475494ea27c8499d1eb634";

function PaymentsView({ site }) {
  const [form, setForm] = React.useState({ email: "", amount: "", name: "", description: "", phone: "" });
  const [method, setMethod] = React.useState("card"); // "card" | "mpesa"
  const [history, setHistory] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("ojola_payments") || "[]"); } catch { return []; }
  });
  const [processing, setProcessing] = React.useState(false);
  const [mpesaStatus, setMpesaStatus] = React.useState(null); // null | "pending" | "sent" | "error"

  const saveToHistory = (entry) => {
    const updated = [entry, ...history].slice(0, 100);
    setHistory(updated);
    try { localStorage.setItem("ojola_payments", JSON.stringify(updated)); } catch {}
  };

  const totalCollected = history.filter(h => h.status === "success").reduce((s, h) => s + h.amount, 0);
  const pendingCount = history.filter(h => h.status === "pending").length;

  const fmtK = n => "KES " + Number(n).toLocaleString("en-KE");

  // ── Safely ensure Paystack script is loaded, then run callback ──
  const loadPaystack = (cb) => {
    if (window.PaystackPop) { cb(); return; }
    const existing = document.querySelector('script[src*="paystack"]');
    if (existing) {
      // Script tag exists but hasn't finished — wait for it
      existing.addEventListener("load", cb);
      existing.addEventListener("error", () => { setProcessing(false); alert("Could not load Paystack. Check your internet connection."); });
      return;
    }
    const s = document.createElement("script");
    s.src = "https://js.paystack.co/v1/inline.js";
    s.onload = cb;
    s.onerror = () => { setProcessing(false); alert("Could not load Paystack. Check your internet connection."); };
    document.head.appendChild(s);
  };

  // ── Paystack card / M-Pesa via Paystack ──
  const handlePaystack = () => {
    const amt = parseFloat(form.amount);
    if (!form.email || !amt || amt < 1) {
      alert("Please enter a valid email and amount."); return;
    }
    setProcessing(true);
    loadPaystack(() => {
      try {
        const ref = "OJL-" + Date.now();
        const handler = window.PaystackPop.setup({
          key: PAYSTACK_KEY,
          email: form.email,
          amount: Math.round(amt * 100),
          currency: "KES",
          ref,
          channels: ["card", "mobile_money", "bank_transfer"],
          metadata: {
            custom_fields: [
              { display_name: "Client Name", variable_name: "client_name", value: form.name },
              { display_name: "Project",     variable_name: "project",     value: site?.name || "Ojola" },
              { display_name: "Description", variable_name: "description", value: form.description },
            ]
          },
          callback: (response) => {
            setProcessing(false);
            saveToHistory({
              id: response.reference,
              date: new Date().toISOString(),
              client: form.name || form.email,
              email: form.email,
              description: form.description || "Payment",
              amount: amt,
              method: "Card / Paystack",
              status: "success",
            });
            setForm({ email: "", amount: "", name: "", description: "", phone: "" });
            alert("✅ Payment successful! Ref: " + response.reference);
          },
          onClose: () => { setProcessing(false); },
        });
        handler.openIframe();
      } catch(e) {
        setProcessing(false);
        alert("Paystack error: " + e.message);
      }
    });
  };

  // ── M-Pesa STK Push via Daraja (requires Netlify Function — shows instructions if not configured) ──
  const handleMpesa = async () => {
    const amt = parseFloat(form.amount);
    if (!form.phone || !amt || amt < 1) {
      alert("Please enter a valid Safaricom phone number and amount."); return;
    }
    const phone = form.phone.replace(/\D/g, "").replace(/^0/, "254").replace(/^(\+?254)/, "254");
    setProcessing(true);
    setMpesaStatus("pending");
    try {
      const res = await fetch("/.netlify/functions/mpesa", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          phone,
          amount: Math.round(amt),
          description: form.description || `Payment to ${site?.name || "Ojola"}`,
          ref: "OJL-" + Date.now(),
        }),
      });
      if (res.ok) {
        const data = await res.json();
        setMpesaStatus("sent");
        saveToHistory({
          id: data.CheckoutRequestID || ("MPE-" + Date.now()),
          date: new Date().toISOString(),
          client: form.name || form.phone,
          email: form.email || "—",
          description: form.description || "M-Pesa STK Push",
          amount: amt,
          method: "M-Pesa STK",
          status: "pending",
        });
        setForm({ email: "", amount: "", name: "", description: "", phone: "" });
        setTimeout(() => setMpesaStatus(null), 6000);
      } else {
        const err = await res.json().catch(() => ({}));
        setMpesaStatus("error");
        alert("M-Pesa error: " + (err.message || res.statusText) + "\n\nMake sure your Netlify Function is deployed and Daraja credentials are set.");
        setTimeout(() => setMpesaStatus(null), 4000);
      }
    } catch (e) {
      setMpesaStatus("error");
      alert("Could not reach the M-Pesa function.\n\nDeploy the Netlify Function first (see Daraja setup guide).\n\n" + e.message);
      setTimeout(() => setMpesaStatus(null), 4000);
    }
    setProcessing(false);
  };

  const statusColor = { success: "#38A169", pending: "#D69E2E", failed: "#E53E3E" };

  return (
    <div style={{ animation: "fadeUp 0.2s ease" }}>

      {/* ── Summary strip ── */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "10px", marginBottom: "14px" }}>
        {[
          { label: "Total Collected", value: fmtK(totalCollected), color: "var(--green)" },
          { label: "Transactions", value: history.filter(h => h.status === "success").length, color: "var(--accent)" },
          { label: "Awaiting Confirmation", value: pendingCount, color: pendingCount > 0 ? "var(--amber)" : "var(--text4)" },
        ].map(({ label, value, color }) => (
          <div key={label} className="card" style={{ padding: "14px 16px" }}>
            <div style={{ fontSize: "20px", fontWeight: "900", color, lineHeight: 1 }}>{value}</div>
            <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'Share Tech Mono',monospace", textTransform: "uppercase", marginTop: "4px" }}>{label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "14px" }}>

        {/* ── Payment request form ── */}
        <div className="card" style={{ padding: "18px" }}>
          <div style={{ fontSize: "11px", fontWeight: "800", color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "14px", display: "flex", alignItems: "center", gap: "6px" }}>
            💳 Request Payment
          </div>

          {/* Method toggle */}
          <div style={{ display: "flex", gap: "6px", marginBottom: "14px" }}>
            {[
              { id: "card", label: "💳 Card / Paystack" },
              { id: "mpesa", label: "📱 M-Pesa STK" },
            ].map(m => (
              <button key={m.id} onClick={() => setMethod(m.id)}
                style={{ flex: 1, padding: "8px", border: `2px solid ${method === m.id ? "var(--accent)" : "var(--border)"}`, borderRadius: "5px", background: method === m.id ? "var(--accent-bg)" : "var(--bg)", color: method === m.id ? "var(--accent)" : "var(--text3)", fontFamily: "'Share Tech Mono',monospace", fontSize: "9px", fontWeight: "700", cursor: "pointer", textTransform: "uppercase", letterSpacing: "0.05em", transition: "all 0.15s" }}>
                {m.label}
              </button>
            ))}
          </div>

          {/* Form fields */}
          {[
            { key: "name", label: "Client Name", placeholder: "e.g. Acme Ltd", type: "text" },
            { key: "email", label: method === "card" ? "Email (required)" : "Email (optional)", placeholder: "client@example.com", type: "email" },
            { key: "amount", label: "Amount (KES)", placeholder: "e.g. 150000", type: "number" },
            { key: "description", label: "Description", placeholder: "e.g. Phase 2 deposit", type: "text" },
            ...(method === "mpesa" ? [{ key: "phone", label: "Safaricom Number", placeholder: "07XX XXX XXX", type: "tel" }] : []),
          ].map(({ key, label, placeholder, type }) => (
            <div key={key} style={{ marginBottom: "10px" }}>
              <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'Share Tech Mono',monospace", textTransform: "uppercase", marginBottom: "4px" }}>{label}</div>
              <input
                type={type}
                value={form[key]}
                placeholder={placeholder}
                onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                style={{ width: "100%", padding: "8px 10px", background: "var(--input-bg)", border: "1px solid var(--border)", borderRadius: "4px", color: "var(--text)", fontFamily: "'Barlow',sans-serif", fontSize: "12px", outline: "none" }}
              />
            </div>
          ))}

          {/* M-Pesa status message */}
          {mpesaStatus === "sent" && (
            <div style={{ background: "var(--green)15", border: "1px solid var(--green)44", borderRadius: "5px", padding: "10px 12px", marginBottom: "10px", fontSize: "11px", color: "var(--green)", fontWeight: "700" }}>
              ✅ STK Push sent! Ask the client to check their phone and enter their M-Pesa PIN.
            </div>
          )}
          {mpesaStatus === "error" && (
            <div style={{ background: "var(--red)15", border: "1px solid var(--red)44", borderRadius: "5px", padding: "10px 12px", marginBottom: "10px", fontSize: "11px", color: "var(--red)", fontWeight: "700" }}>
              ❌ STK Push failed. Check your Daraja credentials in the Netlify Function.
            </div>
          )}

          <button
            onClick={method === "card" ? handlePaystack : handleMpesa}
            disabled={processing}
            style={{ width: "100%", padding: "11px", background: processing ? "var(--border)" : method === "card" ? "var(--accent)" : "var(--green)", color: "#fff", border: "none", borderRadius: "5px", fontFamily: "'Share Tech Mono',monospace", fontSize: "11px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.08em", cursor: processing ? "not-allowed" : "pointer", transition: "all 0.15s" }}>
            {processing ? "Processing…" : method === "card" ? "▶ Open Paystack Checkout" : "📱 Send M-Pesa STK Push"}
          </button>

          {method === "mpesa" && (
            <div style={{ marginTop: "10px", padding: "10px", background: "var(--amber)10", border: "1px solid var(--amber)33", borderRadius: "4px", fontSize: "9px", color: "var(--text3)", fontFamily: "'Share Tech Mono',monospace", lineHeight: 1.6 }}>
              ⚠ M-Pesa STK requires the Netlify Function to be deployed with your Daraja Consumer Key, Secret, Shortcode & Passkey. See setup guide above.
            </div>
          )}
        </div>

        {/* ── Payment history ── */}
        <div className="card" style={{ padding: "18px" }}>
          <div style={{ fontSize: "11px", fontWeight: "800", color: "var(--text)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>📜 Payment History</span>
            {history.length > 0 && (
              <button onClick={() => { if (confirm("Clear all payment history?")) { setHistory([]); localStorage.removeItem("ojola_payments"); } }}
                style={{ background: "var(--red)15", border: "1px solid var(--red)44", color: "var(--red)", padding: "3px 8px", borderRadius: "3px", fontFamily: "'Share Tech Mono',monospace", fontSize: "8px", fontWeight: "700", cursor: "pointer", textTransform: "uppercase" }}>
                Clear
              </button>
            )}
          </div>
          {history.length === 0 ? (
            <div style={{ textAlign: "center", padding: "32px 16px", color: "var(--text4)", fontFamily: "'Share Tech Mono',monospace", fontSize: "10px" }}>
              No payments yet.<br />Requests you initiate will appear here.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "8px", maxHeight: "420px", overflowY: "auto" }}>
              {history.map((h, i) => (
                <div key={i} style={{ padding: "10px 12px", background: "var(--bg)", borderRadius: "5px", borderLeft: `3px solid ${statusColor[h.status] || "var(--border)"}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontSize: "12px", fontWeight: "800", color: "var(--text)" }}>{h.client}</div>
                      <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'Share Tech Mono',monospace", marginTop: "2px" }}>{h.description}</div>
                      <div style={{ fontSize: "9px", color: "var(--text4)", fontFamily: "'Share Tech Mono',monospace" }}>{h.method} · {new Date(h.date).toLocaleDateString("en-KE")}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: "14px", fontWeight: "900", color: statusColor[h.status] || "var(--text)" }}>{fmtK(h.amount)}</div>
                      <div style={{ fontSize: "8px", fontWeight: "700", color: statusColor[h.status] || "var(--text4)", textTransform: "uppercase", fontFamily: "'Share Tech Mono',monospace" }}>{h.status}</div>
                    </div>
                  </div>
                  <div style={{ fontSize: "8px", color: "var(--text4)", fontFamily: "'Share Tech Mono',monospace", marginTop: "4px", wordBreak: "break-all" }}>{h.id}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* ── Daraja setup guide ── */}
      <div className="card" style={{ padding: "18px", marginTop: "14px" }}>
        <div style={{ fontSize: "11px", fontWeight: "800", color: "var(--amber)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "12px" }}>
          📋 M-Pesa / Daraja Setup Checklist
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: "10px" }}>
          {[
            { step: "1", title: "Register on Daraja", desc: "developer.safaricom.co.ke → Create App → enable M-Pesa Express" },
            { step: "2", title: "Create Netlify Function", desc: "Add functions/mpesa.js to your project with Consumer Key, Secret, Shortcode & Passkey as env vars" },
            { step: "3", title: "Set Env Vars in Netlify", desc: "Netlify Dashboard → Site Settings → Environment Variables → add MPESA_CONSUMER_KEY, MPESA_CONSUMER_SECRET, MPESA_SHORTCODE, MPESA_PASSKEY" },
            { step: "4", title: "Go Live on Daraja", desc: "Apply for production shortcode via Safaricom Business portal once testing is complete" },
          ].map(({ step, title, desc }) => (
            <div key={step} style={{ display: "flex", gap: "10px", padding: "10px", background: "var(--bg)", borderRadius: "5px" }}>
              <div style={{ width: "24px", height: "24px", borderRadius: "50%", background: "var(--amber)20", border: "1px solid var(--amber)44", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Share Tech Mono',monospace", fontSize: "10px", fontWeight: "800", color: "var(--amber)", flexShrink: 0 }}>{step}</div>
              <div>
                <div style={{ fontSize: "11px", fontWeight: "700", color: "var(--text)" }}>{title}</div>
                <div style={{ fontSize: "10px", color: "var(--text3)", marginTop: "2px", lineHeight: 1.4 }}>{desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
