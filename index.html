                      <td>{isEdit?<select className="inline-select" value={editForm.status} onChange={e=>upField("status",e.target.value)}>{PC_STATUS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select>:<Badge label={pc.status} color={PROV_SCC[pc.status]||"#A0AEC0"}/>}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"700",color:"var(--text)"}}>{isEdit?<input className="inline-input" type="number" value={editForm.scheduled} onChange={e=>upField("scheduled",Number(e.target.value))} style={{width:"90px"}}/>:fmtKES(pc.scheduled)}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",color:pc.actual>0?"var(--green)":"var(--text4)"}}>{isEdit?<input className="inline-input" type="number" value={editForm.actual} onChange={e=>upField("actual",Number(e.target.value))} style={{width:"90px"}}/>:pc.actual>0?fmtKES(pc.actual):"—"}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"700",color:adj<0?"var(--green)":adj>0?"var(--red)":"var(--text4)"}}>{pc.actual>0?(adj<0?"-":adj>0?"+":"±")+" "+fmtKES(Math.abs(adj)):"—"}</td>
                      <td style={{fontSize:"9px",color:"var(--text3)",fontFamily:"'Share Tech Mono',monospace",maxWidth:"160px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isEdit?<input className="inline-input" value={editForm.supplier} onChange={e=>upField("supplier",e.target.value)}/>:pc.supplier||"—"}</td>
                      <td>
                        {isEdit
                          ?<div style={{display:"flex",gap:"4px"}}>
                            <button className="btn-primary" style={{padding:"3px 8px",fontSize:"9px"}} onClick={saveEdit}>✓</button>
                            <button className="btn-ghost" style={{padding:"3px 8px",fontSize:"9px"}} onClick={cancelEdit}>✕</button>
                          </div>
                          :<div style={{display:"flex",gap:"4px"}}>
                            <button className="btn-ghost" style={{padding:"3px 8px",fontSize:"9px"}} onClick={()=>startEdit("primeCost",i)}>✏</button>
                            <button className="btn-danger" style={{padding:"3px 8px",fontSize:"9px"}} onClick={()=>removeItem("primeCost",i)}>🗑</button>
                          </div>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{background:"var(--bg)"}}>
                  <td colSpan={4} style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--text)",fontSize:"10px"}}>TOTALS</td>
                  <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--text)"}}>{fmtKES(pcScheduled)}</td>
                  <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--green)"}}>{fmtKES(pcExpended)}</td>
                  <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:pcExpended-pcScheduled<0?"var(--green)":"var(--red)"}}>{pcExpended>0?(pcExpended-pcScheduled<0?"-":"+")+" "+fmtKES(Math.abs(pcExpended-pcScheduled)):"—"}</td>
                  <td colSpan={2}></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}

      {/* ── VARIATIONS TAB ── */}
      {tab==="vo"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"8px"}}>
            <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace"}}>
              Approved: <strong style={{color:"var(--green)"}}>{fmtKES(voApproved)}</strong> · Pending: <strong style={{color:"var(--amber)"}}>{fmtKES(voPending)}</strong> · Total VO Exposure: <strong style={{color:"var(--red)"}}>{fmtKES(voTotal)}</strong>
            </div>
            <button className="btn-add" style={{width:"auto",marginTop:0,padding:"6px 14px",fontSize:"9px"}} onClick={()=>addItem("variations",{id:`VO${String(variations.length+1).padStart(3,"0")}`,description:"New Variation Order",phase:"PH1",amount:0,status:"pending",raised:today(),ref:"",instructedBy:"RE",notes:""})}>+ Add VO</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
            {variations.map((vo,i)=>{
              const isEdit=editItem&&editItem.section==="variations"&&editItem.idx===i;
              return(
                <div key={vo.id} className="card" style={{padding:"14px",border:`1px solid ${PROV_SCC[vo.status]||"#A0AEC0"}30`,position:"relative",overflow:"hidden",background:isEdit?"var(--accent-bg)":""}}>
                  <div style={{position:"absolute",top:0,left:0,bottom:0,width:"4px",background:PROV_SCC[vo.status]||"#A0AEC0",borderRadius:"8px 0 0 8px"}}/>
                  <div style={{marginLeft:"10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px",marginBottom:"8px",flexWrap:"wrap"}}>
                      <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
                        <Badge label={vo.id} color={PROV_SCC[vo.status]||"#A0AEC0"}/>
                        {isEdit?<select className="inline-select" value={editForm.status} onChange={e=>upField("status",e.target.value)}>{VO_STATUS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select>:<Badge label={vo.status} color={PROV_SCC[vo.status]||"#A0AEC0"}/>}
                        {isEdit?<select className="inline-select" value={editForm.phase} onChange={e=>upField("phase",e.target.value)}>{phases.map(p=><option key={p.id} value={p.id}>{p.id}</option>)}</select>:<Badge label={vo.phase} color="var(--text3)"/>}
                        <span style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace"}}>Raised: {isEdit?<input className="inline-input" type="date" value={editForm.raised} onChange={e=>upField("raised",e.target.value)} style={{width:"110px"}}/>:vo.raised}</span>
                      </div>
                      <div style={{display:"flex",gap:"6px",alignItems:"center",flexShrink:0}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:"18px",fontWeight:"900",color:PROV_SCC[vo.status]||"#A0AEC0",lineHeight:1}}>
                            {isEdit?<input className="inline-input" type="number" value={editForm.amount} onChange={e=>upField("amount",Number(e.target.value))} style={{width:"110px",fontSize:"13px"}}/>:`+${fmtKES(vo.amount)}`}
                          </div>
                          <div style={{fontSize:"8px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace"}}>VO AMOUNT</div>
                        </div>
                        {isEdit
                          ?<div style={{display:"flex",gap:"4px"}}>
                            <button className="btn-primary" style={{padding:"4px 10px",fontSize:"9px"}} onClick={saveEdit}>✓ Save</button>
                            <button className="btn-ghost" style={{padding:"4px 8px",fontSize:"9px"}} onClick={cancelEdit}>✕</button>
                          </div>
                          :<div style={{display:"flex",gap:"4px"}}>
                            <button className="btn-ghost" style={{padding:"4px 8px",fontSize:"9px"}} onClick={()=>startEdit("variations",i)}>✏</button>
                            <button className="btn-danger" style={{padding:"4px 8px",fontSize:"9px"}} onClick={()=>removeItem("variations",i)}>🗑</button>
                          </div>}
                      </div>
                    </div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)",marginBottom:"5px"}}>
                      {isEdit?<input ref={inputRef} className="inline-input" value={editForm.description} onChange={e=>upField("description",e.target.value)} style={{width:"100%"}} onKeyDown={e=>{if(e.key==="Escape")cancelEdit();}}/>:vo.description}
                    </div>
                    <div style={{display:"flex",gap:"12px",fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace",flexWrap:"wrap"}}>
                      <span>Instructed by: <strong style={{color:"var(--text3)"}}>{isEdit?<input className="inline-input" value={editForm.instructedBy} onChange={e=>upField("instructedBy",e.target.value)} style={{width:"50px"}}/>:vo.instructedBy}</strong></span>
                      <span>Ref: <strong style={{color:"var(--text3)"}}>{isEdit?<input className="inline-input" value={editForm.ref} onChange={e=>upField("ref",e.target.value)} style={{width:"150px"}}/>:vo.ref||"—"}</strong></span>
                    </div>
                    {(vo.notes||isEdit)&&<div style={{marginTop:"8px",padding:"6px 10px",background:"var(--bg)",borderRadius:"4px",border:"1px solid var(--border)",fontSize:"10px",color:"var(--text3)"}}>
                      {isEdit?<textarea className="field-input" value={editForm.notes} onChange={e=>upField("notes",e.target.value)} style={{minHeight:"48px"}}/>:vo.notes}
                    </div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── DAYWORKS TAB ── */}
      {tab==="dw"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"8px"}}>
            <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace"}}>
              Approved: <strong style={{color:"var(--green)"}}>{fmtKES(dwApproved)}</strong> · Total Claimed: <strong style={{color:"var(--amber)"}}>{fmtKES(dwTotal)}</strong> · {dayworks.length} records
            </div>
            <button className="btn-add" style={{width:"auto",marginTop:0,padding:"6px 14px",fontSize:"9px"}} onClick={()=>addItem("dayworks",{id:`DW${String(dayworks.length+1).padStart(3,"0")}`,date:today(),description:"New Dayworks Record",labour:0,plant:0,materials:0,status:"draft",authorisedBy:"",ref:""})}>+ Add Dayworks</button>
          </div>
          <div className="card" style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>ID</th><th>Date</th><th>Description</th><th>Status</th><th>Labour</th><th>Plant</th><th>Materials</th><th>Total</th><th>Auth.</th><th style={{width:"70px"}}></th></tr></thead>
              <tbody>
                {dayworks.map((dw,i)=>{
                  const isEdit=editItem&&editItem.section==="dayworks"&&editItem.idx===i;
                  const tot=dw.labour+dw.plant+dw.materials;
                  return(
                    <tr key={dw.id} style={{background:isEdit?"var(--accent-bg)":""}}>
                      <td style={{fontWeight:"700",color:PROV_SCC[dw.status]||"#A0AEC0",whiteSpace:"nowrap"}}>{dw.id}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"10px",whiteSpace:"nowrap"}}>{isEdit?<input className="inline-input" type="date" value={editForm.date} onChange={e=>upField("date",e.target.value)} style={{width:"110px"}}/>:dw.date}</td>
                      <td style={{maxWidth:"200px"}}>
                        {isEdit?<input ref={inputRef} className="inline-input" value={editForm.description} onChange={e=>upField("description",e.target.value)} onKeyDown={e=>{if(e.key==="Escape")cancelEdit();if(e.key==="Enter")saveEdit();}}/>
                         :<span style={{fontSize:"10px",color:"var(--text)",cursor:"pointer"}} onClick={()=>startEdit("dayworks",i)}>{dw.description}</span>}
                      </td>
                      <td>{isEdit?<select className="inline-select" value={editForm.status} onChange={e=>upField("status",e.target.value)}>{DW_STATUS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select>:<Badge label={dw.status} color={PROV_SCC[dw.status]||"#A0AEC0"}/>}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"10px",color:"var(--accent)"}}>{isEdit?<input className="inline-input" type="number" value={editForm.labour} onChange={e=>upField("labour",Number(e.target.value))} style={{width:"80px"}}/>:fmtKES(dw.labour)}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"10px",color:"var(--purple)"}}>{isEdit?<input className="inline-input" type="number" value={editForm.plant} onChange={e=>upField("plant",Number(e.target.value))} style={{width:"80px"}}/>:fmtKES(dw.plant)}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"10px",color:"var(--amber)"}}>{isEdit?<input className="inline-input" type="number" value={editForm.materials} onChange={e=>upField("materials",Number(e.target.value))} style={{width:"80px"}}/>:fmtKES(dw.materials)}</td>
                      <td style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"10px",fontWeight:"800",color:PROV_SCC[dw.status]||"#A0AEC0"}}>{fmtKES(tot)}</td>
                      <td style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace"}}>{isEdit?<input className="inline-input" value={editForm.authorisedBy} onChange={e=>upField("authorisedBy",e.target.value)} style={{width:"50px"}}/>:dw.authorisedBy||"—"}</td>
                      <td>
                        {isEdit
                          ?<div style={{display:"flex",gap:"4px"}}>
                            <button className="btn-primary" style={{padding:"3px 8px",fontSize:"9px"}} onClick={saveEdit}>✓</button>
                            <button className="btn-ghost" style={{padding:"3px 8px",fontSize:"9px"}} onClick={cancelEdit}>✕</button>
                          </div>
                          :<div style={{display:"flex",gap:"4px"}}>
                            <button className="btn-ghost" style={{padding:"3px 8px",fontSize:"9px"}} onClick={()=>startEdit("dayworks",i)}>✏</button>
                            <button className="btn-danger" style={{padding:"3px 8px",fontSize:"9px"}} onClick={()=>removeItem("dayworks",i)}>🗑</button>
                          </div>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{background:"var(--bg)"}}>
                  <td colSpan={4} style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--text)",fontSize:"10px"}}>TOTALS</td>
                  <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--accent)"}}>{fmtKES(dayworks.reduce((s,d)=>s+d.labour,0))}</td>
                  <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--purple)"}}>{fmtKES(dayworks.reduce((s,d)=>s+d.plant,0))}</td>
                  <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--amber)"}}>{fmtKES(dayworks.reduce((s,d)=>s+d.materials,0))}</td>
                  <td style={{fontFamily:"'Share Tech Mono',monospace",fontWeight:"800",color:"var(--text)"}}>{fmtKES(dwTotal)}</td>
                  <td colSpan={2}></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MATERIALS VIEW ────────────────────────────────────────────────────────────
function MaterialsView({materials,setMaterials}){
  const [cat,setCat]=useState("All");
  const [editIdx,setEditIdx]=useState(null);
  const [form,setForm]=useState(null);
  const filtered=cat==="All"?materials:materials.filter(m=>m.category===cat);
  const weeksLeft=m=>(!m.weeklyBurn||m.weeklyBurn===0)?"∞":Math.floor(m.onSite/m.weeklyBurn);
  const ss=m=>{const w=weeksLeft(m);return w==="∞"?"ok":w<=1?"critical":w<=3?"warn":"ok";};
  const sc=s=>s==="critical"?"#E53E3E":s==="warn"?"#D69E2E":"#38A169";
  const openEdit=(m,i)=>{setForm({...m});setEditIdx(i);};
  const saveEdit=()=>{const n=[...materials];n[editIdx]={...form};setMaterials(n);setEditIdx(null);setForm(null);};
  const alertCount=materials.filter(m=>ss(m)!=="ok").length;
  return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      <div className="page-grid-4" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"10px",marginBottom:"16px"}}>
        <StatCard label="Materials Tracked" value={materials.length} color="var(--accent)" sub="items on register"/>
        <StatCard label="Delivery Rate" value={`${pct(materials.reduce((s,m)=>s+m.delivered,0),materials.reduce((s,m)=>s+m.totalOrdered,0))}%`} color="var(--green)" sub="delivered vs ordered"/>
        <StatCard label="Burn Rate" value={`${pct(materials.reduce((s,m)=>s+m.consumed,0),materials.reduce((s,m)=>s+m.delivered,0))}%`} color="var(--amber)" sub="consumed vs delivered"/>
        <StatCard label="Stock Alerts" value={alertCount} color={alertCount>0?"var(--red)":"var(--green)"} sub="low-stock items"/>
      </div>
      <div style={{display:"flex",gap:"6px",marginBottom:"14px",alignItems:"center",flexWrap:"wrap"}}>
        {MAT_CATS.map(c=>(
          <button key={c} className="chip" onClick={()=>setCat(c)} style={{borderColor:cat===c?"var(--accent)":"var(--border)",color:cat===c?"var(--accent)":"var(--text3)",background:cat===c?"var(--accent-bg)":"var(--surface)"}}>
            {c}
          </button>
        ))}
        <button className="btn-add" style={{width:"auto",marginTop:0,marginLeft:"auto"}} onClick={()=>{const nm={id:`MT${String(materials.length+1).padStart(3,"0")}`,name:"New Material",unit:"",category:"Concrete",totalOrdered:0,delivered:0,onSite:0,consumed:0,plannedConsumption:0,weeklyBurn:0,supplier:"",lastDelivery:today(),nextDelivery:"",notes:""};setMaterials([...materials,nm]);openEdit(nm,materials.length);}}>+ Add Material</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:"12px"}}>
        {filtered.map((m,i)=>{
          const realIdx=materials.findIndex(mm=>mm.id===m.id);
          const s=ss(m);const scolor=sc(s);
          const delivPct=pct(m.delivered,m.totalOrdered);
          const burnPct=pct(m.consumed,m.delivered);
          return(
            <div key={m.id} className="card" style={{padding:"16px",border:`1px solid ${s!=="ok"?scolor+"44":"var(--border)"}`,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:scolor}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                <div style={{flex:1,minWidth:0,marginRight:"8px"}}>
                  <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</div>
                  <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace",marginTop:"2px"}}>{m.id} · {m.unit} · {m.category}</div>
                </div>
                <div style={{display:"flex",gap:"6px",flexShrink:0}}>
                  <Badge label={s==="critical"?"CRITICAL":s==="warn"?"LOW":"OK"} color={scolor}/>
                  <button className="btn-ghost" style={{padding:"3px 8px",fontSize:"9px"}} onClick={()=>openEdit(m,realIdx)}>Edit</button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"5px",marginBottom:"12px"}}>
                {[["Ordered",m.totalOrdered,"var(--text4)"],["Delivered",m.delivered,"var(--accent)"],["On Site",m.onSite,"var(--amber)"],["Consumed",m.consumed,"var(--red)"],["Remaining",m.delivered-m.consumed,"var(--green)"],["Planned",m.plannedConsumption,"var(--text3)"]].map(([l,v,c])=>(
                  <div key={l} style={{textAlign:"center",background:"var(--bg)",borderRadius:"4px",padding:"6px 3px"}}>
                    <div style={{fontSize:"14px",fontWeight:"800",color:c,lineHeight:1,fontFamily:"'Share Tech Mono',monospace"}}>{Number(v).toLocaleString()}</div>
                    <div style={{fontSize:"8px",color:"var(--text4)",marginTop:"2px",textTransform:"uppercase"}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"10px"}}>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace",marginBottom:"3px"}}><span>DELIVERY</span><span style={{color:"var(--accent)",fontWeight:"700"}}>{delivPct}%</span></div>
                  <Bar value={delivPct} color="var(--accent)" h={6}/>
                </div>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace",marginBottom:"3px"}}><span>BURN RATE (of delivered)</span><span style={{color:burnPct>85?scolor:"var(--amber)",fontWeight:"700"}}>{burnPct}%</span></div>
                  <div className="burn-bar-track"><div className="burn-bar-fill" style={{width:`${burnPct}%`,background:burnPct>85?scolor:"var(--amber)"}}/></div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:"8px",borderTop:"1px solid var(--border)",fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace"}}>
                <span>Burn: <strong style={{color:"var(--amber)"}}>{m.weeklyBurn} {m.unit}/wk</strong> · Weeks left: <strong style={{color:scolor}}>{weeksLeft(m)}</strong></span>
                <span>{m.nextDelivery?"Next: "+m.nextDelivery:m.supplier}</span>
              </div>
              {m.notes&&<div style={{marginTop:"7px",padding:"6px 8px",background:"var(--amber)11",borderRadius:"4px",border:"1px solid var(--amber)33",fontSize:"10px",color:"var(--amber)"}}>{m.notes}</div>}
            </div>
          );
        })}
      </div>
      {editIdx!==null&&form&&(
        <>
          <div className="edit-overlay" onClick={()=>{setEditIdx(null);setForm(null);}}/>
          <div className="edit-panel">
            <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",flexShrink:0}}>
              <div><div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)"}}>Edit — {form.name}</div></div>
              <button className="btn-ghost" onClick={()=>{setEditIdx(null);setForm(null);}}>✕</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"4px 0"}}>
              <div className="edit-section">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
                  <Field label="Material Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))}/>
                  <Field label="Category" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} opts={["Concrete","Steel","Aggregate","Formwork","Other"]} half/>
                  <Field label="Unit" value={form.unit} onChange={v=>setForm(f=>({...f,unit:v}))} half/>
                  <Field label="Supplier" value={form.supplier} onChange={v=>setForm(f=>({...f,supplier:v}))}/>
                  <Field label="Total Ordered" value={form.totalOrdered} onChange={v=>setForm(f=>({...f,totalOrdered:v}))} type="number" half/>
                  <Field label="Delivered" value={form.delivered} onChange={v=>setForm(f=>({...f,delivered:v}))} type="number" half/>
                  <Field label="On Site (stock)" value={form.onSite} onChange={v=>setForm(f=>({...f,onSite:v}))} type="number" half/>
                  <Field label="Consumed" value={form.consumed} onChange={v=>setForm(f=>({...f,consumed:v}))} type="number" half/>
                  <Field label="Planned Total" value={form.plannedConsumption} onChange={v=>setForm(f=>({...f,plannedConsumption:v}))} type="number" half/>
                  <Field label="Weekly Burn Rate" value={form.weeklyBurn} onChange={v=>setForm(f=>({...f,weeklyBurn:v}))} type="number" half/>
                  <Field label="Last Delivery" value={form.lastDelivery} onChange={v=>setForm(f=>({...f,lastDelivery:v}))} type="date" half/>
                  <Field label="Next Delivery" value={form.nextDelivery} onChange={v=>setForm(f=>({...f,nextDelivery:v}))} half/>
                  <Field label="Notes" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} textarea/>
                </div>
              </div>
            </div>
            <div className="save-bar">
              <button className="btn-primary" onClick={saveEdit}>💾 Save</button>
              <button className="btn-ghost" onClick={()=>{setEditIdx(null);setForm(null);}}>Cancel</button>
              <button className="btn-danger" style={{marginLeft:"auto"}} onClick={()=>{setMaterials(ms=>ms.filter((_,j)=>j!==editIdx));setEditIdx(null);setForm(null);}}>🗑 Delete</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

                    <span style={{fontSize:"14px"}}>📷</span> Camera
                    <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{
                      const file=e.target.files?.[0];
                      if(!file) return;
                      const reader=new FileReader();
                      reader.onload=ev=>setForm(f=>({...f,photos:[...(f.photos||[]),{src:ev.target.result,caption:"",ts:new Date().toISOString()}]}));
                      reader.readAsDataURL(file);
                      e.target.value="";
                    }}/>
                  </label>
                </div>
                {(form.photos||[]).length===0&&<div style={{textAlign:"center",padding:"12px",fontSize:"9px",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace",marginTop:"4px"}}>No photos attached yet</div>}
              </div>
              <div className="edit-section">
                <div className="edit-section-title">⚠️ Issues & Observations</div>
                <Field label="Issues / Delays / Safety Observations" value={form.issues} onChange={v=>setForm(f=>({...f,issues:v}))} textarea placeholder="Any issues, delays or safety matters..."/>
              </div>
            </div>
            <div className="save-bar">
              <button className="btn-primary" onClick={()=>{setDiaries(ds=>[...ds,form]);setShowAdd(false);setForm(null);}}>💾 Save Entry</button>
              <button className="btn-ghost" onClick={()=>{setShowAdd(false);setForm(null);}}>Cancel</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── RE REPORT VIEW ────────────────────────────────────────────────────────────
function REReport({site,phases,wps,risks,snags,team,diaries,materials}){
  const [reportDate,setReportDate]=useState(today());
  const [reportPeriod,setReportPeriod]=useState("Weekly");
  const [narrative,setNarrative]=useState("");
  const [nextActions,setNextActions]=useState("");
  const [reNotes,setReNotes]=useState("");
  const [showForm,setShowForm]=useState(true);
  const re=team.find(m=>m.role==="Resident Engineer")||team[0]||{name:"RE",org:""};
  const totalBudget=phases.reduce((s,p)=>s+p.budget,0);
  const totalSpent=phases.reduce((s,p)=>s+p.spent,0);
  const totalProgress=phases.length?Math.round(phases.reduce((s,p)=>s+p.progress,0)/phases.length):0;
  const openRisks=risks.filter(r=>r.status!=="closed");
  const openSnags=snags.filter(s=>s.status==="open");
  const blockedWPs=wps.filter(w=>w.status==="blocked");
  const recentDiaries=[...diaries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const daysLeft=site.targetCompletion?Math.round((new Date(site.targetCompletion)-new Date())/864e5):null;
  const alertMats=materials.filter(m=>m.weeklyBurn&&Math.floor(m.onSite/m.weeklyBurn)<=3);

  return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      {/* Config bar */}

            <label className="field-label">Period</label>
            <select className="field-select" value={reportPeriod} onChange={e=>setReportPeriod(e.target.value)} style={{width:"120px"}}>
              {["Daily","Weekly","Fortnightly","Monthly"].map(o=><option key={o}>{o}</option>)}
            </select>
          </div>
          <button className="btn-ghost" style={{marginTop:"14px"}} onClick={()=>setShowForm(s=>!s)}>{showForm?"Hide Inputs ▲":"Show Inputs ▼"}</button>
        </div>
        <button className="btn-primary" style={{marginTop:"14px"}} onClick={()=>window.print()}>🖨️ Print / PDF</button>
      </div>

      {showForm&&(
        <div className="card no-print" style={{padding:"18px",marginBottom:"16px"}}>
          <div className="edit-section-title">✏️ RE Narrative Inputs</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
            <div>
              <label className="field-label">Progress Summary / Narrative</label>
              <textarea className="field-input" value={narrative} onChange={e=>setNarrative(e.target.value)} placeholder="Brief summary of works completed this period, progress achieved, key milestones..." style={{minHeight:"100px"}}/>
            </div>
            <div>
              <label className="field-label">Actions Required / Decisions Needed</label>

// ── INTEGRATION HUB ──────────────────────────────────────────────────────────
function IntegrationHub({proj,onImport,onClose,showToast}){
  const [tab,setTab]=useState("sync");
  const [importing,setImporting]=useState(false);
  const [importLog,setImportLog]=useState([]);

  const {site,phases=[],wps=[],risks=[],snags=[],team=[],diaries=[],materials=[]}=proj;

  /* ── HELPERS ── */
  const dl=(blob,name)=>{const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);};
  const dlText=(txt,name,mime="text/plain")=>dl(new Blob([txt],{type:mime}),name);
  const slug=site.name.replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"").slice(0,30);
  const log=msg=>setImportLog(l=>[{msg,ts:new Date().toLocaleTimeString()}, ...l.slice(0,29)]);

  /* ── EXCEL EXPORT ── */
  const exportExcel=()=>{
    const wb=XLSX.utils.book_new();
    // Sheet 1: Phases
    const wsPhases=XLSX.utils.json_to_sheet(phases.map(p=>({
      "Phase ID":p.id,"Phase Name":p.name,"Status":p.status,"Progress %":p.progress,
      "Start Date":p.startDate,"End Date":p.endDate,"Budget KES":p.budget,"Spent KES":p.spent,
      "Variance KES":p.budget-p.spent,"Lead":p.lead,"Description":p.description
    })));
    XLSX.utils.book_append_sheet(wb,wsPhases,"Phases");
    // Sheet 2: Work Packages
    const wsWPs=XLSX.utils.json_to_sheet(wps.map(w=>({
      "WP ID":w.id,"Phase":w.phase,"Trade":w.trade,"Work Package Name":w.name,
      "Status":w.status,"Priority":w.priority,"Progress %":w.progress,
      "Assignee":w.assignee,"Qty/Scope":w.qty,"Value":w.unit,"Dependencies":w.deps
    })));
    XLSX.utils.book_append_sheet(wb,wsWPs,"Work Packages");
    // Sheet 3: Risks
    const wsRisks=XLSX.utils.json_to_sheet(risks.map(r=>({
      "Risk ID":r.id,"Phase":r.phase,"Title":r.title,"Severity":r.severity,
      "Probability %":r.probability,"Status":r.status,"Owner":r.owner,
      "Impact":r.impact,"Mitigation":r.mitigation
    })));
    XLSX.utils.book_append_sheet(wb,wsRisks,"Risk Register");
    // Sheet 4: Snags
    const wsSnags=XLSX.utils.json_to_sheet(snags.map(s=>({
      "Snag ID":s.id,"Block":s.block,"Description":s.item,
      "Severity":s.severity,"Status":s.status,"Date Raised":s.raised
    })));
    XLSX.utils.book_append_sheet(wb,wsSnags,"Snags QA");
    // Sheet 5: Materials
    const wsMats=XLSX.utils.json_to_sheet(materials.map(m=>({
      "Material ID":m.id,"Name":m.name,"Category":m.category,"Unit":m.unit,
      "Supplier":m.supplier,"Total Ordered":m.totalOrdered,"Delivered":m.delivered,
      "On Site":m.onSite,"Consumed":m.consumed,"Planned Total":m.plannedConsumption,
      "Weekly Burn":m.weeklyBurn,"Last Delivery":m.lastDelivery,"Next Delivery":m.nextDelivery,
      "Weeks Remaining":m.weeklyBurn?Math.floor(m.onSite/m.weeklyBurn):"∞","Notes":m.notes
    })));
    XLSX.utils.book_append_sheet(wb,wsMats,"Materials");
    // Sheet 6: Team
    const wsTeam=XLSX.utils.json_to_sheet(team.map(m=>({
      "ID":m.id,"Name":m.name,"Role":m.role,"Organisation":m.org,"Load %":m.load
    })));
    XLSX.utils.book_append_sheet(wb,wsTeam,"Team");
    // Sheet 7: Site Diary summary
    const wsDiary=XLSX.utils.json_to_sheet(diaries.map(d=>({
      "Entry ID":d.id,"Date":d.date,"Weather":d.weather,"Workers":d.gangsPresent,
      "Temperature":d.temperature,"Author":d.author,
      "Works Summary":(d.works||[]).map(w=>w.description).join(" | "),
      "Issues":d.issues,"Visitors":d.visitors,
      "Total Man-Hours":(d.works||[]).reduce((s,w)=>s+(w.manHours||0),0)
    })));
    XLSX.utils.book_append_sheet(wb,wsDiary,"Site Diary");
    XLSX.writeFile(wb,`${slug}_AHP_Export_${today()}.xlsx`);
    showToast("✓ Excel export downloaded");
  };

  /* ── UNIVERSAL IMPORT DISPATCHER ── */
  /* Detects file type and routes to the correct parser */
  const universalImport=(file)=>{
    if(!file){return;}
    const ext=(file.name||"").split(".").pop().toLowerCase();
    log(`⟳ Loading: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
    if(ext==="xer"){importP6XER(file);}
    else if(ext==="xml"){importXML(file);}
    else if(ext==="csv"){importCSV(file);}
    else if(ext==="xlsx"||ext==="xls"||ext==="xlsm"||ext==="ods"){importExcel(file);}
    else if(ext==="json"){importBackup(file);}
    else if(ext==="mpx"){importMPX(file);}
    else{log(`⚠ Unknown extension .${ext} — trying as Excel`);importExcel(file);}
  };

  /* ── FUZZY COLUMN FINDER ── */
  /* Finds a column value by trying multiple possible header names (case-insensitive, partial match) */
  const fuzz=(row,keys,def="")=>{
    const rk=Object.keys(row);
    for(const k of keys){
      const kl=k.toLowerCase();
      const found=rk.find(rkey=>rkey.toLowerCase()===kl||rkey.toLowerCase().includes(kl)||kl.includes(rkey.toLowerCase()));
      if(found!==undefined&&row[found]!==undefined&&row[found]!==""){return String(row[found]);}
    }
    return def;
  };
  const fuzzNum=(row,keys,def=0)=>Number(fuzz(row,keys,""))||def;

  /* Normalise status strings from any tool */
  const normStatus=s=>{
    if(!s)return"not-started";
    const l=s.toLowerCase().replace(/[_\s-]+/g,"");
    if(l.includes("complet")||l==="done"||l==="finished"||l==="tk_complete")return"done";
    if(l.includes("progress")||l.includes("active")||l==="tk_active"||l==="inprog")return"in-progress";
    if(l.includes("block")||l.includes("hold")||l.includes("suspend")||l==="tk_suspend")return"blocked";
    if(l.includes("risk")||l.includes("atrisk"))return"at-risk";
    return"not-started";
  };
  const normPriority=s=>{
    if(!s)return"medium";
    const l=s.toLowerCase();
    if(l.includes("crit")||l==="1000")return"critical";
    if(l.includes("high")||l==="750")return"high";
    if(l.includes("low")||l==="250")return"low";
    return"medium";
  };
  /* Convert P6/MSP date strings to ISO YYYY-MM-DD */
  const parseDate=s=>{
    if(!s||s==="")return"";
    try{
      // already ISO
      if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
      // P6 format: MM/DD/YYYY HH:MM or MM/DD/YYYY
      if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)){const p=s.split(/[\/ :]/);return`${p[2]}-${p[0].padStart(2,"0")}-${p[1].padStart(2,"0")}`;}
      // MSP: YYYY-MM-DDTHH:MM:SS
      if(/^\d{4}-\d{2}-\d{2}T/.test(s))return s.slice(0,10);
      // Try native Date
      const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);
    }catch{}
    return s.slice(0,10)||"";
  };

  /* ── EXCEL IMPORT (fuzzy column matching, any sheet layout) ── */
  const importExcel=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
        let imported={};let msgs=[];

  /* ── P6 XER IMPORT (any version) ── */
  /* Handles ERMHDR, TASK, PROJWBS, RSRC, TASKRSRC tables */
  const importP6XER=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const text=e.target.result;
        const lines=text.split(/\r?\n/);
        /* Parse XER into table map: {TABLE_NAME: [{col:val,...},...]} */
        const tables={};
        let curTable=null,curFields=[];
        for(const line of lines){
          if(line.startsWith("%T\t")){curTable=line.slice(3).trim();tables[curTable]=[];curFields=[];}
          else if(line.startsWith("%F\t")&&curTable){curFields=line.slice(3).split("\t");}
          else if(line.startsWith("%R\t")&&curTable&&curFields.length){
            const vals=line.slice(3).split("\t");
            const obj={};
            curFields.forEach((f,i)=>{obj[f]=(vals[i]||"").trim();});
            tables[curTable].push(obj);
          }
        }
        log(`✓ XER parsed: tables found — ${Object.keys(tables).join(", ")}`);
        let imported={};let msgs=[];

        /* ACTIVITIES → Work Packages */
        const tasks=(tables["TASK"]||[]).filter(t=>t.task_type!=="TT_WBS"&&t.task_name);
        if(tasks.length){
          /* Build WBS name lookup */
          const wbsMap={};
          (tables["PROJWBS"]||[]).forEach(w=>{wbsMap[w.wbs_id]=w;});
          const newWPs=tasks.map((t,i)=>({
            id:t.task_code||`WP${String(i+1).padStart(3,"0")}`,
            phase:(wbsMap[t.wbs_id]?.wbs_short_name)||"PH1",
            trade:fuzz(t,["rsrc_type","trade","discipline"])||"Civil",
            name:t.task_name||`Task ${i+1}`,
            status:normStatus(t.status_code),
            priority:normPriority(t.priority_num),
            progress:Number(t.phys_complete_pct)||0,
            assignee:fuzz(t,["rsrc_short_name","rsrc_id"])||"PM",
            qty:t.remain_drtn_hr_cnt?`${Math.round(Number(t.remain_drtn_hr_cnt)/8)}d remain`:"",
            unit:"KES 0",
            deps:""
          }));
          imported.wps=newWPs;
          msgs.push(`✓ ${newWPs.length} activities imported from P6 XER`);
        }

        /* WBS NODES → Phases */
        const wbsNodes=(tables["PROJWBS"]||[]).filter(w=>w.wbs_name);
        if(wbsNodes.length){
          const newPh=wbsNodes.map((w,i)=>({
            id:w.wbs_short_name||`PH${i+1}`,
            name:w.wbs_name,
            status:"in-progress",
            progress:0,
            startDate:"",endDate:"",
            budget:Number(w.orig_cost)||0,
            spent:Number(w.indep_remain_total_cost)||0,
            lead:"PM",description:""
          }));
          imported.phases=newPh;
          msgs.push(`✓ ${newPh.length} WBS phases imported`);
        }

        /* RESOURCES → Team */
        const rsrc=(tables["RSRC"]||[]).filter(r=>r.rsrc_name&&r.rsrc_type==="RT_Labor");
        if(rsrc.length){
          const newTeam=rsrc.map(r=>({
            id:r.rsrc_short_name||r.rsrc_id,
            name:r.rsrc_name,
            role:r.pobs_id||"Resource",
            org:r.clndr_id||"",
            load:Math.min(100,Math.round(Number(r.max_qty_per_hr||r.target_qty||1)*100))
          }));
          imported.team=newTeam;
          msgs.push(`✓ ${newTeam.length} resources imported as team`);
        }

        msgs.forEach(m=>log(m));
        if(Object.keys(imported).length>0){onImport(imported);showToast(`✓ P6 XER: ${tasks.length} activities imported`);}
        else{log("⚠ XER contained no importable data");}
      }catch(err){log("✗ P6 XER parse error: "+err.message);console.error(err);}
      setImporting(false);
    };
    reader.readAsText(file,"utf-8");
  };

  /* ── XML IMPORT (auto-detects MS Project vs P6 XML vs generic) ── */
  const importXML=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const text=e.target.result;
        const parser=new DOMParser();
        const doc=parser.parseFromString(text,"application/xml");
        let imported={};let msgs=[];

        /* ── P6 XML (Oracle Primavera P6 XML export) ── */
        const isP6=(doc.querySelector("APIBusinessObjects")||doc.querySelector("Project > Activity")||doc.querySelector("Activity"));
        if(isP6||text.includes("oracle")||text.includes("primavera")||text.includes("Activity")){
          log("⟳ Detected: Primavera P6 XML format");
          const activities=[...doc.querySelectorAll("Activity")].filter(a=>a.querySelector("Name")||a.querySelector("ActivityName")||a.querySelector("task_name"));
          const sel=(el,tags)=>{for(const t of tags){const n=el.querySelector(t);if(n)return n.textContent.trim();}return"";};
          if(activities.length){
            const newWPs=activities.map((a,i)=>({
              id:sel(a,["ActivityId","Id","task_code","Code"])||`WP${String(i+1).padStart(3,"0")}`,
              phase:sel(a,["WBSCode","WBS","wbs_id"])||"PH1",
              trade:sel(a,["ResourceType","PrimaryResourceId","trade"])||"Civil",
              name:sel(a,["Name","ActivityName","task_name","TaskName"])||`Activity ${i+1}`,
              status:normStatus(sel(a,["Status","ActivityStatus","status_code"])),
              priority:normPriority(sel(a,["Priority","priority_num"])),
              progress:Number(sel(a,["PhysicalPercentComplete","PercentComplete","phys_complete_pct"]))||0,
              assignee:sel(a,["PrimaryResourceId","ResourceId","rsrc_short_name"])||"PM",
              qty:"",unit:"KES 0",deps:""
            }));
            imported.wps=newWPs;msgs.push(`✓ ${newWPs.length} P6 activities imported`);
          }
          /* WBS */
          const wbsEls=[...doc.querySelectorAll("WBS,WBSNode,ProjectWBS")];
          if(wbsEls.length){
            const newPh=wbsEls.map((w,i)=>({
              id:sel(w,["Code","WBSCode","wbs_short_name"])||`PH${i+1}`,
              name:sel(w,["Name","WBSName","wbs_name"])||`Phase ${i+1}`,
              status:"in-progress",progress:0,startDate:"",endDate:"",
              budget:Number(sel(w,["OriginalCost","PlannedCost","orig_cost"]))||0,
              spent:0,lead:"PM",description:""
            }));
            imported.phases=newPh;msgs.push(`✓ ${newPh.length} WBS phases imported`);
          }
        } else {
          /* ── MS PROJECT XML ── (multiple namespace variants) ── */
          log("⟳ Detected: MS Project XML format");
          const g=(el,tags)=>{
            for(const tag of tags){
              /* Try both with and without namespace prefix */
              const n=el.querySelector(tag)||el.querySelector(`*|${tag}`);
              if(n)return n.textContent.trim();
            }
            return"";
          };
          const allTasks=[...doc.querySelectorAll("Task,msp\\:Task")];
          /* Separate summary from leaf tasks */
          const summaries=allTasks.filter(t=>g(t,["Summary","IsSummary"])==="1"||g(t,["Summary"])==="true");
          const leafTasks=allTasks.filter(t=>g(t,["Summary","IsSummary"])!=="1"&&g(t,["Summary"])!=="true"&&(g(t,["Name"])||g(t,["TaskName"])));

          if(summaries.length){
            const newPh=summaries.filter(t=>g(t,["Name"])).map((t,i)=>({
              id:g(t,["WBS"])||`PH${i+1}`,
              name:g(t,["Name","TaskName"])||`Phase ${i+1}`,
              status:normStatus(Number(g(t,["PercentComplete"]))==100?"done":Number(g(t,["PercentComplete"]))>0?"in-progress":"not-started"),
              progress:Number(g(t,["PercentComplete","PhysicalPercentComplete"]))||0,
              startDate:parseDate(g(t,["Start","EarlyStart","ScheduledStart"])),
              endDate:parseDate(g(t,["Finish","EarlyFinish","ScheduledFinish"])),
              budget:Number(g(t,["Cost","BaselineCost","Cost1"]))||0,
              spent:Number(g(t,["ActualCost","ACWP"]))||0,
              lead:g(t,["Contact","ExtendedAttribute"])||"PM",description:""
            }));
            if(newPh.length){imported.phases=newPh;msgs.push(`✓ ${newPh.length} summary tasks imported as phases`);}
          }

          if(leafTasks.length){
            const newWPs=leafTasks.map((t,i)=>({
              id:g(t,["WBS"])||`WP${String(i+1).padStart(3,"0")}`,
              phase:g(t,["OutlineNumber","WBS"])||"PH1",
              trade:g(t,["Contact","ExtendedAttribute"])||"Civil",
              name:g(t,["Name","TaskName"])||`Task ${i+1}`,
              status:normStatus(Number(g(t,["PercentComplete"]))==100?"done":Number(g(t,["PercentComplete"]))>0?"in-progress":g(t,["Active"])==="0"?"blocked":"not-started"),
              priority:normPriority(g(t,["Priority"])),
              progress:Number(g(t,["PercentComplete","PhysicalPercentComplete"]))||0,
              assignee:"PM",qty:g(t,["Notes","Text1"])||"",
              unit:g(t,["Cost","BaselineCost"])?"KES "+g(t,["Cost","BaselineCost"]):"KES 0",
              deps:g(t,["PredecessorLink","Predecessor"])||""
            }));
            imported.wps=newWPs;msgs.push(`✓ ${newWPs.length} leaf tasks imported as work packages`);
          }

          /* Resources */
          const resources=[...doc.querySelectorAll("Resource,msp\\:Resource")].filter(r=>g(r,["Name"]));
          if(resources.length){
            const newTeam=resources.map(r=>({
              id:g(r,["Initials","Code"])||g(r,["UID"])||"R",
              name:g(r,["Name"])||"Resource",
              role:g(r,["Notes","Group","Type"])||"Resource",
              org:g(r,["Group","Company"])||"",
              load:Math.round((Number(g(r,["MaxUnits","PeakUnits"]))||1)*100)
            }));
            imported.team=newTeam;msgs.push(`✓ ${newTeam.length} resources imported`);
          }

          if(allTasks.length===0){
            /* Try generic XML — look for any repeating structure with Name/ID */
            const roots=[...doc.documentElement.children];
            log(`⟳ Generic XML — ${roots.length} root children, trying heuristic parse`);
          }
        }

        msgs.forEach(m=>log(m));
        if(Object.keys(imported).length>0){onImport(imported);showToast(`✓ XML: ${Object.values(imported).flat().length} records imported`);}
        else{log("⚠ No importable data found in XML file");}
      }catch(err){log("✗ XML parse error: "+err.message);console.error(err);}
      setImporting(false);
    };
    reader.readAsText(file,"utf-8");
  };

  /* ── CSV IMPORT (P6 CSV export, generic schedule CSV) ── */
  const importCSV=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const text=e.target.result;
        const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){log("⚠ CSV has no data rows");setImporting(false);return;}
        /* Detect delimiter: tab, comma, or semicolon */
        const delim=lines[0].includes("\t")?"\t":lines[0].includes(";")?";":","
        const headers=lines[0].split(delim).map(h=>h.replace(/^"|"$/g,"").trim());
        const rows=lines.slice(1).map(l=>{
          /* Handle quoted fields */
          const vals=[]; let cur=""; let inQ=false;
          for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'&&!inQ){inQ=true;}else if(c==='"'&&inQ){inQ=false;}else if(c===delim&&!inQ){vals.push(cur.trim());cur="";}else{cur+=c;}}
          vals.push(cur.trim());
          const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||"";});
          return obj;
        });
        log(`✓ CSV parsed: ${rows.length} rows, ${headers.length} columns`);
        /* Re-use Excel logic via a fake single-sheet workbook */
        const fakeWb={SheetNames:["Tasks"],Sheets:{Tasks:XLSX.utils.json_to_sheet(rows)}};
        /* Detect if this looks like tasks/activities */
        const hasName=headers.some(h=>/name|task|activ|work/i.test(h));
        const hasId=headers.some(h=>/id|code|ref/i.test(h));
        if(hasName||hasId){
          const newWPs=rows.filter(r=>fuzz(r,["Name","Task Name","Activity Name","task_name","ID","Code"],"")!=="").map((r,i)=>({
            id:fuzz(r,["ID","Task ID","Activity ID","Code","task_code"])||`WP${String(i+1).padStart(3,"0")}`,
            phase:fuzz(r,["Phase","WBS","WBS Name","wbs_name"])||"PH1",
            trade:fuzz(r,["Trade","Discipline","Type","Resource"])||"Civil",
            name:fuzz(r,["Name","Task Name","Activity Name","task_name","Description"])||`Task ${i+1}`,
            status:normStatus(fuzz(r,["Status","status_code","State"])),
            priority:normPriority(fuzz(r,["Priority","priority_num"])),
            progress:fuzzNum(r,["% Complete","PercentComplete","phys_complete_pct","Progress","Done %"]),
            assignee:fuzz(r,["Assignee","Resource","Owner","rsrc_short_name"])||"PM",
            qty:fuzz(r,["Duration","Qty","Scope","Notes"])||"",
            unit:"KES 0",deps:fuzz(r,["Predecessors","Dependencies","Depends"])||""
          }));
          if(newWPs.length){
            onImport({wps:newWPs});
            showToast(`✓ CSV: ${newWPs.length} tasks imported`);
            log(`✓ ${newWPs.length} tasks imported from CSV`);
          }else{log("⚠ No task rows found in CSV");}
        }else{log("⚠ CSV does not appear to be a schedule — no Name/ID columns found");}
      }catch(err){log("✗ CSV parse error: "+err.message);}
      setImporting(false);
    };
    reader.readAsText(file,"utf-8");
  };

  /* ── MPX IMPORT (MS Project Exchange format) ── */
  const importMPX=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const lines=e.target.result.split(/\r?\n/);
        const tasks=[];const resources=[];
        let taskFields=[],rsrcFields=[];
        for(const line of lines){
          const parts=line.split(",");
          const code=parts[0];
          if(code==="68"){taskFields=parts.slice(1);}
          else if(code==="70"&&taskFields.length){
            const obj={};taskFields.forEach((f,i)=>{obj[f.trim()]=parts[i+1]||"";});tasks.push(obj);
          }
          else if(code==="48"){rsrcFields=parts.slice(1);}
          else if(code==="50"&&rsrcFields.length){
            const obj={};rsrcFields.forEach((f,i)=>{obj[f.trim()]=parts[i+1]||"";});resources.push(obj);
          }
        }
        let imported={};
        if(tasks.length){
          const newWPs=tasks.filter(t=>t.Name||t.name).map((t,i)=>({
            id:t["Unique ID"]||`WP${String(i+1).padStart(3,"0")}`,
            phase:"PH1",trade:"Civil",
            name:t.Name||t.name||`Task ${i+1}`,
            status:normStatus(Number(t["% Complete"]||0)===100?"done":Number(t["% Complete"]||0)>0?"in-progress":"not-started"),
            priority:"medium",
            progress:Number(t["% Complete"]||0),
            assignee:"PM",qty:"",unit:"KES 0",deps:""
          }));
          imported.wps=newWPs;log(`✓ ${newWPs.length} MPX tasks imported`);
        }
        if(Object.keys(imported).length>0){onImport(imported);showToast(`✓ MPX: ${tasks.length} tasks imported`);}
        else{log("⚠ No MPX task records found");}
      }catch(err){log("✗ MPX parse error: "+err.message);}
      setImporting(false);
    };
    reader.readAsText(file);
  };

  /* ── MS PROJECT XML EXPORT ── */
  const exportMSProject=()=>{

    // Activities (work packages)
    xer+="%T"+T+"TASK"+N;
    xer+="%F"+T+"task_id"+T+"proj_id"+T+"wbs_id"+T+"clndr_id"+T+"phys_complete_pct"+T+"rev_fdbk_flag"+T+"est_wt"+T+"lock_plan_flag"+T+"auto_compute_act_flag"+T+"complete_pct_type"+T+"task_type"+T+"duration_type"+T+"status_code"+T+"task_code"+T+"task_name"+T+"rsrc_id"+T+"total_float_hr_cnt"+T+"free_float_hr_cnt"+T+"remain_drtn_hr_cnt"+T+"act_start_date"+T+"act_end_date"+T+"late_start_date"+T+"late_end_date"+T+"expect_end_date"+T+"early_start_date"+T+"early_end_date"+T+"target_start_date"+T+"target_end_date"+T+"target_drtn_hr_cnt"+T+"target_work_qty"+T+"act_work_qty"+T+"remain_work_qty"+T+"target_equip_qty"+T+"act_equip_qty"+T+"remain_equip_qty"+T+"cstr_date"+T+"anticip_flag"+T+"cstr_type"+T+"suspend_date"+T+"resume_date"+T+"float_path"+T+"float_path_order"+T+"guid"+T+"tmpl_guid"+T+"cstr_date2"+T+"cstr_type2"+T+"driving_path_flag"+T+"act_this_per_work_qty"+T+"act_this_per_equip_qty"+N;
    wps.forEach(w=>{
      const phIdx=phases.findIndex(p=>p.id===w.phase);
      const wbsId=phIdx>=0?(4000+phIdx):"4000";
      const st=w.status==="done"?"TK_Complete":w.status==="in-progress"?"TK_Active":w.status==="blocked"?"TK_Suspend":"TK_NotStart";
      const ph=phases.find(p=>p.id===w.phase)||{};
      const hrs=(8*5*4); // ~160hr default
      xer+="%R"+T+(taskId)+T+projId+T+wbsId+T+"100"+T+w.progress+T+"N"+T+"1"+T+"N"+T+"Y"+T+"CP_Phys"+T+"TT_Task"+T+"DT_FixedDrtn"+T+st+T+safe(w.id)+T+safe(w.name)+T+""+T+"0"+T+"0"+T+(hrs*(100-w.progress)/100)+T+(w.status==="done"?p6Date(ph.endDate):"")+T+(w.status==="done"?p6Date(ph.endDate):"")+T+p6Date(ph.startDate)+T+p6Date(ph.endDate)+T+p6Date(ph.endDate)+T+p6Date(ph.startDate)+T+p6Date(ph.endDate)+T+p6Date(ph.startDate)+T+p6Date(ph.endDate)+T+hrs+T+hrs+T+(hrs*w.progress/100)+T+(hrs*(100-w.progress)/100)+T+"0"+T+"0"+T+"0"+T+""+T+"N"+T+""+T+""+T+""+T+"0"+T+"0"+T+w.id+"-GUID"+T+""+T+""+T+""+T+"Y"+T+"0"+T+"0"+N;
      taskId++;

    // Resources
    xer+="%T"+T+"RSRC"+N;
    xer+="%F"+T+"rsrc_id"+T+"parent_rsrc_id"+T+"clndr_id"+T+"role_id"+T+"shift_id"+T+"user_id"+T+"pobs_id"+T+"guid"+T+"rsrc_seq_num"+T+"email_addr"+T+"employee_code"+T+"office_phone"+T+"other_phone"+T+"rsrc_name"+T+"rsrc_short_name"+T+"rsrc_type"+T+"unit_id"+T+"def_qty_per_hr"+T+"target_qty"+T+"act_this_per_qty"+T+"act_total_qty"+T+"remain_qty"+T+"cost_qty_type"+T+"act_ot_qty"+T+"act_ot_cost"+T+"auto_compute_act_flag"+T+"def_cost_qty_link_flag"+T+"ot_factor"+T+"max_qty_per_hr"+N;
    team.forEach((m,i)=>{
      xer+="%R"+T+(rsrcId+i)+T+""+T+"100"+T+""+T+""+T+""+T+""+T+m.id+"-GUID"+T+(i+1)+T+""+T+m.id+T+""+T+""+T+safe(m.name)+T+safe(m.id)+T+"RT_Labor"+T+"HR"+T+"1"+T+(m.load/100)+T+"0"+T+"0"+T+(m.load/100)+T+"QT_CostTime"+T+"0"+T+"0"+T+"Y"+T+"N"+T+"1.5"+T+m.load/100+N;
    });
    xer+="%E"+N;
    dlText(xer,`${slug}_P6_${today()}.xer`);
    showToast("✓ Primavera P6 XER exported");

  /* ── FILE PICKER HELPER ── */
  // Appends a real <input> to the body so all browsers (incl. Safari) keep it alive
  // until the user finishes the dialog, then cleans up.
  const openFilePicker=(accept,handler)=>{
    const input=document.createElement("input");
    input.type="file";
    input.accept=accept;
    input.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0;";
    document.body.appendChild(input);
    input.onchange=e=>{
      const file=e.target.files?.[0];
      if(file) handler(file);
      setTimeout(()=>{try{document.body.removeChild(input);}catch(err){}},200);
    };
    input.oncancel=()=>setTimeout(()=>{try{document.body.removeChild(input);}catch(err){}},200);

  };

const CACHE = 'ahp-v4';
const ASSETS = ['/', '/index.html'];

self.addEventListener('install', e =>
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));

self.addEventListener('fetch', e =>
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));

// Sync on reconnect
self.addEventListener('sync', e => {
  if (e.tag === 'ahp-sync') e.waitUntil(pushPendingData());
});`}</div>

const fccCan = (user, action) => {
  const role = user?.role || "viewer";
  return (FCC_ROLES[role]?.can || []).includes(action);
};

/* ── 4. SUPABASE BRIDGE ──────────────────────────────────────── */
const sbReady = () => FCC_CONFIG.supabaseUrl && FCC_CONFIG.supabaseKey;

const sbFetch = async (path, opts={}) => {
  const res = await fetch(`${FCC_CONFIG.supabaseUrl}/rest/v1/${path}`, {
    headers: {
      "apikey": FCC_CONFIG.supabaseKey,
      "Authorization": `Bearer ${FCC_CONFIG.supabaseKey}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(opts.headers||{})
    },
    ...opts
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
};

const sbSignup = async (name, email, password) => {
  if(!sbReady()) {
    // local-first fallback
    const u = { id:"local-"+Date.now(), name, email, role:"owner", plan:"free", org:"Local Org", createdAt:new Date().toISOString() };
    try{ localStorage.setItem("fcc_user", JSON.stringify(u)); }catch{}
    return { user:u };
  }
  const res = await fetch(`${FCC_CONFIG.supabaseUrl}/auth/v1/signup`, {
    method:"POST",
    headers:{ "apikey":FCC_CONFIG.supabaseKey, "Content-Type":"application/json" },
    body: JSON.stringify({ email, password, data:{ name } })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message||data.error);
  const u = { id:data.user?.id, name, email, role:"owner", plan:"free", org:"", createdAt:new Date().toISOString(), access_token:data.access_token };
  try{ localStorage.setItem("fcc_user", JSON.stringify(u)); }catch{}
  return { user:u };
};

const sbLogin = async (email, password) => {
  if(!sbReady()) {
    // local-first: check stored user
    let stored=null;
    try{ stored=JSON.parse(localStorage.getItem("fcc_user")); }catch{}
    if(stored && stored.email===email) return { user:stored };
    throw new Error("No account found. Please sign up first.");
  }
  const res = await fetch(`${FCC_CONFIG.supabaseUrl}/auth/v1/token?grant_type=password`, {
    method:"POST",
    headers:{ "apikey":FCC_CONFIG.supabaseKey, "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message||data.error);
  const u = { id:data.user?.id, name:data.user?.user_metadata?.name||email.split("@")[0], email, role:"owner", plan:"free", org:"", access_token:data.access_token };
  try{ localStorage.setItem("fcc_user", JSON.stringify(u)); }catch{}
  return { user:u };
};

const sbLoadProjects = async (userId) => {
  if(!sbReady()) {
    try{ return JSON.parse(localStorage.getItem("ahp_projects"))||[]; }catch{ return []; }
  }
  try{
    const rows = await sbFetch(`fcc_projects?owner_id=eq.${userId}&order=created_at.desc`);
    return rows.map(r=>r.data||r);
  }catch(e){ try{ return JSON.parse(localStorage.getItem("ahp_projects"))||[]; }catch{ return []; } }
};

const sbSaveProject = async (userId, project) => {
  // Always write to localStorage (offline-first)
  try{
    const all = JSON.parse(localStorage.getItem("ahp_projects"))||[];
    const idx = all.findIndex(p=>p.id===project.id);
    if(idx>=0) all[idx]=project; else all.push(project);
    localStorage.setItem("ahp_projects", JSON.stringify(all));
  }catch{}
  // Best-effort Supabase upsert
  if(!sbReady()||!userId) return;
  try{
    await sbFetch(`fcc_projects?id=eq.${project.id}`, {
      method:"POST",
      headers:{ "Prefer":"resolution=merge-duplicates" },
      body: JSON.stringify({ id:project.id, owner_id:userId, data:project, updated_at:new Date().toISOString() })
    });
  }catch(e){ console.warn("Supabase save skipped:",e.message); }
};

// Format phone to 254XXXXXXXXX
const normalizeMpesaPhone = (phone) => {
  const d = phone.replace(/\D/g, "");
  if(d.startsWith("254")) return d;
  if(d.startsWith("0")) return "254" + d.slice(1);
  if(d.startsWith("7") || d.startsWith("1")) return "254" + d;
  return d;
};

// Generate Daraja password (base64 of shortcode + passkey + timestamp)
const darajaPassword = (shortcode, passkey, timestamp) => {
  const raw = shortcode + passkey + timestamp;
  try { return btoa(raw); } catch { return btoa(unescape(encodeURIComponent(raw))); }
};

// Format YYYYMMDDHHMMSS timestamp
const darajaTimestamp = () => {
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
};

// Initiate STK Push via the relay Edge Function (avoids CORS)
// The relay calls Safaricom on the server side and returns the response.
const initMpesaStkPush = async (phone, amount, planLabel, userEmail) => {
  if(!FCC_CONFIG.mpesaRelayUrl) throw new Error("mpesaRelayUrl not configured in FCC_CONFIG.");
  const timestamp = darajaTimestamp();
  const password  = darajaPassword(FCC_CONFIG.mpesaShortcode, FCC_CONFIG.mpesaPasskey || "bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919", timestamp);
  const payload = {
    env:              FCC_CONFIG.mpesaEnv || "sandbox",
    shortcode:        FCC_CONFIG.mpesaShortcode,
    password,
    timestamp,
    amount:           Math.ceil(amount),
    phone:            normalizeMpesaPhone(phone),
    accountReference: `FCC-${planLabel.toUpperCase()}`,
    transactionDesc:  `Field Command Center ${planLabel} plan`,
    callbackUrl:      FCC_CONFIG.mpesaRelayUrl + "/callback",
  };
  const res = await fetch(FCC_CONFIG.mpesaRelayUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if(!res.ok || data.ResponseCode !== "0") throw new Error(data.ResponseDescription || data.errorMessage || "STK Push failed");
  return data; // { CheckoutRequestID, MerchantRequestID, ResponseCode, CustomerMessage }
};

// Paystack inline checkout (cards + M-Pesa via Paystack JS SDK)
const openPaystackCheckout = (plan, amount, userEmail, onSuccess) => {
  if(!FCC_CONFIG.paystackPublicKey) {
    alert("Paystack not configured yet. Add paystackPublicKey to FCC_CONFIG.\n\nAlternatively configure mpesaRelayUrl for direct M-Pesa STK Push.");
    return;
  }
  // Dynamically load Paystack inline JS if not already loaded
  const load = (cb) => {
    if(window.PaystackPop) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://js.paystack.co/v1/inline.js";
    s.onload = cb;
    document.head.appendChild(s);
  };
  load(() => {
    const handler = window.PaystackPop.setup({
      key:       FCC_CONFIG.paystackPublicKey,
      email:     userEmail || "user@fcc.app",
      amount:    amount * 100, // Paystack expects kobo/cents (KES * 100)
      currency:  "KES",
      ref:       "FCC-" + Date.now(),
      metadata:  { plan, custom_fields: [{ display_name: "Plan", variable_name: "plan", value: plan }] },
      channels:  ["card", "mobile_money", "bank_transfer"],
      callback:  (response) => { if(onSuccess) onSuccess(response.reference); },
      onClose:   () => {}
    });
    handler.openIframe();
  });
};

// React component: M-Pesa payment modal (STK Push flow)
function MpesaPayModal({ plan, amount, userEmail, onSuccess, onClose }) {
  const [phone, setPhone]       = useState("");
  const [status, setStatus]     = useState("idle"); // idle | sending | waiting | done | error
  const [msg, setMsg]           = useState("");
  const [checkoutId, setCheckoutId] = useState(null);
  const PLAN_COLORS = { pro: "var(--accent)", team: "var(--purple)" };
  const color = PLAN_COLORS[plan] || "var(--accent)";

  const handleSTK = async () => {
    if(!phone || phone.replace(/\D/g,"").length < 9) { setMsg("Enter a valid M-Pesa number e.g. 0712345678"); return; }
    setStatus("sending"); setMsg("");
    try {
      const res = await initMpesaStkPush(phone, amount, plan, userEmail);
      setCheckoutId(res.CheckoutRequestID);
      setStatus("waiting");
      setMsg("M-Pesa prompt sent! Enter your PIN on your phone to complete payment. This screen will update automatically.");
      // Poll for completion (simplified — production should use Supabase Realtime)
      let tries = 0;
      const poll = setInterval(async () => {
        tries++;
        if(tries > 24) { clearInterval(poll); setStatus("error"); setMsg("Timed out waiting for payment. If you paid, add ?upgraded=" + plan + " to your URL."); }
        // In sandbox/dev, auto-resolve after 8s for demo purposes
        if(FCC_CONFIG.mpesaEnv === "sandbox" && tries >= 4) {
          clearInterval(poll);
          setStatus("done");
          setMsg("✓ Sandbox payment confirmed! Your plan is now " + plan.toUpperCase() + ".");
          setTimeout(() => { if(onSuccess) onSuccess("SANDBOX-" + Date.now()); }, 1200);

      setStatus("error");
      setMsg("Error: " + e.message);

          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text3)",fontSize:"20px",cursor:"pointer",padding:"4px"}}>✕</button>

        {/* Amount display */}

/* ═══════════════════════════════════════════════════════════
   SHARE SNAPSHOT MODAL
   Encodes all project data into a URL-safe string.
   Recipient opens the link and sees the full project.
   ═══════════════════════════════════════════════════════════ */
function ShareSnapshotModal({proj,diaries,materials,provisions,onClose,showToast}){
  const [copied,setCopied]   = useState(false);
  const [emailCopied,setEmailCopied] = useState(false);
  const [waPhone,setWaPhone] = useState("");
  const [showWaInput,setShowWaInput] = useState(false);

  // ── Build the snapshot URL ──────────────────────────────────────
  const buildURL = () => {
    try {
      const payload = {
        site:proj.site, phases:proj.phases, wps:proj.wps,
        risks:proj.risks, snags:proj.snags, team:proj.team,
        diaries:diaries||[], materials:materials||[],
        provisions:provisions||{},
        _shared:true, _sharedAt:new Date().toISOString()
      };
      const encoded = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
      const base = window.location.href.split("?")[0];
      return `${base}?snap=${encoded}`;
    } catch(e) { return window.location.href; }
  };

  const url = React.useMemo(buildURL, []);
  const urlLen = url.length;

  // WhatsApp safe limit ~2000 chars for the full wa.me?text= URL
  const WA_LIMIT = 1800;
  const MAIL_LIMIT = 1900;
  const urlOk  = urlLen <= WA_LIMIT;
  const mailOk = urlLen <= MAIL_LIMIT;

  // Short message (link only) always fits
  const shortWaText  = `FCC snapshot — ${proj.site?.name||"Project"}:\n${url}`;
  const longWaText   = `Hi 👋 Here's the latest project snapshot for *${proj.site?.name||"our site"}*. Open this link to view all phases, work packages, risks and diary entries:\n\n${url}`;
  const waText       = urlOk ? longWaText : shortWaText;

  const emailSubject = `Project Snapshot — ${proj.site?.name||"Site"}`;
  const emailBodyFull = `Hi,

I'm sharing the latest project snapshot from Field Command Centre.

Project: ${proj.site?.name||""}
Location: ${proj.site?.location||""}

Open this link to view the full project data:
${url}

Regards`;

  // ── Copy helpers ────────────────────────────────────────────────
  const doCopy = (text, onDone) => {
    const fallback = () => {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch{}
      document.body.removeChild(ta);
      onDone();
    };
    if(navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onDone).catch(fallback);
    } else { fallback(); }
  };

  const copyLink = () => {
    doCopy(url, () => {
      setCopied(true);
      showToast("✓ Link copied to clipboard");
      if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"clipboard"});
      setTimeout(() => setCopied(false), 2500);
    });
  };

  const copyEmailBody = () => {
    doCopy(emailBodyFull, () => {
      setEmailCopied(true);
      showToast("✓ Email body copied — paste into your email client");
      setTimeout(() => setEmailCopied(false), 3000);
    });
  };

  // ── Share actions ───────────────────────────────────────────────

  // Native share (mobile share sheet) — supports WhatsApp, Telegram, SMS etc.
  const nativeShare = async () => {
    if(!navigator.share) return false;
    try {
      await navigator.share({
        title: `FCC Snapshot — ${proj.site?.name||"Project"}`,
        text: `Field Command Centre project snapshot for ${proj.site?.name||"our site"}`,
        url: url
      });
      if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"native"});
      return true;
    } catch(e) { return false; }
  };

  // WhatsApp — direct to number if provided, otherwise open chat picker
  const shareWhatsApp = () => {
    const phone = waPhone.replace(/\D/g,"");
    const num = phone.startsWith("254") ? phone : phone.startsWith("0") ? "254"+phone.slice(1) : phone ? "254"+phone : "";
    const text = encodeURIComponent(waText);
    const waUrl = num
      ? `https://wa.me/${num}?text=${text}`
      : `https://wa.me/?text=${text}`;

    if(urlOk) {
      window.open(waUrl, "_blank");
      if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"whatsapp"});
      showToast("✓ Opening WhatsApp…");
    } else {
      // URL too long for wa.me — copy link and open WhatsApp separately
      doCopy(url, () => {
        showToast("✓ Link copied — paste it into WhatsApp");
        const waBase = num ? `https://wa.me/${num}` : "https://wa.me/";
        window.open(waBase, "_blank");
        if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"whatsapp_manual"});
      });
    }
  };

  // Email — try mailto first; fall back to copy if too long
  const shareEmail = () => {
    if(mailOk) {
      const href = `mailto:?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBodyFull)}`;
      window.location.href = href;
      if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"email"});
    } else {
      // mailto body too long — copy email body instead
      copyEmailBody();
    }
  };

  // SMS — works well on mobile
  const shareSMS = () => {
    const smsBody = `FCC snapshot — ${proj.site?.name||"Project"}: ${url}`;
    window.open(`sms:?body=${encodeURIComponent(smsBody)}`, "_blank");
    if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"sms"});
  };

  const hasNativeShare = !!navigator.share;

  // URL size indicator
  const sizeKB = (urlLen/1024).toFixed(1);
  const sizeColor = urlLen > 2500 ? "var(--red)" : urlLen > 1500 ? "var(--orange,#dd6b20)" : "var(--green)";

  return(
    <>
      <div className="share-modal-overlay" onClick={onClose}/>
      <div className="share-modal">

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px"}}>
          <div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"10px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.14em",marginBottom:"4px"}}>Share Project Snapshot</div>
            <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)"}}>{proj.site?.name||"Project"}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:"18px",padding:"2px"}}>✕</button>
        </div>

        {/* URL box + copy */}
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"9px",color:"var(--text4)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.1em",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Snapshot Link</span>
          <span style={{color:sizeColor,fontSize:"8px"}}>{sizeKB} KB · {urlLen.toLocaleString()} chars</span>
        </div>
        <div className="share-url-box">{url}</div>

        <button className="btn-primary" style={{width:"100%",marginBottom:"14px"}} onClick={copyLink}>
          {copied ? "✓ Copied!" : "📋 Copy Link"}
        </button>

        {/* Large project warning */}
        {!urlOk && (
          <div style={{background:"var(--orange,#dd6b20)15",border:"1px solid var(--orange,#dd6b20)44",borderRadius:"6px",padding:"9px 12px",marginBottom:"14px",fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",color:"var(--orange,#dd6b20)",lineHeight:1.6}}>
            ⚠ This project is large ({sizeKB} KB). WhatsApp and email links have a ~2 KB limit.
            The app will copy the link to your clipboard so you can paste it manually.
          </div>
        )}

        {/* Share channels */}
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}}>
          Share via
        </div>

        {/* Native share (mobile) */}
        {hasNativeShare && (
          <button className="share-channel-btn" onClick={nativeShare}
            style={{width:"100%",marginBottom:"8px",justifyContent:"center",padding:"11px"}}>
            <span style={{fontSize:"16px"}}>📤</span>
            <span>Share via Apps (WhatsApp · Telegram · SMS…)</span>
          </button>
        )}

        <div className="share-channels">

          {/* WhatsApp */}
          <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
            <button className="share-channel-btn" onClick={shareWhatsApp}
              style={{justifyContent:"center",padding:"10px 8px"}}>
              <span style={{fontSize:"16px"}}>💬</span>
              <span>WhatsApp</span>
              {!urlOk && <span style={{fontSize:"8px",color:"var(--orange,#dd6b20)",marginLeft:"2px"}}>+copy</span>}
            </button>
            <button onClick={()=>setShowWaInput(v=>!v)}
              style={{background:"none",border:"none",color:"var(--text4)",fontFamily:"'Share Tech Mono',monospace",fontSize:"8px",cursor:"pointer",textAlign:"left",padding:"0 2px"}}>
              {showWaInput ? "▲ hide number" : "▼ send to a number"}
            </button>
            {showWaInput && (
              <input
                type="tel"
                placeholder="e.g. 0712 345 678"
                value={waPhone}
                onChange={e=>setWaPhone(e.target.value)}
                style={{padding:"6px 8px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"4px",color:"var(--text)",fontFamily:"'Share Tech Mono',monospace",fontSize:"9px",outline:"none"}}
              />
            )}
          </div>

          {/* Email */}
          <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
            <button className="share-channel-btn" onClick={shareEmail}
              style={{justifyContent:"center",padding:"10px 8px"}}>
              <span style={{fontSize:"16px"}}>📧</span>
              <span>{mailOk ? "Email" : "Copy Email"}</span>
              {!mailOk && <span style={{fontSize:"8px",color:"var(--orange,#dd6b20)",marginLeft:"2px"}}>body</span>}
            </button>
            {!mailOk && (
              <button onClick={copyEmailBody}
