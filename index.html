                  <div style={{fontSize:"22px",fontWeight:"900",color:"var(--amber)",lineHeight:1}}>{risks.filter(r=>r.status==="open").length}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"7px",color:"var(--text4)",marginTop:"3px"}}>OPEN</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"22px",fontWeight:"900",color:"var(--green)",lineHeight:1}}>{snags.filter(s=>s.status==="open").length}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"7px",color:"var(--text4)",marginTop:"3px"}}>SNAGS</div>
                </div>
              </div>
            </div>

            {/* Risk list — native cards on mobile */}
            <div className="mob-section-hdr mob-only"><span className="mob-section-label">🚨 Risk Register</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"16px"}}>
              {risks.map(r=>(
                <div key={r.id} className="card" style={{padding:"16px",border:`1px solid ${SCC[r.severity]||"#A0AEC0"}30`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:SCC[r.severity]||"#A0AEC0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"12px",marginBottom:"10px"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"6px"}}>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>{r.id}</span>
                        <Badge label={r.severity} color={SCC[r.severity]||"#A0AEC0"}/>
                        <Badge label={r.status} color={SCC[r.status]||"#A0AEC0"}/>
                      </div>
                      <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)",lineHeight:1.3,marginBottom:"4px"}}>{r.title}</div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text3)"}}>Phase {r.phase} · {r.impact}</div>
                    </div>
                    <div style={{textAlign:"center",flexShrink:0}}>
                      <div style={{fontSize:"30px",fontWeight:"900",color:SCC[r.severity]||"#A0AEC0",lineHeight:1}}>{r.probability}%</div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"7px",color:"var(--text4)"}}>PROB.</div>
                    </div>
                  </div>
                  <Bar value={r.probability} color={SCC[r.severity]||"#A0AEC0"} h={4}/>
                  <div style={{marginTop:"10px",padding:"10px 12px",background:"var(--bg)",borderRadius:"10px",display:"flex",gap:"8px",alignItems:"flex-start"}}>
                    <div style={{width:"3px",background:SCC[r.status]||"#A0AEC0",borderRadius:"2px",flexShrink:0,alignSelf:"stretch",marginTop:"1px"}}/>
                    <div style={{fontSize:"11px",color:"var(--text2)",lineHeight:1.5}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",display:"block",marginBottom:"2px"}}>MITIGATION</span>
                      {r.mitigation}
                    </div>
                  </div>
                  {r.severity==="critical"&&r.status!=="closed"&&(
                    <div style={{marginTop:"10px",display:"flex",gap:"8px",flexWrap:"wrap"}}>
                      <button className="btn-primary" style={{padding:"6px 14px",fontSize:"9px",background:"var(--red)",borderColor:"var(--red)"}}
                        onClick={()=>{
                          notifIncident(r.title+' — '+r.impact,site.name);
                          showToast("🚨 Incident alert sent to all supervisors");
                        }}>
                        🚨 Push Incident Alert
                      </button>
                      <button className="btn-ghost" style={{padding:"6px 14px",fontSize:"9px"}}
                        onClick={()=>{
                          const msg=`🚨 SITE INCIDENT — ${site.name}

${r.title}

${r.impact}

Mitigation: ${r.mitigation}

Owner: ${r.owner} | Status: ${r.status}`;
                          if(navigator.share){navigator.share({title:"Mradi HQ — Incident Alert",text:msg}).catch(()=>{});}
                          else{navigator.clipboard?.writeText(msg);showToast("✓ Alert text copied");}
                        }}>
                        📤 Share Alert
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Snags */}
            <div className="mob-section-hdr mob-only"><span className="mob-section-label">🔍 QA/QC Snagging</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {snags.map(s=>(
                <div key={s.id} className="card" style={{padding:"14px",border:`1px solid ${SCC[s.status==="remediated"?"remediated":s.severity]||"#A0AEC0"}30`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"5px"}}>
                        <Badge label={s.severity} color={SCC[s.status==="remediated"?"remediated":s.severity]||"#A0AEC0"}/>
                        <Badge label={s.status} color={SCC[s.status]||"#A0AEC0"}/>
                      </div>
                      <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)",lineHeight:1.3}}>{s.item}</div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",marginTop:"3px"}}>{s.block} · {s.raised}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── TEAM ── */}
        {view==="team"&&(hasAddon("gps")
          ? <TeamAttendanceView site={site} workers={workers} setWorkers={setWorkers} team={team} wps={wps} projectId={projects[activeProject]?.id||"local"} showToast={showToast}/>
          : <PaywallGate feature="gps" planNeeded="pro" onUpgrade={()=>setShowPlanPayment(true)}/>
        )}

        {/* ── RE REPORT ── */}
        {view==="budget"&&(hasAddon("budget")
          ? <BudgetView site={site} phases={phases} provisions={provisions} materials={materials} wps={wps}/>
          : <PaywallGate feature="budget" planNeeded="pro" onUpgrade={()=>setShowPlanPayment(true)}/>
        )}
        {view==="report"&&(hasAddon("reports")
          ? <REReport site={site} phases={phases} wps={wps} risks={risks} snags={snags} team={team} diaries={diaries} materials={materials}/>
          : <PaywallGate feature="reports" planNeeded="pro" onUpgrade={()=>setShowPlanPayment(true)}/>
        )}

        {/* ── PAYMENTS ── */}
        {view==="payments"&&(hasAddon("reports")
          ? <PaymentsView site={site}/>
          : <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",gap:"16px",textAlign:"center",padding:"24px"}}>
              <div style={{fontSize:"48px"}}>💳</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:"var(--text)"}}>Payments &amp; RE Reports</div>
              <div style={{fontSize:"13px",color:"var(--text3)",maxWidth:"360px",lineHeight:1.6}}>Request payments via M-Pesa or card, and generate professional RE Report PDFs. Unlock with the Reports add-on.</div>
              <button className="btn-primary" style={{padding:"12px 28px",fontSize:"11px"}} onClick={()=>setShowPremium("reports")}>
                📄 Unlock Reports &amp; Payments · KES {IAP_ADDONS.reports.price.toLocaleString()}
              </button>
            </div>
        )}

      </main>

      {/* MOBILE BOTTOM NAV — iPhone 17 floating glass pill, 5 pinned + More */}
      <nav className="mobile-nav">
        <div className="mobile-nav-inner">
          {NAV.slice(0,5).map(({id,label,icon})=>(
            <button key={id} className={`mob-nav-btn ${view===id?"active":""}`} onClick={()=>setView(id)}>
              <span className="mob-nav-icon">{icon}</span>
              <span className="mob-nav-label">{label}</span>
            </button>
          ))}
          {/* More — opens drawer with remaining screens */}
          <button className={`mob-nav-btn ${NAV.slice(5).some(n=>n.id===view)?"active":""}`}
            onClick={()=>setShowMobileMenu(true)}>
            <span className="mob-nav-icon" style={{fontSize:"18px"}}>
              {NAV.slice(5).some(n=>n.id===view)
                ? (NAV.find(n=>n.id===view)?.icon||"≡")
                : "≡"}
            </span>
            <span className="mob-nav-label">
              {NAV.slice(5).some(n=>n.id===view)
                ? (NAV.find(n=>n.id===view)?.label||"More")
                : "More"}
            </span>
          </button>
        </div>
      </nav>
    </div>
  );
}


// ══════════════════════════════════════════════════════════
//  AUTO REPORT GENERATOR MODAL
//  Builds a WhatsApp-ready Daily Progress Report from a diary entry
// ══════════════════════════════════════════════════════════
function AutoReportModal({entry, site, team, workers, onClose}){
  const {useState, useRef} = React;
  const [reportType, setReportType] = useState("daily"); // daily | client | consultant
  const [copied, setCopied] = useState(false);
  const textRef = useRef(null);

  const allPeople = [...team, ...(workers||[])];
  const authorMember = allPeople.find(m=>m.id===entry.author)||{name:entry.author||"Site Manager"};
  const totalWorkers = entry.gangsPresent || (entry.workforce||[]).reduce((s,w)=>s+(Number(w.count)||0),0);
  const totalHours   = (entry.works||[]).reduce((s,w)=>s+(w.manHours||0),0);
  const dateStr      = new Date(entry.date).toLocaleDateString("en-KE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  const worksList = (entry.works||[]).map(w=>`  • ${w.area?`[${w.area}] `:""}${w.description}${w.manHours?` (${w.manHours}h)`:""}${w.materials?` — Materials: ${w.materials}`:""}`).join("\n");
  const workforceList = (entry.workforce||[]).length > 0
    ? (entry.workforce||[]).map(w=>`  • ${w.count}× ${w.trade}${w.company?` (${w.company})`:""}`).join("\n")
    : `  ${totalWorkers} workers on site`;

  const reports = {
    daily: `📊 *MRADI HQ — DAILY SITE REPORT*
━━━━━━━━━━━━━━━━━━━━━━━━━━
🏗 *Project:* ${site.name||"Project"}
📍 *Location:* ${site.location||"Site"}
📅 *Date:* ${dateStr}
🌤 *Weather:* ${entry.weather||"—"}${entry.temperature?` · ${entry.temperature}`:""}

👷 *WORKFORCE*
${workforceList}
  Total: *${totalWorkers} workers* · ${totalHours} man-hours

🔨 *WORKS CARRIED OUT*
${worksList||"  No works logged"}
${entry.issues&&entry.issues.trim()?`
⚠️ *ISSUES / OBSERVATIONS*
  ${entry.issues}`:""}${entry.visitors&&entry.visitors.trim()?`

👤 *VISITORS / INSPECTIONS*
  ${entry.visitors}`:""}${(entry.photos||[]).length>0?`

📸 *${(entry.photos||[]).length} site photo${(entry.photos||[]).length>1?"s":""} attached*`:""}

━━━━━━━━━━━━━━━━━━━━━━━━━━
Prepared by: ${authorMember.name}
_Generated by Mradi HQ_`,

    client: `Dear ${site.client||"Client"},

Please find below your site progress update for *${site.name||"your project"}*.

📅 *Date:* ${dateStr}
🌤 *Weather:* ${entry.weather||"—"}${entry.temperature?` · ${entry.temperature}`:""}

*PROGRESS THIS DAY*
${(entry.works||[]).map(w=>`• ${w.area?`${w.area}: `:""}${w.description}`).join("\n")||"Works in progress — see attached photos"}
${(entry.photos||[]).length>0?`\n📸 ${(entry.photos||[]).length} progress photo${(entry.photos||[]).length>1?"s":""} enclosed.`:""}
${entry.issues&&entry.issues.trim()?`\n⚠️ *Note:* ${entry.issues}`:""}

Your site is progressing as planned. Please do not hesitate to reach out with any queries.

Regards,
${authorMember.name}
${site.contractor||"Contractor"}
_Powered by Mradi HQ_`,

    consultant: `RE/DAILY/${entry.id||"001"}
${dateStr.toUpperCase()}

PROJECT: ${(site.name||"PROJECT").toUpperCase()}
CONTRACT VALUE: ${site.contractValue?("KES "+Number(site.contractValue).toLocaleString("en-KE")):"—"}
CONTRACTOR: ${site.contractor||"—"}

SITE CONDITIONS
Weather: ${entry.weather||"—"}${entry.temperature?` · ${entry.temperature}`:""}
Workforce: ${totalWorkers} persons · ${totalHours} man-hours

WORKS EXECUTED
${(entry.works||[]).map(w=>`[${w.area||"General"}] ${w.description}${w.materials?` — Mats: ${w.materials}`:""}`).join("\n")||"Nil"}

WORKFORCE BREAKDOWN
${(entry.workforce||[]).length>0?(entry.workforce||[]).map(w=>`${w.trade}: ${w.count}${w.company?` (${w.company})`:""}`).join("\n"):"See above"}
${entry.issues&&entry.issues.trim()?`\nISSUES / OBSERVATIONS\n${entry.issues}`:""}
${entry.visitors&&entry.visitors.trim()?`\nSITE VISITORS\n${entry.visitors}`:""}

Prepared by: ${authorMember.name}
Date: ${dateStr}
Signature: _____________________

[Mradi HQ — Field Command Centre]`
  };

  const reportText = reports[reportType];

  const copyText = () => {
    const fallback = () => {
      if(textRef.current){ textRef.current.select(); try{document.execCommand("copy");}catch{} }
    };
    if(navigator.clipboard?.writeText){
      navigator.clipboard.writeText(reportText).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2500); }).catch(fallback);
    } else { fallback(); setCopied(true); setTimeout(()=>setCopied(false),2500); }
  };

  const openWhatsApp = () => {
    window.open("https://wa.me/?text="+encodeURIComponent(reportText),"_blank");
  };

  return(
    <>
      <div className="edit-overlay" onClick={onClose}/>
      <div className="edit-panel">
        {/* Header */}
        <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontSize:"9px",fontFamily:"'JetBrains Mono',monospace",color:"var(--green)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"2px"}}>📤 Auto Report Generator</div>
            <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)"}}>{new Date(entry.date).toLocaleDateString("en-KE",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</div>
          </div>
          <button className="btn-ghost" style={{padding:"6px 10px"}} onClick={onClose}>✕</button>
        </div>

        {/* Report type tabs */}
        <div style={{display:"flex",gap:"0",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          {[["daily","📋 Daily"],["client","👤 Client"],["consultant","🏛 Consultant"]].map(([id,label])=>(
            <button key={id} className={`edit-tab${reportType===id?" active":""}`}
              onClick={()=>setReportType(id)} style={{flex:1,textAlign:"center",fontSize:"10px"}}>
              {label}
            </button>
          ))}
        </div>

        {/* Report preview */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 18px"}}>
          <div style={{fontSize:"9px",fontFamily:"'JetBrains Mono',monospace",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}}>
            {reportType==="daily"?"WhatsApp-ready daily report":reportType==="client"?"Professional client update":"Resident Engineer formal report"}
          </div>
          <textarea
            ref={textRef}
            readOnly
            value={reportText}
            style={{
              width:"100%",minHeight:"340px",background:"var(--bg)",border:"1px solid var(--border)",
              borderRadius:"8px",padding:"14px",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",
              color:"var(--text2)",lineHeight:1.65,resize:"vertical",outline:"none"
            }}
            onFocus={e=>e.target.select()}
          />
        </div>

        {/* Action bar */}
        <div className="save-bar" style={{gap:"8px"}}>
          <button className="btn-primary" style={{flex:1,background:"#25D366",boxShadow:"0 0 16px rgba(37,211,102,0.3)"}}
            onClick={openWhatsApp}>
            💬 Open in WhatsApp
          </button>
          <button className="btn-primary" style={{flex:1}} onClick={copyText}>
            {copied?"✓ Copied!":"📋 Copy Text"}
          </button>
          <button className="btn-ghost" onClick={()=>window.print()}>🖨 Print</button>
        </div>
      </div>
    </>
  );
}

// ══════════════════════════════════════════════════════════
//  PHOTO TIMELINE
//  Visual chronological timeline built from diary photos
// ══════════════════════════════════════════════════════════
function PhotoTimeline({diaries, site}){
  const {useState,useMemo} = React;
  const [lightbox, setLightbox] = useState(null);
  const [filter, setFilter] = useState("all"); // "all" | month string

  // Build flat list of all photos with diary context
  const allPhotos = useMemo(()=>{
    const list = [];
    const sorted = [...diaries].sort((a,b)=>a.date.localeCompare(b.date));
    sorted.forEach(d=>{
      (d.photos||[]).forEach((p,i)=>{
        list.push({
          ...p,
          diaryDate: d.date,
          diaryId: d.id,
          weather: d.weather,
          works: d.works||[],
          idx: list.length,
        });
      });
    });
    return list;
  },[diaries]);

  const months = useMemo(()=>[...new Set(allPhotos.map(p=>p.diaryDate.slice(0,7)))].sort(),[allPhotos]);

  const filtered = filter==="all" ? allPhotos : allPhotos.filter(p=>p.diaryDate.startsWith(filter));

  // Group photos by month for the timeline layout
  const byMonth = useMemo(()=>{
    const groups = {};
    filtered.forEach(p=>{
      const m = p.diaryDate.slice(0,7);
      if(!groups[m]) groups[m]=[];
      groups[m].push(p);
    });
    return groups;
  },[filtered]);

  const totalPhotos = allPhotos.length;
  const totalDaysWithPhotos = new Set(allPhotos.map(p=>p.diaryDate)).size;

  if(totalPhotos===0) return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      <div className="card" style={{padding:"48px",textAlign:"center",color:"var(--text4)"}}>
        <div style={{fontSize:"48px",marginBottom:"16px"}}>📸</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}}>No photos yet</div>
        <div style={{fontSize:"13px",color:"var(--text3)"}}>Add photos to your Site Diary entries to build your project's visual timeline.</div>
      </div>
    </div>
  );

  return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      {/* Header stats */}
      <div className="page-grid-4" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"16px"}}>
        <div className="card" style={{padding:"14px"}}>
          <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>Total Photos</div>
          <div style={{fontSize:"26px",fontWeight:"900",color:"var(--accent)",lineHeight:1}}>{totalPhotos}</div>
        </div>
        <div className="card" style={{padding:"14px"}}>
          <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>Days with Photos</div>
          <div style={{fontSize:"26px",fontWeight:"900",color:"var(--green)",lineHeight:1}}>{totalDaysWithPhotos}</div>
        </div>
        <div className="card" style={{padding:"14px"}}>
          <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>Months Covered</div>
          <div style={{fontSize:"26px",fontWeight:"900",color:"var(--amber)",lineHeight:1}}>{months.length}</div>
        </div>
      </div>

      {/* Month filter */}
      <div style={{display:"flex",gap:"6px",marginBottom:"20px",flexWrap:"wrap",alignItems:"center"}}>
        <button className="chip" onClick={()=>setFilter("all")}
          style={{borderColor:filter==="all"?"var(--accent)":"var(--border)",color:filter==="all"?"var(--accent)":"var(--text3)",background:filter==="all"?"var(--accent-bg)":"var(--surface)"}}>
          All Time
        </button>
        {months.map(m=>(
          <button key={m} className="chip" onClick={()=>setFilter(m)}
            style={{borderColor:filter===m?"var(--accent)":"var(--border)",color:filter===m?"var(--accent)":"var(--text3)",background:filter===m?"var(--accent-bg)":"var(--surface)"}}>
            {new Date(m+"-01").toLocaleDateString("en-KE",{month:"short",year:"numeric"})}
          </button>
        ))}
      </div>

      {/* Timeline */}
      <div style={{position:"relative",paddingLeft:"20px",borderLeft:"2px solid var(--border)"}}>
        {Object.entries(byMonth).sort(([a],[b])=>b.localeCompare(a)).map(([month, photos])=>(
          <div key={month} style={{marginBottom:"36px",position:"relative"}}>
            {/* Month marker */}
            <div style={{position:"absolute",left:"-30px",top:"2px",width:"16px",height:"16px",borderRadius:"50%",background:"var(--accent)",border:"2px solid var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"6px",color:"#fff",fontWeight:"900"}}/>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",fontWeight:"800",color:"var(--text)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"12px"}}>
              {new Date(month+"-01").toLocaleDateString("en-KE",{month:"long",year:"numeric"})}
              <span style={{fontWeight:"400",color:"var(--text3)",marginLeft:"8px"}}>{photos.length} photo{photos.length!==1?"s":""}</span>
            </div>

            {/* Photo grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:"8px"}}>
              {photos.map((p,i)=>(
                <div key={i}
                  style={{position:"relative",aspectRatio:"1",borderRadius:"10px",overflow:"hidden",
                    border:"1px solid var(--border)",cursor:"pointer",background:"var(--card)"}}
                  onClick={()=>setLightbox({photos:photos.map(x=>({...x,url:x.url||x.src})),index:i})}>
                  <img
                    src={p.url||p.src} alt={p.caption||"Site photo"}
                    style={{width:"100%",height:"100%",objectFit:"cover",transition:"transform 0.3s"}}
                    onMouseEnter={e=>{e.target.style.transform="scale(1.05)";}}
                    onMouseLeave={e=>{e.target.style.transform="scale(1)";}}
                    onError={e=>{e.target.style.display="none";}}
                  />
                  {/* Date overlay */}
                  <div style={{position:"absolute",bottom:0,left:0,right:0,
                    background:"linear-gradient(transparent,rgba(0,0,0,0.7))",
                    padding:"16px 8px 6px",pointerEvents:"none"}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"rgba(255,255,255,0.9)",fontWeight:"700"}}>
                      {new Date(p.diaryDate).toLocaleDateString("en-KE",{day:"numeric",month:"short"})}
                    </div>
                    {p.caption&&<div style={{fontSize:"8px",color:"rgba(255,255,255,0.7)",marginTop:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.caption}</div>}
                    {!p.caption&&(p.works[0]?.area)&&<div style={{fontSize:"8px",color:"rgba(255,255,255,0.7)",marginTop:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.works[0].area}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {lightbox&&<PhotoLightbox photos={lightbox.photos} startIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}
    </div>
  );
}


// ══════════════════════════════════════════════════════════
//  DAILY WORKFORCE REGISTER — foreman-managed daily presence log
//  Statuses: present | absent | half-day | sick | leave
// ══════════════════════════════════════════════════════════
const DR_STATUSES = [
  { id:"present",  label:"Present",  color:"var(--green)",  icon:"✅" },
  { id:"absent",   label:"Absent",   color:"var(--red)",    icon:"❌" },
  { id:"half",     label:"Half Day", color:"var(--amber)",  icon:"⬛" },
  { id:"sick",     label:"Sick",     color:"var(--purple)", icon:"🤒" },
  { id:"leave",    label:"Leave",    color:"var(--text4)",  icon:"📅" },
];
const DR_STATUS_COLOR = Object.fromEntries(DR_STATUSES.map(s=>[s.id, s.color]));
const DR_STATUS_ICON  = Object.fromEntries(DR_STATUSES.map(s=>[s.id, s.icon]));

function DailyRegisterTab({ workers, projectId, todayStr, showToast }) {
  const { useState, useEffect, useMemo } = React;

  // ── state ────────────────────────────────────────────────────────────────
  const [viewDate, setViewDate]     = useState(todayStr);
  const [allRegs,  setAllRegs]      = useState(() => loadDailyRegs(projectId));
  const [editing,  setEditing]      = useState(false); // true = edit mode for viewDate
  const [draft,    setDraft]        = useState({});    // workerId → {status, note}
  const [regNote,  setRegNote]      = useState("");    // whole-day foreman note

  // Reload when project changes
  useEffect(() => {
    const regs = loadDailyRegs(projectId);
    setAllRegs(regs);
    setEditing(false);
    setDraft({});
    setRegNote("");
  }, [projectId]);

  // ── derived data ─────────────────────────────────────────────────────────
  const activeWorkers = workers.filter(w => (w.status||"active") === "active");
  const reg = allRegs[viewDate]; // saved register for viewDate, or undefined

  // History: dates that have a saved register, sorted desc
  const savedDates = useMemo(() =>
    Object.keys(allRegs).sort((a,b) => b.localeCompare(a)).slice(0,60)
  , [allRegs]);

  // Summary counts for the viewed register
  const counts = useMemo(() => {
    if (!reg) return {};
    return DR_STATUSES.reduce((acc, s) => {
      acc[s.id] = Object.values(reg.entries||{}).filter(e => e.status === s.id).length;
      return acc;
    }, {});
  }, [reg]);

  const presentCount = counts.present || 0;
  const absentCount  = counts.absent  || 0;

  // ── open edit mode ────────────────────────────────────────────────────────
  const openEdit = () => {
    // Pre-fill draft from existing saved register (if any), else default present
    const existing = allRegs[viewDate]?.entries || {};
    const d = {};
    activeWorkers.forEach(w => {
      d[w.id] = existing[w.id]
        ? { status: existing[w.id].status, note: existing[w.id].note||"" }
        : { status: "present", note: "" };
    });
    setDraft(d);
    setRegNote(allRegs[viewDate]?.note || "");
    setEditing(true);
  };

  // ── save register ─────────────────────────────────────────────────────────
  const saveReg = () => {
    const entries = {};
    activeWorkers.forEach(w => {
      const e = draft[w.id] || { status:"present", note:"" };
      entries[w.id] = { status:e.status, note:e.note||"", name:w.name, trade:w.trade||w.role||"" };
    });
    const present = Object.values(entries).filter(e=>e.status==="present").length;
    const updated = {
      ...allRegs,
      [viewDate]: { entries, note:regNote, savedAt:new Date().toISOString(), total:activeWorkers.length, present }
    };
    setAllRegs(updated);
    saveDailyRegs(projectId, updated);
    setEditing(false);
    showToast(`✓ Register saved — ${present} present, ${activeWorkers.length - present} absent/other`);
  };

  // ── delete register ───────────────────────────────────────────────────────
  const deleteReg = () => {
    if (!window.confirm("Delete the register for " + viewDate + "?")) return;
    const updated = { ...allRegs };
    delete updated[viewDate];
    setAllRegs(updated);
    saveDailyRegs(projectId, updated);
    setEditing(false);
    showToast("Register deleted");
  };

  // ── CSV export ────────────────────────────────────────────────────────────
  const exportCSV = () => {
    const rows = [["Date","Worker ID","Name","Trade","Status","Note"]];
    const dates = editing ? [viewDate] : savedDates;
    dates.forEach(dt => {
      const r = allRegs[dt];
      if (!r) return;
      Object.entries(r.entries||{}).forEach(([wid, e]) => {
        rows.push([dt, wid, e.name||"", e.trade||"", e.status||"", e.note||""]);
      });
    });
    const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")).join("\n");
    const a = document.createElement("a");
    a.href = "data:text/csv," + encodeURIComponent(csv);
    a.download = "daily_register_" + projectId + ".csv";
    a.click();
    showToast("✓ Register exported");
  };

  // ── colour helpers ────────────────────────────────────────────────────────
  const sc = (s) => DR_STATUS_COLOR[s] || "var(--text4)";
  const si = (s) => DR_STATUS_ICON[s]  || "•";

  // ── render: EDIT MODE ─────────────────────────────────────────────────────
  if (editing) {
    const presentNow = Object.values(draft).filter(e=>e.status==="present").length;
    return (
      <div style={{animation:"fadeUp 0.2s ease"}}>
        {/* header */}
        <div className="card" style={{padding:"14px 16px",marginBottom:"14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}}>
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.1em"}}>📋 Daily Register — Edit</div>
            <div style={{fontSize:"16px",fontWeight:"900",color:"var(--text)",marginTop:"2px"}}>{viewDate}</div>
          </div>
          <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",color:"var(--green)",fontWeight:"700"}}>{presentNow} / {activeWorkers.length} present</div>
            <button className="btn-ghost" style={{fontSize:"10px",padding:"6px 12px"}} onClick={()=>setEditing(false)}>Cancel</button>
            <button className="btn-primary" style={{fontSize:"11px",padding:"7px 16px"}} onClick={saveReg}>Save Register</button>
          </div>
        </div>

        {/* quick-set all */}
        <div style={{display:"flex",gap:"6px",marginBottom:"12px",flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.08em",marginRight:"4px"}}>Set all:</span>
          {DR_STATUSES.map(s => (
            <button key={s.id} className="chip" style={{fontSize:"10px",padding:"4px 10px",borderColor:s.color+"55",color:s.color}}
              onClick={()=>{const d={};activeWorkers.forEach(w=>{d[w.id]={status:s.id,note:draft[w.id]?.note||""};});setDraft(d);}}>
              {s.icon} {s.label}
            </button>
          ))}
        </div>

        {/* worker rows */}
        <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"14px"}}>
          {activeWorkers.map(w => {
            const e = draft[w.id] || { status:"present", note:"" };
            return (
              <div key={w.id} className="card" style={{padding:"12px 14px",borderLeft:`3px solid ${sc(e.status)}`}}>
                <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
                  <div style={{width:"38px",height:"38px",borderRadius:"9px",background:sc(e.status)+"18",border:`1.5px solid ${sc(e.status)}44`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",fontWeight:"900",color:sc(e.status),flexShrink:0}}>{w.id}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)",lineHeight:1.2}}>{w.name}</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",marginBottom:"8px"}}>{w.trade||w.role}</div>
                    {/* status buttons */}
                    <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"6px"}}>
                      {DR_STATUSES.map(s => (
                        <button key={s.id}
                          style={{padding:"4px 9px",borderRadius:"5px",fontSize:"9px",fontWeight:"700",fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",
                            border:`1.5px solid ${e.status===s.id ? s.color : "var(--border)"}`,
                            background:e.status===s.id ? s.color+"18" : "transparent",
                            color:e.status===s.id ? s.color : "var(--text4)"}}
                          onClick={()=>setDraft(d=>({...d,[w.id]:{...e,status:s.id}}))}>
                          {s.icon} {s.label}
                        </button>
                      ))}
                    </div>
                    {/* note field */}
                    <input className="field-input" value={e.note||""} placeholder="Note (optional)"
                      onChange={ev=>setDraft(d=>({...d,[w.id]:{...e,note:ev.target.value}}))}
                      style={{fontSize:"11px",padding:"5px 8px"}}/>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* foreman note */}
        <div className="card" style={{padding:"14px 16px",marginBottom:"14px"}}>
          <label style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",display:"block",marginBottom:"6px"}}>Foreman's Note (optional)</label>
          <textarea className="field-input" value={regNote} onChange={e=>setRegNote(e.target.value)}
            placeholder="Any observations for today — absenteeism patterns, disciplinary matters, site conditions…"
            style={{minHeight:"70px",fontSize:"12px"}}/>
        </div>

        <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
          <button className="btn-ghost" style={{fontSize:"10px"}} onClick={()=>setEditing(false)}>Cancel</button>
          <button className="btn-primary" style={{fontSize:"12px",padding:"9px 22px"}} onClick={saveReg}>💾 Save Register</button>
        </div>
      </div>
    );
  }

  // ── render: VIEW MODE ─────────────────────────────────────────────────────
  return (
    <div style={{animation:"fadeUp 0.2s ease"}}>
      {/* toolbar */}
      <div style={{display:"flex",gap:"8px",marginBottom:"14px",alignItems:"center",flexWrap:"wrap"}}>
        <input type="date" value={viewDate} onChange={e=>setViewDate(e.target.value)}
          className="field-input" style={{flex:"0 0 auto",padding:"7px 10px",fontSize:"12px",maxWidth:"150px"}}/>
        {viewDate === todayStr && !reg &&
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--amber)",flex:1}}>No register for today yet</div>}
        {viewDate !== todayStr && !reg &&
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",flex:1}}>No register saved for {viewDate}</div>}
        {reg &&
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--green)",flex:1}}>✓ {presentCount} present · {absentCount} absent</div>}
        <button className="btn-ghost" style={{fontSize:"10px",padding:"6px 12px"}} onClick={exportCSV}>⬇ CSV</button>
        <button className="btn-primary" style={{fontSize:"11px",padding:"7px 14px"}} onClick={openEdit}>
          {reg ? "✏ Edit" : "📋 Take Register"}
        </button>
      </div>

      {/* saved register view */}
      {reg ? (
        <>
          {/* summary strip */}
          <div className="card" style={{padding:"12px 16px",marginBottom:"14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
              <div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Attendance Summary</div>
                <div style={{fontSize:"13px",fontWeight:"800",color:"var(--text)",marginTop:"2px"}}>{viewDate}</div>
              </div>
              <button className="btn-danger" style={{fontSize:"9px",padding:"4px 10px"}} onClick={deleteReg}>Delete</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"0",borderTop:"1px solid var(--border)",paddingTop:"10px"}}>
              {DR_STATUSES.map((s,i) => (
                <div key={s.id} style={{textAlign:"center",borderLeft:i>0?"1px solid var(--border)":"none"}}>
                  <div style={{fontSize:"20px",fontWeight:"900",color:s.color,lineHeight:1}}>{counts[s.id]||0}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"7px",color:"var(--text4)",marginTop:"3px",textTransform:"uppercase"}}>{s.label}</div>
                </div>
              ))}
            </div>
            {reg.note && <div style={{marginTop:"10px",padding:"8px 10px",background:"var(--bg)",borderRadius:"6px",fontSize:"11px",color:"var(--text3)",fontStyle:"italic"}}>"{reg.note}"</div>}
          </div>

          {/* worker rows */}
          <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"14px"}}>
            {activeWorkers.map(w => {
              const e = reg.entries?.[w.id];
              const status = e?.status || "—";
              const col = DR_STATUS_COLOR[status] || "var(--text4)";
              return (
                <div key={w.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"8px",borderLeft:`3px solid ${col}`}}>
                  <div style={{width:"34px",height:"34px",borderRadius:"8px",background:col+"18",border:`1.5px solid ${col}44`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",fontWeight:"900",color:col,flexShrink:0}}>{w.id}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"13px",fontWeight:"800",color:"var(--text)",lineHeight:1.2}}>{w.name}</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>{w.trade||w.role}</div>
                    {e?.note && <div style={{fontSize:"10px",color:"var(--text3)",fontStyle:"italic",marginTop:"1px"}}>"{e.note}"</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"5px",flexShrink:0}}>
                    <span style={{fontSize:"14px"}}>{si(status)}</span>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",fontWeight:"700",color:col,textTransform:"uppercase"}}>{status!=="—"?status:"not set"}</span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* past registers */}
          {savedDates.length > 1 && (
            <div className="card" style={{padding:"14px 16px"}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"10px"}}>Past Registers</div>
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                {savedDates.filter(d=>d!==viewDate).slice(0,14).map(dt => {
                  const r = allRegs[dt];
                  const pct = r.total ? Math.round((r.present/r.total)*100) : 0;
                  return (
                    <button key={dt} onClick={()=>setViewDate(dt)}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"5px",cursor:"pointer",textAlign:"left",width:"100%"}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",color:"var(--text)",fontWeight:"700"}}>{dt}</span>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:pct>=90?"var(--green)":pct>=70?"var(--amber)":"var(--red)"}}>{r.present}/{r.total} present · {pct}%</span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </>
      ) : (
        /* empty state */
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          <div className="card" style={{padding:"40px",textAlign:"center",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",lineHeight:1.8}}>
            {activeWorkers.length === 0
              ? <span>No active workers registered.<br/>Add workers in the Workers tab first.</span>
              : <span>No register for {viewDate}.<br/>Tap <strong style={{color:"var(--accent)"}}>Take Register</strong> to log who's on site today.</span>}
          </div>
          {savedDates.length > 0 && (
            <div className="card" style={{padding:"14px 16px"}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"10px"}}>Past Registers</div>
              <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                {savedDates.slice(0,10).map(dt => {
                  const r = allRegs[dt];
                  const pct = r.total ? Math.round((r.present/r.total)*100) : 0;
                  return (
                    <button key={dt} onClick={()=>setViewDate(dt)}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"5px",cursor:"pointer",textAlign:"left",width:"100%"}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",color:"var(--text)",fontWeight:"700"}}>{dt}</span>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:pct>=90?"var(--green)":pct>=70?"var(--amber)":"var(--red)"}}>{r.present}/{r.total} present · {pct}%</span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  TEAM ATTENDANCE VIEW  — GPS clock-in/out + workload + history
// ══════════════════════════════════════════════════════════
function TeamAttendanceView({ site, workers, setWorkers, team, wps, projectId, showToast }) {
  const { useState, useMemo } = React;
  // workers = on-site workforce registry (masons, labourers etc.)
  // team    = professional team (PM, SE, AR etc.) — used only in Workload tab
  const activeWorkers = workers.filter(w => (w.status||"active") === "active");
  const [attTab, setAttTab] = useState("today");
  const todayStr = new Date().toISOString().slice(0,10);
  const [attRecords, setAttRecords] = useState(() => loadAttendance(projectId));
  const todayRecs = attRecords.filter(r => r.date === todayStr);
  const [attLoading, setAttLoading] = useState({});
  const [attMsg, setAttMsg] = useState({});

  // Refresh records when projectId changes
  React.useEffect(() => { setAttRecords(loadAttendance(projectId)); }, [projectId]);

  const doClockAction = async (m, action) => {
    setAttLoading(l => ({ ...l, [m.id + action]: true }));
    setAttMsg(msgs => ({ ...msgs, [m.id]: "" }));
    const result = await gpsClockAction({
      action,
      workerId: m.id,
      workerName: m.name,
      projectId,
      siteLat: site.lat ? parseFloat(site.lat) : null,
      siteLng: site.lng ? parseFloat(site.lng) : null,
      radiusM: site.radiusM ? parseInt(site.radiusM) : 200
    });
    setAttLoading(l => ({ ...l, [m.id + action]: false }));
    if (result.ok) {
      setAttRecords(loadAttendance(projectId));
      showToast((action === "in" ? "✅ Clocked in: " : "🕐 Clocked out: ") + m.name + (result.distanceM != null ? " · " + result.distanceM + "m from site" : ""));
      setAttMsg(msgs => ({ ...msgs, [m.id]: action === "in" ? "✅ On site" + (result.distanceM != null ? " · " + result.distanceM + "m" : "") : "🕐 Clocked out" }));
    } else {
      setAttMsg(msgs => ({ ...msgs, [m.id]: "⚠ " + result.error }));
      showToast("⚠ " + result.error);
    }
  };

  const getWorkerStatus = (memberId) => {
    const recs = todayRecs.filter(r => r.workerId === memberId);
    return recs.length ? recs[recs.length - 1] : null;
  };

  const onSiteNow = todayRecs.filter(r =>
    r.action === "in" &&
    !todayRecs.some(rr => rr.workerId === r.workerId && rr.action === "out" && rr.ts > r.ts)
  ).length;

  const needInduction = workers.filter(w => !w.inductionDate && (w.status||"active")==="active").length;

  return (
    <div style={{animation:"fadeUp 0.2s ease"}}>
      {/* ── HEADER STATS ── */}
      <div className="mob-hero card" style={{marginBottom:"14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"4px"}}>👷 On-Site Workforce &amp; GPS Attendance</div>
            <div style={{fontSize:"18px",fontWeight:"900",color:"var(--text)"}}>{site.name}</div>
            {!site.lat && <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--amber)",marginTop:"4px"}}>⚠ No geofence set — tap ⚙ Edit to add site coordinates</div>}
            {site.lat  && <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--green)",marginTop:"4px"}}>📍 Geofence active · {site.radiusM||200}m radius</div>}
          </div>
          <div style={{textAlign:"center",flexShrink:0}}>
            <div style={{fontSize:"28px",fontWeight:"900",color:"var(--green)",lineHeight:1}}>{onSiteNow}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"7px",color:"var(--text4)",marginTop:"2px"}}>ON SITE NOW</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"0",borderTop:"1px solid var(--border)",paddingTop:"12px"}}>
          {[
            {v:activeWorkers.length,                        l:"REGISTERED",       c:"var(--accent)"},
            {v:todayRecs.filter(r=>r.action==="in").length, l:"CLOCK-INS TODAY",  c:"var(--green)"},
            {v:needInduction,                               l:"NEED INDUCTION",   c: needInduction>0?"var(--red)":"var(--green)"},
            {v:wps.filter(w=>w.status!=="done").length,      l:"ACTIVE WPS",     c:"var(--accent)"},
          ].map((s,i) => (
            <div key={i} style={{textAlign:"center",borderLeft:i>0?"1px solid var(--border)":"none"}}>
              <div style={{fontSize:"22px",fontWeight:"900",color:s.c,lineHeight:1}}>{s.v}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"7px",color:"var(--text4)",marginTop:"3px"}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── TAB STRIP ── */}
      <div style={{display:"flex",gap:"6px",marginBottom:"14px",borderBottom:"1px solid var(--border)",paddingBottom:"10px"}}>
        {[["today","📅 Today"],["dailyreg","📋 Daily Register"],["history","📜 Log"],["team","📊 Workload"],["registry","👷 Workers"]].map(([k,l]) => (
          <button key={k} className="chip" onClick={() => setAttTab(k)}
            style={{borderColor:attTab===k?"var(--accent)":"var(--border)",color:attTab===k?"var(--accent)":"var(--text3)",background:attTab===k?"var(--accent-bg)":"var(--surface)"}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── TODAY TAB ── */}
      {attTab === "today" && (
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {activeWorkers.map(m => {
            const lastRec  = getWorkerStatus(m.id);
            const isIn     = lastRec && lastRec.action === "in";
            const ldIn     = attLoading[m.id + "in"];
            const ldOut    = attLoading[m.id + "out"];
            const msg      = attMsg[m.id];
            const bc       = isIn ? "var(--green)" : lastRec ? "var(--text4)" : "var(--border)";
            return (
              <div key={m.id} className="card" style={{padding:"14px",borderLeft:`3px solid ${bc}`}}>
                <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                  <div style={{width:"44px",height:"44px",borderRadius:"12px",background:`${bc}15`,border:`2px solid ${bc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:"900",color:bc,fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>{m.id}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"15px",fontWeight:"800",color:"var(--text)",lineHeight:1.2}}>{m.name}</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",marginTop:"1px"}}>{m.trade||m.role} {m.org ? "· "+m.org : ""}</div>
                    {msg && (
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:msg.startsWith("⚠")?"var(--red)":"var(--green)",marginTop:"3px"}}>{msg}</div>
                    )}
                    {!msg && lastRec && (
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:isIn?"var(--green)":"var(--text4)",marginTop:"3px"}}>
                        {isIn ? "✅ On site since " : "🕐 Clocked out "}{new Date(lastRec.ts).toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit"})}
                        {lastRec.verified  && <span style={{color:"var(--green)"}}> · GPS ✓</span>}
                        {lastRec.distanceM != null && <span> · {lastRec.distanceM}m</span>}
                      </div>
                    )}
                    {!msg && !lastRec && (
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",marginTop:"3px"}}>Not clocked in today</div>
                    )}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:"6px",flexShrink:0}}>
                    {!isIn && (
                      <button className="btn-primary" style={{padding:"7px 14px",fontSize:"10px",opacity:ldIn?0.6:1}}
                        onClick={() => doClockAction(m,"in")} disabled={ldIn}>
                        {ldIn ? "📡 GPS…" : "✅ Clock In"}
                      </button>
                    )}
                    {isIn && (
                      <button className="btn-ghost" style={{padding:"7px 14px",fontSize:"10px",opacity:ldOut?0.6:1,borderColor:"var(--amber)",color:"var(--amber)"}}
                        onClick={() => doClockAction(m,"out")} disabled={ldOut}>
                        {ldOut ? "📡 GPS…" : "🕐 Clock Out"}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
          {workers.length === 0 && (
            <div className="card" style={{padding:"32px",textAlign:"center",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",lineHeight:1.7}}>
              No workers registered yet.<br/>Go to the Registry tab to add your site workforce.
            </div>
          )}
          {workers.length > 0 && activeWorkers.length === 0 && (
            <div className="card" style={{padding:"24px",textAlign:"center",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px"}}>
              All workers are inactive or suspended. Update status in Registry tab.
            </div>
          )}
        </div>
      )}

      {/* ── DAILY REGISTER TAB ── */}
      {attTab === "dailyreg" && (
        <DailyRegisterTab
          workers={workers}
          projectId={projectId}
          todayStr={todayStr}
          showToast={showToast}
        />
      )}

      {/* ── WORKLOAD TAB ── */}
      {attTab === "team" && (
        <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
          {team.map(m => {
            const assignments = wps.filter(w => w.assignee === m.id && w.status !== "done");
            const lc = m.load > 90 ? "var(--red)" : m.load > 80 ? "var(--amber)" : "var(--green)";
            return (
              <div key={m.id} className="mob-member-card">
                <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"12px"}}>
                  <div style={{width:"52px",height:"52px",borderRadius:"14px",background:`${lc}15`,border:`2px solid ${lc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",fontWeight:"900",color:lc,fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>{m.id}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"16px",fontWeight:"800",color:"var(--text)",lineHeight:1.2}}>{m.name}</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",marginTop:"2px"}}>{m.role}</div>
                    <Badge label={m.org} color={SCC["in-progress"]}/>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:"30px",fontWeight:"900",color:lc,lineHeight:1}}>{m.load}%</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"7px",color:"var(--text4)"}}>LOAD</div>
                  </div>
                </div>
                <Bar value={m.load} color={lc} h={6}/>
                {assignments.length > 0 && (
                  <div style={{marginTop:"12px"}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:"8px"}}>Active Packages · {assignments.length}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                      {assignments.map(w => (
                        <div key={w.id} style={{display:"flex",gap:"10px",alignItems:"center",padding:"10px 12px",background:"var(--bg)",borderRadius:"12px",borderLeft:`3px solid ${SCC[w.status]||"#A0AEC0"}`}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:"12px",fontWeight:"700",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.name}</div>
                            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",marginTop:"2px"}}>{w.phase} · {w.trade}</div>
                          </div>
                          <Badge label={w.status} color={SCC[w.status]||"#A0AEC0"}/>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── HISTORY TAB ── */}
      {attTab === "history" && (
        <div>
          {attRecords.length === 0 && (
            <div className="card" style={{padding:"32px",textAlign:"center",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px"}}>No attendance records yet.</div>
          )}
          {attRecords.length > 0 && (
            <div className="card" style={{padding:"14px",overflowX:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                <SectionTitle>Attendance Log — {attRecords.length} records</SectionTitle>
                <button className="btn-ghost" style={{fontSize:"9px",padding:"4px 10px"}} onClick={() => {
                  const csv = ["ID,Name,Action,Date,Time,Lat,Lng,Accuracy,Distance(m),Verified"].concat(
                    [...attRecords].reverse().map(r =>
                      `${r.workerId},${r.workerName},${r.action},${r.date},${new Date(r.ts).toLocaleTimeString("en-KE")},${r.lat||""},${r.lng||""},${r.accuracy||""},${r.distanceM!=null?r.distanceM:""},${r.verified?"Yes":"No"}`
                    )
                  ).join("\n");
                  const a = document.createElement("a");
                  a.href = "data:text/csv," + encodeURIComponent(csv);
                  a.download = "mradi_attendance_" + todayStr + ".csv";
                  a.click();
                }}>⬇ Export CSV</button>
              </div>
              <table>
                <thead><tr><th>Worker</th><th>Action</th><th>Date</th><th>Time</th><th className="hide-mobile">Accuracy</th><th className="hide-mobile">Distance</th><th>Verified</th></tr></thead>
                <tbody>
                  {[...attRecords].reverse().slice(0,100).map(r => (
                    <tr key={r.id}>
                      <td style={{fontWeight:"700",color:"var(--text)"}}>{r.workerName} <span style={{color:"var(--text4)",fontSize:"9px"}}>({r.workerId})</span></td>
                      <td><Badge label={r.action==="in"?"CLOCK IN":"CLOCK OUT"} color={r.action==="in"?"var(--green)":"var(--text4)"}/></td>
                      <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px"}}>{r.date}</td>
                      <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px"}}>{new Date(r.ts).toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit"})}</td>
                      <td className="hide-mobile" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--text3)"}}>{r.accuracy != null ? r.accuracy + "m" : "—"}</td>
                      <td className="hide-mobile" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--text3)"}}>{r.distanceM != null ? r.distanceM + "m" : "—"}</td>
                      <td>{r.verified ? <Badge label="GPS ✓" color="var(--green)"/> : <Badge label="No fence" color="var(--text4)"/>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* ── REGISTRY TAB ── */}
      {attTab === "registry" && (
        <WorkforceRegistryView workers={workers} setWorkers={setWorkers} projectId={projectId} showToast={showToast}/>
      )}
    </div>
  );
}

//  WORKFORCE REGISTRY — full worker directory with onboarding
// ══════════════════════════════════════════════════════════

function WorkforceRegistryView({ workers, setWorkers, projectId, showToast }) {
  const { useState, useMemo } = React;
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterTrade, setFilterTrade] = useState("all");
  const [showAdd, setShowAdd] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const BLANK = { id:"", name:"", role:"", trade:"Labourer", org:"", phone:"", idNumber:"", emergencyContact:"", emergencyPhone:"", dailyRate:"", inductionDate:"", joinDate:today(), status:"active" };
  const [form, setForm] = useState({...BLANK});
  const up = (k,v) => setForm(f=>({...f,[k]:v}));

  const filtered = useMemo(() => {
    return workers.filter(m => {
      const q = search.toLowerCase();
      const matchSearch = !q || m.name?.toLowerCase().includes(q) || m.id?.toLowerCase().includes(q) || m.trade?.toLowerCase().includes(q) || m.role?.toLowerCase().includes(q) || m.phone?.includes(q);
      const matchStatus = filterStatus === "all" || (m.status||"active") === filterStatus;
      const matchTrade  = filterTrade  === "all" || m.trade === filterTrade;
      return matchSearch && matchStatus && matchTrade;
    });
  }, [workers, search, filterStatus, filterTrade]);

  const openAdd = () => { setForm({...BLANK, id:"W"+String(workers.length+1).padStart(3,"0")}); setEditIdx(null); setShowAdd(true); };
  const openEdit = (idx) => { setForm({...BLANK, ...workers[idx]}); setEditIdx(idx); setShowAdd(true); };

  const save = () => {
    if (!form.name.trim() || !form.id.trim()) { showToast("⚠ Name and ID are required"); return; }
    const idConflict = workers.some((m,i) => m.id === form.id.trim() && i !== editIdx);
    if (idConflict) { showToast("⚠ Worker ID already exists — use a unique ID"); return; }
    const next = [...workers];
    const worker = { ...form, id: form.id.trim(), name: form.name.trim() };
    if (editIdx !== null) { next[editIdx] = worker; } else { next.push(worker); }
    setWorkers(next);
    setShowAdd(false);
    showToast(editIdx !== null ? `✓ ${worker.name} updated` : `✓ ${worker.name} added to registry`);
  };

  const remove = (idx) => {
    if (!confirm("Remove " + workers[idx].name + " from this project?")) return;
    const next = workers.filter((_,i) => i !== idx);
    setWorkers(next);
    showToast("Worker removed");
  };

  const exportCSV = () => {
    const cols = ["ID","Name","Trade","Role","Organisation","Phone","ID Number","Daily Rate (KES)","Join Date","Induction Date","Status","Emergency Contact","Emergency Phone"];
    const rows = workers.map(m => [m.id,m.name,m.trade||"",m.role||"",m.org||"",m.phone||"",m.idNumber||"",m.dailyRate||"",m.joinDate||"",m.inductionDate||"",m.status||"active",m.emergencyContact||"",m.emergencyPhone||""].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","));
    const csv = [cols.join(","), ...rows].join("\n");
    const a = document.createElement("a"); a.href = "data:text/csv," + encodeURIComponent(csv); a.download = "workforce_registry.csv"; a.click();
  };

  const statusColor = { active:"var(--green)", inactive:"var(--text4)", suspended:"var(--red)" };
  const inducted = workers.filter(m => m.inductionDate).length;
  const active   = workers.filter(m => (m.status||"active") === "active").length;

  return (
    <div style={{animation:"fadeUp 0.2s ease"}}>
      {/* ── summary strip ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"16px"}}>
        {[
          {v:workers.length,       l:"Total workers", c:"var(--accent)"},
          {v:active,            l:"Active",         c:"var(--green)"},
          {v:inducted,          l:"Inducted",       c:"var(--amber)"},
          {v:workers.length-inducted, l:"Need induction",c:"var(--red)"},
        ].map((s,i)=>(
          <div key={i} className="card" style={{padding:"12px 14px"}}>
            <div style={{fontSize:"24px",fontWeight:"900",color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",marginTop:"3px",textTransform:"uppercase"}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* ── toolbar ── */}
      <div style={{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap",alignItems:"center"}}>
        <input className="field-input" placeholder="Search name, ID, trade, phone…" value={search} onChange={e=>setSearch(e.target.value)} style={{flex:"1 1 180px",minWidth:"140px",padding:"7px 10px",fontSize:"12px"}}/>
        <select className="field-select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{fontSize:"11px",padding:"7px 10px"}}>
          <option value="all">All status</option>
          {WORKER_STATUS.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
        </select>
        <select className="field-select" value={filterTrade} onChange={e=>setFilterTrade(e.target.value)} style={{fontSize:"11px",padding:"7px 10px"}}>
          <option value="all">All trades</option>
          {TRADES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <button className="btn-ghost" style={{fontSize:"10px",padding:"7px 12px"}} onClick={exportCSV}>⬇ CSV</button>
        <button className="btn-primary" style={{fontSize:"11px",padding:"7px 14px"}} onClick={openAdd}>+ Add Worker</button>
      </div>

      {/* ── worker cards ── */}
      {filtered.length === 0 && (
        <div className="card" style={{padding:"40px",textAlign:"center",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px"}}>
          {workers.length === 0 ? "No workers yet. Tap \"+ Add Worker\" to build your registry." : "No workers match your filters."}
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        {filtered.map((m) => {
          const realIdx = workers.findIndex(t=>t.id===m.id);
          const sc = statusColor[m.status||"active"] || "var(--text4)";
          const hasInduction = !!m.inductionDate;
          return (
            <div key={m.id} className="card" style={{padding:"14px",borderLeft:`3px solid ${sc}`}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:"12px"}}>
                <div style={{width:"42px",height:"42px",borderRadius:"10px",background:`${sc}15`,border:`1.5px solid ${sc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"900",color:sc,fontFamily:"'JetBrains Mono',monospace",flexShrink:0,lineHeight:1.1,textAlign:"center"}}>{m.id}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"2px"}}>
                    <span style={{fontSize:"15px",fontWeight:"800",color:"var(--text)"}}>{m.name}</span>
                    <Badge label={m.status||"active"} color={sc}/>
                    {!hasInduction && <Badge label="No induction" color="var(--red)"/>}
                    {hasInduction  && <Badge label="Inducted ✓"   color="var(--green)"/>}
                  </div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text3)",lineHeight:1.6}}>
                    {m.trade||m.role} {m.org ? "· "+m.org : ""}
                    {m.phone ? " · "+m.phone : ""}
                    {m.dailyRate ? " · KES "+Number(m.dailyRate).toLocaleString("en-KE")+"/day" : ""}
                  </div>
                  {m.idNumber && <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>ID: {m.idNumber}</div>}
                  {m.inductionDate && <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>Inducted: {m.inductionDate}</div>}
                </div>
                <div style={{display:"flex",gap:"6px",flexShrink:0}}>
                  <button className="btn-ghost" style={{padding:"5px 10px",fontSize:"10px"}} onClick={()=>openEdit(realIdx)}>Edit</button>
                  <button className="btn-danger" style={{padding:"5px 10px",fontSize:"10px"}} onClick={()=>remove(realIdx)}>✕</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Add / Edit modal ── */}
      {showAdd && (
        <div style={{position:"fixed",inset:0,background:"var(--overlay)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",animation:"fadeIn 0.15s"}}>
          <div style={{background:"var(--modal-bg)",border:"1px solid var(--border)",borderRadius:"12px",width:"min(560px,100%)",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.25)"}}>
            <div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:"16px",fontWeight:"900",color:"var(--text)"}}>{editIdx !== null ? "Edit Worker" : "Add Worker"}</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",marginTop:"2px"}}>All changes saved to project</div>
              </div>
              <button onClick={()=>setShowAdd(false)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:"18px",cursor:"pointer",padding:"4px"}}>✕</button>
            </div>
            <div style={{padding:"22px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
              {/* Required */}
              <Field label="Worker ID *" value={form.id} onChange={v=>up("id",v)} placeholder="e.g. W001" half/>
              <Field label="Full Name *" value={form.name} onChange={v=>up("name",v)} placeholder="e.g. James Mwangi" half/>
              <div className="field-group" style={{gridColumn:"span 1"}}>
                <label className="field-label">Trade</label>
                <select className="field-select" value={form.trade} onChange={e=>up("trade",e.target.value)}>
                  {TRADES.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <Field label="Role / Title" value={form.role} onChange={v=>up("role",v)} placeholder="e.g. Senior Mason" half/>
              <Field label="Organisation / Sub-contractor" value={form.org} onChange={v=>up("org",v)} placeholder="e.g. Kamau Steel Works"/>
              <Field label="Phone (M-Pesa / WhatsApp)" value={form.phone} onChange={v=>up("phone",v)} placeholder="+254 7XX XXX XXX" half/>
              <Field label="National ID / Passport No." value={form.idNumber} onChange={v=>up("idNumber",v)} placeholder="e.g. 12345678" half/>
              <Field label="Daily Rate (KES)" value={form.dailyRate} onChange={v=>up("dailyRate",v)} type="number" half/>
              <Field label="Join Date" value={form.joinDate} onChange={v=>up("joinDate",v)} type="date" half/>
              <Field label="Induction Date" value={form.inductionDate} onChange={v=>up("inductionDate",v)} type="date" half/>
              {/* Status */}
              <div className="field-group" style={{gridColumn:"span 1"}}>
                <label className="field-label">Status</label>
                <select className="field-select" value={form.status} onChange={e=>up("status",e.target.value)}>
                  {WORKER_STATUS.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
                </select>
              </div>
              <div style={{gridColumn:"span 2",height:"1px",background:"var(--border)",margin:"6px 0"}}/>
              <Field label="Emergency Contact Name" value={form.emergencyContact} onChange={v=>up("emergencyContact",v)} placeholder="e.g. Mary Wanjiku" half/>
              <Field label="Emergency Contact Phone" value={form.emergencyPhone} onChange={v=>up("emergencyPhone",v)} placeholder="+254 7XX XXX XXX" half/>
            </div>
            <div style={{padding:"14px 22px",borderTop:"1px solid var(--border)",display:"flex",gap:"10px",justifyContent:"flex-end"}}>
              <button className="btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
              <button className="btn-primary" onClick={save}>{editIdx !== null ? "Save Changes" : "Add to Registry"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
