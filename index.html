                        <label className="field-label">Company / Subcontractor</label>
                        <input className="field-input" value={w.company||""} onChange={e=>{const wf=[...form.workforce];wf[i]={...wf[i],company:e.target.value};setForm(f=>({...f,workforce:wf}));}} placeholder="e.g. Kamau Steel Works"/>
                      </div>
                      <div className="field-group" style={{marginBottom:0}}>
                        <label className="field-label">Count</label>
                        <input className="field-input" type="number" min="0" value={w.count||0} onChange={e=>{const wf=[...form.workforce];wf[i]={...wf[i],count:Number(e.target.value)};const total=wf.reduce((s,x)=>s+(Number(x.count)||0),0);setForm(f=>({...f,workforce:wf,gangsPresent:total}));}} style={{textAlign:"center"}}/>
                      </div>
                    </div>
                    <div style={{marginTop:"8px"}}>
                      <label className="field-label">Notes (optional)</label>
                      <input className="field-input" value={w.notes||""} onChange={e=>{const wf=[...form.workforce];wf[i]={...wf[i],notes:e.target.value};setForm(f=>({...f,workforce:wf}));}} placeholder="e.g. Arrived late, working overtime, induction done"/>
                    </div>
                  </div>
                ))}
                {(form.workforce||[]).length>0&&(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--purple)0D",border:"1px solid var(--purple)33",borderRadius:"5px",marginBottom:"8px"}}>
                    <span style={{fontSize:"10px",color:"var(--purple)",fontFamily:"'JetBrains Mono',monospace",fontWeight:"700"}}>TOTAL HEADCOUNT</span>
                    <span style={{fontSize:"18px",fontWeight:"900",color:"var(--purple)",fontFamily:"'JetBrains Mono',monospace"}}>{(form.workforce||[]).reduce((s,w)=>s+(Number(w.count)||0),0)}</span>
                  </div>
                )}
                <button className="btn-add" style={{borderColor:"var(--purple)55",color:"var(--purple)",background:"var(--purple)08"}} onClick={()=>setForm(f=>({...f,workforce:[...(f.workforce||[]),{trade:"Concrete",company:"",count:0,notes:""}]}))}>+ Add Gang / Trade</button>
              </div>
              <div className="edit-section">
                <div className="edit-section-title">📸 Site Photos</div>
                <div style={{fontSize:"10px",color:"var(--text3)",marginBottom:"10px",lineHeight:1.5}}>Attach photos from your camera or gallery. Stored locally with this entry. Click to add a caption.</div>
                {(form.photos||[]).length>0&&(
                  <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"12px"}}>
                    {(form.photos||[]).map((p,i)=>(
                      <div key={i} style={{position:"relative",width:"90px",flexShrink:0}}>
                        <div onClick={()=>setLightbox({photos:form.photos,index:i})} style={{width:"90px",height:"90px",borderRadius:"6px",overflow:"hidden",border:"1px solid var(--border2)",cursor:"pointer",position:"relative"}}>
                          <img src={p.url||p.src} alt={p.caption||"Photo"} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                          {p._cloud&&<div style={{position:"absolute",top:"3px",left:"3px",background:"rgba(0,0,0,0.55)",borderRadius:"3px",padding:"1px 4px",fontSize:"7px",color:"#fff",fontFamily:"'JetBrains Mono',monospace"}}>☁</div>}
                        </div>
                        <input className="field-input" value={p.caption||""} onChange={e=>{const ph=[...form.photos];ph[i]={...ph[i],caption:e.target.value};setForm(f=>({...f,photos:ph}));}} placeholder="Caption..." style={{fontSize:"8px",padding:"3px 5px",marginTop:"3px",width:"100%"}}/>
                        <button onClick={()=>setForm(f=>({...f,photos:f.photos.filter((_,j)=>j!==i)}))} style={{position:"absolute",top:"3px",right:"3px",background:"var(--red)",border:"none",borderRadius:"50%",width:"18px",height:"18px",cursor:"pointer",color:"#fff",fontSize:"11px",fontWeight:"900",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                  <label style={{flex:1,minWidth:"140px",display:"flex",alignItems:"center",justifyContent:"center",gap:"7px",padding:"10px 14px",background:"var(--accent)10",border:"1px dashed var(--accent)55",color:uploading?"var(--text4)":"var(--accent)",fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",borderRadius:"4px",cursor:uploading?"not-allowed":"pointer",pointerEvents:uploading?"none":"auto"}}>
                    <span style={{fontSize:"14px"}}>{uploading?"⟳":"📁"}</span> {uploading?"Uploading…":"Gallery / File"}
                    <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={async e=>{
                      const files=e.target.files;
                      if(!files?.length) return;
                      await addPhotos(files, currentUserId);
                      e.target.value="";
                    }}/>
                  </label>
                  <label style={{flex:1,minWidth:"140px",display:"flex",alignItems:"center",justifyContent:"center",gap:"7px",padding:"10px 14px",background:"var(--green)10",border:"1px dashed var(--green)55",color:uploading?"var(--text4)":"var(--green)",fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",borderRadius:"4px",cursor:uploading?"not-allowed":"pointer",pointerEvents:uploading?"none":"auto"}}>
                    <span style={{fontSize:"14px"}}>{uploading?"⟳":"📷"}</span> {uploading?"Uploading…":"Camera"}
                    <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={async e=>{
                      const files=e.target.files;
                      if(!files?.length) return;
                      await addPhotos(files, currentUserId);
                      e.target.value="";
                    }}/>
                  </label>
                </div>
                {(form.photos||[]).length===0&&!uploading&&<div style={{textAlign:"center",padding:"12px",fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginTop:"4px"}}>No photos attached yet</div>}
                {uploading&&<div style={{textAlign:"center",padding:"10px",fontSize:"9px",color:"var(--accent)",fontFamily:"'JetBrains Mono',monospace",marginTop:"4px",animation:"fadeIn 0.2s"}}>☁ Uploading to cloud…</div>}
                {(form.photos||[]).some(p=>p._cloud)&&<div style={{fontSize:"8px",color:"var(--green)",fontFamily:"'JetBrains Mono',monospace",marginTop:"6px",textAlign:"center"}}>☁ Photos saved to cloud — shareable on any device</div>}
                {(form.photos||[]).some(p=>!p._cloud&&p.src?.startsWith("data:"))&&<div style={{fontSize:"8px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginTop:"4px",textAlign:"center"}}>⚠ Some photos are device-only (offline upload). Connect to sync.</div>}
              </div>
              <div className="edit-section">
                <div className="edit-section-title">⚠️ Issues & Observations</div>
                <Field label="Issues / Delays / Safety Observations" value={form.issues} onChange={v=>setForm(f=>({...f,issues:v}))} textarea placeholder="Any issues, delays or safety matters..."/>
              </div>
            </div>
            <div className="save-bar">
              <button className="btn-primary" onClick={()=>{setDiaries(ds=>[...ds,form]);setShowAdd(false);setForm(null);}}>💾 Save Entry</button>
              <button className="btn-ghost" onClick={()=>{setShowAdd(false);setForm(null);}}>Cancel</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── BUDGET VS ACTUAL COST TRACKER ─────────────────────────────────────────────
function BudgetView({site,phases,provisions,materials,wps}){
  const [activeTab,setActiveTab]=useState("summary");
  const [expandedPhase,setExpandedPhase]=useState(null);

  // ── Compute totals ──────────────────────────────────────────────────────────
  const totalBudget   = phases.reduce((s,p)=>s+(p.budget||0),0);
  const totalSpent    = phases.reduce((s,p)=>s+(p.spent||0),0);
  const contractVal   = site?.contractValue||0;

  // Provisions impact
  const voApproved    = (provisions?.variations||[]).filter(v=>v.status==="approved").reduce((s,v)=>s+(v.amount||0),0);
  const voSubmitted   = (provisions?.variations||[]).filter(v=>v.status==="submitted"||v.status==="pending").reduce((s,v)=>s+(v.amount||0),0);
  const psInstructed  = (provisions?.provisionalSums||[]).reduce((s,p)=>s+(p.instructed||0),0);
  const pcActual      = (provisions?.primeCost||[]).reduce((s,p)=>s+(p.actual||p.adjusted||p.scheduled||0),0);
  const dwTotal       = (provisions?.dayworks||[]).filter(d=>d.status==="approved").reduce((s,d)=>s+(d.labour||0)+(d.plant||0)+(d.materials||0),0);
  const contingencyUsed = provisions?.contingency?.expended||0;
  const contingencyAlloc= provisions?.contingency?.allocated||0;

  const adjustedContract = contractVal + voApproved + voSubmitted;
  const forecastFinal    = totalBudget + voApproved;
  const variance         = adjustedContract - forecastFinal;
  const spentPct         = totalBudget>0 ? (totalSpent/totalBudget)*100 : 0;
  const contractSpentPct = contractVal>0 ? (totalSpent/contractVal)*100 : 0;

  // Phase health colour
  const phaseColor=(ph)=>{
    if(!ph.budget||ph.budget===0) return "var(--text3)";
    const ratio = ph.spent/ph.budget;
    if(ratio>1.1) return "#e74c3c";
    if(ratio>0.9) return "#f39c12";
    return "var(--accent)";
  };
  const phaseStatus=(ph)=>{
    if(!ph.budget||ph.budget===0) return {label:"No Budget",color:"var(--text3)"};
    const ratio = ph.spent/ph.budget;
    if(ratio>1.1) return {label:"Over Budget",color:"#e74c3c"};
    if(ratio>0.9) return {label:"Near Limit",color:"#f39c12"};
    if(ph.spent===0) return {label:"Not Started",color:"var(--text3)"};
    return {label:"On Track",color:"#27ae60"};
  };

  const fmtK=(n)=>{
    if(!n&&n!==0) return "—";
    if(Math.abs(n)>=1000000) return `KES ${(n/1000000).toFixed(2)}M`;
    if(Math.abs(n)>=1000) return `KES ${(n/1000).toFixed(0)}K`;
    return `KES ${n.toLocaleString()}`;
  };
  const pct=(a,b)=> b>0 ? Math.min(100,Math.round((a/b)*100)) : 0;

  // Spend by trade (from WPs + phases)
  const tradeMap={};
  wps.forEach(wp=>{
    const ph = phases.find(p=>p.id===wp.phase);
    if(!ph||!ph.budget) return;
    const t = wp.trade||"Other";
    if(!tradeMap[t]) tradeMap[t]={budget:0,spent:0};
    // Proportional allocation: WP share of phase budget
    const phaseWps = wps.filter(w=>w.phase===ph.id);
    const share = ph.budget / (phaseWps.length||1);
    const spentShare = ph.spent / (phaseWps.length||1);
    tradeMap[t].budget += share;
    tradeMap[t].spent  += spentShare;
  });
  const tradeRows = Object.entries(tradeMap).map(([trade,d])=>({trade,...d})).sort((a,b)=>b.budget-a.budget);

  const tabs=[
    {id:"summary", label:"📊 Summary"},
    {id:"phases",  label:"🏗 By Phase"},
    {id:"trades",  label:"🔧 By Trade"},
    {id:"provisions", label:"📋 Provisions"},
  ];

  return(
    <div style={{padding:"16px",maxWidth:"960px",margin:"0 auto"}}>
      {/* Header */}
      <div style={{marginBottom:"20px"}}>
        <h2 style={{fontSize:"clamp(16px,2.5vw,22px)",fontWeight:"800",margin:"0 0 4px 0",color:"var(--text)"}}>
          📊 Budget vs Actual Cost Tracker
        </h2>
        <p style={{margin:0,fontSize:"13px",color:"var(--text2)"}}>
          {site?.name||"Project"} · Contract Value {fmtK(contractVal)}
        </p>
      </div>

      {/* KPI Strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"10px",marginBottom:"20px"}}>
        {[
          {label:"Contract Value",value:fmtK(contractVal),color:"var(--accent)",sub:"Original"},
          {label:"Adjusted Contract",value:fmtK(adjustedContract),color:voApproved>0?"#f39c12":"var(--accent)",sub:`+${fmtK(voApproved)} VOs`},
          {label:"Total Spent",value:fmtK(totalSpent),color:"var(--text)",sub:`${pct(totalSpent,contractVal)}% of contract`},
          {label:"Remaining Budget",value:fmtK(Math.max(0,totalBudget-totalSpent)),color:"#27ae60",sub:`${pct(totalBudget-totalSpent,totalBudget)}% left`},
          {label:"Forecast Variance",value:fmtK(variance),color:variance>=0?"#27ae60":"#e74c3c",sub:variance>=0?"Within budget":"⚠ Over budget"},
        ].map(k=>(
          <div key={k.label} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px 12px"}}>
            <div style={{fontSize:"11px",color:"var(--text2)",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.5px"}}>{k.label}</div>
            <div style={{fontSize:"clamp(13px,1.8vw,17px)",fontWeight:"800",color:k.color,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.2}}>{k.value}</div>
            <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"3px"}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Overall spend bar */}
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"16px",marginBottom:"20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <span style={{fontSize:"13px",fontWeight:"700",color:"var(--text)"}}>Overall Project Spend</span>
          <span style={{fontSize:"12px",color:"var(--text2)",fontFamily:"'JetBrains Mono',monospace"}}>{fmtK(totalSpent)} / {fmtK(totalBudget)}</span>
        </div>
        <div style={{background:"var(--bg)",borderRadius:"6px",height:"18px",overflow:"hidden",position:"relative"}}>
          <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct(totalSpent,totalBudget)}%`,background:"linear-gradient(90deg,var(--accent),var(--accent2,var(--accent)))",borderRadius:"6px",transition:"width 0.6s"}}/>
          {voApproved>0&&<div style={{position:"absolute",left:`${pct(totalSpent,totalBudget)}%`,top:0,height:"100%",width:`${pct(voApproved,totalBudget)}%`,background:"rgba(243,156,18,0.5)",borderRadius:"0 6px 6px 0"}}/>}
        </div>
        <div style={{display:"flex",gap:"16px",marginTop:"8px",flexWrap:"wrap"}}>
          <span style={{fontSize:"11px",color:"var(--text3)"}}>■ <span style={{color:"var(--accent)"}}>Spent {pct(totalSpent,totalBudget)}%</span></span>
          {voApproved>0&&<span style={{fontSize:"11px",color:"var(--text3)"}}>■ <span style={{color:"#f39c12"}}>Approved VOs</span></span>}
          <span style={{fontSize:"11px",color:"var(--text3)"}}>□ Remaining {pct(totalBudget-totalSpent,totalBudget)}%</span>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:"6px",marginBottom:"16px",flexWrap:"wrap"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"7px 14px",borderRadius:"8px",border:`1px solid ${activeTab===t.id?"var(--accent)":"var(--border)"}`,background:activeTab===t.id?"var(--accent)12":"var(--card)",color:activeTab===t.id?"var(--accent)":"var(--text2)",fontWeight:activeTab===t.id?"700":"400",fontSize:"13px",cursor:"pointer"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── SUMMARY TAB ── */}
      {activeTab==="summary"&&(
        <div>
          {/* Cost waterfall cards */}
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"16px",marginBottom:"14px"}}>
            <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"14px",color:"var(--text)"}}>Cost Waterfall</div>
            {[
              {label:"Original Contract",amount:contractVal,type:"base",icon:"📋"},
              {label:"Approved Variations",amount:voApproved,type:"add",icon:"✅"},
              {label:"Submitted Variations",amount:voSubmitted,type:"warn",icon:"⏳"},
              {label:"Adjusted Contract",amount:contractVal+voApproved+voSubmitted,type:"total",icon:"="},
              {label:"Total Spent to Date",amount:totalSpent,type:"spent",icon:"💸"},
              {label:"Remaining to Spend",amount:(contractVal+voApproved+voSubmitted)-totalSpent,type:"remain",icon:"→"},
            ].map((row,i)=>{
              const colors={base:"var(--text)",add:"#27ae60",warn:"#f39c12",total:"var(--accent)",spent:"#e74c3c",remain:"#3498db"};
              const isTotal = row.type==="total";
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:i<5?"1px solid var(--border)":"none",borderTop:isTotal?"2px solid var(--border)":"none"}}>
                  <span style={{fontSize:"16px",width:"24px",textAlign:"center"}}>{row.icon}</span>
                  <span style={{flex:1,fontSize:"13px",color:"var(--text2)",fontWeight:isTotal?"700":"400"}}>{row.label}</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:isTotal?"800":"600",color:colors[row.type]||"var(--text)"}}>{fmtK(row.amount)}</span>
                </div>
              );
            })}
          </div>

          {/* Contingency status */}
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"16px"}}>
            <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"12px",color:"var(--text)"}}>🛡 Contingency Reserve</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
              <span style={{fontSize:"13px",color:"var(--text2)"}}>Allocated</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:"700"}}>{fmtK(contingencyAlloc)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
              <span style={{fontSize:"13px",color:"var(--text2)"}}>Committed</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",color:"#f39c12"}}>{fmtK(provisions?.contingency?.committed||0)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
              <span style={{fontSize:"13px",color:"var(--text2)"}}>Expended</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",color:"#e74c3c"}}>{fmtK(contingencyUsed)}</span>
            </div>
            <div style={{background:"var(--bg)",borderRadius:"6px",height:"12px",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct(contingencyUsed,contingencyAlloc)}%`,background:"#e74c3c",borderRadius:"6px"}}/>
            </div>
            <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"6px"}}>{pct(contingencyUsed,contingencyAlloc)}% of contingency used · {fmtK(contingencyAlloc-contingencyUsed)} remaining</div>
          </div>
        </div>
      )}

      {/* ── PHASES TAB ── */}
      {activeTab==="phases"&&(
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {phases.map(ph=>{
            const st = phaseStatus(ph);
            const spentP = pct(ph.spent,ph.budget);
            const isExp = expandedPhase===ph.id;
            const phWps = wps.filter(w=>w.phase===ph.id);
            return(
              <div key={ph.id} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",overflow:"hidden"}}>
                {/* Phase header row */}
                <div style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}} onClick={()=>setExpandedPhase(isExp?null:ph.id)}>
                  <div style={{flex:"0 0 auto"}}>
                    <span style={{fontSize:"11px",fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)",background:"var(--bg)",padding:"2px 6px",borderRadius:"4px"}}>{ph.id}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ph.name}</div>
                    <div style={{marginTop:"6px",background:"var(--bg)",borderRadius:"4px",height:"8px",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${spentP}%`,background:phaseColor(ph),borderRadius:"4px",transition:"width 0.5s"}}/>
                    </div>
                  </div>
                  <div style={{flex:"0 0 auto",textAlign:"right"}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:"800",color:phaseColor(ph)}}>{spentP}%</div>
                    <div style={{fontSize:"10px",color:st.color,fontWeight:"700"}}>{st.label}</div>
                  </div>
                  <span style={{color:"var(--text3)",fontSize:"12px"}}>{isExp?"▲":"▼"}</span>
                </div>

                {/* Expanded detail */}
                {isExp&&(
                  <div style={{borderTop:"1px solid var(--border)",padding:"12px 14px",background:"var(--bg)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"12px"}}>
                      {[
                        {label:"Budget",value:fmtK(ph.budget),color:"var(--text)"},
                        {label:"Spent",value:fmtK(ph.spent),color:phaseColor(ph)},
                        {label:"Variance",value:fmtK((ph.budget||0)-(ph.spent||0)),color:(ph.budget||0)>=(ph.spent||0)?"#27ae60":"#e74c3c"},
                      ].map(s=>(
                        <div key={s.label} style={{background:"var(--card)",borderRadius:"8px",padding:"10px"}}>
                          <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"3px"}}>{s.label}</div>
                          <div style={{fontSize:"13px",fontWeight:"800",fontFamily:"'JetBrains Mono',monospace",color:s.color}}>{s.value}</div>
                        </div>
                      ))}
                    </div>
                    {phWps.length>0&&(
                      <div>
                        <div style={{fontSize:"12px",fontWeight:"700",color:"var(--text2)",marginBottom:"6px"}}>Work Packages in this Phase</div>
                        {phWps.map(wp=>(
                          <div key={wp.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
                            <span style={{fontSize:"11px",color:"var(--text3)",width:"50px",fontFamily:"monospace"}}>{wp.id}</span>
                            <span style={{flex:1,fontSize:"12px",color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{wp.name}</span>
                            <span style={{fontSize:"11px",fontFamily:"'JetBrains Mono',monospace",color:wp.status==="done"?"#27ae60":wp.status==="in-progress"?"var(--accent)":"var(--text3)"}}>{wp.status}</span>
                            <div style={{width:"60px",background:"var(--border)",borderRadius:"4px",height:"6px",overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${wp.progress||0}%`,background:"var(--accent)"}}/>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── TRADES TAB ── */}
      {activeTab==="trades"&&(
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"16px"}}>
          <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"14px",color:"var(--text)"}}>Spend by Trade / Category</div>
          {tradeRows.map(t=>{
            const spentP = pct(t.spent,t.budget);
            const over = t.spent>t.budget;
            return(
              <div key={t.trade} style={{marginBottom:"14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                  <span style={{fontSize:"13px",fontWeight:"600",color:"var(--text)"}}>{t.trade}</span>
                  <span style={{fontSize:"12px",fontFamily:"'JetBrains Mono',monospace",color:over?"#e74c3c":"var(--text2)"}}>
                    {fmtK(t.spent)} / {fmtK(t.budget)} <span style={{color:over?"#e74c3c":"var(--text3)"}}>({spentP}%)</span>
                  </span>
                </div>
                <div style={{background:"var(--bg)",borderRadius:"4px",height:"10px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min(100,spentP)}%`,background:over?"#e74c3c":spentP>80?"#f39c12":"var(--accent)",borderRadius:"4px",transition:"width 0.5s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── PROVISIONS TAB ── */}
      {activeTab==="provisions"&&(
        <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
          {/* Variations summary */}
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"16px"}}>
            <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"12px",color:"var(--text)"}}>📝 Variations (VOs)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"8px",marginBottom:"12px"}}>
              {[
                {label:"Approved",value:fmtK(voApproved),color:"#27ae60"},
                {label:"Submitted",value:fmtK(voSubmitted),color:"#f39c12"},
                {label:"Total VOs",value:(provisions?.variations||[]).length,color:"var(--text)",sub:"items"},
              ].map(k=>(
                <div key={k.label} style={{background:"var(--bg)",borderRadius:"8px",padding:"10px"}}>
                  <div style={{fontSize:"11px",color:"var(--text3)"}}>{k.label}</div>
                  <div style={{fontSize:"15px",fontWeight:"800",color:k.color,fontFamily:"'JetBrains Mono',monospace"}}>{k.value}{k.sub?` ${k.sub}`:""}</div>
                </div>
              ))}
            </div>
            {(provisions?.variations||[]).slice(0,6).map(v=>(
              <div key={v.id} style={{display:"flex",gap:"8px",padding:"6px 0",borderBottom:"1px solid var(--border)",alignItems:"center"}}>
                <span style={{fontSize:"11px",fontFamily:"monospace",color:"var(--text3)",width:"56px"}}>{v.id}</span>
                <span style={{flex:1,fontSize:"12px",color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.description}</span>
                <span style={{fontSize:"12px",fontFamily:"'JetBrains Mono',monospace",fontWeight:"700",color:v.amount<0?"#27ae60":"var(--text)"}}>{fmtK(v.amount)}</span>
                <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"4px",background:v.status==="approved"?"#27ae6018":v.status==="submitted"?"#f39c1218":"var(--border)",color:v.status==="approved"?"#27ae60":v.status==="submitted"?"#f39c12":"var(--text3)",fontWeight:"700"}}>{v.status}</span>
              </div>
            ))}
            {(provisions?.variations||[]).length>6&&<div style={{fontSize:"12px",color:"var(--text3)",marginTop:"6px",textAlign:"center"}}>+{(provisions?.variations||[]).length-6} more — see Provisions view</div>}
          </div>

          {/* PS + PC Summary */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
            <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px"}}>
              <div style={{fontWeight:"700",fontSize:"13px",marginBottom:"10px",color:"var(--text)"}}>🔵 Provisional Sums</div>
              <div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}>Scheduled: <b style={{fontFamily:"monospace"}}>{fmtK((provisions?.provisionalSums||[]).reduce((s,p)=>s+(p.scheduled||0),0))}</b></div>
              <div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}>Instructed: <b style={{fontFamily:"monospace",color:"var(--accent)"}}>{fmtK(psInstructed)}</b></div>
              <div style={{fontSize:"12px",color:"var(--text2)"}}>Expended: <b style={{fontFamily:"monospace",color:"#e74c3c"}}>{fmtK((provisions?.provisionalSums||[]).reduce((s,p)=>s+(p.spent||0),0))}</b></div>
            </div>
            <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px"}}>
              <div style={{fontWeight:"700",fontSize:"13px",marginBottom:"10px",color:"var(--text)"}}>🟡 Prime Cost Sums</div>
              <div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}>Scheduled: <b style={{fontFamily:"monospace"}}>{fmtK((provisions?.primeCost||[]).reduce((s,p)=>s+(p.scheduled||0),0))}</b></div>
              <div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}>Adjusted: <b style={{fontFamily:"monospace",color:"var(--accent)"}}>{fmtK((provisions?.primeCost||[]).reduce((s,p)=>s+(p.adjusted||p.scheduled||0),0))}</b></div>
              <div style={{fontSize:"12px",color:"var(--text2)"}}>Actual: <b style={{fontFamily:"monospace",color:"#e74c3c"}}>{fmtK(pcActual)}</b></div>
            </div>
          </div>

          {/* Dayworks */}
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px"}}>
            <div style={{fontWeight:"700",fontSize:"13px",marginBottom:"8px",color:"var(--text)"}}>⚒ Dayworks Total</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"18px",fontWeight:"800",color:"#f39c12"}}>{fmtK(dwTotal)}</div>
            <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}}>{(provisions?.dayworks||[]).filter(d=>d.status==="approved").length} approved daywork records</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── RE REPORT VIEW ────────────────────────────────────────────────────────────
function REReport({site,phases,wps,risks,snags,team,diaries,materials}){
  const [reportDate,setReportDate]=useState(today());
  const [reportPeriod,setReportPeriod]=useState("Weekly");
  const [narrative,setNarrative]=useState("");
  const [nextActions,setNextActions]=useState("");
  const [reNotes,setReNotes]=useState("");
  const [showForm,setShowForm]=useState(true);
  const re=team.find(m=>m.role==="Resident Engineer")||team[0]||{name:"RE",org:""};
  const totalBudget=phases.reduce((s,p)=>s+p.budget,0);
  const totalSpent=phases.reduce((s,p)=>s+p.spent,0);
  const totalProgress=phases.length?Math.round(phases.reduce((s,p)=>s+p.progress,0)/phases.length):0;
  const openRisks=risks.filter(r=>r.status!=="closed");
  const openSnags=snags.filter(s=>s.status==="open");
  const blockedWPs=wps.filter(w=>w.status==="blocked");
  const recentDiaries=[...diaries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const daysLeft=site.targetCompletion?Math.round((new Date(site.targetCompletion)-new Date())/864e5):null;
  const alertMats=materials.filter(m=>m.weeklyBurn&&Math.floor(m.onSite/m.weeklyBurn)<=3);

  return(
    <div style={{animation:"fadeUp 0.2s ease"}}>
      {/* Config bar */}
      <div className="card no-print" style={{padding:"14px 18px",marginBottom:"16px",display:"flex",gap:"12px",alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:"8px",alignItems:"center",flex:1,flexWrap:"wrap"}}>
          <div className="field-group" style={{marginBottom:0}}>
            <label className="field-label">Report Date</label>
            <input className="field-input" type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)} style={{width:"140px"}}/>
          </div>
          <div className="field-group" style={{marginBottom:0}}>
            <label className="field-label">Period</label>
            <select className="field-select" value={reportPeriod} onChange={e=>setReportPeriod(e.target.value)} style={{width:"120px"}}>
              {["Daily","Weekly","Fortnightly","Monthly"].map(o=><option key={o}>{o}</option>)}
            </select>
          </div>
          <button className="btn-ghost" style={{marginTop:"14px"}} onClick={()=>setShowForm(s=>!s)}>{showForm?"Hide Inputs ▲":"Show Inputs ▼"}</button>
        </div>
        <button className="btn-primary" style={{marginTop:"14px"}} onClick={()=>window.print()}>🖨️ Print / PDF</button>
      </div>

      {showForm&&(
        <div className="card no-print" style={{padding:"18px",marginBottom:"16px"}}>
          <div className="edit-section-title">✏️ RE Narrative Inputs</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
            <div>
              <label className="field-label">Progress Summary / Narrative</label>
              <textarea className="field-input" value={narrative} onChange={e=>setNarrative(e.target.value)} placeholder="Brief summary of works completed this period, progress achieved, key milestones..." style={{minHeight:"100px"}}/>
            </div>
            <div>
              <label className="field-label">Actions Required / Decisions Needed</label>
              <textarea className="field-input" value={nextActions} onChange={e=>setNextActions(e.target.value)} placeholder="List any pending decisions, approvals required, escalations needed..." style={{minHeight:"100px"}}/>
            </div>
            <div style={{gridColumn:"span 2"}}>
              <label className="field-label">RE Notes / Recommendations</label>
              <textarea className="field-input" value={reNotes} onChange={e=>setReNotes(e.target.value)} placeholder="Technical observations, recommendations, compliance matters..." style={{minHeight:"80px"}}/>
            </div>
          </div>
        </div>
      )}

      {/* ── PRINTABLE REPORT ── */}
      <div className="re-report-print card" style={{padding:"0",overflow:"hidden"}}>
        {/* Report header */}
        <div style={{background:"linear-gradient(135deg,#1a2744,#2d3a6b)",padding:"24px 28px",color:"#fff",position:"relative"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"4px",background:"linear-gradient(90deg,var(--red),var(--amber),var(--green),var(--accent))"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"16px"}}>
            <div>
              <div style={{fontSize:"10px",letterSpacing:"0.2em",textTransform:"uppercase",opacity:0.7,fontFamily:"'JetBrains Mono',monospace",marginBottom:"6px"}}>Resident Engineer's {reportPeriod} Report</div>
              <div style={{fontSize:"22px",fontWeight:"900",lineHeight:1.2,marginBottom:"4px"}}>{site.name}</div>
              <div style={{fontSize:"11px",opacity:0.75,fontFamily:"'JetBrains Mono',monospace"}}>{site.location}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:"11px",opacity:0.7,fontFamily:"'JetBrains Mono',monospace",marginBottom:"4px"}}>Report Date</div>
              <div style={{fontSize:"16px",fontWeight:"800",fontFamily:"'JetBrains Mono',monospace"}}>{fmtDate(reportDate)}</div>
              <div style={{fontSize:"10px",opacity:0.6,marginTop:"8px",fontFamily:"'JetBrains Mono',monospace"}}>Prepared by: {re.name}</div>
              <div style={{fontSize:"10px",opacity:0.6,fontFamily:"'JetBrains Mono',monospace"}}>{re.org||re.role}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:"20px",marginTop:"16px",paddingTop:"16px",borderTop:"1px solid rgba(255,255,255,0.15)",flexWrap:"wrap"}}>
            {[["Client",site.client||"—"],["Contractor",site.contractor||"—"],["Contract Value",fmtKES(site.contractValue)],["Target Completion",fmtDate(site.targetCompletion)]].map(([l,v])=>(
              <div key={l}>
                <div style={{fontSize:"8px",opacity:0.5,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'JetBrains Mono',monospace"}}>{l}</div>
                <div style={{fontSize:"12px",fontWeight:"700",marginTop:"2px"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{padding:"20px 28px"}}>
          {/* KPI ROW */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"20px"}} className="page-grid-4">
            {[
              {l:"Overall Progress",v:`${totalProgress}%`,c:"var(--accent)",sub:`${phases.filter(p=>p.status==="in-progress").length} phases active`},
              {l:"Budget Utilised",v:`${pct(totalSpent,totalBudget)}%`,c:pct(totalSpent,totalBudget)>95?"var(--red)":"var(--amber)",sub:`${fmtKES(totalSpent)} of ${fmtKES(totalBudget)}`},
              {l:"Open Risks",v:openRisks.length,c:openRisks.filter(r=>r.severity==="critical").length>0?"#E53E3E":"#D69E2E",sub:`${openRisks.filter(r=>r.severity==="critical").length} critical`},
              {l:"Days to Completion",v:daysLeft!==null?daysLeft:"—",c:daysLeft!=null&&daysLeft<180?"var(--amber)":"var(--accent)",sub:site.targetCompletion||"Not set"},
            ].map(k=>(
              <div key={k.l} style={{border:`1px solid ${k.c}33`,borderRadius:"8px",padding:"12px 14px",background:`${k.c}08`}}>
                <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"4px"}}>{k.l}</div>
                <div style={{fontSize:"22px",fontWeight:"900",color:k.c,lineHeight:1}}>{k.v}</div>
                <div style={{fontSize:"9px",color:"var(--text3)",marginTop:"3px",fontFamily:"'JetBrains Mono',monospace"}}>{k.sub}</div>
              </div>
            ))}
          </div>

          {/* PROGRESS NARRATIVE */}
          {narrative&&(
            <div style={{marginBottom:"20px"}}>
              <div style={{fontSize:"12px",fontWeight:"800",color:"var(--text)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"6px",borderBottom:"2px solid var(--accent)",paddingBottom:"4px"}}>Progress Summary</div>
              <p style={{fontSize:"12px",color:"var(--text)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{narrative}</p>
            </div>
          )}

          {/* PHASE PROGRESS TABLE */}
          <div style={{marginBottom:"20px"}}>
            <div style={{fontSize:"12px",fontWeight:"800",color:"var(--text)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px",borderBottom:"2px solid var(--accent)",paddingBottom:"4px"}}>Construction Phase Status</div>
            <table>
              <thead><tr><th>Phase</th><th>Description</th><th>Status</th><th>Progress</th><th>Budget</th><th>Spent</th><th>Variance</th></tr></thead>
              <tbody>
                {phases.map(ph=>{
                  const v=ph.budget-ph.spent,over=v<0;
                  return(
                    <tr key={ph.id}>
                      <td style={{fontWeight:"700",color:SCC[ph.status]||"#A0AEC0"}}>{ph.id}</td>
                      <td style={{color:"var(--text)",fontWeight:"600",maxWidth:"200px"}}>{ph.name}</td>
                      <td><Badge label={ph.status} color={SCC[ph.status]||"#A0AEC0"}/></td>
                      <td style={{width:"120px"}}>
                        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                          <div style={{flex:1,height:"5px",background:"var(--border)",borderRadius:"2px",overflow:"hidden"}}>
                            <div style={{width:`${ph.progress}%`,height:"100%",background:SCC[ph.status]||"#A0AEC0"}}/>
                          </div>
                          <span style={{color:SCC[ph.status]||"#A0AEC0",fontWeight:"700",fontSize:"9px"}}>{ph.progress}%</span>
                        </div>
                      </td>
                      <td>{fmtKES(ph.budget)}</td>
                      <td style={{color:over?"#E53E3E":"var(--text2)"}}>{fmtKES(ph.spent)}</td>
                      <td style={{fontWeight:"700",color:over?"#E53E3E":"#38A169"}}>{over?"− ":"+ "}{fmtKES(Math.abs(v))}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* RISKS & SNAGS 2-col */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"20px"}} className="page-grid-2">
            <div>
              <div style={{fontSize:"12px",fontWeight:"800",color:"var(--text)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px",borderBottom:"2px solid #E53E3E",paddingBottom:"4px"}}>Open Risks</div>
              {openRisks.length===0?<div style={{fontSize:"11px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",padding:"8px 0"}}>No open risks.</div>:
              openRisks.map(r=>(
                <div key={r.id} style={{padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                  <div style={{display:"flex",gap:"6px",marginBottom:"2px",flexWrap:"wrap"}}>
                    <Badge label={r.id} color={SCC[r.severity]||"#A0AEC0"}/>
                    <Badge label={r.severity} color={SCC[r.severity]||"#A0AEC0"}/>
                    <span style={{fontSize:"10px",fontWeight:"700",color:"var(--text)",flex:1}}>{r.title}</span>
                    <span style={{fontSize:"11px",fontWeight:"900",color:SCC[r.severity]||"#A0AEC0"}}>{r.probability}%</span>
                  </div>
                  <div style={{fontSize:"10px",color:"var(--text3)",marginLeft:"2px"}}>↳ {r.mitigation}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{fontSize:"12px",fontWeight:"800",color:"var(--text)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px",borderBottom:"2px solid var(--amber)",paddingBottom:"4px"}}>QA — Open Snags</div>
              {openSnags.length===0?<div style={{fontSize:"11px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",padding:"8px 0"}}>No open snags.</div>:
              openSnags.map(s=>(
                <div key={s.id} style={{padding:"7px 0",borderBottom:"1px solid var(--border)",display:"flex",gap:"8px",alignItems:"flex-start"}}>
                  <div style={{width:"3px",background:SCC[s.severity]||"#A0AEC0",alignSelf:"stretch",borderRadius:"2px",flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"11px",color:"var(--text)",fontWeight:"600"}}>{s.item}</div>
                    <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",marginTop:"1px"}}>{s.block} · Raised: {fmtDate(s.raised)}</div>
                  </div>
                  <Badge label={s.severity} color={SCC[s.severity]||"#A0AEC0"}/>
                </div>
              ))}
            </div>
          </div>

          {/* BLOCKED WPs */}
          {blockedWPs.length>0&&(
            <div style={{marginBottom:"20px",padding:"12px 16px",background:"#E53E3E0D",border:"1px solid #E53E3E33",borderRadius:"6px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"#E53E3E",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"8px"}}>⚠ Blocked Work Packages — Action Required</div>
              {blockedWPs.map(w=>(
                <div key={w.id} style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"4px",fontSize:"11px",color:"var(--text)"}}>
                  <Badge label={w.id} color="#E53E3E"/>
                  <span style={{flex:1}}>{w.name}</span>
                  <span style={{fontSize:"9px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>Depends on: {w.deps}</span>
                </div>
              ))}
            </div>
          )}

          {/* MATERIAL ALERTS */}
          {alertMats.length>0&&(
            <div style={{marginBottom:"20px",padding:"12px 16px",background:"color-mix(in srgb,var(--amber) 6%,transparent)",border:"1px solid color-mix(in srgb,var(--amber) 20%,transparent)",borderRadius:"6px"}}>
              <div style={{fontSize:"11px",fontWeight:"800",color:"var(--amber)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"8px"}}>📦 Material Stock Alerts</div>
              {alertMats.map(m=>{const wk=m.weeklyBurn?Math.floor(m.onSite/m.weeklyBurn):0;return(
                <div key={m.id} style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"4px",fontSize:"11px",color:"var(--text)"}}>
                  <Badge label={wk<=1?"CRITICAL":"LOW STOCK"} color={wk<=1?"var(--red)":"var(--amber)"}/>
                  <span style={{flex:1}}>{m.name}</span>
                  <span style={{fontSize:"9px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>{m.onSite} {m.unit} on site · {wk} week{wk!==1?"s":""} remaining</span>
                </div>
              );})}
            </div>
          )}

          {/* RECENT DIARY */}
          {recentDiaries.length>0&&(
            <div style={{marginBottom:"20px"}}>
              <div style={{fontSize:"12px",fontWeight:"800",color:"var(--text)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px",borderBottom:"2px solid #38A169",paddingBottom:"4px"}}>Recent Site Activity (Last {recentDiaries.length} Entries)</div>
              {recentDiaries.map(d=>(
                <div key={d.id} style={{display:"flex",gap:"10px",padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
                  <div style={{flexShrink:0,width:"90px"}}>
                    <div style={{fontSize:"10px",fontWeight:"700",color:"var(--text)",fontFamily:"'JetBrains Mono',monospace"}}>{fmtDate(d.date)}</div>
                    <div style={{fontSize:"9px",color:"var(--text4)"}}>👥 {d.gangsPresent} workers</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"11px",color:"var(--text)"}}>{(d.works||[])[0]?.description?.slice(0,120)||"—"}{(d.works||[])[0]?.description?.length>120?"…":""}</div>

            </div>
          )}

          {/* SIGNATURE BLOCK */}
          <div style={{marginTop:"28px",paddingTop:"20px",borderTop:"1px solid var(--border)",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"24px"}} className="page-grid-2">
            <div>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"4px"}}>Prepared by — Resident Engineer</div>
              <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)"}}>{re.name}</div>
              <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"16px"}}>{re.org||re.role}</div>
              <div style={{borderBottom:"1px solid var(--border2)",marginBottom:"4px",height:"32px"}}/>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace"}}>Signature &amp; Date</div>
            </div>
            <div>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"4px"}}>Acknowledged by — Project Manager</div>
              <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)"}}>{team.find(m=>m.id==="PM")?.name||"Project Manager"}</div>
              <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"16px"}}>{team.find(m=>m.id==="PM")?.org||""}</div>
              <div style={{borderBottom:"1px solid var(--border2)",marginBottom:"4px",height:"32px"}}/>
              <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace"}}>Signature &amp; Date</div>
            </div>
          </div>
          <div style={{marginTop:"16px",fontSize:"9px",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",textAlign:"center"}}>
            Generated by AHP Command Centre · {fmtDate(today())} · {site.PMC||"PMC"}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── INTEGRATION HUB ──────────────────────────────────────────────────────────
function IntegrationHub({proj,onImport,onClose,showToast}){
  const [tab,setTab]=useState("sync");
  const [importing,setImporting]=useState(false);
  const [importLog,setImportLog]=useState([]);

  const {site,phases=[],wps=[],risks=[],snags=[],team=[],diaries=[],materials=[]}=proj;
  const workers=proj.workers||[];

  /* ── HELPERS ── */
  const dl=(blob,name)=>{const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);};
  const dlText=(txt,name,mime="text/plain")=>dl(new Blob([txt],{type:mime}),name);
  const slug=site.name.replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"").slice(0,30);
  const log=msg=>setImportLog(l=>[{msg,ts:new Date().toLocaleTimeString()}, ...l.slice(0,29)]);

  /* ── EXCEL EXPORT ── */
  const exportExcel=()=>{
    const wb=XLSX.utils.book_new();
    // Sheet 1: Phases
    const wsPhases=XLSX.utils.json_to_sheet(phases.map(p=>({
      "Phase ID":p.id,"Phase Name":p.name,"Status":p.status,"Progress %":p.progress,
      "Start Date":p.startDate,"End Date":p.endDate,"Budget KES":p.budget,"Spent KES":p.spent,
      "Variance KES":p.budget-p.spent,"Lead":p.lead,"Description":p.description
    })));
    XLSX.utils.book_append_sheet(wb,wsPhases,"Phases");
    // Sheet 2: Work Packages
    const wsWPs=XLSX.utils.json_to_sheet(wps.map(w=>({
      "WP ID":w.id,"Phase":w.phase,"Trade":w.trade,"Work Package Name":w.name,
      "Status":w.status,"Priority":w.priority,"Progress %":w.progress,
      "Assignee":w.assignee,"Qty/Scope":w.qty,"Value":w.unit,"Dependencies":w.deps
    })));
    XLSX.utils.book_append_sheet(wb,wsWPs,"Work Packages");
    // Sheet 3: Risks
    const wsRisks=XLSX.utils.json_to_sheet(risks.map(r=>({
      "Risk ID":r.id,"Phase":r.phase,"Title":r.title,"Severity":r.severity,
      "Probability %":r.probability,"Status":r.status,"Owner":r.owner,
      "Impact":r.impact,"Mitigation":r.mitigation
    })));
    XLSX.utils.book_append_sheet(wb,wsRisks,"Risk Register");
    // Sheet 4: Snags
    const wsSnags=XLSX.utils.json_to_sheet(snags.map(s=>({
      "Snag ID":s.id,"Block":s.block,"Description":s.item,
      "Severity":s.severity,"Status":s.status,"Date Raised":s.raised
    })));
    XLSX.utils.book_append_sheet(wb,wsSnags,"Snags QA");
    // Sheet 5: Materials
    const wsMats=XLSX.utils.json_to_sheet(materials.map(m=>({
      "Material ID":m.id,"Name":m.name,"Category":m.category,"Unit":m.unit,
      "Supplier":m.supplier,"Total Ordered":m.totalOrdered,"Delivered":m.delivered,
      "On Site":m.onSite,"Consumed":m.consumed,"Planned Total":m.plannedConsumption,
      "Weekly Burn":m.weeklyBurn,"Last Delivery":m.lastDelivery,"Next Delivery":m.nextDelivery,
      "Weeks Remaining":m.weeklyBurn?Math.floor(m.onSite/m.weeklyBurn):"∞","Notes":m.notes
    })));
    XLSX.utils.book_append_sheet(wb,wsMats,"Materials");
    // Sheet 6: Workforce Registry (on-site workers)
    const wsWorkers=XLSX.utils.json_to_sheet(workers.map(w=>({
      "Worker ID":w.id,"Name":w.name,"Trade":w.trade||"","Role":w.role||"",
      "Organisation":w.org||"","Phone":w.phone||"","National ID":w.idNumber||"",
      "Daily Rate (KES)":w.dailyRate||"","Join Date":w.joinDate||"",
      "Induction Date":w.inductionDate||"","Status":w.status||"active",
      "Emergency Contact":w.emergencyContact||"","Emergency Phone":w.emergencyPhone||""
    })));
    XLSX.utils.book_append_sheet(wb,wsWorkers,"Workforce Registry");
    // Sheet 7: Professional Team
    const wsTeam=XLSX.utils.json_to_sheet(team.map(m=>({
      "ID":m.id,"Name":m.name,"Role":m.role,"Organisation":m.org,"Load %":m.load
    })));
    XLSX.utils.book_append_sheet(wb,wsTeam,"Project Team");
    // Sheet 7: Site Diary summary
    const wsDiary=XLSX.utils.json_to_sheet(diaries.map(d=>({
      "Entry ID":d.id,"Date":d.date,"Weather":d.weather,"Workers":d.gangsPresent,
      "Temperature":d.temperature,"Author":d.author,
      "Works Summary":(d.works||[]).map(w=>w.description).join(" | "),
      "Issues":d.issues,"Visitors":d.visitors,
      "Total Man-Hours":(d.works||[]).reduce((s,w)=>s+(w.manHours||0),0)
    })));
    XLSX.utils.book_append_sheet(wb,wsDiary,"Site Diary");
    XLSX.writeFile(wb,`${slug}_AHP_Export_${today()}.xlsx`);
    showToast("✓ Excel export downloaded");
  };

  /* ── UNIVERSAL IMPORT DISPATCHER ── */
  /* Detects file type and routes to the correct parser */
  const universalImport=(file)=>{
    if(!file){return;}
    const ext=(file.name||"").split(".").pop().toLowerCase();
    log(`⟳ Loading: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
    if(ext==="xer"){importP6XER(file);}
    else if(ext==="xml"){importXML(file);}
    else if(ext==="csv"){importCSV(file);}
    else if(ext==="xlsx"||ext==="xls"||ext==="xlsm"||ext==="ods"){importExcel(file);}
    else if(ext==="json"){importBackup(file);}
    else if(ext==="mpx"){importMPX(file);}
    else{log(`⚠ Unknown extension .${ext} — trying as Excel`);importExcel(file);}
  };

  /* ── FUZZY COLUMN FINDER ── */
  /* Finds a column value by trying multiple possible header names (case-insensitive, partial match) */
  const fuzz=(row,keys,def="")=>{
    const rk=Object.keys(row);
    for(const k of keys){
      const kl=k.toLowerCase();
      const found=rk.find(rkey=>rkey.toLowerCase()===kl||rkey.toLowerCase().includes(kl)||kl.includes(rkey.toLowerCase()));
      if(found!==undefined&&row[found]!==undefined&&row[found]!==""){return String(row[found]);}
    }
    return def;
  };
  const fuzzNum=(row,keys,def=0)=>Number(fuzz(row,keys,""))||def;

  /* Normalise status strings from any tool */
  const normStatus=s=>{
    if(!s)return"not-started";
    const l=s.toLowerCase().replace(/[_\s-]+/g,"");
    if(l.includes("complet")||l==="done"||l==="finished"||l==="tk_complete")return"done";
    if(l.includes("progress")||l.includes("active")||l==="tk_active"||l==="inprog")return"in-progress";
    if(l.includes("block")||l.includes("hold")||l.includes("suspend")||l==="tk_suspend")return"blocked";
    if(l.includes("risk")||l.includes("atrisk"))return"at-risk";
    return"not-started";
  };
  const normPriority=s=>{
    if(!s)return"medium";
    const l=s.toLowerCase();
    if(l.includes("crit")||l==="1000")return"critical";
    if(l.includes("high")||l==="750")return"high";
    if(l.includes("low")||l==="250")return"low";
    return"medium";
  };
  /* Convert P6/MSP date strings to ISO YYYY-MM-DD */
  const parseDate=s=>{
    if(!s||s==="")return"";
    try{
      // already ISO
      if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
      // P6 format: MM/DD/YYYY HH:MM or MM/DD/YYYY
      if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)){const p=s.split(/[\/ :]/);return`${p[2]}-${p[0].padStart(2,"0")}-${p[1].padStart(2,"0")}`;}
      // MSP: YYYY-MM-DDTHH:MM:SS
      if(/^\d{4}-\d{2}-\d{2}T/.test(s))return s.slice(0,10);
      // Try native Date
      const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);
    }catch{}
    return s.slice(0,10)||"";
  };

  /* ── EXCEL IMPORT (fuzzy column matching, any sheet layout) ── */
  const importExcel=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
        let imported={};let msgs=[];
        log(`✓ Opened workbook: ${wb.SheetNames.length} sheets — ${wb.SheetNames.join(", ")}`);

        wb.SheetNames.forEach(sName=>{
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sName],{defval:""});
          if(!rows.length)return;
          const sl=sName.toLowerCase().replace(/[\s_-]/g,"");

          /* WORK PACKAGES / TASKS / ACTIVITIES */
          if(sl.includes("work")||sl.includes("task")||sl.includes("activ")||sl.includes("wp")||sl.includes("package")){
            const newWPs=rows.filter(r=>fuzz(r,["WP ID","Task ID","Activity ID","ID","task_code","Name","Task Name","Activity Name","Work Package Name"],"")!=="").map((r,i)=>({
              id:fuzz(r,["WP ID","Task ID","Activity ID","ID","task_code"])||`WP${String(i+1).padStart(3,"0")}`,
              phase:fuzz(r,["Phase","WBS","Phase ID","wbs_name","WBS Phase"])||"PH1",
              trade:fuzz(r,["Trade","Discipline","Category","Resource Type"])||"Civil",
              name:fuzz(r,["Work Package Name","Task Name","Activity Name","Name","Description","task_name"])||`Task ${i+1}`,
              status:normStatus(fuzz(r,["Status","Task Status","status_code"])),
              priority:normPriority(fuzz(r,["Priority","priority_num"])),
              progress:fuzzNum(r,["Progress %","% Complete","phys_complete_pct","PercentComplete","Percent Complete","Complete %"]),
              assignee:fuzz(r,["Assignee","Assigned To","Resource","Owner","rsrc_short_name"])||"PM",
              qty:fuzz(r,["Qty/Scope","Scope","Quantity","Notes"])||"",
              unit:fuzz(r,["Value","Cost","Budget","Budgeted Cost"])||"KES 0",
              deps:fuzz(r,["Dependencies","Predecessors","Depends"])||""
            }));
            if(newWPs.length){imported.wps=(imported.wps||[]).concat(newWPs);msgs.push(`✓ ${newWPs.length} work packages from sheet "${sName}"`);}
          }

          /* PHASES / WBS */
          else if(sl.includes("phase")||sl.includes("wbs")||sl.includes("stage")||sl.includes("milestone")){
            const newPh=rows.filter(r=>fuzz(r,["Phase ID","ID","WBS ID","Code"],"")!=="").map((r,i)=>({
              id:fuzz(r,["Phase ID","ID","WBS ID","Code"])||`PH${i+1}`,
              name:fuzz(r,["Phase Name","Name","WBS Name","Description"])||`Phase ${i+1}`,
              status:normStatus(fuzz(r,["Status"])),
              progress:fuzzNum(r,["Progress %","% Complete","Percent Complete"]),
              startDate:parseDate(fuzz(r,["Start Date","Start","Planned Start","Baseline Start"])||""),
              endDate:parseDate(fuzz(r,["End Date","Finish","Planned Finish","Baseline Finish"])||""),
              budget:fuzzNum(r,["Budget KES","Budget","Planned Cost","Original Budget"]),
              spent:fuzzNum(r,["Spent KES","Spent","Actual Cost","Actual"]),
              lead:fuzz(r,["Lead","Owner","Responsible","Manager"])||"PM",
              description:fuzz(r,["Description","Notes","Remarks"])||""
            }));
            if(newPh.length){imported.phases=newPh;msgs.push(`✓ ${newPh.length} phases from sheet "${sName}"`);}
          }

          /* RISKS */
          else if(sl.includes("risk")){
            const newR=rows.filter(r=>fuzz(r,["Risk ID","ID","Title","Risk"],"")!=="").map((r,i)=>({
              id:fuzz(r,["Risk ID","ID","Ref"])||`R${String(i+1).padStart(3,"0")}`,
              phase:fuzz(r,["Phase","WBS"])||"PH1",
              title:fuzz(r,["Title","Risk","Description","Risk Description"])||"Unnamed Risk",
              severity:normPriority(fuzz(r,["Severity","Priority","Impact Level"])),
              probability:fuzzNum(r,["Probability %","Probability","Likelihood %","Likelihood"],50),
              status:normStatus(fuzz(r,["Status","Risk Status"])),
              owner:fuzz(r,["Owner","Assignee","Responsible"])||"PM",
              impact:fuzz(r,["Impact","Consequence","Effect"])||"",
              mitigation:fuzz(r,["Mitigation","Response","Control","Action"])||""
            }));
            if(newR.length){imported.risks=newR;msgs.push(`✓ ${newR.length} risks from sheet "${sName}"`);}
          }

          /* MATERIALS / RESOURCES */
          else if(sl.includes("material")||sl.includes("stock")||sl.includes("supply")){
            const newM=rows.filter(r=>fuzz(r,["Material ID","ID","Name","Material"],"")!=="").map((r,i)=>({
              id:fuzz(r,["Material ID","ID","Code"])||`M${String(i+1).padStart(3,"0")}`,
              name:fuzz(r,["Name","Material","Description","Item"])||"Material",
              category:fuzz(r,["Category","Type","Group"])||"Other",
              unit:fuzz(r,["Unit","UOM","Unit of Measure"])||"",
              supplier:fuzz(r,["Supplier","Vendor","Source"])||"",
              totalOrdered:fuzzNum(r,["Total Ordered","Ordered","PO Qty","Quantity Ordered"]),
              delivered:fuzzNum(r,["Delivered","Received","Qty Received"]),
              onSite:fuzzNum(r,["On Site","Stock","Qty On Site","Available"]),
              consumed:fuzzNum(r,["Consumed","Used","Qty Used"]),
              plannedConsumption:fuzzNum(r,["Planned Total","Total Required","Required Qty"]),
              weeklyBurn:fuzzNum(r,["Weekly Burn","Weekly Usage","Burn Rate"]),
              lastDelivery:parseDate(fuzz(r,["Last Delivery","Last Received"])||""),
              nextDelivery:fuzz(r,["Next Delivery","Expected Delivery","ETA"])||"",
              notes:fuzz(r,["Notes","Remarks","Comments"])||""
            }));
            if(newM.length){imported.materials=newM;msgs.push(`✓ ${newM.length} materials from sheet "${sName}"`);}
          }

          /* TEAM / RESOURCES */
          else if(sl.includes("team")||sl.includes("resource")||sl.includes("staff")||sl.includes("person")){
            const newT=rows.filter(r=>fuzz(r,["ID","Name","Resource Name","rsrc_name"],"")!=="").map((r,i)=>({
              id:fuzz(r,["ID","Initials","Code","rsrc_short_name"])||`R${i+1}`,
              name:fuzz(r,["Name","Resource Name","Full Name","rsrc_name"])||"Resource",
              role:fuzz(r,["Role","Position","Title","Discipline","Notes"])||"Resource",
              org:fuzz(r,["Organisation","Organization","Company","Firm","Group"])||"",
              load:fuzzNum(r,["Load %","Utilisation %","Allocation %","max_qty_per_hr"],0)
            }));
            if(newT.length){imported.team=newT;msgs.push(`✓ ${newT.length} team members from sheet "${sName}"`);}
          }

          /* SNAGS / PUNCH LIST / QA */
          else if(sl.includes("snag")||sl.includes("punch")||sl.includes("qa")||sl.includes("defect")||sl.includes("snagg")){
            const newS=rows.filter(r=>fuzz(r,["Snag ID","ID","Item","Description"],"")!=="").map((r,i)=>({
              id:fuzz(r,["Snag ID","ID","Ref","Punch ID"])||`SN${String(i+1).padStart(3,"0")}`,
              block:fuzz(r,["Block","Location","Area","Zone"])||"",
              item:fuzz(r,["Description","Item","Defect","Issue","Snag"])||"Snag",
              severity:normPriority(fuzz(r,["Severity","Priority","Type"])),
              status:fuzz(r,["Status","Snag Status"])||"open",
              raised:parseDate(fuzz(r,["Date Raised","Date","Raised","Created"])||today())
            }));
            if(newS.length){imported.snags=newS;msgs.push(`✓ ${newS.length} snags from sheet "${sName}"`);}
          }
        });

        if(Object.keys(imported).length===0){
          msgs.push("⚠ No recognised data found. Sheets seen: "+wb.SheetNames.join(", "));
          msgs.push("💡 Tip: Column headers are matched flexibly — any standard project schedule format should work.");
        }
        msgs.forEach(m=>log(m));
        if(Object.keys(imported).length>0){onImport(imported);showToast(`✓ Excel: ${Object.values(imported).flat().length} records imported`);}
      }catch(err){log("✗ Excel parse error: "+err.message);console.error(err);}
      setImporting(false);
    };
    reader.readAsArrayBuffer(file);
  };

  /* ── P6 XER IMPORT (any version) ── */
  /* Handles ERMHDR, TASK, PROJWBS, RSRC, TASKRSRC tables */
  const importP6XER=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const text=e.target.result;
        const lines=text.split(/\r?\n/);
        /* Parse XER into table map: {TABLE_NAME: [{col:val,...},...]} */
        const tables={};
        let curTable=null,curFields=[];
        for(const line of lines){
          if(line.startsWith("%T\t")){curTable=line.slice(3).trim();tables[curTable]=[];curFields=[];}
          else if(line.startsWith("%F\t")&&curTable){curFields=line.slice(3).split("\t");}
          else if(line.startsWith("%R\t")&&curTable&&curFields.length){
            const vals=line.slice(3).split("\t");
            const obj={};
            curFields.forEach((f,i)=>{obj[f]=(vals[i]||"").trim();});
            tables[curTable].push(obj);
          }
        }
        log(`✓ XER parsed: tables found — ${Object.keys(tables).join(", ")}`);
        let imported={};let msgs=[];

        /* ACTIVITIES → Work Packages */
        const tasks=(tables["TASK"]||[]).filter(t=>t.task_type!=="TT_WBS"&&t.task_name);
        if(tasks.length){
          /* Build WBS name lookup */
          const wbsMap={};
          (tables["PROJWBS"]||[]).forEach(w=>{wbsMap[w.wbs_id]=w;});
          const newWPs=tasks.map((t,i)=>({
            id:t.task_code||`WP${String(i+1).padStart(3,"0")}`,
            phase:(wbsMap[t.wbs_id]?.wbs_short_name)||"PH1",
            trade:fuzz(t,["rsrc_type","trade","discipline"])||"Civil",
            name:t.task_name||`Task ${i+1}`,
            status:normStatus(t.status_code),
            priority:normPriority(t.priority_num),
            progress:Number(t.phys_complete_pct)||0,
            assignee:fuzz(t,["rsrc_short_name","rsrc_id"])||"PM",
            qty:t.remain_drtn_hr_cnt?`${Math.round(Number(t.remain_drtn_hr_cnt)/8)}d remain`:"",
            unit:"KES 0",
            deps:""
          }));
          imported.wps=newWPs;
          msgs.push(`✓ ${newWPs.length} activities imported from P6 XER`);
        }

        /* WBS NODES → Phases */
        const wbsNodes=(tables["PROJWBS"]||[]).filter(w=>w.wbs_name);
        if(wbsNodes.length){
          const newPh=wbsNodes.map((w,i)=>({
            id:w.wbs_short_name||`PH${i+1}`,
            name:w.wbs_name,
            status:"in-progress",
            progress:0,
            startDate:"",endDate:"",
            budget:Number(w.orig_cost)||0,
            spent:Number(w.indep_remain_total_cost)||0,
            lead:"PM",description:""
          }));
          imported.phases=newPh;
          msgs.push(`✓ ${newPh.length} WBS phases imported`);
        }

        /* RESOURCES → Team */
        const rsrc=(tables["RSRC"]||[]).filter(r=>r.rsrc_name&&r.rsrc_type==="RT_Labor");
        if(rsrc.length){
          const newTeam=rsrc.map(r=>({
            id:r.rsrc_short_name||r.rsrc_id,
            name:r.rsrc_name,
            role:r.pobs_id||"Resource",
            org:r.clndr_id||"",
            load:Math.min(100,Math.round(Number(r.max_qty_per_hr||r.target_qty||1)*100))
          }));
          imported.team=newTeam;
          msgs.push(`✓ ${newTeam.length} resources imported as team`);
        }

        msgs.forEach(m=>log(m));

          if(summaries.length){

              deps:g(t,["PredecessorLink","Predecessor"])||""
            }));
            imported.wps=newWPs;msgs.push(`✓ ${newWPs.length} leaf tasks imported as work packages`);

          if(resources.length){

        else{log("⚠ No importable data found in XML file");}

  /* ── CSV IMPORT (P6 CSV export, generic schedule CSV) ── */
  const importCSV=(file)=>{

    reader.onload=e=>{
      try{
        const text=e.target.result;
        const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){log("⚠ CSV has no data rows");setImporting(false);return;}
        /* Detect delimiter: tab, comma, or semicolon */
        const delim=lines[0].includes("\t")?"\t":lines[0].includes(";")?";":","
        const headers=lines[0].split(delim).map(h=>h.replace(/^"|"$/g,"").trim());
        const rows=lines.slice(1).map(l=>{
          /* Handle quoted fields */
          const vals=[]; let cur=""; let inQ=false;
          for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'&&!inQ){inQ=true;}else if(c==='"'&&inQ){inQ=false;}else if(c===delim&&!inQ){vals.push(cur.trim());cur="";}else{cur+=c;}}
          vals.push(cur.trim());
          const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||"";});
          return obj;
        });
        log(`✓ CSV parsed: ${rows.length} rows, ${headers.length} columns`);
        /* Re-use Excel logic via a fake single-sheet workbook */
        const fakeWb={SheetNames:["Tasks"],Sheets:{Tasks:XLSX.utils.json_to_sheet(rows)}};
        /* Detect if this looks like tasks/activities */
        const hasName=headers.some(h=>/name|task|activ|work/i.test(h));
        const hasId=headers.some(h=>/id|code|ref/i.test(h));
        if(hasName||hasId){
          const newWPs=rows.filter(r=>fuzz(r,["Name","Task Name","Activity Name","task_name","ID","Code"],"")!=="").map((r,i)=>({
            id:fuzz(r,["ID","Task ID","Activity ID","Code","task_code"])||`WP${String(i+1).padStart(3,"0")}`,

            name:fuzz(r,["Name","Task Name","Activity Name","task_name","Description"])||`Task ${i+1}`,
            status:normStatus(fuzz(r,["Status","status_code","State"])),
            priority:normPriority(fuzz(r,["Priority","priority_num"])),
            progress:fuzzNum(r,["% Complete","PercentComplete","phys_complete_pct","Progress","Done %"]),
            assignee:fuzz(r,["Assignee","Resource","Owner","rsrc_short_name"])||"PM",
            qty:fuzz(r,["Duration","Qty","Scope","Notes"])||"",
            unit:"KES 0",deps:fuzz(r,["Predecessors","Dependencies","Depends"])||""
          }));
          if(newWPs.length){
            onImport({wps:newWPs});
            showToast(`✓ CSV: ${newWPs.length} tasks imported`);
            log(`✓ ${newWPs.length} tasks imported from CSV`);
          }else{log("⚠ No task rows found in CSV");}
        }else{log("⚠ CSV does not appear to be a schedule — no Name/ID columns found");}
      }catch(err){log("✗ CSV parse error: "+err.message);}
      setImporting(false);
    };
    reader.readAsText(file,"utf-8");
  };

  /* ── MPX IMPORT (MS Project Exchange format) ── */
  const importMPX=(file)=>{
    setImporting(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const lines=e.target.result.split(/\r?\n/);
        const tasks=[];const resources=[];
        let taskFields=[],rsrcFields=[];
        for(const line of lines){
          const parts=line.split(",");
          const code=parts[0];
          if(code==="68"){taskFields=parts.slice(1);}
          else if(code==="70"&&taskFields.length){
            const obj={};taskFields.forEach((f,i)=>{obj[f.trim()]=parts[i+1]||"";});tasks.push(obj);
          }
          else if(code==="48"){rsrcFields=parts.slice(1);}
          else if(code==="50"&&rsrcFields.length){
            const obj={};rsrcFields.forEach((f,i)=>{obj[f.trim()]=parts[i+1]||"";});resources.push(obj);
          }
        }
        let imported={};
        if(tasks.length){
          const newWPs=tasks.filter(t=>t.Name||t.name).map((t,i)=>({
            id:t["Unique ID"]||`WP${String(i+1).padStart(3,"0")}`,
            phase:"PH1",trade:"Civil",
            name:t.Name||t.name||`Task ${i+1}`,
            status:normStatus(Number(t["% Complete"]||0)===100?"done":Number(t["% Complete"]||0)>0?"in-progress":"not-started"),
            priority:"medium",
            progress:Number(t["% Complete"]||0),
            assignee:"PM",qty:"",unit:"KES 0",deps:""
          }));
          imported.wps=newWPs;log(`✓ ${newWPs.length} MPX tasks imported`);
        }
        if(Object.keys(imported).length>0){onImport(imported);showToast(`✓ MPX: ${tasks.length} tasks imported`);}
        else{log("⚠ No MPX task records found");}
      }catch(err){log("✗ MPX parse error: "+err.message);}
      setImporting(false);
    };
    reader.readAsText(file);
  };

const CACHE = 'ahp-v4';
const ASSETS = ['/', '/index.html'];

self.addEventListener('install', e =>
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));

self.addEventListener('fetch', e =>
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));

// Sync on reconnect
self.addEventListener('sync', e => {

});`}</div>

const TRIAL_DAYS = 14;
const PLAN_RANK  = { free:0, pro:1, command:2 };

// In-memory plan state — populated by verifyPlanWithServer()

// Read plan from server cache, fall back to localStorage
const _getEffectivePlan = () => {
  if(_serverPlanState && _serverPlanState.plan) return _serverPlanState.plan;
  try { return localStorage.getItem("mradi_plan") || "free"; } catch { return "free"; }
};
const _getEffectiveExpiry = () => {
  if(_serverPlanState) return _serverPlanState.expiry || 0;
  try { return parseInt(localStorage.getItem("mradi_plan_expiry")||"0",10); } catch { return 0; }
};
const _getEffectiveTrialStart = () => {
  if(_serverPlanState && _serverPlanState.trialStart) return _serverPlanState.trialStart;
  try {
    const v = localStorage.getItem("mradi_trial_start");
    if(v) return parseInt(v,10);
    const now = Date.now();
    localStorage.setItem("mradi_trial_start", String(now));
    return now;
  } catch { return Date.now(); }
};

const getTrialDaysLeft = () => {
  const elapsed = (Date.now() - _getEffectiveTrialStart()) / (1000*60*60*24);
  return Math.max(0, Math.ceil(TRIAL_DAYS - elapsed));
};
const isInTrial      = () => getTrialDaysLeft() > 0;
const getPlanExpiry  = () => _getEffectiveExpiry();
const savePlanExpiry = (ms) => { try{ localStorage.setItem("mradi_plan_expiry", String(ms)); }catch{} };
const isPlanActive   = () => {
  if(_getEffectivePlan() === "free") return false;
  return _getEffectiveExpiry() > Date.now();
};
const hasPaidAccess  = () => isInTrial() || isPlanActive();

// Core hasAddon — server-verified when online, cache when offline

  const feat = PLAN_FEATURES[featureId];
  if(!feat) return true;
  if(isInTrial()) return true;
  if(!isPlanActive()) return false;
  return planRank(_getEffectivePlan()) >= planRank(feat.minPlan);
};

  try {
    const sb = getSupabaseClient();
    if(!sb) return;
    const { data: { session } } = await sb.auth.getSession();
    if(!session?.access_token) return;
    const fnUrl = FCC_CONFIG.supabaseUrl + "/functions/v1/get-plan";
    const res = await fetch(fnUrl, {
      headers: { "Authorization": "Bearer " + session.access_token }
    });
    if(!res.ok) return;
    const data = await res.json();
    _serverPlanState = {
      plan:       data.plan || "free",
      expiry:     data.expiry || 0,
      trialStart: data.trialStart || Date.now(),
    };
    try { localStorage.setItem("mradi_plan_cache", JSON.stringify({..._serverPlanState, cachedAt:Date.now()})); }catch{}
  } catch(e) {
    // On failure, try reading from cache (max 2hr grace)
    try {
      const c = JSON.parse(localStorage.getItem("mradi_plan_cache")||"{}");
      if(c.plan && Date.now()-c.cachedAt < 7200000) _serverPlanState = c;
    } catch{}
  }
}

let _notifPermission = null;
async function requestNotifPermission() {
  if(!('Notification' in window)) return 'unsupported';
  if(Notification.permission === 'granted') { _notifPermission = 'granted'; return 'granted'; }
  if(Notification.permission === 'denied')  { _notifPermission = 'denied';  return 'denied'; }
  const result = await Notification.requestPermission();
  _notifPermission = result;
  return result;
}

async function showLocalNotif({ title, body, tag = 'mradi', requireInteraction = false, url = '/' }) {
  if(!('Notification' in window)) return;
  const perm = _notifPermission || Notification.permission;
  if(perm !== 'granted') return;
  const sw = window.__mradiSWRegistration;
  if(sw && sw.active) {
    sw.active.postMessage({ type:'SHOW_NOTIFICATION', title, body, tag, requireInteraction, url });
  } else {
    new Notification(title, { body, tag, icon:'/icon-192.png' });
  }
}

// ══════════════════════════════════════════════════════════════════

function haversineM(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const phi1 = lat1 * Math.PI / 180, phi2 = lat2 * Math.PI / 180;
  const dphi = (lat2 - lat1) * Math.PI / 180;
  const dlam = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dphi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dlam/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getCurrentPosition(opts) {
  return new Promise((resolve, reject) => {
    if(!navigator.geolocation) return reject(new Error('Geolocation not supported'));
    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: true, timeout: 12000, maximumAge: 0, ...(opts||{})
    });
  });
}

const ATT_KEY = (projId) => 'mradi_attendance_' + projId;
const loadAttendance = (projId) => {

};
const saveAttendance = (projId, records) => {

};

async function gpsClockAction({ action, workerId, workerName, projectId, siteLat, siteLng, radiusM }) {
  radiusM = radiusM || 200;
  let pos;
  try { pos = await getCurrentPosition(); }
  catch(e) {
    const msg = e.code === 1 ? 'Location permission denied' : e.code === 2 ? 'GPS signal unavailable' : 'GPS timed out — try again';
    return { ok: false, error: msg };
  }
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  let distanceM = null;
  if(siteLat && siteLng) {
    distanceM = Math.round(haversineM(lat, lng, siteLat, siteLng));
    if(distanceM > radiusM) {
      return { ok: false, error: 'You are ' + distanceM + 'm from site. Must be within ' + radiusM + 'm to clock ' + action + '.', distanceM };
    }
  }
  const ts = new Date().toISOString();
  const record = {
    id: 'ATT-' + Date.now(), workerId, workerName, action, ts,
    lat, lng, accuracy: Math.round(accuracy||0), distanceM,
    verified: !!(siteLat && siteLng), date: ts.slice(0,10)
  };
  const records = loadAttendance(projectId);
  records.push(record);
  saveAttendance(projectId, records);
  notifAttendance(workerName, action);
  return { ok: true, record, distanceM };
}

const sbReady = () => FCC_CONFIG.supabaseUrl && FCC_CONFIG.supabaseKey;

// Always send the user's JWT when available — required for owner_id = auth.uid() RLS
const sbAuthToken = () => {
  try {
    // fcc_user holds the Supabase access_token; mradi_profile is local-only
    const u = JSON.parse(localStorage.getItem("fcc_user")||"{}");
    return u.access_token || FCC_CONFIG.supabaseKey;
  } catch { return FCC_CONFIG.supabaseKey; }
};

// Refresh the JWT using the stored refresh_token. Returns new access_token or null.
const sbRefreshSession = async () => {
  try {
    const u = JSON.parse(localStorage.getItem("fcc_user")||"{}");
    if(!u.refresh_token) return null;
    const res = await fetch(`${FCC_CONFIG.supabaseUrl}/auth/v1/token?grant_type=refresh_token`, {
      method: "POST",
      headers: { "apikey": FCC_CONFIG.supabaseKey, "Content-Type": "application/json" },
      body: JSON.stringify({ refresh_token: u.refresh_token })
    });
    if(!res.ok) return null;
    const data = await res.json();
    if(!data.access_token) return null;
    // Persist refreshed tokens
    const updated = { ...u, access_token: data.access_token, refresh_token: data.refresh_token || u.refresh_token };
    localStorage.setItem("fcc_user", JSON.stringify(updated));
    return data.access_token;
  } catch { return null; }
};

const sbFetch = async (path, opts={}, _retry=false) => {
  const res = await fetch(`${FCC_CONFIG.supabaseUrl}/rest/v1/${path}`, {
    headers: {
      "apikey":         FCC_CONFIG.supabaseKey,
      "Authorization":  `Bearer ${sbAuthToken()}`,
      "Content-Type":   "application/json",
      "Prefer":         "return=representation",
      ...(opts.headers||{})
    },
    ...opts
  });
  if(!res.ok) {
    const txt = await res.text();
    // Auto-refresh on JWT expired — try once
    if(!_retry && (txt.includes("JWT expired") || txt.includes("PGRST303"))) {
      const newToken = await sbRefreshSession();
      if(newToken) return sbFetch(path, opts, true);
    }
    throw new Error(txt);
  }
  return res.json();
};
