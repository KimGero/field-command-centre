  onClose, isAdmin, screenSyncMode, setScreenSyncMode, currentView, showToast }) {

  const [chatInput, setChatInput] = React.useState("");
  const [copying,   setCopying]   = React.useState(false);
  const chatEndRef = React.useRef(null);

  // Auto-scroll chat to bottom on new messages
  React.useEffect(()=>{
    chatEndRef.current?.scrollIntoView({ behavior:"smooth" });
  },[chatMessages.length]);

  const sendMsg = () => {
    const txt = chatInput.trim();
    if(!txt || !channelRef.current) return;
    const msg = {
      id:       "msg-" + Date.now(),
      userId:   profile?.id   || "anon",
      userName: profile?.name || "You",
      orgId:    getOrgId()    || null,
      text:     txt,
      ts:       new Date().toISOString(),
    };
    // Optimistic local add
    addChatMsg(msg);
    // Broadcast to room
    try {
      channelRef.current.send({
        type:"broadcast", event:"chat_msg", payload: msg
      });
    } catch(e) { /* offline */ }
    setChatInput("");
  };

  const handleKeyDown = e => {
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMsg(); }
  };

  const copyRoomLink = () => {
    const base = window.location.href.split("?")[0];
    const link = `${base}?room=${encodeURIComponent(proj?.id || "main")}`;
    if(navigator.clipboard){
      navigator.clipboard.writeText(link).then(()=>{
        setCopying(true); setTimeout(()=>setCopying(false), 1800);
        showToast("✓ Room link copied — share it with your team!");
      }).catch(()=>{ showToast("⚠ Could not copy — try manually"); });
    } else {
      const ta = document.createElement("textarea");
      ta.value = link; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand("copy"); showToast("✓ Room link copied!"); }catch{}
      document.body.removeChild(ta);
    }
  };

  const sendWhatsApp = () => {
    const base = window.location.href.split("?")[0];
    const link = `${base}?room=${encodeURIComponent(proj?.id || "main")}`;
    const msg = `👥 *Join our live project room — ${proj?.site?.name || "Mradi HQ"}*\n\nI've opened a live team room. Click the link to join and see real-time updates:\n${link}\n\n_Sent from Mradi HQ_`;
    const win = window.open("https://wa.me/?text="+encodeURIComponent(msg), "_blank");
    if(!win) showToast("✓ WhatsApp link ready — if blocked, copy the room link instead");
    else showToast("✅ Opening WhatsApp…");
  };

  const fmtTime = ts => {
    try { return new Date(ts).toLocaleTimeString("en-KE",{hour:"2-digit",minute:"2-digit",hour12:true}); }
    catch { return ""; }
  };

  const memberColors = ["#4A9EFF","#00D4AA","#FFB800","#FF6B35","#9B6DFF","#FF4444"];
  const getColor = (userId) => memberColors[Math.abs((userId||"").charCodeAt(2)||0) % memberColors.length];

  const SYNC_MODES = isAdmin
    ? [
        { id:"broadcast", icon:"📡", label:"Sync Screen", desc:"Team follows your view" },
        { id:"free",      icon:"🔓", label:"Free Browse", desc:"Everyone navigates freely" },
      ]
    : [
        { id:"follow",    icon:"👁", label:"Follow Admin", desc:"Auto-follow screen syncs" },
        { id:"free",      icon:"🔓", label:"Free Browse",  desc:"Navigate independently" },
      ];

  return (
    <>
      {/* Click-away overlay — only on desktop (on mobile the panel slides up from bottom) */}
      <div className="team-room-overlay" onClick={onClose} style={{background:"var(--overlay)",pointerEvents:"all"}}/>

      <div className="team-room-panel">
        {/* ── Header ── */}
        <div className="team-room-header">
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <div className="room-live-dot"/>
            <div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",fontWeight:"800",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.1em",lineHeight:1}}>
                Team Room
              </div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",marginTop:"2px"}}>
                {roomMembers.length + 1} member{roomMembers.length !== 0 ? "s" : ""} · {proj?.site?.name?.split(" ").slice(0,3).join(" ")||"Project"}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            {isAdmin && (
              <button className="room-btn" onClick={sendWhatsApp} title="Invite via WhatsApp">
                <span>📲</span><span>Invite</span>
              </button>
            )}
            <button onClick={onClose} style={{background:"none",border:"1px solid var(--border)",color:"var(--text3)",borderRadius:"5px",padding:"5px 8px",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",lineHeight:1,transition:"all 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--red)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>✕</button>
          </div>
        </div>

        {/* ── Invite box (admin only) ── */}
        {isAdmin && (
          <div className="room-invite-box">
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:"7px"}}>🔗 Room Link — share with team</div>
            <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
              <div style={{flex:1,background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:"5px",padding:"7px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {(window.location.href.split("?")[0])}?room={proj?.id||"main"}
              </div>
              <button className="room-btn" onClick={copyRoomLink} style={{flexShrink:0}}>
                {copying ? "✓ Copied" : "📋 Copy"}
              </button>
            </div>
            <div style={{marginTop:"7px",display:"flex",gap:"6px"}}>
              <button className="room-btn green" style={{flex:1,justifyContent:"center"}} onClick={sendWhatsApp}>
                📱 Send via WhatsApp
              </button>
              <button className="room-btn" style={{flex:1,justifyContent:"center"}} onClick={copyRoomLink}>
                ✉ Copy for Email / SMS
              </button>
            </div>
          </div>
        )}

        {/* ── Screen Sync mode ── */}
        <div style={{padding:"10px 14px 0",flexShrink:0}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:"7px"}}>
            {isAdmin ? "📡 Screen Broadcast" : "🖥 View Sync"}
          </div>
          <div className="sync-mode-bar" style={{padding:0,gap:"6px"}}>
            {SYNC_MODES.map(m=>(
              <button key={m.id} className={`sync-mode-btn ${screenSyncMode===m.id?"active":""}`}
                onClick={()=>setScreenSyncMode(m.id)}>
                <span style={{fontSize:"14px"}}>{m.icon}</span>
                <span>{m.label}</span>
              </button>
            ))}
          </div>
          {isAdmin && screenSyncMode==="broadcast" && (
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--green)",padding:"5px 0 8px",textAlign:"center"}}>
              ✓ Team will follow your screen · Currently showing: <strong>{currentView}</strong>
            </div>
          )}
          {!isAdmin && screenSyncMode==="follow" && (
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--accent)",padding:"5px 0 8px",textAlign:"center"}}>
              👁 Following admin screen — tap Free Browse to navigate
            </div>
          )}
        </div>

        {/* ── Who's here ── */}
        <div style={{padding:"6px 14px 4px",flexShrink:0}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:"4px"}}>
            👷 In this room
          </div>
          {/* Self */}
          <div className="member-row" style={{paddingLeft:0,paddingRight:0}}>
            <div className="member-avatar" style={{background:getColor(profile?.id||"me")}}>
              {(profile?.name||"You")[0].toUpperCase()}
              <div className="member-avatar-dot" style={{background:"var(--green)"}}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"11px",fontWeight:"700",color:"var(--text)",lineHeight:1.2}}>
                {profile?.name||"You"} <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--accent)"}}>({isAdmin?"Admin":"You"})</span>
              </div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>📍 {currentView}</div>
            </div>
            <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"var(--green)",flexShrink:0}}/>
          </div>
          {/* Others */}
          {roomMembers.length===0 && (
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",padding:"6px 0 4px",textAlign:"center",lineHeight:1.6}}>
              No teammates yet.<br/>Share the room link to invite them.
            </div>
          )}
          {roomMembers.map((m,i)=>(
            <div key={m.userId||i} className="member-row" style={{paddingLeft:0,paddingRight:0}}>
              <div className="member-avatar" style={{background:getColor(m.userId)}}>
                {(m.userName||"?")[0].toUpperCase()}
                <div className="member-avatar-dot" style={{background:"var(--green)"}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"11px",fontWeight:"700",color:"var(--text)",lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {m.userName||"Teammate"}
                </div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>
                  📍 {m.view||"overview"}{m.screenSyncMode==="follow"?" · 👁 Following":""}
                </div>
              </div>
              <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"var(--green)",flexShrink:0}}/>
            </div>
          ))}
        </div>

        {/* ── Divider ── */}
        <div style={{height:"1px",background:"var(--border)",margin:"6px 0",flexShrink:0}}/>

        {/* ── Chat area ── */}
        <div style={{padding:"0 14px 4px",flexShrink:0}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.09em"}}>
            💬 Team Chat — live session
          </div>
        </div>
        <div className="chat-area">
          {chatMessages.length===0 && (
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textAlign:"center",marginTop:"24px",lineHeight:1.8}}>
              No messages yet.<br/>Say hello to your team 👋
            </div>
          )}
          {chatMessages.map((m,i)=>{
            const mine = m.userId===profile?.id;
            const isSystem = m.type==="system";
            if(isSystem) return <div key={m.id||i} className="chat-system-msg">{m.text}</div>;
            return(
              <div key={m.id||i} className={`chat-msg ${mine?"mine":""}`}>
                {!mine&&(
                  <div className="chat-meta">{m.userName||"Team"}</div>
                )}
                <div className="chat-bubble" style={{borderColor: mine?"var(--accent)44":"var(--border)"}}>
                  {m.text}
                </div>
                <div className="chat-meta">{fmtTime(m.ts)}</div>
              </div>
            );
          })}
          <div ref={chatEndRef}/>
        </div>

        {/* ── Chat input ── */}
        <div className="chat-input-row">
          <textarea
            className="chat-input-field"
            placeholder="Message your team…"
            value={chatInput}
            rows={1}
            onChange={e=>setChatInput(e.target.value)}
            onKeyDown={handleKeyDown}
          />
          <button className="chat-send-btn" onClick={sendMsg} disabled={!chatInput.trim()} title="Send (Enter)">
            ➤
          </button>
        </div>
      </div>
    </>
  );
}

function App(){
  const load=key=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch{return null;}};
  const persist=(key,val)=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}};

  // ── OJOLA SEED GUARD — clears any stale Rongo/other cached data and forces
  //    fresh Mradi HQ project on first load of this file. Change SEED_VER to re-seed.
  //    SKIP if a ?snap= link is being loaded — recipient's storage must not be wiped.
  const SEED_VER="mradi-v2";
  const _isSnapLoad=!!window.__FCC_SNAPSHOT__;
  if(!_isSnapLoad && load("ahp_seed")!==SEED_VER){
    ["ahp_projects","ahp_activeProject","ahp_seenApp","ahp_theme","ahp_large"].forEach(k=>{
      try{localStorage.removeItem(k);}catch{}
    });
    persist("ahp_seed",SEED_VER);
    persist("ahp_projects",[RONGO_DATA]);
    persist("ahp_activeProject",0);
  }

  // ── Auth & Profile state ──────────────────────────────────────────────────
  const [profile, setProfile] = useState(()=>getLocalProfile());
  // Show auth screen if user has no email (never logged in with account)
  const [showAuth, setShowAuth] = useState(false); // always shown via enterApp() after landing
  const [showOrgPanel, setShowOrgPanel] = useState(false);   // AccountPanel (profile/addons)
  const [showOrgMgmt,  setShowOrgMgmt]  = useState(false);   // OrgPanel (team/invite/admin)
  const [showOrgSetup, setShowOrgSetup] = useState(false);   // OrgSetupScreen (first-time)
  const [orgSetupJoinCode, setOrgSetupJoinCode] = useState(null); // prefill code from ?join=
  const [showPremium, setShowPremium] = useState(null); // addonId or null
  const [addons, setAddons] = useState(getAddons);
  const refreshAddons = () => setAddons(getAddons());
  const [isFirstVisit]=useState(()=>{ try{return !localStorage.getItem("fcc_tutorials_seen");}catch{return true;} });

  const [showPlanPayment, setShowPlanPayment] = useState(false);
  const [mpesaModalApp, setMpesaModalApp] = useState(null);

  // ── PWA install prompt ────────────────────────────────────────────────────
  const [pwaInstallable, setPwaInstallable] = useState(!!window.__pwaInstallPrompt);
  const [pwaInstalled,   setPwaInstalled]   = useState(false);
  useEffect(()=>{
    const onReady     = () => setPwaInstallable(true);
    const onInstalled = () => { setPwaInstallable(false); setPwaInstalled(true); showToast("✓ Mradi HQ installed! Find it on your home screen."); };
    window.addEventListener('mradi-install-ready', onReady);
    window.addEventListener('mradi-installed', onInstalled);
    return ()=>{ window.removeEventListener('mradi-install-ready', onReady); window.removeEventListener('mradi-installed', onInstalled); };
  }, []);
  const triggerInstall = async () => {
    const prompt = window.__pwaInstallPrompt;
    if(!prompt) return;
    prompt.prompt();
    const { outcome } = await prompt.userChoice;
    if(outcome === 'accepted') { window.__pwaInstallPrompt = null; setPwaInstallable(false); }
  };

  const handleAuthDone = (p) => {
    setProfile(p);
    setShowAuth(false);
    // Gate 1.5: show org setup if user has no org yet
    if(!p?.isGuest && !getOrg()) {
      const joinCode = window.__FCC_JOIN_CODE__ || null;
      if(joinCode) { setOrgSetupJoinCode(joinCode); window.__FCC_JOIN_CODE__ = null; try{ document.getElementById('fcc-join-loader')?.remove(); }catch{} }
      setShowOrgSetup(true);
      return;
    }
    // Remove join loader if present
    try{ document.getElementById('fcc-join-loader')?.remove(); }catch{}
    if(p?.id && !p.isGuest) window.__pendingCloudSync = p.id;
    // If user chose a paid plan from landing page, trigger payment modal
    const chosenPid = getPlanId();
    if(chosenPid && chosenPid !== "free" && FCC_PLANS[chosenPid]) {
      setShowPlanPayment(true);
    }
  };

  const handleLogout = () => {
    // Wipe auth token; keep local project data and preferences
    const cleaned = {...getLocalProfile()};
    delete cleaned.email;
    delete cleaned.access_token;
    cleaned.isGuest = false;
    saveLocalProfile(cleaned);
    setProfile(getLocalProfile());
    setShowAuth(true);
  };

  // (snapshot toast fires after toast state is declared below)

  const [theme,setTheme]     = useState(()=>load("ahp_theme")||"light");
  const [largeText,setLargeText] = useState(()=>load("ahp_large")||false);
  const [showLanding,setShowLanding] = useState(()=>{
    if(window.__FCC_SNAPSHOT__ || window.__FCC_SHARE_ID__) return false; // share/snap links skip landing
    const _p = getLocalProfile();
    const loggedIn = _p?.email && !_p?.isGuest;
    if(!loggedIn) return true; // always show landing to unauthenticated users
    return load("ahp_seenApp")!==true; // logged-in first-timers also see landing
  });
  const [projects,setProjects] = useState(()=>{
    if(window.__FCC_SNAPSHOT__){
      try{
        const snap=window.__FCC_SNAPSHOT__;
        const snapProject={...snap, site:{...snap.site, name:`[Shared] ${snap.site?.name||"Project"}`}, _isSnapshot:true};
        const existing=load("ahp_projects")||[RONGO_DATA];
        // Avoid duplicating if already saved (e.g. hot reload)
        const alreadyIn=existing.some(p=>p._isSnapshot && p.site?.name===snapProject.site?.name);
        const merged=alreadyIn?existing:[...existing,snapProject];
        persist("ahp_projects",merged);
        persist("ahp_activeProject",merged.length-1);
        persist("ahp_seenApp",true);
        window.history.replaceState({},"",window.location.pathname);
        // stash name for toast — fired after render
        window.__FCC_SNAP_NAME__=snap.site?.name||"Project";
        window.__FCC_SNAPSHOT__=null;
        return merged;
      }catch(e){ console.warn("FCC: snapshot parse failed",e); }
    }
    return load("ahp_projects")||[RONGO_DATA];
  });
  const [activeProject,setActiveProject] = useState(()=>{
    // If we just loaded a snapshot, point to the last project (the snap)
    if(window.__FCC_SNAP_NAME__ !== undefined){
      const all=load("ahp_projects")||[RONGO_DATA];
      return all.length-1;
    }
    return load("ahp_activeProject")||0;
  });
  const [showNewProject,setShowNewProject] = useState(false);
  const [showProjectPicker,setShowProjectPicker] = useState(false);

  // ── Multi-project tab state ───────────────────────────────────────────────
  // openProjectIds: ordered array of project IDs currently open as tabs
  const [openProjectIds, setOpenProjectIds] = useState(()=>{
    const ap = projects[load("ahp_activeProject")||0];
    return ap?.id ? [ap.id] : (projects[0]?.id ? [projects[0].id] : []);
  });

  // Open a project tab (or focus it if already open)
  const openProject = (projectId) => {
    const idx = projects.findIndex(p=>p.id===projectId);
    if(idx<0) return;
    setOpenProjectIds(ids=>ids.includes(projectId)?ids:[...ids,projectId]);
    setActiveProject(idx);
    setView("overview");
    setShowProjectPicker(false);
    setShowNewProject(false);
  };

  // Close a project tab; pivot focus to adjacent tab
  const closeProjectTab = (projectId, e) => {
    if(e){ e.stopPropagation(); }
    setOpenProjectIds(ids=>{
      if(ids.length<=1) return ids; // always keep at least one tab
      const next = ids.filter(id=>id!==projectId);
      // If we're closing the active tab, focus the previous (or first) remaining tab
      if(projects[activeProject]?.id===projectId){
        const newFocusId = next[Math.max(0, ids.indexOf(projectId)-1)];
        const newIdx = projects.findIndex(p=>p.id===newFocusId);
        if(newIdx>=0) setActiveProject(newIdx);
      }
      return next;
    });
  };

  // Ensure the active project is always in the open tabs (e.g. after share link loads)
  useEffect(()=>{
    const ap = projects[activeProject];
    if(ap?.id) setOpenProjectIds(ids=>ids.includes(ap.id)?ids:[...ids,ap.id]);
  },[activeProject]);

  const proj = projects[activeProject]||projects[0];
  const {site,phases=[],wps=[],risks=[],snags=[],team=[]} = proj;
  const [workers,setWorkers]     = useState(()=>proj.workers||[]);
  const [diaries,setDiaries]   = useState(()=>proj.diaries||[]);
  const [materials,setMaterials] = useState(()=>proj.materials||[]);
  const [provisions,setProvisions] = useState(()=>proj.provisions||RONGO_PROVISIONS);

  // sync diaries/materials when switching project
  useEffect(()=>{
    const p=projects[activeProject]||projects[0];
    setDiaries(p.diaries||[]);
    setMaterials(p.materials||[]);
    setProvisions(p.provisions||RONGO_PROVISIONS);
    setWorkers(p.workers||[]);
  },[activeProject]);

  // save diaries/materials/provisions/workers back to project
  useEffect(()=>{
    const p=[...projects];
    p[activeProject]={...p[activeProject],diaries,materials,provisions,workers};
    setProjects(p);
    persist("ahp_projects",p);
    sbSaveProject(profile?.id, p[activeProject]);
  },[diaries,materials,provisions,workers]);

  const saveProj=(d)=>{
    const p=[...projects];
    p[activeProject]={...p[activeProject],...d, _lastEditBy:profile?.id};
    setProjects(p);persist("ahp_projects",p);
    sbSaveProject(profile?.id, p[activeProject]);
    // Broadcast live edit to teammates in this project
    if(channelRef.current && hasAddon("sync")){
      try{
        channelRef.current.send({
          type:"broadcast", event:"project_update",
          payload:{ userId:profile?.id, userName:profile?.name||"User", orgId:getOrgId()||null, data:{...d,_lastEditBy:profile?.id} }
        });
      }catch{}
    }
  };

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);persist("ahp_theme",theme);},[theme]);
  useEffect(()=>{document.documentElement.setAttribute("data-large",largeText?"1":"0");persist("ahp_large",largeText);},[largeText]);
  const [pendingPlan, setPendingPlan] = useState(()=>getPlanId());
  const enterApp=(planId)=>{
    const pid = planId||"free";
    setPendingPlan(pid);
    savePlanId(pid);
    persist("ahp_seenApp",true);
    setShowLanding(false);
    // Always require sign-in — guest mode removed
    const _p = getLocalProfile();
    if(!_p?.email || _p?.isGuest){ setShowAuth(true); }
    if(window.fccTrack) window.fccTrack("app_entered",{plan:pid,project:proj?.site?.name||""});
    // Verify plan server-side after auth confirms identity
    verifyPlanWithServer().catch(()=>{});
  };
  const goHome=()=>{setShowLanding(true);window.scrollTo({top:0,behavior:"smooth"});};
  useEffect(()=>{persist("ahp_activeProject",activeProject);},[activeProject]);

  const [view,setView] = useState(()=>{
    // Handle ?upgraded=plan&ref=xxx — Paystack redirect activates the plan
    try{
      const up = new URLSearchParams(window.location.search);
      const upgPlan = up.get('upgraded');
      if(upgPlan && FCC_PLANS[upgPlan]) {
        savePlanId(upgPlan);
        savePlanExpiry(Date.now() + 30*24*60*60*1000); // 30-day subscription
        window.history.replaceState({},'',window.location.pathname);
        // Toast will fire once showToast is initialised via useEffect below
        window.__FCC_UPGRADED_PLAN__ = upgPlan;
      }
    }catch{}
    // Handle PWA shortcut deep links e.g. ?view=diary
    try{
      const vp = new URLSearchParams(window.location.search).get('view');
      const validViews = ['overview','programme','wbs','provisions','budget','materials',
                          'diary','timeline','risks','team','report','payments'];
      if(vp && validViews.includes(vp)){
        window.history.replaceState({},'',window.location.pathname);
        return vp;
      }
    }catch{}
    return 'overview';
  });
  const [activePhase,setActivePhase] = useState("PH3");
  const [time,setTime]         = useState(new Date());
  const [notif,setNotif]       = useState(false);
  const [showEdit,setShowEdit] = useState(false);
  const [showPin,setShowPin]   = useState(false);
  const [toast,setToast]       = useState("");
  const [showIntegration,setShowIntegration] = useState(false);
  const [showShareModal, setShowShareModal] = useState(false);
  const [ovOpen, setOvOpen] = useState(false); // ⋯ overflow menu
  // ── Team Room state ──────────────────────────────────────────────────────────
  const [showTeamRoom,   setShowTeamRoom]   = useState(()=>!!window.__FCC_ROOM_ID__);
  const [roomMembers,    setRoomMembers]    = useState([]);  // other users in room
  const [chatMessages,   setChatMessages]   = useState([]);  // live session chat
  const [screenSyncMode, setScreenSyncMode] = useState("free"); // "broadcast"|"follow"|"free"
  const [isRoomAdmin,    setIsRoomAdmin]    = useState(false);
  const addChatMsg = msg => setChatMessages(prev=>[...prev, msg].slice(-200));
  const [online,setOnline]     = useState(()=>navigator.onLine);
  const [syncing,setSyncing]   = useState(false);
  const [lastSync,setLastSync] = useState(()=>load("ahp_lastSync")||null);
  const [showMobileMenu,setShowMobileMenu] = useState(false);
  const [navOpen,setNavOpen] = useState(false);
  const navTriggerRef = React.useRef(null);
  // ── Realtime presence ────────────────────────────────────────────────────────
  const [presenceUsers, setPresenceUsers] = useState([]); // other users in same project
  const channelRef = useRef(null);
  const sbClient = React.useMemo(()=>getSupabaseClient(),[]);
  // ── Inline cell editing ──────────────────────────────────────────────────────
  const [inlineEdit,setInlineEdit] = useState(null); // {wpId,col,val} | null
  const inlineRef = useRef(null);

  // Online/offline detection
  useEffect(()=>{
    const goOnline=()=>{
      setOnline(true);
      setSyncing(true);
      const ts=new Date().toISOString();
      // Push local data to Supabase on reconnect
      const syncOnReconnect = async () => {
        try{
          const localProjects = JSON.parse(localStorage.getItem("ahp_projects"))||[];
          const localProfile = getLocalProfile();
          for(const p of localProjects){
            if(!p?.id) continue;
            await sbFetch(`fcc_projects?id=eq.${p.id}`, {
              method:"POST",
              headers:{ "Prefer":"resolution=merge-duplicates" },
              body: JSON.stringify({ id:p.id, owner_id:localProfile?.id, data:p, updated_at:ts })
            }).catch(()=>{});
          }
        }catch{}
        setLastSync(ts);persist("ahp_lastSync",ts);setSyncing(false);
        showToast("☁ Back online — all changes synced to cloud");
      };
      syncOnReconnect();
    };
    const goOffline=()=>{setOnline(false);showToast("📴 Offline mode active — all changes saved locally");};
    window.addEventListener("online",goOnline);
    window.addEventListener("offline",goOffline);
    return()=>{window.removeEventListener("online",goOnline);window.removeEventListener("offline",goOffline);};
  },[]);

  // ── Supabase realtime subscription + presence ────────────────────────────────
  useEffect(()=>{
    if(!sbClient || !proj?.id) return;
    // Remove old channel cleanly
    if(channelRef.current){ try{sbClient.removeChannel(channelRef.current);}catch{} }
    // ── Privacy: scope channel to org so only invited members share a namespace.
    //    If the user has no org, fall back to their own userId so they get a
    //    private channel that nobody else can guess or join.
    const scopeId = getOrgId() || profile?.id || "solo";
    const channelName = `project:${scopeId}:${proj.id}`;
    const myOrgId = getOrgId();
    const ch = sbClient.channel(channelName, {
      config:{ presence:{ key: profile?.id || "anon" } }
    });
    // Presence — who else is in this project / room right now
    // Only surface users who share the same org (double-check even though channel is scoped)
    ch.on("presence",{ event:"sync" },()=>{
      try{
        const state = ch.presenceState();
        const all = Object.values(state).flat();
        const others = all.filter(u=>
          u.userId &&
          u.userId !== profile?.id &&
          // Accept if same org, or if both have no org (solo private channel)
          (myOrgId ? u.orgId === myOrgId : !u.orgId)
        ).slice(0,10);
        setPresenceUsers(others.slice(0,5));
        setRoomMembers(others);
      }catch{}
    });
    // Broadcast — live project edits from teammates
    ch.on("broadcast",{ event:"project_update" },(msg)=>{
      const payload = msg?.payload;
      if(!payload || payload.userId===profile?.id) return;
      // Reject messages from outside the org
      if(myOrgId && payload.orgId !== myOrgId) return;
      setProjects(prev=>{
        const p=[...prev];
        p[activeProject]={ ...p[activeProject], ...payload.data };
        try{localStorage.setItem("ahp_projects",JSON.stringify(p));}catch{}
        return p;
      });
      showToast(`↓ ${payload.userName||"Teammate"} updated the project live`);
    });
    // ── Screen sync — admin broadcasts view; followers update their view ──────
    ch.on("broadcast",{ event:"screen_sync" },(msg)=>{
      const payload = msg?.payload;
      if(!payload || payload.userId===profile?.id) return;
      if(myOrgId && payload.orgId !== myOrgId) return;
      // Only follow if member is in "follow" mode AND sender is admin
      setScreenSyncMode(prev=>{
        if(prev==="follow"){
          setView(payload.view);
          // Subtle toast so member knows screen was synced
          showToast(`📡 Screen synced → ${payload.view} by ${payload.userName||"Admin"}`);
        }
        return prev;
      });
    });
    // ── Chat messages ────────────────────────────────────────────────────────
    ch.on("broadcast",{ event:"chat_msg" },(msg)=>{
      const payload = msg?.payload;
      if(!payload || payload.userId===profile?.id) return;
      if(myOrgId && payload.orgId !== myOrgId) return;
      addChatMsg(payload);
    });
    // ── Member joined/left notifications ────────────────────────────────────
    ch.on("presence",{ event:"join" },(payload)=>{
      const joined = payload?.newPresences?.[0];
      if(joined && joined.userId && joined.userId!==profile?.id){
        // Only notify for same-org members
        if(myOrgId && joined.orgId !== myOrgId) return;
        addChatMsg({ id:"sys-"+Date.now(), type:"system", text:`👋 ${joined.userName||"Teammate"} joined the room` });
        showToast(`👋 ${joined.userName||"Teammate"} joined the room`);
      }
    });
    ch.on("presence",{ event:"leave" },(payload)=>{
      const left = payload?.leftPresences?.[0];
      if(left && left.userId && left.userId!==profile?.id){
        if(myOrgId && left.orgId !== myOrgId) return;
        addChatMsg({ id:"sys-"+Date.now(), type:"system", text:`👋 ${left.userName||"Teammate"} left the room` });
      }
    });
    // Listen for DB changes (multi-device, not just same tab)
    ch.on("postgres_changes",{ event:"UPDATE", schema:"public", table:"fcc_projects", filter:`id=eq.${proj.id}` },(change)=>{
      const incoming = change?.new?.data;
      if(!incoming || incoming._lastEditBy===profile?.id) return;
      setProjects(prev=>{
        const p=[...prev];
        p[activeProject]={ ...p[activeProject], ...incoming };
        try{localStorage.setItem("ahp_projects",JSON.stringify(p));}catch{}
        return p;
      });
    });
    ch.subscribe(async(status)=>{
      if(status==="SUBSCRIBED"){
        try{
          await ch.track({
            userId:    profile?.id,
            userName:  profile?.name||"User",
            orgId:     getOrgId()||null,
            view,
            isAdmin:   isRoomAdmin,
            screenSyncMode,
            joinedAt:  new Date().toISOString()
          });
        }catch{}
      }
    });
    channelRef.current=ch;
    return()=>{ try{sbClient.removeChannel(ch);}catch{} };
  },[proj?.id]);

  // Update presence + broadcast screen sync when changing view
  useEffect(()=>{
    if(channelRef.current){
      try{
        channelRef.current.track({
          userId:    profile?.id,
          userName:  profile?.name||"User",
          orgId:     getOrgId()||null,
          view,
          isAdmin:   isRoomAdmin,
          screenSyncMode,
          joinedAt:  new Date().toISOString()
        });
      }catch{}
      // Admin in broadcast mode — push view change to all followers
      if(isRoomAdmin && screenSyncMode==="broadcast"){
        try{
          channelRef.current.send({
            type:"broadcast", event:"screen_sync",
            payload:{ userId:profile?.id, userName:profile?.name||"Admin", orgId:getOrgId()||null, view }
          });
        }catch{}
      }
    }
  },[view]);

  const manualSync=()=>{
    if(!online){showToast("📴 Offline — all changes saved locally, will sync when back online");return;}
    setSyncing(true);
    const ts=new Date().toISOString();
    // Also save to SW cache if available
    if(window.__mradiSWRegistration){
      try{window.__mradiSWRegistration && window.__mradiSWRegistration.update().catch(()=>{});}catch{}
    }
    // Real Supabase sync — push current project to cloud
    const doSync = async () => {
      try{
        if(sbClient && proj?.id){
          await sbFetch(`fcc_projects?id=eq.${proj.id}`, {
            method:"POST",
            headers:{ "Prefer":"resolution=merge-duplicates" },
            body: JSON.stringify({ id:proj.id, owner_id:profile?.id, data:proj, updated_at:ts })
          });
        }
      }catch(e){ console.warn("[Mradi sync]", e.message); }
      setLastSync(ts);persist("ahp_lastSync",ts);setSyncing(false);
      showToast("☁ Synced to cloud — changes saved");
    };
    doSync();
  };

  const handleImport=(imported)=>{
    const p=[...projects];
    p[activeProject]={...p[activeProject],...imported};
    setProjects(p);persist("ahp_projects",p);
    if(imported.diaries)setDiaries(imported.diaries);
    if(imported.materials)setMaterials(imported.materials);
    if(imported.provisions)setProvisions(imported.provisions);
    if(imported.workers)setWorkers(imported.workers);
  };

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  // ── Request push notification permission on first meaningful interaction
  React.useEffect(()=>{
    const askNotif=async()=>{
      if(!('Notification' in window)) return;
      if(Notification.permission==='default'){
        // Delay 3s so user is oriented before the browser prompt
        await new Promise(r=>setTimeout(r,3000));
        const perm=await requestNotifPermission();
        if(perm==='granted') showToast("🔔 Push alerts enabled — you'll be notified of incidents");
      } else {
        _notifPermission=Notification.permission;
      }
    };
    askNotif();
  },[]);

  // ── Resolve ?share=<id> cloud snapshot ──────────────────────────────────────
  useEffect(()=>{
    const shareId = window.__FCC_SHARE_ID__;
    if(!shareId) return;
    window.__FCC_SHARE_ID__ = null;
    const removeOverlay = () => { try{ document.getElementById('fcc-share-loader')?.remove(); }catch{} };
    sbLoadSnapshot(shareId).then(payload => {
      removeOverlay();
      if(!payload){ showToast("⚠ Share link not found or has expired"); return; }
      persist("ahp_seenApp", true); // don't show landing page on next load
      const snapProject = {
        ...payload,
        site: {...(payload.site||{}), name:`[Shared] ${payload.site?.name||"Project"}`},
        _isSnapshot: true, _sharedAt: new Date().toISOString()
      };
      setProjects(prev => {
        if(prev.some(p=>p.id===snapProject.id)){
          const idx = prev.findIndex(p=>p.id===snapProject.id);
          setActiveProject(idx);
          openProject(snapProject.id);
          return prev;
        }
        const next = [...prev, snapProject];
        persist("ahp_projects", next);
        setActiveProject(next.length - 1); // point to the newly added project
        openProject(snapProject.id);
        return next;
      });
      showToast(`✓ Shared project loaded — ${payload.site?.name||"Project"}`);
    }).catch(() => {
      removeOverlay();
      showToast("⚠ Could not load shared project — check your connection");
    });
  },[]);

  // ── Resolve ?room=<projectId> — join a live team room ──────────────────────
  useEffect(()=>{
    const roomId = window.__FCC_ROOM_ID__;
    const removeOverlay = () => { try{ document.getElementById('fcc-room-loader')?.remove(); }catch{} };
    if(!roomId){ removeOverlay(); return; }
    window.__FCC_ROOM_ID__ = null;

    const joinRoom = async () => {
      removeOverlay();
      // Try to load the project from Supabase cloud
      if(sbReady()){
        try{
          const rows = await sbFetch(`fcc_projects?id=eq.${encodeURIComponent(roomId)}&select=data,updated_at`);
          if(rows?.length){
            const cloudProj = rows[0].data;
            if(cloudProj){
              setProjects(prev=>{
                const exists = prev.findIndex(p=>p.id===cloudProj.id);
                if(exists>=0){
                  setActiveProject(exists);
                  openProject(cloudProj.id);
                  return prev;
                }
                const next = [...prev, {...cloudProj, _liveRoom:true}];
                persist("ahp_projects", next);
                setActiveProject(next.length-1);
                openProject(cloudProj.id);
                return next;
              });
            }
          }
        }catch(e){ console.warn("[Mradi Room] Could not load project:", e.message); }
      }
      // Determine if this user is the admin (owner) of the project
      const currentProj = projects.find(p=>p.id===roomId);
      const ownerMatch = currentProj?.owner_id && profile?.id && currentProj.owner_id===profile.id;
      setIsRoomAdmin(ownerMatch || false);
      setShowTeamRoom(true);
      setShowLanding(false);
      // Welcome message
      addChatMsg({ id:"sys-boot", type:"system", text:"🚀 You joined the live team room" });
      showToast(`✓ Joined live room for ${currentProj?.site?.name || "the project"}`);
    };
    // Delay slightly to let auth / state settle
    setTimeout(joinRoom, 600);
  },[]);

  // Determine room admin status whenever profile or project changes
  useEffect(()=>{
    if(!proj || !profile) return;
    // Admin = project was created by this user (owner_id match) OR no owner set
    const isOwner = !proj.owner_id || proj.owner_id===profile.id || profile.id?.startsWith("local-");
    setIsRoomAdmin(isOwner);
  },[proj?.id, profile?.id]);
  useEffect(()=>{
    const uid = window.__pendingCloudSync;
    if(uid){
      window.__pendingCloudSync = null;
      (async()=>{
        if(!sbReady()) return;
        try{
          const cloudProjects = await sbLoadProjects(uid);
          if(cloudProjects && cloudProjects.length > 0){
            const localProjects = load("ahp_projects")||[];
            const localIds = new Set(localProjects.map(p=>p.id).filter(Boolean));
            const cloudOnly = cloudProjects.filter(p=>p.id && !localIds.has(p.id));
            const merged = [...localProjects, ...cloudOnly];
            if(cloudOnly.length > 0){
              persist("ahp_projects", merged);
              setProjects(merged);
              // Open first new cloud project as a tab
              if(cloudOnly[0]?.id) setOpenProjectIds(ids=>[...new Set([...ids, cloudOnly[0].id])]);
              const orgLabel = getOrg()?.name ? ` (${getOrg().name})` : "";
              showToast(`☁ ${cloudOnly.length} project(s) loaded from cloud${orgLabel}`);
            } else {
              showToast("☁ Projects synced");
            }
          }
        }catch(e){ console.warn("Cloud sync:", e.message); }
      })();
    }
  },[]);

  // ── Analytics: track user on boot / re-open ─────────────────────────────────
  useEffect(()=>{
    const p = getLocalProfile();
    if(p?.id && !p.isGuest) sbTrackUser(p);
  },[]);

  // ── Snapshot toast — notify recipient that shared project loaded ────────────
  useEffect(()=>{
    if(window.__FCC_SNAP_NAME__!==undefined){
      const name=window.__FCC_SNAP_NAME__;
      window.__FCC_SNAP_NAME__=undefined;
      setTimeout(()=>showToast(`✓ Shared snapshot loaded — ${name}`),400);
      if(window.fccTrack) window.fccTrack("snapshot_received",{project:name});
    }
    // ── Upgraded plan toast — fires after Paystack redirect activates plan ────
    if(window.__FCC_UPGRADED_PLAN__){
      const pid=window.__FCC_UPGRADED_PLAN__;
      window.__FCC_UPGRADED_PLAN__=undefined;
      const label=FCC_PLANS[pid]?.label||pid;
      setTimeout(()=>showToast(`✅ ${label} plan activated! Valid for 30 days.`),600);
      refreshAddons();
      if(window.fccTrack) window.fccTrack("plan_upgraded",{plan:pid,method:"paystack"});
    }
  },[]);

  const handleSave=d=>{saveProj(d);setShowEdit(false);showToast("✓ Dashboard updated");};

  // ── WhatsApp "Send to Team" ──────────────────────────────────────────────────
  const sendToTeam=()=>{
    try{
      // Build a lightweight snapshot (overview data only — keep URL short)
      const snap={
        site: proj.site,
        phases: proj.phases?.map(ph=>({id:ph.id,name:ph.name,progress:ph.progress,status:ph.status,budget:ph.budget,spent:ph.spent})),
        snags: proj.snags?.slice(0,10),
        risks: proj.risks?.slice(0,10),
        _snapBy: profile?.name||"Team",
        _snapAt: new Date().toISOString(),
      };
      const encoded = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(snap)))));
      const baseUrl = window.location.href.split("?")[0];
      const link = `${baseUrl}?snap=${encoded}`;
      const spent = totalSpent||0;
      const budget = totalBudget||0;
      const pctBudget = budget>0?Math.round(spent/budget*100):0;
      const lines = [
        `*📊 ${proj.site?.name||"Project"} — Field Update*`,
        ``,
        `▸ Overall: *${totalProgress}%* complete`,
        daysLeft!=null?`▸ Days left: *${daysLeft}*`:"",
        `▸ Budget used: *${pctBudget}%* (KES ${(spent/1e6).toFixed(1)}M / ${(budget/1e6).toFixed(1)}M)`,
        openRisks>0?`▸ Open risks: *${openRisks}*`:"▸ No open risks ✓",
        blockedWPs>0?`▸ Blocked work pkgs: *${blockedWPs}*`:"",
        ``,
        `📱 View live snapshot:`,
        link,
        ``,
        `_Sent from Mradi HQ_`,
      ].filter(Boolean).join("\n");
      const waUrl = "https://wa.me/?text="+encodeURIComponent(lines);
      // Must be synchronous — no await before window.open or browser blocks it as popup
      const win = window.open(waUrl, "_blank");
      if(win) {
        showToast("✅ Opening WhatsApp…");
      } else {
        // Popup blocked — copy to clipboard using synchronous execCommand fallback
        try {
          const ta = document.createElement("textarea");
          ta.value = lines; ta.style.position="fixed"; ta.style.opacity="0";
          document.body.appendChild(ta); ta.focus(); ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        } catch(copyErr) { /* silent */ }
        showToast("✓ Message copied — open WhatsApp and paste");
      }
      if(window.fccTrack) window.fccTrack("whatsapp_send",{project:proj.site?.name||""});
    }catch(e){
      showToast("⚠ Could not open WhatsApp — try again");
      console.warn("[sendToTeam]", e);
    }
  };

  // ── Inline edit helpers ──────────────────────────────────────────────────────
  // Auto-focus & select the input whenever a cell enters edit mode
  useEffect(()=>{
    if(inlineEdit&&inlineRef.current){
      inlineRef.current.focus();
      if(typeof inlineRef.current.select==="function") inlineRef.current.select();
    }
  },[inlineEdit]);

  // Commit the current edit back into wps state
  const commitInline=(overrideVal)=>{
    if(!inlineEdit) return;
    const {wpId,col}=inlineEdit;
    const val=overrideVal!==undefined?overrideVal:inlineEdit.val;
    const coerced=col==="progress"?Math.max(0,Math.min(100,Number(val))):val;
    const newWPs=wps.map(w=>w.id===wpId?{...w,[col]:coerced}:w);
    saveProj({wps:newWPs});
    setInlineEdit(null);
    showToast("✓ Saved");
  };

  const cancelInline=()=>setInlineEdit(null);

  // Save current cell and move up/down in same column (dir: +1 down, -1 up)
  const navigateInline=(dir)=>{
    if(!inlineEdit) return;
    const {wpId,col,val}=inlineEdit;
    // commit current value first
    const coerced=col==="progress"?Math.max(0,Math.min(100,Number(val))):val;
    const updatedWPs=wps.map(w=>w.id===wpId?{...w,[col]:coerced}:w);
    saveProj({wps:updatedWPs});
    const rows=updatedWPs.filter(w=>w.phase===activePhase);
    const idx=rows.findIndex(w=>w.id===wpId);
    const nextIdx=idx+dir;
    if(nextIdx>=0&&nextIdx<rows.length){
      const next=rows[nextIdx];
      setInlineEdit({wpId:next.id,col,val:String(next[col]??'')});
    } else {
      setInlineEdit(null);
    }
  };

  // Shared keyboard handler for all inline inputs
  const inlineKeyDown=(e)=>{
    if(e.key==="Enter"||e.key==="ArrowDown"){e.preventDefault();navigateInline(1);}
    else if(e.key==="ArrowUp"){e.preventDefault();navigateInline(-1);}
    else if(e.key==="Escape"){e.preventDefault();cancelInline();}
  };

  // Open a cell for editing
  const openCell=(wpId,col,val)=>setInlineEdit({wpId,col,val:String(val??'')});

  const teamMap=Object.fromEntries(team.map(m=>[m.id,m]));
  const totalBudget=phases.reduce((s,p)=>s+p.budget,0);
  const totalSpent=phases.reduce((s,p)=>s+p.spent,0);
  const totalProgress=phases.length?Math.round(phases.reduce((s,p)=>s+p.progress,0)/phases.length):0;
  const completedUnits=Math.round((site.units||0)*0.09);
  const openRisks=risks.filter(r=>r.status!=="closed").length;
  const blockedWPs=wps.filter(w=>w.status==="blocked").length;
  const daysLeft=site.targetCompletion?Math.round((new Date(site.targetCompletion)-new Date())/864e5):null;
  const matAlerts=materials.filter(m=>m.weeklyBurn&&Math.floor(m.onSite/m.weeklyBurn)<=3).length;
  // ── SMART DELAY ALERTS — auto-detect schedule slippage ──
  const todayMs = Date.now();
  const overdueWPs = wps.filter(w=>{
    if(!w.endDate || w.status==="completed" || w.status==="done") return false;
    return new Date(w.endDate).getTime() < todayMs;
  });
  const behindPhases = phases.filter(p=>{
    if(!p.startDate || !p.endDate || p.status==="completed") return false;
    const start = new Date(p.startDate).getTime();
    const end   = new Date(p.endDate).getTime();
    const total = end - start;
    if(total<=0) return false;
    const elapsed = Math.min(todayMs - start, total);
    const expectedPct = Math.round((elapsed/total)*100);
    return (p.progress||0) < expectedPct - 15; // >15% behind expected
  });
  const alerts=[
    // Critical risks & snags
    ...risks.filter(r=>r.severity==="critical"&&r.status==="open").map(r=>({type:"critical",msg:r.title,ts:"Risk Register"})),
    ...snags.filter(s=>s.status==="open"&&s.severity==="critical").map(s=>({type:"critical",msg:`Snag: ${s.block||""} — ${s.item}`,ts:s.raised})),
    // Smart delay: overdue work packages
    ...overdueWPs.slice(0,3).map(w=>{
      const daysOver = Math.round((todayMs - new Date(w.endDate).getTime())/864e5);
      return {type:"critical",msg:`Delay: "${w.title||w.id}" overdue by ${daysOver}d`,ts:"Programme"};
    }),
    // Smart delay: phases behind expected progress
    ...behindPhases.slice(0,2).map(p=>{
      const start = new Date(p.startDate).getTime();
      const end   = new Date(p.endDate).getTime();
      const expectedPct = Math.round(((Math.min(todayMs,end)-start)/(end-start))*100);
      return {type:"warn",msg:`${p.name}: ${p.progress||0}% done, expected ${expectedPct}% — may affect completion date`,ts:"Programme"};
    }),
    // Material stock warnings
    ...materials.filter(m=>m.weeklyBurn&&Math.floor(m.onSite/m.weeklyBurn)<=1).map(m=>({type:"critical",msg:`${m.name} — less than 1 week stock remaining`,ts:"Materials"})),

    ...(provisions.variations||[]).filter(v=>v.status==="pending"||v.status==="submitted").map(v=>({type:"warn",msg:`VO Pending: ${v.id} — ${fmtKES(v.amount)}`,ts:v.raised})),

  const NAV=[
    // ── BOTTOM NAV — 5 field-first pins ──

    {id:"materials",  label:"Materials", icon:"🧱"},
    {id:"diary",      label:"Diary",     icon:"📋"},
    {id:"report",     label:"Reports",   icon:"📄"},

    {id:"wbs",        label:"Work Pkgs", icon:"📦"},
    {id:"provisions", label:"Provisions",icon:"💰"},
    {id:"budget",     label:"Cost Tracker",icon:"📊"},
    {id:"timeline",   label:"Timeline",  icon:"📸"},
    {id:"risks",      label:"Risks & QA",icon:"⚠"},
    {id:"payments",   label:"Payments",  icon:"💳"},

  // ── Gate 1: Auth (Login / Sign Up) ──

      {/* iOS Safari install banner — shown on first visit if not installed */}

        />

      {showShareModal&&<ShareSnapshotModal proj={proj} diaries={diaries} materials={materials} provisions={provisions} onClose={()=>setShowShareModal(false)} showToast={showToast} currentUserId={profile?.id||null}/>}
      {showTeamRoom&&(
        <TeamRoomPanel
          proj={proj}
          profile={profile}

                  type:"broadcast", event:"screen_sync",

            if(channelRef.current){
              try{
                channelRef.current.track({

                  userName:  profile?.name||"User",

          showToast={showToast}
        />

      {showNewProject&&<NewProjectWizard onCreate={p=>{
