const sbSignup = async (name, email, password) => {
  if(!sbReady()) {
    // Supabase not configured — local-only fallback
    const u = { id:"local-"+Date.now(), name, email, role:"owner", plan:"free", org:"Local Org", createdAt:new Date().toISOString() };
    try{ localStorage.setItem("fcc_user", JSON.stringify(u)); }catch{}
    return { user:u };
  }
  let res, data;
  try {
    res = await fetch(`${FCC_CONFIG.supabaseUrl}/auth/v1/signup`, {
      method:"POST",
      headers:{ "apikey":FCC_CONFIG.supabaseKey, "Content-Type":"application/json" },
      body: JSON.stringify({ email, password, data:{ name } })
    });
    data = await res.json();
  } catch(netErr) {
    throw new Error("Network error — check your internet connection and try again.");
  }
  if(!res.ok || data.error) {
    const msg = data?.error?.message || data?.msg || data?.error || "Sign-up failed.";
    // Map common Supabase error codes to plain English
    if(/already registered/i.test(msg))    throw new Error("This email is already registered. Try signing in instead.");
    if(/password.*short|characters/i.test(msg)) throw new Error("Password must be at least 6 characters.");
    if(/invalid.*email/i.test(msg))        throw new Error("Enter a valid email address.");
    throw new Error(msg);
  }
  // Supabase returns user in data.user (email confirm OFF) or data.identities (confirm ON)
  const userId = data.user?.id || data.id;
  if(!userId) throw new Error("Account created — check your email to confirm before signing in.");
  const u = { id:userId, name, email, role:"owner", plan:"free", org:"", createdAt:new Date().toISOString(), access_token:data.access_token||null, refresh_token:data.refresh_token||null };
  try{ localStorage.setItem("fcc_user", JSON.stringify(u)); }catch{}
  return { user:u };
};

const sbLogin = async (email, password) => {
  if(!sbReady()) {
    // Supabase not configured — check locally stored user
    let stored=null;
    try{ stored=JSON.parse(localStorage.getItem("fcc_user")); }catch{}
    if(stored && stored.email===email) return { user:stored };
    throw new Error("No local account found. Please sign up first, or check your internet connection.");
  }
  let res, data;
  try {
    res = await fetch(`${FCC_CONFIG.supabaseUrl}/auth/v1/token?grant_type=password`, {
      method:"POST",
      headers:{ "apikey":FCC_CONFIG.supabaseKey, "Content-Type":"application/json" },
      body: JSON.stringify({ email, password })
    });
    data = await res.json();
  } catch(netErr) {
    throw new Error("Network error — check your internet connection and try again.");
  }
  if(!res.ok || data.error) {
    const msg = data?.error?.message || data?.error_description || data?.error || "Login failed.";
    if(/invalid.*credentials|wrong.*password|Email not confirmed/i.test(msg))
      throw new Error("Incorrect email or password. Double-check and try again.");
    if(/email.*not.*confirmed/i.test(msg))
      throw new Error("Please confirm your email address first — check your inbox for the verification link.");
    if(/too many requests/i.test(msg))
      throw new Error("Too many attempts — wait a minute then try again.");
    throw new Error(msg);
  }
  const u = {
    id: data.user?.id,
    name: data.user?.user_metadata?.name || email.split("@")[0],
    email,
    role: "owner", plan: "free", org: "",
    access_token:  data.access_token,
    refresh_token: data.refresh_token || null
  };
  try{ localStorage.setItem("fcc_user", JSON.stringify(u)); }catch{}
  return { user:u };
};

const sbSaveProject = async (userId, project) => {

  try{

    // Stamp updated_at for merge resolution
    const stamped = {...project, updated_at: new Date().toISOString()};
    if(idx>=0) all[idx]=stamped; else all.push(stamped);
    localStorage.setItem("ahp_projects", JSON.stringify(all));
  }catch{}
  // Best-effort Supabase upsert (skipped for guests — local-only)
  if(!sbReady() || !userId || String(userId).startsWith("guest-") || String(userId).startsWith("local-")) return;

/* ── 4a-2. SNAPSHOT SHORT-LINK HELPERS ───────────────────────────
   sbSaveSnapshot  — stores full payload, returns 8-char share ID
   sbLoadSnapshot  — fetches payload by ID (used at boot time)
   ─────────────────────────────────────────────────────────────── */

const genShareId = () => {
  const chars = "abcdefghjkmnpqrstuvwxyz23456789"; // no 0/O/1/I/l confusion
  let id = "";
  for(let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
};

const sbSaveSnapshot = async (payload, userId) => {
  if(!sbReady()) throw new Error("Cloud storage not available.");
  const id = genShareId();
  let res;
  try {
    res = await fetch(`${FCC_CONFIG.supabaseUrl}/rest/v1/fcc_snapshots`, {
      method: "POST",
      headers: {
        "apikey":        FCC_CONFIG.supabaseKey,
        "Authorization": `Bearer ${sbAuthToken()}`,
        "Content-Type":  "application/json",
        "Prefer":        "return=minimal"
      },
      body: JSON.stringify({
        id,
        data:       payload,
        created_by: userId || null
      })
    });
  } catch(netErr) {
    throw new Error("Network error — check your connection and try again.");
  }
  if(!res.ok) {
    const txt = await res.text().catch(()=>"");
    // Auto-refresh JWT and retry once
    if(txt.includes("JWT expired") || txt.includes("PGRST303")) {
      const newToken = await sbRefreshSession();
      if(newToken) {
        // Retry with fresh token
        const res2 = await fetch(`${FCC_CONFIG.supabaseUrl}/rest/v1/fcc_snapshots`, {
          method: "POST",
          headers: {
            "apikey":        FCC_CONFIG.supabaseKey,
            "Authorization": `Bearer ${newToken}`,
            "Content-Type":  "application/json",
            "Prefer":        "return=minimal"
          },
          body: JSON.stringify({ id, data: payload, created_by: userId || null })
        });
        if(res2.ok) return id;
        const txt2 = await res2.text().catch(()=>"");
        throw new Error("Failed to save snapshot: " + (txt2||res2.status));
      }
      // No refresh token available — try with anon key (RLS allows public insert)
      const res3 = await fetch(`${FCC_CONFIG.supabaseUrl}/rest/v1/fcc_snapshots`, {
        method: "POST",
        headers: {
          "apikey":        FCC_CONFIG.supabaseKey,
          "Authorization": `Bearer ${FCC_CONFIG.supabaseKey}`,
          "Content-Type":  "application/json",
          "Prefer":        "return=minimal"
        },
        body: JSON.stringify({ id, data: payload, created_by: userId || null })
      });
      if(res3.ok) return id;
    }
    throw new Error("Failed to save snapshot: " + (txt||res.status));
  }
  return id;
};

const sbLoadSnapshot = async (id) => {
  if(!sbReady() || !id) return null;
  try {
    const res = await fetch(
      `${FCC_CONFIG.supabaseUrl}/rest/v1/fcc_snapshots?id=eq.${encodeURIComponent(id)}&select=data,expires_at`,
      { headers: { "apikey": FCC_CONFIG.supabaseKey, "Authorization": `Bearer ${FCC_CONFIG.supabaseKey}` } }
    );
    if(!res.ok) return null;
    const rows = await res.json();
    if(!rows?.length) return null;
    const row = rows[0];
    if(row.expires_at && new Date(row.expires_at) < new Date()) return null; // expired
    return row.data;
  } catch(e) { return null; }
};

/* ── 4a-3. SUPABASE STORAGE — PHOTO UPLOADS ─────────────────────
   Photos are uploaded to the 'site-photos' public bucket and stored
   as HTTPS URLs. This means they open on any device, work in shared
   snapshots, and don't bloat localStorage.

   SQL / Supabase Dashboard setup (one-time):
   ─────────────────────────────────────────
   1. Go to Storage → New bucket → Name: "site-photos" → Public: ON
   2. Under Policies add:
      INSERT: (bucket_id = 'site-photos') — authenticated users
      SELECT: (bucket_id = 'site-photos') — public (true)
   Or run in SQL Editor:
      insert into storage.buckets (id, name, public)
        values ('site-photos', 'site-photos', true)
        on conflict (id) do nothing;
      create policy "Public read photos"
        on storage.objects for select using (bucket_id = 'site-photos');
      create policy "Auth upload photos"
        on storage.objects for insert
        with check (bucket_id = 'site-photos');
   ─────────────────────────────────────────────────────────────── */

// Upload a photo file (File or Blob) to Supabase Storage.
// Returns the public HTTPS URL, or null if unavailable.
const sbUploadPhoto = async (file, userId) => {
  if(!sbReady()) return null;
  try {
    // Build a unique path: photos/<userId>/<timestamp>-<random>.<ext>
    const ext  = (file.name || "photo.jpg").split(".").pop().toLowerCase().replace(/[^a-z0-9]/g,"") || "jpg";
    const uid  = userId || "anon";
    const name = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const path = `photos/${uid}/${name}`;
    const res  = await fetch(
      `${FCC_CONFIG.supabaseUrl}/storage/v1/object/site-photos/${path}`,
      {
        method:  "POST",
        headers: {
          "apikey":        FCC_CONFIG.supabaseKey,
          "Authorization": `Bearer ${sbAuthToken()}`,
          "Content-Type":  file.type || "image/jpeg",
          "x-upsert":      "true"
        },
        body: file
      }
    );
    if(!res.ok) {
      const txt = await res.text().catch(()=>"");
      console.warn("[FCC] Photo upload failed:", txt);
      return null;
    }
    // Construct the public URL
    return `${FCC_CONFIG.supabaseUrl}/storage/v1/object/public/site-photos/${path}`;
  } catch(e) {
    console.warn("[FCC] Photo upload error:", e.message);
    return null;
  }
};

/* ── 4b. SUPABASE REALTIME CLIENT + PRESENCE ─────────────────────
   Singleton Supabase JS client (used for realtime channels).
   Raw REST (sbFetch) is kept for data ops; the JS client handles
   realtime subscriptions, presence, and broadcasts.
   ─────────────────────────────────────────────────────────────── */
let _sbJsClient = null;
const getSupabaseClient = () => {
  if(_sbJsClient) return _sbJsClient;
  if(!FCC_CONFIG.supabaseUrl || !FCC_CONFIG.supabaseKey) return null;
  try{
    const { createClient } = window.supabase || {};
    if(!createClient) return null;
    _sbJsClient = createClient(FCC_CONFIG.supabaseUrl, FCC_CONFIG.supabaseKey, {
      realtime: { params: { eventsPerSecond: 5 } }
    });
    return _sbJsClient;
  }catch(e){ console.warn("[Mradi RT] Supabase client init failed:", e.message); return null; }
};

/* ── 5. M-PESA REALTIME PAYMENT LISTENER ─────────────────────────────────────
   Subscribes to mpesa_payments table via Supabase Realtime.
   Falls back to REST polling every 3s if JS client unavailable.
   Returns a cleanup function — always call it when the component unmounts.
   ─────────────────────────────────────────────────────────────────────────── */
function listenForPaymentResult(checkoutRequestId, { onSuccess, onFailure, onTimeout, maxWaitMs = 90000 }) {
  const sbClient = getSupabaseClient();
  let settled = false;
  let timeoutHandle = null;

  const settle = (fn) => {
    if (settled) return;
    settled = true;
    clearTimeout(timeoutHandle);
    if (sbClient) { try { sbClient.removeChannel(channel); } catch {} }
    fn();
  };

  timeoutHandle = setTimeout(() => settle(onTimeout), maxWaitMs);

  if (sbClient) {
    const channel = sbClient
      .channel(`mpesa:${checkoutRequestId}`)
      .on("postgres_changes", {
        event: "*", schema: "public", table: "mpesa_payments",
        filter: `id=eq.${checkoutRequestId}`,
      }, (payload) => {
        const row = payload.new;
        if (!row || !row.status || row.status === "pending") return;
        row.status === "success"
          ? settle(() => onSuccess(row.mpesa_receipt || checkoutRequestId))
          : settle(() => onFailure(row.result_desc || row.status, row.status));
      })
      .subscribe();
    return () => settle(() => {});
  }

  // REST poll fallback
  const startedAt = Date.now();
  const poll = setInterval(async () => {
    if (settled) { clearInterval(poll); return; }
    if (Date.now() - startedAt > maxWaitMs) { clearInterval(poll); settle(onTimeout); return; }
    try {
      const r = await fetch(
        `${FCC_CONFIG.supabaseUrl}/rest/v1/mpesa_payments?id=eq.${encodeURIComponent(checkoutRequestId)}&select=status,result_desc,mpesa_receipt`,
        { headers: { apikey: FCC_CONFIG.supabaseKey, Authorization: `Bearer ${FCC_CONFIG.supabaseKey}` } }
      );
      const rows = await r.json();
      const row = Array.isArray(rows) && rows[0];
      if (!row || !row.status || row.status === "pending") return;
      clearInterval(poll);
      row.status === "success"
        ? settle(() => onSuccess(row.mpesa_receipt || checkoutRequestId))
        : settle(() => onFailure(row.result_desc || row.status, row.status));
    } catch {} // network hiccup — keep polling
  }, 3000);

  return () => { clearInterval(poll); settle(() => {}); };
}

/* ── 6. M-PESA DARAJA STK PUSH + PAYSTACK CHECKOUT ──────────── */

// Format phone to 254XXXXXXXXX
const normalizeMpesaPhone = (phone) => {
  const d = phone.replace(/\D/g, "");
  if(d.startsWith("254")) return d;
  if(d.startsWith("0")) return "254" + d.slice(1);
  if(d.startsWith("7") || d.startsWith("1")) return "254" + d;
  return d;
};

// Generate Daraja password (base64 of shortcode + passkey + timestamp)
const darajaPassword = (shortcode, passkey, timestamp) => {
  const raw = shortcode + passkey + timestamp;
  try { return btoa(raw); } catch { return btoa(unescape(encodeURIComponent(raw))); }
};

// Format YYYYMMDDHHMMSS timestamp
const darajaTimestamp = () => {
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
};

// Initiate STK Push via the relay Edge Function (avoids CORS)
// The relay calls Safaricom on the server side and returns the response.
const initMpesaStkPush = async (phone, amount, planLabel, userEmail) => {
  if(!FCC_CONFIG.mpesaRelayUrl) throw new Error("mpesaRelayUrl not configured in FCC_CONFIG.");
  const timestamp = darajaTimestamp();
  const password  = darajaPassword(FCC_CONFIG.mpesaShortcode, FCC_CONFIG.mpesaPasskey || "bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919", timestamp);
  const payload = {
    env:              FCC_CONFIG.mpesaEnv || "sandbox",
    shortcode:        FCC_CONFIG.mpesaShortcode,
    password,
    timestamp,
    amount:           Math.ceil(amount),
    phone:            normalizeMpesaPhone(phone),
    accountReference: `FCC-${planLabel.toUpperCase()}`,
    transactionDesc:  `Mradi HQ ${planLabel} plan`,
    callbackUrl:      FCC_CONFIG.mpesaRelayUrl + "/callback",
  };
  const res = await fetch(FCC_CONFIG.mpesaRelayUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if(!res.ok || data.ResponseCode !== "0") throw new Error(data.ResponseDescription || data.errorMessage || "STK Push failed");
  return data; // { CheckoutRequestID, MerchantRequestID, ResponseCode, CustomerMessage }
};

// Paystack inline checkout (cards + M-Pesa via Paystack JS SDK)
const openPaystackCheckout = (plan, amount, userEmail, onSuccess) => {
  if(!FCC_CONFIG.paystackPublicKey) {
    alert("Paystack not configured yet. Add paystackPublicKey to FCC_CONFIG.\n\nAlternatively configure mpesaRelayUrl for direct M-Pesa STK Push.");
    return;
  }
  // Dynamically load Paystack inline JS if not already loaded
  const load = (cb) => {
    if(window.PaystackPop) { cb(); return; }
    const s = document.createElement("script");
    s.src = "https://js.paystack.co/v1/inline.js";
    s.onload = cb;
    document.head.appendChild(s);
  };
  load(() => {
    const handler = window.PaystackPop.setup({
      key:       FCC_CONFIG.paystackPublicKey,
      email:     userEmail || "user@fcc.app",
      amount:    amount * 100, // Paystack expects kobo/cents (KES * 100)
      currency:  "KES",
      ref:       "FCC-" + Date.now(),
      metadata:  { plan, custom_fields: [{ display_name: "Plan", variable_name: "plan", value: plan }] },
      channels:  ["card", "mobile_money", "bank_transfer"],
      callback:  (response) => { if(onSuccess) onSuccess(response.reference); },
      onClose:   () => {}
    });
    handler.openIframe();
  });
};

// React component: M-Pesa payment modal (STK Push flow)
function MpesaPayModal({ plan, amount, userEmail, onSuccess, onClose }) {
  const [phone, setPhone]       = useState("");
  const [status, setStatus]     = useState("idle"); // idle | sending | waiting | done | error
  const [msg, setMsg]           = useState("");
  const [checkoutId, setCheckoutId] = useState(null);
  const PLAN_COLORS = { pro: "var(--accent)", team: "var(--purple)" };
  const color = PLAN_COLORS[plan] || "var(--accent)";

  const handleSTK = async () => {
    if(!phone || phone.replace(/\D/g,"").length < 9) { setMsg("Enter a valid M-Pesa number e.g. 0712345678"); return; }
    setStatus("sending"); setMsg("");
    try {
      const res = await initMpesaStkPush(phone, amount, plan, userEmail);
      setStatus("waiting");
      setMsg("M-Pesa prompt sent! Enter your PIN on your phone to complete payment. This screen will update automatically.");
      const checkoutId = res.CheckoutRequestID;
      setCheckoutId(checkoutId);
      // ── Supabase Realtime listener + REST poll fallback ──────────────────
      const startedAt = Date.now();
      const MAX_WAIT = 90000;
      let settled = false;
      let sbCh = null; // declared before closures so resolve/fail always see the assigned channel
      let restPoll = null;
      const resolve = (receipt) => {
        if(settled) return; settled = true;
        if(restPoll) clearInterval(restPoll);
        if(sbCh) try { getSupabaseClient()?.removeChannel(sbCh); sbCh = null; } catch {}
        setStatus("done");
        setMsg("✅ Payment confirmed! Your plan is now " + plan.toUpperCase() + ".");
        setTimeout(() => { if(onSuccess) onSuccess(receipt || checkoutId); }, 1000);
      };
      const fail = (desc) => {
        if(settled) return; settled = true;
        if(restPoll) clearInterval(restPoll);
        if(sbCh) try { getSupabaseClient()?.removeChannel(sbCh); sbCh = null; } catch {}
        setStatus("error");
        setMsg(desc || "Payment did not complete. Please try again.");
      };
      // Supabase Realtime channel (fires instantly when callback updates the row)
      const sbClient = getSupabaseClient();
      if(sbClient && checkoutId) {
        sbCh = sbClient
          .channel("mpesa-modal:" + checkoutId)
          .on("postgres_changes", {
            event: "*", schema: "public",
            table: "mpesa_payments",
            filter: "id=eq." + checkoutId,
          }, (payload) => {
            const row = payload.new;
            if(!row || !row.status || row.status === "pending") return;
            if(row.status === "success") resolve(row.mpesa_receipt);
            else fail(row.result_desc || "Payment " + row.status + ". Please try again.");
          })
          .subscribe();
      }
      // REST poll — sandbox auto-resolve + Realtime fallback
      restPoll = setInterval(async () => {
        if(settled) { clearInterval(restPoll); return; }
        if(Date.now() - startedAt > MAX_WAIT) {
          clearInterval(restPoll);
          fail("No response after 90 seconds. If you entered your PIN, check your M-Pesa messages — the payment may still process.");
          return;
        }
        // Sandbox: auto-confirm after 8s so demo flow works without a real callback
        if(FCC_CONFIG.mpesaEnv === "sandbox" && Date.now() - startedAt > 8000) {
          resolve("SANDBOX-" + Date.now()); return;
        }
        // REST check against mpesa_payments table
        try {
          if(!FCC_CONFIG.supabaseUrl || !FCC_CONFIG.supabaseKey || !checkoutId) return;
          const r = await fetch(
            FCC_CONFIG.supabaseUrl + "/rest/v1/mpesa_payments?id=eq." + encodeURIComponent(checkoutId) + "&select=status,mpesa_receipt,result_desc",
            { headers: { apikey: FCC_CONFIG.supabaseKey, Authorization: "Bearer " + FCC_CONFIG.supabaseKey } }
          );
          const rows = await r.json();
          const row = Array.isArray(rows) && rows[0];
          if(row && row.status && row.status !== "pending") {
            if(row.status === "success") resolve(row.mpesa_receipt);
            else fail(row.result_desc || "Payment " + row.status + ". Please try again.");
          }
        } catch {} // network hiccup — keep polling
      }, 3000);
    } catch(e) {
      setStatus("error");
      setMsg("Error: " + e.message);
    }
  };

  return (
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"var(--overlay)",zIndex:600}}/>
      <div style={{
        position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
        width:"min(380px,94vw)",background:"var(--modal-bg)",
        border:`1px solid ${color}55`,borderRadius:"12px",zIndex:601,
        boxShadow:"0 20px 60px rgba(0,0,0,0.35)",padding:"24px",
        animation:"fadeUp 0.2s ease"
      }}>

const ORG_KEY = 'mradi_org';

const genId  = (n=12) => Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b=>'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[b%36]).join('');
const genCode = ()    => genId(6);

const getOrg = () => { try{ return JSON.parse(localStorage.getItem(ORG_KEY))||null; }catch{ return null; } };
const saveOrg = (org) => { try{ localStorage.setItem(ORG_KEY, JSON.stringify(org)); }catch{} return org; };

const getOrgRole   = () => { try{ return JSON.parse(localStorage.getItem('mradi_profile')||'{}').orgRole||null; }catch{ return null; } };
const getOrgId     = () => { try{ return JSON.parse(localStorage.getItem('mradi_profile')||'{}').orgId||null; }catch{ return null; } };

const avatarColor = (name='?') => {
  const palette = ['#E53E3E','#D69E2E','#38A169','#3182CE','#805AD5','#DD6B20','#00B5D8','#B83280'];
  let h = 0; for(let i=0;i<name.length;i++) h = (h*31+name.charCodeAt(i))&0xffff;
  return palette[h % palette.length];
};

// ─── OrgSetupScreen ────────────────────────────────────────────
function OrgSetupScreen({ profile, onDone, prefillCode }) {
  const {useState:uS} = React;
  const [mode,    setMode]    = uS(prefillCode ? 'join' : null); // null | 'create' | 'join'
  const [orgName, setOrgName] = uS('');
  const [code,    setCode]    = uS(prefillCode||'');
  const [step,    setStep]    = uS(prefillCode ? 'join' : 'choose'); // 'choose'|'create'|'join'|'done'
  const [created, setCreated] = uS(null); // newly created org
  const [error,   setError]   = uS('');
  const [loading, setLoading] = uS(false);
  const IS = {width:'100%',padding:'11px 13px',background:'var(--input-bg)',border:'1px solid var(--border)',borderRadius:'8px',color:'var(--text)',fontFamily:"'DM Sans',sans-serif",fontSize:'13px',outline:'none',boxSizing:'border-box',marginBottom:'12px'};
  const LS = {fontFamily:"'JetBrains Mono',monospace",fontSize:'9px',color:'var(--text4)',textTransform:'uppercase',letterSpacing:'0.1em',display:'block',marginBottom:'5px'};

  const createOrg = () => {
    if(!orgName.trim()) { setError('Enter your organisation name.'); return; }
    setLoading(true);
    const org = saveOrg({
      id: genId(16),
      name: orgName.trim(),
      inviteCode: genCode(),
      adminId: profile.id,
      adminName: profile.name,
      createdAt: new Date().toISOString(),
      members: [{ id:profile.id, name:profile.name, email:profile.email, role:'admin', joinedAt:new Date().toISOString() }],
    });
    saveLocalProfile({ orgId:org.id, orgRole:'admin', orgName:org.name });
    sbSyncOrgMember(profile.id, org.id, 'admin'); // sync to Supabase for cloud RLS
    setCreated(org);
    setStep('done');
    setLoading(false);
  };

  const joinOrg = () => {
    const upper = code.trim().toUpperCase();
    if(upper.length !== 6) { setError('Enter the 6-character invite code.'); return; }
    // Check if org with this invite code exists locally
    const existing = getOrg();
    if(!existing || existing.inviteCode !== upper) {
      setError('Code not found. Ask your admin to share the invite link — it will load the org automatically.');
      return;
    }
    // Add member
    const member = { id:profile.id, name:profile.name, email:profile.email||'', role:'member', joinedAt:new Date().toISOString() };
    const already = existing.members.find(m=>m.id===profile.id);
    if(!already) existing.members.push(member);
    saveOrg(existing);
    saveLocalProfile({ orgId:existing.id, orgRole:'member', orgName:existing.name });
    sbSyncOrgMember(profile.id, existing.id, 'member'); // sync to Supabase for cloud RLS
    onDone(getLocalProfile());
  };

  const inviteLink = created ? `${location.origin}${location.pathname}?join=${created.inviteCode}` : '';

  return (
    <div className="org-setup-screen">
      <div className="org-box">
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'24px'}}>
          <div style={{width:'44px',height:'44px',background:'var(--accent)',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',color:'#fff',flexShrink:0}}>🏗</div>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:'22px',letterSpacing:'0.07em',color:'var(--text)',lineHeight:1}}>Welcome, {profile.name?.split(' ')[0]||'there'}!</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'8px',color:'var(--text4)',letterSpacing:'0.16em',textTransform:'uppercase',marginTop:'2px'}}>Set up your organisation</div>
          </div>
        </div>

        {/* STEP: CHOOSE */}
        {step==='choose'&&(
          <>
            <div style={{fontSize:'13px',color:'var(--text2)',marginBottom:'20px',lineHeight:1.5}}>
              Mradi HQ is built for teams. Create your organisation or join an existing one.
            </div>
            <div className="org-mode-grid">
              <button className={`org-mode-btn ${mode==='create'?'selected':''}`} onClick={()=>{setMode('create');setStep('create');}}>
                <span className="org-mode-icon">🏗</span>
                <span className="org-mode-label">Create Org</span>
                <span className="org-mode-sub">Set up a new organisation and invite your team</span>
              </button>
              <button className={`org-mode-btn ${mode==='join'?'selected':''}`} onClick={()=>{setMode('join');setStep('join');}}>
                <span className="org-mode-icon">👥</span>
                <span className="org-mode-label">Join Org</span>
                <span className="org-mode-sub">Enter an invite code from your admin</span>
              </button>
            </div>
            <button onClick={()=>onDone(profile)} style={{width:'100%',padding:'10px',background:'none',border:'1px dashed var(--border2)',borderRadius:'8px',color:'var(--text4)',fontFamily:"'JetBrains Mono',monospace",fontSize:'9px',cursor:'pointer',marginTop:'4px'}}>
              Skip for now — continue solo
            </button>
          </>
        )}

        {/* STEP: CREATE */}
        {step==='create'&&(
          <>
            <button onClick={()=>setStep('choose')} style={{background:'none',border:'none',color:'var(--text4)',fontFamily:"'JetBrains Mono',monospace",fontSize:'9px',cursor:'pointer',marginBottom:'16px',padding:'0',display:'flex',alignItems:'center',gap:'4px'}}>← Back</button>
            <div style={{fontSize:'15px',fontWeight:'800',color:'var(--text)',marginBottom:'16px'}}>🏗 Create Your Organisation</div>
            {error&&<div style={{background:'var(--red)15',border:'1px solid var(--red)44',borderRadius:'6px',padding:'10px',marginBottom:'12px',fontSize:'11px',color:'var(--red)',fontFamily:"'JetBrains Mono',monospace"}}>{error}</div>}
            <label style={LS}>Organisation / Company Name</label>
            <input style={IS} placeholder="e.g. Mradi Construction Ltd" value={orgName} onChange={e=>{setOrgName(e.target.value);setError('');}} onKeyDown={e=>e.key==='Enter'&&createOrg()} autoFocus/>
            <div style={{fontSize:'11px',color:'var(--text3)',marginBottom:'16px',lineHeight:1.5}}>
              An invite code and link will be generated — share it with your team so they can join this organisation.
            </div>

          </>
        )}

        {/* STEP: JOIN */}
        {step==='join'&&(

            {!prefillCode&&<button onClick={()=>setStep('choose')} style={{background:'none',border:'none',color:'var(--text4)',fontFamily:"'JetBrains Mono',monospace",fontSize:'9px',cursor:'pointer',marginBottom:'16px',padding:'0',display:'flex',alignItems:'center',gap:'4px'}}>← Back</button>}

            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'16px'}}>
              <div style={{width:'40px',height:'40px',background:'var(--green)15',border:'2px solid var(--green)44',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:0}}>✓</div>
              <div>

                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'8px',color:'var(--green)',textTransform:'uppercase',letterSpacing:'0.1em',marginTop:'2px'}}>Organisation Created · You are Admin</div>
              </div>
            </div>
            <div style={{fontSize:'12px',color:'var(--text3)',marginBottom:'12px',lineHeight:1.5}}>Share this invite code with your team — they can use it or click the invite link to join your organisation.</div>
            <div className="invite-code-box">
              <div className="invite-code-val">{created.inviteCode}</div>
              <div className="invite-code-lbl">Invite Code · Share with your team</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'20px',marginTop:'4px'}}>
              <button className="btn-ghost" style={{padding:'9px',fontSize:'9px',display:'flex',alignItems:'center',justifyContent:'center',gap:'5px'}}
                onClick={()=>{navigator.clipboard?.writeText(created.inviteCode);alert('Invite code copied!');}}>
                📋 Copy Code
              </button>
              <button className="btn-ghost" style={{padding:'9px',fontSize:'9px',display:'flex',alignItems:'center',justifyContent:'center',gap:'5px'}}
                onClick={()=>{navigator.clipboard?.writeText(inviteLink);alert('Invite link copied!');}}>
                🔗 Copy Invite Link
              </button>
            </div>
            {/* WhatsApp */}
            <a href={`https://wa.me/?text=${encodeURIComponent(`You're invited to join ${created.name} on Mradi HQ! Tap the link to get started:\n${inviteLink}`)}`}
              target="_blank" rel="noopener"
              style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',width:'100%',padding:'11px',background:'#25D366',color:'#fff',borderRadius:'8px',textDecoration:'none',fontFamily:"'JetBrains Mono',monospace",fontSize:'10px',fontWeight:'800',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'16px'}}>
              📲 Send via WhatsApp
            </a>
            <button className="btn-primary" style={{width:'100%',padding:'13px',fontSize:'11px'}} onClick={()=>onDone(getLocalProfile())}>
              Continue to App →
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── OrgPanel (admin management panel) ─────────────────────────
function OrgPanel({ profile, onClose, showToast }) {
  const {useState:uS} = React;
  const [tab, setTab] = uS('members');
  const [copied, setCopied] = uS(false);
  const org = getOrg();
  const isAdmin = profile?.orgRole === 'admin';
  const inviteLink = org ? `${location.origin}${location.pathname}?join=${org.inviteCode}` : '';

  const regenCode = () => {
    if(!isAdmin||!org) return;
    org.inviteCode = genCode();
    saveOrg(org);
    if(showToast) showToast('New invite code generated');
  };

  const removeMember = (memberId) => {
    if(!isAdmin||!org||memberId===org.adminId) return;
    org.members = org.members.filter(m=>m.id!==memberId);
    saveOrg(org);
    if(showToast) showToast('Member removed');
    // force re-render
    window.dispatchEvent(new Event('mradi_org_update'));
  };

  const copyInvite = (text) => {
    navigator.clipboard?.writeText(text);
    setCopied(true);
    setTimeout(()=>setCopied(false), 2000);
    if(showToast) showToast('Copied to clipboard!');
  };

  if(!org) return (
    <><div className="org-panel-overlay" onClick={onClose}/>
    <div className="org-panel" style={{padding:'32px',textAlign:'center'}}>
      <div style={{fontSize:'32px',marginBottom:'12px'}}>🏗</div>

function AuthScreen({ onDone }) {
  const [mode,     setMode]     = useState("login"); // "login" | "signup" | "reset"
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [name,     setName]     = useState("");
  const [org,      setOrg]      = useState("");
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState("");
  const [info,     setInfo]     = useState("");
  const [showPass, setShowPass] = useState(false);

  const clear = () => { setError(""); setInfo(""); };

  const handleLogin = async () => {
    if(!email.trim() || !password) { setError("Enter your email and password."); return; }
    setLoading(true); clear();
    try {
      const { user } = await sbLogin(email.trim().toLowerCase(), password);
      const profile = saveLocalProfile({
        id: user.id, name: user.name || email.split("@")[0],
        email: user.email || email.trim().toLowerCase(),
        org: user.org || "", access_token: user.access_token, isGuest: false
      });
      sbTrackUser(profile);  // analytics ping
      onDone(profile);
    } catch(e) { setError(e.message || "Login failed — check your credentials."); }
    setLoading(false);
  };

  const handleSignup = async () => {
    if(!name.trim()) { setError("Enter your full name."); return; }
    if(!email.trim() || !/\S+@\S+\.\S+/.test(email)) { setError("Enter a valid email address."); return; }
    if(password.length < 6) { setError("Password must be at least 6 characters."); return; }
    setLoading(true); clear();
    try {
      const { user } = await sbSignup(name.trim(), email.trim().toLowerCase(), password);
      const profile = saveLocalProfile({
        id: user.id, name: name.trim(),
        email: email.trim().toLowerCase(), org: org.trim(),
        access_token: user.access_token, isGuest: false
      });
      sbTrackUser(profile);
      setInfo("✓ Account created! Check your email to confirm, then sign in.");
      setMode("login");
    } catch(e) { setError(e.message || "Sign-up failed — try again."); }
    setLoading(false);
  };

  const handleReset = async () => {
    if(!email.trim()) { setError("Enter your email address."); return; }
    setLoading(true); clear();
    try {
      if(sbReady()) {
        let res;
        try {
          res = await fetch(`${FCC_CONFIG.supabaseUrl}/auth/v1/recover`, {
            method:"POST",
            headers:{ "apikey":FCC_CONFIG.supabaseKey, "Content-Type":"application/json" },
            body: JSON.stringify({ email: email.trim().toLowerCase() })
          });
        } catch(netErr) {
          throw new Error("Network error — check your internet connection.");
        }
        if(!res.ok) throw new Error("Reset request failed — try again.");
      }
      setInfo("✓ If that email exists, a reset link has been sent. Check your inbox.");
      setMode("login");
    } catch(e) { setError(e.message || "Reset failed."); }
    setLoading(false);
  };

  const submit = () => {
    if(mode==="login")  handleLogin();
    else if(mode==="signup") handleSignup();
    else handleReset();
  };

  const IS = {width:"100%",padding:"10px 12px",background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:"6px",color:"var(--text)",fontFamily:"'DM Sans',sans-serif",fontSize:"13px",outline:"none",boxSizing:"border-box",marginBottom:"12px"};
  const LS = {fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",display:"block",marginBottom:"5px"};

  return (
    <div style={{position:"fixed",inset:0,background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:950,padding:"20px",animation:"fadeIn 0.3s",overflowY:"auto"}}>
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"14px",padding:"32px",width:"min(440px,100%)",position:"relative",overflow:"hidden",boxShadow:"0 20px 64px rgba(0,0,0,0.18)",margin:"auto"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:"var(--gradient)"}}/>

        {/* Logo — pops in then vanishes */}
        <div className="auth-pop-vanish" style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"24px"}}>
          <div style={{width:"42px",height:"50px",flexShrink:0}}>
                  <svg viewBox="0 0 48 56" width="42" height="50" xmlns="http://www.w3.org/2000/svg">
                    <rect x="0" y="0" width="48" height="38" rx="7" fill="#FF5C00"/>
                    <text x="24" y="31" fontSize="28" fontWeight="900" textAnchor="middle" fontFamily="Arial Black,Arial,sans-serif" fill="#07070D">M</text>
                    <text x="24" y="52" fontSize="10" fontWeight="700" textAnchor="middle" fontFamily="Arial,Helvetica,sans-serif" fill="#FF5C00" letterSpacing="2">mradi</text>
                  </svg>
                </div>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:"22px",letterSpacing:"0.08em",color:"var(--text)",lineHeight:1}}>Mradi HQ</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",letterSpacing:"0.18em",textTransform:"uppercase"}}>Construction Intelligence Platform</div>
          </div>
        </div>

        {/* Trial badge */}
        <div style={{display:"flex",alignItems:"center",gap:"8px",background:"var(--accent)12",border:"1px solid var(--accent)33",borderRadius:"6px",padding:"8px 12px",marginBottom:"20px"}}>
          <span style={{fontSize:"14px"}}>⚡</span>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--accent)",lineHeight:1.5}}>
            {mode==="signup"
              ? <><strong>14-day free trial</strong> · All Field Pro features · No credit card ever</>
              : <><strong>Sign in</strong> to access your projects · Works offline</>
            }
          </div>
        </div>

        {mode !== "reset" && (
          <div style={{display:"flex",gap:"2px",marginBottom:"20px",background:"var(--bg)",borderRadius:"6px",padding:"3px"}}>

                style={{flex:1,padding:"8px",border:"none",borderRadius:"4px",fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",cursor:"pointer",transition:"all 0.15s",

        {mode === "reset" && (
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"16px"}}>

/* ── PHOTO LIGHTBOX ──────────────────────────────────────────────
   Opens a photo fullscreen with prev/next nav and caption.
   Works with both HTTPS URLs (Supabase Storage) and base64.
   ─────────────────────────────────────────────────────────────── */
function PhotoLightbox({ photos, startIndex, onClose }) {
  const [idx, setIdx] = useState(startIndex || 0);
  const photo = photos[idx] || {};
  const src   = photo.url || photo.src || "";
  const total = photos.length;

  // Keyboard navigation
  React.useEffect(() => {
    const handler = (e) => {
      if(e.key === "Escape")      onClose();
      if(e.key === "ArrowRight")  setIdx(i => Math.min(i + 1, total - 1));
      if(e.key === "ArrowLeft")   setIdx(i => Math.max(i - 1, 0));
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [total]);

  // Download / open in new tab helper
  const openFull = () => {
    if(!src) return;
    if(src.startsWith("http")) {
      window.open(src, "_blank");
    } else {
      // base64 — create a temporary anchor and trigger download
      const a = document.createElement("a");
      a.href  = src;
      a.download = photo.caption ? `${photo.caption}.jpg` : `site-photo-${idx + 1}.jpg`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
  };

  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.93)", zIndex:1200,
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"
    }}>
      {/* Top bar */}
      <div onClick={e=>e.stopPropagation()} style={{
        position:"absolute", top:0, left:0, right:0,
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"12px 16px", background:"rgba(0,0,0,0.6)"
      }}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"rgba(255,255,255,0.6)",letterSpacing:"0.1em"}}>
          {idx + 1} / {total}{photo.caption ? ` · ${photo.caption}` : ""}
        </span>
        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={openFull} title="Open full size / download" style={{
            background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.2)",
            color:"#fff", borderRadius:"5px", padding:"5px 10px",
            fontFamily:"'JetBrains Mono',monospace", fontSize:"9px", cursor:"pointer"
          }}>
            {src.startsWith("http") ? "🔗 Open" : "⬇ Download"}
          </button>
          <button onClick={onClose} style={{
            background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.2)",
            color:"#fff", borderRadius:"5px", padding:"5px 10px",
            fontFamily:"'JetBrains Mono',monospace", fontSize:"9px", cursor:"pointer"
          }}>✕ Close</button>
        </div>
      </div>

      {/* Image */}
      <img onClick={e=>e.stopPropagation()} src={src}
        alt={photo.caption || `Photo ${idx + 1}`}
        style={{
          maxWidth:"calc(100vw - 32px)", maxHeight:"calc(100vh - 120px)",
          objectFit:"contain", borderRadius:"6px",
          boxShadow:"0 8px 48px rgba(0,0,0,0.5)"
        }}
      />

      {/* Prev / Next arrows */}
      {idx > 0 && (
        <button onClick={e=>{e.stopPropagation();setIdx(i=>i-1);}} style={{
          position:"absolute", left:"12px", top:"50%", transform:"translateY(-50%)",
          background:"rgba(255,255,255,0.15)", border:"none", color:"#fff",
          borderRadius:"50%", width:"44px", height:"44px", fontSize:"22px",
          cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"
        }}>‹</button>
      )}
      {idx < total - 1 && (
        <button onClick={e=>{e.stopPropagation();setIdx(i=>i+1);}} style={{
          position:"absolute", right:"12px", top:"50%", transform:"translateY(-50%)",
          background:"rgba(255,255,255,0.15)", border:"none", color:"#fff",
          borderRadius:"50%", width:"44px", height:"44px", fontSize:"22px",
          cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"
        }}>›</button>
      )}

      {/* Thumbnail strip */}
      {total > 1 && (
        <div onClick={e=>e.stopPropagation()} style={{
          position:"absolute", bottom:0, left:0, right:0,
          display:"flex", gap:"6px", overflowX:"auto", padding:"10px 16px",
          background:"rgba(0,0,0,0.6)", justifyContent:"center"
        }}>
          {photos.map((p, i) => (
            <div key={i} onClick={()=>setIdx(i)} style={{
              width:"48px", height:"48px", borderRadius:"4px", overflow:"hidden",
              border: i === idx ? "2px solid var(--accent,#4299e1)" : "2px solid transparent",
              flexShrink:0, cursor:"pointer", opacity: i === idx ? 1 : 0.6, transition:"all 0.15s"
            }}>
              <img src={p.url || p.src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SHARE SNAPSHOT MODAL  (v15 — short-link edition)
   Saves payload to Supabase fcc_snapshots, returns 8-char ID.
   Share link: <base>?share=<id>  (~40 chars, works anywhere)
   ═══════════════════════════════════════════════════════════ */
function ShareSnapshotModal({proj,diaries,materials,provisions,onClose,showToast,currentUserId}){
  const [phase,    setPhase]    = useState("idle"); // idle | generating | done | error
  const [shareId,  setShareId]  = useState(null);
  const [copied,   setCopied]   = useState(false);
  const [errorMsg, setErrorMsg] = useState("");

  const shareUrl = shareId
    ? `${window.location.href.split("?")[0]}?share=${shareId}`
    : null;

  // ── Build full payload (same as before) ──────────────────────
  const buildPayload = () => ({
    site:proj.site, phases:proj.phases, wps:proj.wps,
    risks:proj.risks, snags:proj.snags, team:proj.team, workers:proj.workers||[],
    diaries:diaries||[], materials:materials||[],
    provisions:provisions||{},
    _shared:true, _sharedAt:new Date().toISOString()
  });

  // ── Generate short link ───────────────────────────────────────
  const generateLink = async () => {
    setPhase("generating"); setErrorMsg("");
    try {
      // Only pass a real UUID — guest-* and local-* IDs are not UUIDs and
      // will cause a Postgres "invalid input syntax for type uuid" rejection.
      const safeUserId = (currentUserId &&
        !currentUserId.startsWith("guest-") &&
        !currentUserId.startsWith("local-"))
        ? currentUserId : null;
      const id = await sbSaveSnapshot(buildPayload(), safeUserId);
      setShareId(id);
      setPhase("done");
      if(window.fccTrack) window.fccTrack("snapshot_saved",{id});
    } catch(e) {
      setErrorMsg(e.message || "Failed to generate link.");
      setPhase("error");
    }
  };

  // ── Copy helpers ──────────────────────────────────────────────
  const doCopy = (text, onDone) => {
    const fallback = () => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try{ document.execCommand("copy"); }catch{}
      document.body.removeChild(ta);
      onDone();
    };
    if(navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(onDone).catch(fallback);
    else fallback();
  };

  const copyLink = () => {
    if(!shareUrl) return;
    doCopy(shareUrl, () => {
      setCopied(true);
      showToast("✓ Link copied!");
      setTimeout(()=>setCopied(false), 2500);
    });
  };

  // ── Share actions (all synchronous window.open — no popup block) ──
  const shareWhatsApp = () => {
    if(!shareUrl) return;
    const text = encodeURIComponent(`📊 *${proj.site?.name||"Project"}* — Mradi HQ snapshot\n\nView it here: ${shareUrl}`);
    const win = window.open(`https://wa.me/?text=${text}`, "_blank");
    if(!win) { doCopy(shareUrl, () => showToast("✓ Copied — paste into WhatsApp")); }
    else { showToast("✓ Opening WhatsApp…"); }
    if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"whatsapp",id:shareId});
  };

  const shareEmail = () => {
    if(!shareUrl) return;
    const subject = encodeURIComponent(`Project Snapshot — ${proj.site?.name||"Site"}`);
    const body    = encodeURIComponent(`Hi,\n\nHere's the latest project snapshot from Mradi HQ.\n\nProject: ${proj.site?.name|""}\n\nView it here: ${shareUrl}\n\nRegards`);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
    if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"email",id:shareId});
  };

  const shareSMS = () => {
    if(!shareUrl) return;
    window.open(`sms:?body=${encodeURIComponent(`FCC snapshot — ${proj.site?.name||"Project"}: ${shareUrl}`)}`, "_blank");
    if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"sms",id:shareId});
  };

  const nativeShare = () => {
    if(!shareUrl || !navigator.share) return;
    navigator.share({
      title: `FCC — ${proj.site?.name||"Project"}`,
      text:  "Mradi HQ project snapshot",
      url:   shareUrl
    }).catch(()=>{});
    if(window.fccTrack) window.fccTrack("snapshot_shared",{channel:"native",id:shareId});
  };

  // ── Styles ────────────────────────────────────────────────────
  const btnCh = {display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",padding:"11px 8px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"8px",color:"var(--text)",fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",fontWeight:"700",cursor:"pointer",transition:"all 0.15s",flex:1};

  return(
    <>
      <div className="share-modal-overlay" onClick={onClose}/>
      <div className="share-modal">

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"18px"}}>
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.14em",marginBottom:"4px"}}>Share Project</div>
            <div style={{fontSize:"13px",fontWeight:"700",color:"var(--text)"}}>{proj.site?.name||"Project"}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:"18px",padding:"2px"}}>✕</button>
        </div>

        {/* ── IDLE: Generate button ── */}
        {phase==="idle" && (
          <div style={{textAlign:"center",padding:"24px 0"}}>
            <div style={{fontSize:"40px",marginBottom:"14px"}}>🔗</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",color:"var(--text)",marginBottom:"8px",fontWeight:"700"}}>
              Generate a unique shareable link
            </div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",lineHeight:1.7,marginBottom:"20px"}}>
              Creates a short link (e.g. <em>?share=ab3x7q2m</em>).<br/>
              Works in WhatsApp, SMS, email — no file attachments needed.<br/>
              Link is valid for <strong>90 days</strong>.
            </div>
            <button className="btn-primary" style={{padding:"13px 28px",fontSize:"11px"}} onClick={generateLink}>
              Generate Link →
            </button>
          </div>
        )}

        {/* ── GENERATING spinner ── */}
        {phase==="generating" && (
          <div style={{textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:"32px",animation:"spin 1s linear infinite",display:"inline-block"}}>⌘</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--text4)",marginTop:"14px",letterSpacing:"0.1em"}}>
              Saving snapshot to cloud…
            </div>
          </div>
        )}

        {/* ── ERROR state ── */}
        {phase==="error" && (
          <div style={{textAlign:"center",padding:"16px 0"}}>
            <div style={{background:"var(--red)15",border:"1px solid var(--red)44",borderRadius:"8px",padding:"14px",marginBottom:"16px",fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--red)",lineHeight:1.6}}>
              ⚠ {errorMsg}
            </div>
            <button className="btn-primary" style={{padding:"11px 24px",fontSize:"10px"}} onClick={generateLink}>
              Try Again
            </button>
          </div>
        )}

        {/* ── DONE: show link + share buttons ── */}
        {phase==="done" && shareUrl && (
          <>
            {/* Link display */}
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.1em",display:"flex",justifyContent:"space-between"}}>
              <span>Your Share Link</span>
              <span style={{color:"var(--green)",fontSize:"8px"}}>✓ saved · valid 90 days</span>
            </div>
            <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"8px",padding:"12px 14px",fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"var(--text)",wordBreak:"break-all",lineHeight:1.5,marginBottom:"10px",userSelect:"all"}}>
              {shareUrl}
            </div>
            <button className="btn-primary" style={{width:"100%",padding:"12px",marginBottom:"16px"}} onClick={copyLink}>
              {copied ? "✓ Copied!" : "📋 Copy Link"}
            </button>

            {/* Share channels */}
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}}>
              Share via
            </div>

            {navigator.share && (
              <button style={{...btnCh,width:"100%",marginBottom:"8px",flex:"none"}} onClick={nativeShare}>
                <span style={{fontSize:"16px"}}>📤</span>
                <span>Share via Apps (WhatsApp · Telegram · SMS…)</span>
              </button>
            )}

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginBottom:"8px"}}>
              <button style={btnCh} onClick={shareWhatsApp}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                <span style={{fontSize:"18px"}}>💬</span>
                <span>WhatsApp</span>
              </button>
              <button style={btnCh} onClick={shareEmail}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                <span style={{fontSize:"18px"}}>📧</span>
                <span>Email</span>
              </button>
              <button style={btnCh} onClick={shareSMS}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                <span style={{fontSize:"18px"}}>📱</span>
                <span>SMS</span>
              </button>
            </div>

            {/* Regenerate */}
            <button onClick={()=>{setPhase("idle");setShareId(null);setCopied(false);}}
              style={{background:"none",border:"none",cursor:"pointer",color:"var(--text4)",fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",textDecoration:"underline",display:"block",margin:"4px auto 0",width:"100%",textAlign:"center"}}>
              ↩ Generate a new link
            </button>

            {/* What's included chips */}
            <div style={{marginTop:"14px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"6px",padding:"10px 12px"}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"5px"}}>What's included</div>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {["Site Details","Phases","Work Packages","Risk Register","Snag List","Team","Site Diary","Materials","Provisions"].map(t=>(
                  <span key={t} style={{background:"var(--accent-bg)",border:"1px solid var(--accent)22",color:"var(--accent)",padding:"2px 7px",borderRadius:"3px",fontFamily:"'JetBrains Mono',monospace",fontSize:"8px"}}>{t}</span>
                ))}
              </div>
            </div>

            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",marginTop:"10px",lineHeight:1.5}}>
              ⚠ Only share with authorised team members — link opens the full project.
            </div>
          </>
        )}

      </div>
    </>
  );
}

function TutorialSystem({ currentView, isFirstVisit, onDismiss, onNewProject, onEditProject, hasProject }) {
  const [open, setOpen] = useState(false);
  const [activeTutorial, setActiveTutorial] = useState(null);
  const [step, setStep] = useState(0);
  const [seen, setSeen] = useState(() => {
    try { return JSON.parse(localStorage.getItem("fcc_tutorials_seen")) || {}; } catch { return {}; }
  });

  const markSeen = (id) => {
    const next = { ...seen, [id]: true };
    setSeen(next);
    try { localStorage.setItem("fcc_tutorials_seen", JSON.stringify(next)); } catch {}
  };

  // Auto-open welcome on very first visit
  useEffect(() => {
    if (isFirstVisit && !seen["welcome"]) {
      setTimeout(() => {
        setActiveTutorial(TUTORIALS[0]);
        setStep(0);
        setOpen(true);
      }, 800);
    }
  }, [isFirstVisit]);

  // Auto-suggest tutorial when entering a view for first time
  useEffect(() => {
    const viewTut = TUTORIALS.find(t => t.id === currentView);
    if (viewTut && !seen[currentView] && !open) {
      // Don't auto-open, just show a gentle prompt via a timeout
    }
  }, [currentView]);

  const openTutorial = (tut) => {
    setActiveTutorial(tut);
    setStep(0);
    setOpen(true);
  };

  const close = () => {
    if (activeTutorial) markSeen(activeTutorial.id);
    setOpen(false);
    setActiveTutorial(null);
    setStep(0);
  };

  const next = () => {
    if (step < activeTutorial.steps.length - 1) {
      setStep(s => s + 1);
    } else {
      close();
    }
  };

  const prev = () => { if (step > 0) setStep(s => s - 1); };

  const currentStep = activeTutorial ? activeTutorial.steps[step] : null;

  return (
    <>
      {/* ── Quick-action buttons — stack above help ── */}
      <div style={{
        position:"fixed", bottom:"144px", right:"16px", zIndex:400,
        display:"flex", flexDirection:"column", alignItems:"center", gap:"8px"
      }}>
        {/* Edit current project */}
        {hasProject && (
          <button
            onClick={onEditProject}
            title="Edit current project"
            style={{
              width:"44px", height:"44px", borderRadius:"50%",
              background:"var(--card)", border:"1px solid var(--border2)",
              color:"var(--text2)", fontSize:"18px", cursor:"pointer",
              boxShadow:"0 4px 16px rgba(0,0,0,0.2)",
              display:"flex", alignItems:"center", justifyContent:"center",
              transition:"all 0.2s"
            }}
            onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.1)";e.currentTarget.style.borderColor="var(--accent)";e.currentTarget.style.color="var(--accent)";}}
            onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.color="var(--text2)";}}
          >✏️</button>
        )}

        {/* New project */}
        <button
          onClick={onNewProject}
          title="New project"
          style={{
            width:"44px", height:"44px", borderRadius:"50%",
            background:"var(--card)", border:"1px solid var(--border2)",
            color:"var(--text2)", fontSize:"20px", cursor:"pointer",
            boxShadow:"0 4px 16px rgba(0,0,0,0.2)",
            display:"flex", alignItems:"center", justifyContent:"center",
            transition:"all 0.2s"
          }}
          onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.1)";e.currentTarget.style.borderColor="var(--accent)";e.currentTarget.style.color="var(--accent)";}}
          onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.color="var(--text2)";}}
        >＋</button>
      </div>

      {/* Tutorial launcher button — bottom right */}
      <button
        onClick={() => setOpen(o => !o)}
        title="Tutorials & Help"
        style={{
          position: "fixed", bottom: "88px", right: "16px", zIndex: 400,
          width: "44px", height: "44px", borderRadius: "50%",
          background: "var(--accent)", border: "none", color: "#fff",
          fontSize: "18px", cursor: "pointer", boxShadow: "0 4px 16px rgba(0,0,0,0.25)",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "all 0.2s"
        }}
        onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"}
        onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
      >
        ?
      </button>

      {/* Tutorial picker drawer */}
      {open && !activeTutorial && (
        <>
          <div onClick={() => setOpen(false)} style={{position:"fixed",inset:0,zIndex:401}}/>
          <div style={{
            position: "fixed", bottom: "144px", right: "16px", zIndex: 402,
            background: "var(--modal-bg)", border: "1px solid var(--border)",
            borderRadius: "10px", padding: "14px", width: "260px",
            boxShadow: "0 8px 32px rgba(0,0,0,0.2)", animation: "fadeUp 0.15s ease"
          }}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.14em",marginBottom:"10px"}}>
              Tutorials & Help
            </div>
            {TUTORIALS.map(tut => (
              <button key={tut.id} onClick={() => openTutorial(tut)} style={{
                width:"100%",background:seen[tut.id]?"var(--bg)":"var(--accent)10",
                border:"1px solid " + (seen[tut.id]?"var(--border)":"var(--accent)44"),
                borderRadius:"5px",padding:"9px 12px",marginBottom:"6px",
                cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",
                transition:"all 0.15s"
              }}>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:"11px",fontWeight:"700",color:"var(--text)"}}>{tut.title}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",marginTop:"2px"}}>{tut.steps.length} steps</div>
                </div>
                {seen[tut.id] && <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--green)"}}>✓ done</span>}
              </button>
            ))}
            <div style={{marginTop:"8px",borderTop:"1px solid var(--border)",paddingTop:"8px",fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)",lineHeight:1.5}}>
              Press ? anytime to reopen this menu
            </div>
          </div>
        </>
      )}

      {/* Active tutorial modal */}
      {open && activeTutorial && currentStep && (
        <>
          <div onClick={close} style={{position:"fixed",inset:0,background:"var(--overlay)",zIndex:450,animation:"fadeIn 0.2s"}}/>
          <div style={{
            position:"fixed",bottom:"100px",right:"16px",
            width:"min(340px,calc(100vw - 32px))",
            background:"var(--modal-bg)",border:"1px solid var(--border)",
            borderRadius:"12px",zIndex:451,
            boxShadow:"0 16px 48px rgba(0,0,0,0.3)",animation:"fadeUp 0.2s ease",
            overflow:"hidden"
          }}>
            {/* Progress bar */}
            <div style={{height:"3px",background:"var(--border)"}}>
              <div style={{height:"100%",width:`${((step+1)/activeTutorial.steps.length)*100}%`,background:"var(--accent)",transition:"width 0.3s ease"}}/>
            </div>

            <div style={{padding:"16px 18px"}}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"0.12em"}}>
                  {activeTutorial.title}
                </div>
                <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"var(--text4)"}}>
                    {step+1}/{activeTutorial.steps.length}
                  </span>
                  <button onClick={close} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:"14px",padding:"0",lineHeight:1}}>✕</button>
                </div>
              </div>

              {/* Step content */}
              <div style={{fontSize:"14px",fontWeight:"800",color:"var(--text)",marginBottom:"8px",lineHeight:1.3}}>
                {currentStep.title}
              </div>
              <div style={{fontSize:"11px",color:"var(--text2)",lineHeight:1.6,marginBottom:currentStep.tip?"10px":"0"}}>
                {currentStep.body}
              </div>

              {/* Tip callout */}
              {currentStep.tip && (
                <div style={{
                  background:"var(--amber)10",border:"1px solid var(--amber)33",
                  borderRadius:"5px",padding:"8px 10px",
                  display:"flex",gap:"6px",alignItems:"flex-start"
                }}>
                  <span style={{fontSize:"12px",flexShrink:0}}>💡</span>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8.5px",color:"var(--amber)",lineHeight:1.5}}>
                    {currentStep.tip}
                  </div>
                </div>
              )}

              {/* Navigation */}
              <div style={{display:"flex",gap:"8px",marginTop:"14px",alignItems:"center"}}>
                {step > 0 ? (
                  <button onClick={prev} className="btn-ghost" style={{fontSize:"9px",padding:"7px 12px"}}>← Back</button>
                ) : (
                  <button onClick={close} className="btn-ghost" style={{fontSize:"9px",padding:"7px 12px"}}>Skip</button>
                )}
                <button onClick={next} className="btn-primary" style={{flex:1,fontSize:"9px",padding:"8px"}}>
                  {step < activeTutorial.steps.length - 1 ? "Next →" : "Got it ✓"}
                </button>
              </div>

              {/* Dots */}
              <div style={{display:"flex",gap:"5px",justifyContent:"center",marginTop:"10px"}}>
                {activeTutorial.steps.map((_,i) => (
                  <div key={i} onClick={() => setStep(i)} style={{
                    width:"6px",height:"6px",borderRadius:"50%",cursor:"pointer",
                    background:i===step?"var(--accent)":"var(--border)",
                    transition:"background 0.2s"
                  }}/>
                ))}
              </div>
            </div>
          </div>
        </>
      )}
    </>
  );
}
